name: "Cluster Setup - Configure TLS Certificates/Secrets"
description: "Configures TLS certificates/secrets for GKE, ROSA, or EKS clusters."
inputs:
  distro-platform:
    description: "Kubernetes distro platform (gke | rosa | eks)"
    required: true
  chart-path:
    description: "Path to Helm chart"
    required: true
  namespace:
    description: "Target namespace for test secrets"
    required: true
  namespace-prefix:
    description: "Namespace prefix (used only for EKS)"
    required: false
  keycloak-admin-vault-key:
    description: >-
      Vault entry path for the qa-keycloak-admin-credentials ExternalSecret's
      remoteRef.key. Empty (default) uses the helm CI shared entry.
      QA's nightly workflow should pass its own path here so the K8s secret
      qa-keycloak-admin-credentials resolves from a QA-owned vault entry,
      independently of helm CI rotations.
    required: false
    default: ""
  keycloak-admin-vault-property:
    description: >-
      Vault property name (a.k.a. key within the entry) for
      qa-keycloak-admin-credentials. Empty (default) uses keycloak-admin-password,
      which is the property name on the helm CI shared entry.
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Configure TLS Certificates/Secrets
      shell: bash
      env:
        INPUT_KEYCLOAK_ADMIN_VAULT_KEY: ${{ inputs.keycloak-admin-vault-key }}
        INPUT_KEYCLOAK_ADMIN_VAULT_PROPERTY: ${{ inputs.keycloak-admin-vault-property }}
      run: |
        set -euo pipefail

        DISTRO_PLATFORM="${{ inputs.distro-platform }}"
        TEST_NAMESPACE="${{ inputs.namespace }}"
        CHART_PATH="${{ inputs.chart-path }}"
        NAMESPACE_PREFIX="${{ inputs.namespace-prefix }}"

        # Function to apply external secrets with retry logic
        # This handles the case where the external-secrets webhook is not yet ready
        apply_external_secret_with_retry() {
          local file="$1"
          local namespace="$2"
          local max_retries=20
          local retry_delay=10

          for ((i=1; i<=max_retries; i++)); do
            echo "🔄 Attempt $i/$max_retries: Applying $file"
            if kubectl apply -n "$namespace" -f "$file" 2>&1; then
              echo "✅ Successfully applied $file"
              return 0
            else
              if [[ $i -lt $max_retries ]]; then
                echo "⚠️ Failed to apply $file, retrying in ${retry_delay}s... (webhook may not be ready)"
                sleep $retry_delay
                retry_delay=$((retry_delay * 2))
              else
                echo "❌ Failed to apply $file after $max_retries attempts"
                return 1
              fi
            fi
          done
        }

        # Apply a manifest that contains ${KEYCLOAK_ADMIN_VAULT_KEY} /
        # ${KEYCLOAK_ADMIN_VAULT_PROPERTY} placeholders, substituting from the
        # current environment.
        apply_templated_manifest_with_retry() {
          local file="$1"
          local namespace="$2"
          local max_retries=20
          local retry_delay=10
          local rendered
          rendered="$(KEYCLOAK_ADMIN_VAULT_KEY="$KEYCLOAK_ADMIN_VAULT_KEY" \
                      KEYCLOAK_ADMIN_VAULT_PROPERTY="$KEYCLOAK_ADMIN_VAULT_PROPERTY" \
                      envsubst < "$file")"
          for ((i=1; i<=max_retries; i++)); do
            echo "🔄 Attempt $i/$max_retries: Applying $file (templated)"
            if echo "$rendered" | kubectl apply -n "$namespace" -f - 2>&1; then
              echo "✅ Successfully applied $file"
              return 0
            else
              if [[ $i -lt $max_retries ]]; then
                echo "⚠️ Failed to apply $file, retrying in ${retry_delay}s..."
                sleep $retry_delay
                retry_delay=$((retry_delay * 2))
              else
                echo "❌ Failed to apply $file after $max_retries attempts"
                return 1
              fi
            fi
          done
        }

        if [[ "$DISTRO_PLATFORM" == "gke" || "$DISTRO_PLATFORM" == "rosa" ]]; then
          echo "🔧 Applying external secret certificates for $DISTRO_PLATFORM"
          apply_external_secret_with_retry \
            ".github/config/external-secret/external-secret-certificates.yaml" \
            "$TEST_NAMESPACE"

          # Apply QA keycloak admin secret. Renders the qa-keycloak-admin-credentials
          # K8s secret. Default vault path matches the existing helm-CI keycloak admin
          # entry — i.e., behavior is identical to before this change unless an
          # override is passed via the action inputs.
          # QA can override `keycloak-admin-vault-key` (and optionally
          # `keycloak-admin-vault-property`) on their workflow to point at a
          # QA-owned vault entry, giving them rotation independence from helm CI.
          KEYCLOAK_ADMIN_VAULT_KEY="${INPUT_KEYCLOAK_ADMIN_VAULT_KEY:-integration-test}"
          KEYCLOAK_ADMIN_VAULT_PROPERTY="${INPUT_KEYCLOAK_ADMIN_VAULT_PROPERTY:-keycloak-admin-password}"
          export KEYCLOAK_ADMIN_VAULT_KEY KEYCLOAK_ADMIN_VAULT_PROPERTY
          echo "ℹ️ qa-keycloak-admin-credentials → $KEYCLOAK_ADMIN_VAULT_KEY/$KEYCLOAK_ADMIN_VAULT_PROPERTY (distribution-team store)"
          apply_templated_manifest_with_retry \
            ".github/config/external-secret/external-secret-qa-keycloak-credentials.yaml" \
            "$TEST_NAMESPACE"

          # Apply external secret configuration for integration tests
          # Check for chart-specific external secret first (better approach)
          CHART_SPECIFIC_FILE="${CHART_PATH}/test/integration/external-secrets/external-secret-integration-test-credentials.yaml"

          if [[ -f "$CHART_SPECIFIC_FILE" ]]; then
            echo "✅ Applying chart-specific external secret for integration tests: $CHART_SPECIFIC_FILE"
            apply_external_secret_with_retry "$CHART_SPECIFIC_FILE" "$TEST_NAMESPACE"
          else
            echo "⚠️ Chart-specific external secret not found, using fallback"
            # For backward compatibility with other versions (alpha, future versions).
            apply_external_secret_with_retry \
              ".github/config/external-secret/external-secret-integration-test-credentials.yaml" \
              "$TEST_NAMESPACE"
          fi

          for secret in $(kubectl get externalsecret -n $TEST_NAMESPACE -o jsonpath='{.items[*].metadata.name}'); do
            echo "⏳ Waiting for ExternalSecret: $secret"
            kubectl get externalsecret/"$secret" -n $TEST_NAMESPACE
            kubectl wait --for=condition=Ready externalsecret/"$secret" -n $TEST_NAMESPACE --timeout=600s
          done

        else
          echo "🔧 Running in EKS mode"
          # Copy TLS certificate from certs namespace (EKS uses a pre-provisioned secret, not an ExternalSecret)
          if kubectl get secret aws-camunda-cloud-tls -n "$TEST_NAMESPACE" &>/dev/null; then
            echo "✅ Secret aws-camunda-cloud-tls already exists in $TEST_NAMESPACE, skipping copy"
          else
            kubectl get secret -n "${NAMESPACE_PREFIX}-certs" aws-camunda-cloud-tls -o yaml > aws-camunda-cloud-tls.yaml
            sed -i "s/namespace: ${NAMESPACE_PREFIX}-certs/namespace: $TEST_NAMESPACE/g" aws-camunda-cloud-tls.yaml
            kubectl apply -f aws-camunda-cloud-tls.yaml -n "$TEST_NAMESPACE"
          fi

          # EKS uses vault-backed ExternalSecrets (ClusterSecretStore: vault-backend)
          echo "🔧 Applying vault-backed external secrets for EKS"

          # Apply infra secrets (creates infra-credentials secret)
          apply_external_secret_with_retry \
            ".github/config/external-secret/external-secret-infra-vault.yaml" \
            "$TEST_NAMESPACE"

          # Apply credentials secrets (creates integration-test secret, for backward compat)
          apply_external_secret_with_retry \
            ".github/config/external-secret/external-secret-credentials-vault.yaml" \
            "$TEST_NAMESPACE"

          # Apply QA keycloak admin secret. Renders the qa-keycloak-admin-credentials
          # K8s secret from the vault-backend store. Default vault path matches the
          # existing helm-CI keycloak admin entry; QA can override.
          KEYCLOAK_ADMIN_VAULT_KEY="${INPUT_KEYCLOAK_ADMIN_VAULT_KEY:-products/distribution/ci/integration-test}"
          KEYCLOAK_ADMIN_VAULT_PROPERTY="${INPUT_KEYCLOAK_ADMIN_VAULT_PROPERTY:-keycloak-admin-password}"
          export KEYCLOAK_ADMIN_VAULT_KEY KEYCLOAK_ADMIN_VAULT_PROPERTY
          echo "ℹ️ qa-keycloak-admin-credentials → $KEYCLOAK_ADMIN_VAULT_KEY/$KEYCLOAK_ADMIN_VAULT_PROPERTY (vault-backend store)"
          apply_templated_manifest_with_retry \
            ".github/config/external-secret/external-secret-qa-keycloak-credentials-vault.yaml" \
            "$TEST_NAMESPACE"

          # Apply integration test credentials (creates integration-test-credentials secret)
          # Check for chart-specific vault external secret first
          CHART_SPECIFIC_VAULT_FILE="${CHART_PATH}/test/integration/external-secrets/external-secret-integration-test-credentials-vault.yaml"

          if [[ -f "$CHART_SPECIFIC_VAULT_FILE" ]]; then
            echo "✅ Applying chart-specific vault external secret for integration tests: $CHART_SPECIFIC_VAULT_FILE"
            apply_external_secret_with_retry "$CHART_SPECIFIC_VAULT_FILE" "$TEST_NAMESPACE"
          else
            echo "⚠️ Chart-specific vault external secret not found, using fallback"
            apply_external_secret_with_retry \
              ".github/config/external-secret/external-secret-integration-test-credentials-vault.yaml" \
              "$TEST_NAMESPACE"
          fi

          # Wait for all ExternalSecrets to become Ready
          for secret in $(kubectl get externalsecret -n $TEST_NAMESPACE -o jsonpath='{.items[*].metadata.name}'); do
            echo "⏳ Waiting for ExternalSecret: $secret"
            kubectl get externalsecret/"$secret" -n $TEST_NAMESPACE
            kubectl wait --for=condition=Ready externalsecret/"$secret" -n $TEST_NAMESPACE --timeout=600s
          done
        fi

        if [[ "$DISTRO_PLATFORM" == "eks" ]]; then
          echo "✅ Infra secrets already applied via vault-backed ExternalSecrets above"
        else
          echo "🔧 Applying external secret infra configuration"
          apply_external_secret_with_retry \
            ".github/config/external-secret/external-secret-infra.yaml" \
            "$TEST_NAMESPACE"
        fi

        echo "✅ TLS Certificates/Secrets configuration completed."

