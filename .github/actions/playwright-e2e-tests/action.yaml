name: Playwright E2E Tests
description: Run Playwright e2e tests using existing CI actions
inputs:
  camunda-helm-git-ref:
    description: Git ref for camunda-platform-helm checkout
    required: false
    default: main
  camunda-helm-dir:
    description: Chart directory to test (e.g., camunda-platform-8.8)
    required: false
    default: camunda-platform-8.8
  camunda-helm-upgrade-version:
    description: Helm chart version used in upgrade-patch flow
    required: false
    default: ""
  flow:
    description: Setup flow (install, upgrade-patch, upgrade-minor)
    required: false
    default: install
  distro-platform:
    description: Target platform (gke, rosa, eks)
    required: true
  infra-type:
    description: Infrastructure type (standard or preemptible)
    required: true
  identifier:
    description: Unique identifier used for namespace/host
    required: true
  namespace-prefix:
    description: Optional namespace prefix
    required: false
    default: ""
  deployment-ttl:
    description: TTL for deployment lifespan
    required: false
    default: "12h"
  auth:
    description: Authentication type to use for tests
    required: true
  auth-data:
    description: Serialized auth data for cluster-auth action
    required: false
    default: ""
  exclude:
    description: Test suites to exclude
    required: false
    default: ""
  test-stage:
    description: Test stage identifier (after-install or after-upgrade)
    required: true
  shard-index:
    description: Shard index for parallel test execution
    required: false
    default: "1"
  scenario:
    description: The scenario being tested (e.g., opensearch, keycloak-rba, keycloak-mt, multitenancy)
    required: false
    default: "elasticsearch"
  run-smoke-tests:
    description: If true, run only the smoke-tests project. If false, run the full-suite project.
    required: false
    default: "true"
  management-namespace:
    description: >-
      For a multi-namespace topology scenario: the namespace running the
      central Identity/Keycloak. A deploy-camunda binary is downloaded so
      run-e2e-tests.sh can merge the two namespaces' .env via
      `deploy-camunda e2e-env merge`. Pair with namespace-override so
      TEST_NAMESPACE resolves to the orchestration namespace.
    required: false
    default: ""
  namespace-override:
    description: >-
      Overrides the namespace workflow-vars would otherwise compute from
      identifier/namespace-prefix. Used by multi-namespace topology callers,
      whose per-release namespace (e.g. <base>-orcha) workflow-vars has no
      way to derive on its own.
    required: false
    default: ""
  binary-artifact-name:
    description: Name of the uploaded deploy-camunda binary artifact to download (only used when management-namespace is set).
    required: false
    default: deploy-camunda-binary
runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        # Skip if gettext-base is already installed (pre-configured container)
        if command -v envsubst &> /dev/null; then
          echo "envsubst already available, skipping system dependencies installation"
          exit 0
        fi
        
        # Install gettext for envsubst command used by render-e2e-env.sh
        # Note: no sudo — containers run as root, and sudo may not be installed.
        if command -v apt-get &> /dev/null; then
          install_packages() {
            apt-get update && apt-get install -y gettext-base
          }

          # Try up to 5 times with exponential backoff
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt of 5..."
            if install_packages; then
              echo "Successfully installed packages"
              break
            fi

            if [ $attempt -lt 5 ]; then
              echo "apt-get failed, cleaning cache and retrying in $((attempt * 30)) seconds..."
              rm -rf /var/lib/apt/lists/*
              sleep $((attempt * 30))

              # On third attempt, try switching to a different mirror
              if [ $attempt -eq 3 ]; then
                echo "Switching to alternative Ubuntu mirror..."
                sed -i 's|http://archive.ubuntu.com|http://mirrors.edge.kernel.org|g' /etc/apt/sources.list 2>/dev/null || true
                sed -i 's|http://security.ubuntu.com|http://mirrors.edge.kernel.org|g' /etc/apt/sources.list 2>/dev/null || true
              fi
            else
              echo "All attempts failed"
              exit 1
            fi
          done
        elif command -v apk &> /dev/null; then
          apk add --no-cache gettext
        fi

    - name: Check if tools are pre-installed
      id: check-tools
      shell: bash
      run: |
        if command -v helm &> /dev/null && command -v kubectl &> /dev/null; then
          echo "Tools are pre-installed in container, skipping installation"
          echo "skip-install=true" >> "$GITHUB_OUTPUT"
        else
          echo "Tools not found, will install"
          echo "skip-install=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install if required common software tooling
      if: steps.check-tools.outputs.skip-install != 'true'
      uses: camunda/infra-global-github-actions/common-tooling@305de9730455a10c1df97262d42ced69855f2b16 # main
      with:
        overwrite: "false"
        build-essential-enabled: "false"
        node-enabled: "true"
        yarn-enabled: "false"
        buildx-enabled: "false"
        java-enabled: "false"
        python-enabled: "false"

    - name: Install tools
      if: steps.check-tools.outputs.skip-install != 'true'
      uses: ./.github/actions/install-tool-versions
      with:
        tools: |
          helm
          kubectl
          oc
          yq
          zbctl
          jq

    - name: Download deploy-camunda binary (multi-namespace topology)
      if: inputs.management-namespace != ''
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: ${{ inputs.binary-artifact-name }}
        path: ${{ runner.temp }}/bin
    - name: Add deploy-camunda to PATH (multi-namespace topology)
      if: inputs.management-namespace != ''
      shell: bash
      run: |
        chmod +x "${RUNNER_TEMP}/bin/deploy-camunda"
        echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"

    - name: Set workflow vars
      id: vars
      uses: ./.github/actions/workflow-vars
      with:
        deployment-ttl: ${{ inputs.deployment-ttl }}
        setup-flow: ${{ inputs.flow }}
        platform: ${{ inputs.distro-platform }}
        identifier-base: ${{ inputs.identifier }}
        chart-dir: ${{ inputs.camunda-helm-dir }}
        chart-upgrade-version: ${{ inputs.camunda-helm-upgrade-version }}
        prefix: ${{ inputs.namespace-prefix }}

    - name: Override TEST_NAMESPACE (multi-namespace topology)
      if: inputs.namespace-override != ''
      shell: bash
      run: echo "TEST_NAMESPACE=${{ inputs.namespace-override }}" | tee -a "$GITHUB_ENV"

    - name: Authenticate to cluster
      id: cluster-auth
      uses: ./.github/actions/cluster-auth
      with:
        platform: ${{ inputs.distro-platform }}
        auth-data: ${{ inputs.auth-data }}
      env:
        GH_APP_ID:        ${{ env.GH_APP_ID }}
        GH_APP_KEY:       ${{ env.GH_APP_KEY }}
        GKE_CLUSTER_NAME: ${{ env.GKE_CLUSTER_NAME }}
        GKE_CLUSTER_LOC:  ${{ env.GKE_CLUSTER_LOC }}
        GKE_WIP:          ${{ env.GKE_WIP }}
        GKE_SA:           ${{ env.GKE_SA }}
        ROSA_URL:         ${{ env.ROSA_URL }}
        ROSA_USER:        ${{ env.ROSA_USER }}
        ROSA_PASS:        ${{ env.ROSA_PASS }}
        CLUSTER_NAME:     ${{ env.INFRA_CLUSTER_NAME }}

    - name: Set test type vars
      id: test-type-vars
      uses: ./.github/actions/test-type-vars
      with:
        chart-dir: ${{ inputs.camunda-helm-dir }}
        infra-type: ${{ inputs.infra-type }}
        platform: ${{ inputs.distro-platform }}
        flow: ${{ inputs.flow }}

    - name: Run Playwright E2E Tests
      shell: bash
      env:
        TEST_NAMESPACE: ${{ env.TEST_NAMESPACE }}
        ABSOLUTE_TEST_CHART_DIR: ${{ env.ABSOLUTE_TEST_CHART_DIR }}
        TEST_EXCLUDE: ${{ inputs.exclude }}
        TEST_AUTH_TYPE: ${{ inputs.auth }}
        MANAGEMENT_NAMESPACE: ${{ inputs.management-namespace }}
      run: |
        cd "$GITHUB_WORKSPACE/scripts"
        # Unset KEYCLOAK_REALM to avoid conflicts with the integration tests
        unset KEYCLOAK_REALM

        # Build scenario-specific flags
        EXTRA_FLAGS=""
        SMOKE_FLAG="${{ inputs.run-smoke-tests == 'true' && '--run-smoke-tests' || '' }}"
        if [[ "${{ inputs.scenario }}" == opensearch* ]]; then
          EXTRA_FLAGS="--opensearch"
        elif [[ "${{ inputs.scenario }}" == "keycloak-rba" ]]; then
          EXTRA_FLAGS="--rba"
        elif [[ "${{ inputs.scenario }}" == "keycloak-mt" ]] || [[ "${{ inputs.scenario }}" == "multitenancy" ]]; then
          EXTRA_FLAGS="--mt"
        elif [[ "${{ inputs.scenario }}" == "auth0" ]]; then
          # auth0 uses its own Playwright project (auth0-smoke); do NOT pass
          # --run-smoke-tests, which would otherwise route to the Keycloak-
          # coupled smoke-tests project.
          EXTRA_FLAGS="--auth0"
          SMOKE_FLAG=""
        fi

        MGMT_NS_FLAG=""
        [[ -n "$MANAGEMENT_NAMESPACE" ]] && MGMT_NS_FLAG="--management-namespace ${MANAGEMENT_NAMESPACE}"

        ./run-e2e-tests.sh --absolute-chart-path "${ABSOLUTE_TEST_CHART_DIR}" --namespace "${TEST_NAMESPACE}" ${SMOKE_FLAG} --trace retain-on-failure --verbose ${EXTRA_FLAGS} ${MGMT_NS_FLAG}

    - name: Upload blob report to GitHub Actions Artifacts
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: blob-report-${{ inputs.identifier }}-${{ inputs.flow }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.test-stage }}-${{ inputs.shard-index }}
        path: ${{ env.ABSOLUTE_TEST_CHART_DIR }}/test/e2e/blob-report
        retention-days: 1

    - name: Set report date
      id: report_date
      if: ${{ !cancelled() }}
      shell: bash
      run: echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> "$GITHUB_OUTPUT"

    - name: Upload Playwright JSON results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: playwright-results-json-${{ github.run_id }}-${{ inputs.identifier }}-${{ inputs.flow }}-${{ inputs.distro-platform }}-${{ inputs.test-stage }}-${{ inputs.shard-index }}-${{ steps.report_date.outputs.date }}
        path: ${{ env.ABSOLUTE_TEST_CHART_DIR }}/test/e2e/test-results/playwright-results.json
        if-no-files-found: warn
        retention-days: 5

    - name: Upload Playwright traces for failed tests
      if: ${{ failure() && !cancelled() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: playwright-traces-${{ github.run_id }}-${{ inputs.identifier }}-${{ inputs.flow }}-${{ inputs.distro-platform }}-${{ inputs.test-stage }}-${{ inputs.shard-index }}-${{ steps.report_date.outputs.date }}
        path: |
          ${{ env.ABSOLUTE_TEST_CHART_DIR }}/test/e2e/test-results/**/trace.zip
          ${{ env.ABSOLUTE_TEST_CHART_DIR }}/test/e2e/test-results/**/*.png
        if-no-files-found: ignore
        retention-days: 5