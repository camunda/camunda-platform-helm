name: Test type vars
description: Get vars for different type of tests
inputs:
  chart-dir:
    description: A reference for the Camunda Helm chart directory.
  infra-type:
    description: standard or preemptible
  platform:
    description: matrix.distro.platform
  values-enterprise:
    description: Enable enterprise values
  values-digest:
    description: Enable digest values
  flow:
    description: Flow type, e.g., install, upgrade-patch, upgrade-minor
  camunda-version-previous:
    description: Previous Camunda version, e.g., 8.7
  upgrade-step:
    description: |
      Set to "true" when called from the upgrade phase of an upgrade flow.
      When false (default), upgrade-minor uses the previous chart version for the install phase.
      When true, the current chart-dir is used so helm upgrade deploys the new version.
    required: false
    default: "false"
outputs:
  unitTestEnabled:
    description: Should the unit test be executed or not.
    value: ${{ steps.vars.outputs.unit-enabled }}
  unitTestMatrix:
    description: JSON matrix of changed charts which will be used as input for GHA workflow matrix.
    value: ${{ steps.vars.outputs.unit-matrix }}

runs:
  using: composite
  steps:
    - name: Setup deploy-camunda
      uses: ./.github/actions/setup-deploy-camunda
    - name: Get test type vars
      id: vars
      shell: bash
      env:
        DISTRO_QA_E2E_TESTS_KEYCLOAK_CLIENTS_SECRET: ${{ env.DISTRO_QA_E2E_TESTS_KEYCLOAK_CLIENTS_SECRET }}
      run: |
        deploy-camunda ci test-type-vars \
          --chart-dir "${{ inputs.chart-dir }}" \
          --flow "${{ inputs.flow }}" \
          --camunda-version-previous "${{ inputs.camunda-version-previous }}" \
          --upgrade-step "${{ inputs.upgrade-step }}" \
          --values-enterprise "${{ inputs.values-enterprise }}" \
          --values-digest "${{ inputs.values-digest }}"
