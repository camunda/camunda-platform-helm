---
# Renders the qa-keycloak-admin-credentials K8s secret.
# remoteRef.key and remoteRef.property are templated via envsubst before apply
# so the consumer (helm CI default, QA's own workflow, or a future tenant) can
# point at any vault entry without changing this file. Default values come from
# the apply step in .github/actions/cluster-setup-secrets/action.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: camunda-helm-existing-secrets-qa-keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: distribution-team
  target:
    name: qa-keycloak-admin-credentials  # name of the k8s Secret to be created
  data:
  - secretKey: identity-keycloak-admin-password
    remoteRef:
      key: ${KEYCLOAK_ADMIN_VAULT_KEY}
      property: ${KEYCLOAK_ADMIN_VAULT_PROPERTY}
