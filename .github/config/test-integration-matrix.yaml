matrix:
  distro:
    - name: Kubernetes
      type: kubernetes
      platform: gke
      secret: {}
    - name: Kubernetes
      type: kubernetes
      platform: eks
      secret: {}
    - name: OpenShift
      type: openshift
      platform: rosa
      secret:
        server-url: DISTRO_CI_OPENSHIFT_CLUSTER_URL
        username: DISTRO_CI_OPENSHIFT_CLUSTER_USERNAME
        password: DISTRO_CI_OPENSHIFT_CLUSTER_PASSWORD
  scenario:
    - name: Chart Install
      desc: Install chart in production-like setup with Ingress and TLS.
      flow: install
    - name: Chart Upgrade Patch (from the same minor version)
      desc: Upgrade chart from the latest released version to the current branch.
      flow: upgrade-patch
    - name: Chart Upgrade Minor (from the previous minor version)
      desc: Upgrade chart from the latest released version to the current branch.
      flow: upgrade-minor
    - name: Chart Modular Upgrade Minor (from the previous minor version)
      desc: Upgrade chart from the latest released version to the current branch.
      flow: modular-upgrade-minor
