name: Repo - Auto Approve

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    name: Auto approve allowlisted authors
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: scripts/auto-approve-gate/go.mod
          cache: false

      - name: Check author and changed files
        id: check
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          EVENT_ACTOR: ${{ github.actor }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        working-directory: scripts/auto-approve-gate
        run: go run .

      - name: Import Vault secrets
        if: ${{ steps.check.outputs.allowed == 'true' && steps.check.outputs.lane == 'human' }}
        id: vault-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/distribution/ci GH_APP_ID_DISTRO_CI;
            secret/data/products/distribution/ci GH_APP_PRIVATE_KEY_DISTRO_CI;

      - name: Generate distro-ci token
        if: ${{ steps.check.outputs.allowed == 'true' && steps.check.outputs.lane == 'human' }}
        id: app-token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
        with:
          app_id: ${{ steps.vault-secrets.outputs.GH_APP_ID_DISTRO_CI }}
          private_key: ${{ steps.vault-secrets.outputs.GH_APP_PRIVATE_KEY_DISTRO_CI }}

      - name: Approve PR (allowlisted author)
        if: ${{ steps.check.outputs.allowed == 'true' && steps.check.outputs.lane == 'human' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          approved=$(gh api "repos/${REPO}/pulls/${PR}/reviews" \
            --jq "[.[] | select(.user.login==\"distro-ci[bot]\" and .commit_id==\"${SHA}\" and .state==\"APPROVED\")] | length")
          if [[ "$approved" -gt 0 ]]; then
            echo "::notice::Already approved by distro-ci for ${SHA}; skipping."
            exit 0
          fi
          gh pr review "$PR" --approve --body "Auto-approved: author is on .github/auto-approve-allowlist.txt."

      - name: Approve PR (renovate)
        if: ${{ steps.check.outputs.allowed == 'true' && steps.check.outputs.lane == 'renovate' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          approved=$(gh api "repos/${REPO}/pulls/${PR}/reviews" \
            --jq "[.[] | select(.user.login==\"github-actions[bot]\" and .commit_id==\"${SHA}\" and .state==\"APPROVED\")] | length")
          if [[ "$approved" -gt 0 ]]; then
            echo "::notice::Already approved by github-actions for ${SHA}; skipping."
            exit 0
          fi
          gh pr review "$PR" --approve --body "Auto-approved: Renovate PR (re-approved on every push)."
      - name: Dismiss stale bot approvals
        if: ${{ steps.check.outputs.allowed != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ids=$(gh api "repos/${REPO}/pulls/${PR}/reviews" --paginate \
            --jq '[.[] | select((.user.login=="github-actions[bot]" or .user.login=="distro-ci[bot]") and .state=="APPROVED")] | .[].id')
          for id in $ids; do
            gh api -X PUT "repos/${REPO}/pulls/${PR}/reviews/${id}/dismissals" \
              -f message="Head is no longer auto-approvable; dismissing stale bot approval." \
              -f event="DISMISS"
            echo "::notice::dismissed stale bot approval ${id}"
          done
