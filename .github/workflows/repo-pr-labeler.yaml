name: Repo - Pull Request Labels

on:
  pull_request_target:

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Run Labeler
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6
        with:
          configuration-path: .github/config/pr-labeler.yaml
