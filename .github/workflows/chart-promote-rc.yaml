# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
name: "Chart - Release - Pipeline - 2 - Promote RC"

on:
  workflow_dispatch:
    inputs:
      dev-tag:
        description: |
          Dev package tag to promote to RC.
          Format: {version}-dev-{sha} (e.g., "13.4.0-dev-abc1234")
          Or rolling tag: {chart-major}-dev-latest (e.g., "13-dev-latest")
        required: true
        type: string
      dry-run:
        description: |
          Dry run: validate the dev package and stage real RC tags to isolated
          {version}-rc-dryrun / {major}-rc-dryrun-latest Harbor tags, exercise
          release-notes/matrix generation locally, but skip the release-please
          PR, branch push, and project-board add. The internal dryrun tags are
          deletable residue.
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ inputs.dev-tag }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  HARBOR_REGISTRY: registry.camunda.cloud
  HARBOR_PROJECT: team-distribution
  RELEASE_PLEASE_CONFIG_FILE: .github/config/release-please/release-please-config.json
  RELEASE_PLEASE_MANIFEST_FILE: .github/config/release-please/.release-please-manifest.json

jobs:
  promote-rc:
    name: Promote to RC
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      sha: ${{ steps.parse.outputs.sha }}
      chart-major: ${{ steps.parse.outputs.chart_major }}
      camunda-version: ${{ steps.package.outputs.camunda_version }}
      chart-dir-id: ${{ steps.package.outputs.chart_dir_id }}
      rc-tag: ${{ steps.parse.outputs.rc_tag }}
      release-pr-url: ${{ steps.release-please.outputs.pr_url }}
    steps:
      - name: Info - ℹ️ Print workflow inputs ℹ️
        env:
          GITHUB_CONTEXT: ${{ toJson(inputs) }}
        run: |
          if [[ -n "${INITIAL_CLAIM_VALUE}" ]]; then
            echo "::add-mask::${INITIAL_CLAIM_VALUE}"
          fi
          echo "Workflow Inputs:"
          echo "${GITHUB_CONTEXT}" | jq '."extra-values" = "<Check below>"'
          echo "Workflow Inputs - Extra Values:"
          echo "${GITHUB_CONTEXT}" | jq -r '."extra-values"'

      - name: Import Vault secrets
        id: test-credentials-secret
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/distribution/ci GH_APP_ID_DISTRO_CI;
            secret/data/products/distribution/ci GH_APP_PRIVATE_KEY_DISTRO_CI;
            secret/data/products/distribution/ci HARBOR_REGISTRY_USER;
            secret/data/products/distribution/ci HARBOR_REGISTRY_PASSWORD;
          exportEnv: false

      - name: Generate GitHub token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
        id: generate-github-token
        with:
          app_id: ${{ steps.test-credentials-secret.outputs.GH_APP_ID_DISTRO_CI }}
          private_key: ${{ steps.test-credentials-secret.outputs.GH_APP_PRIVATE_KEY_DISTRO_CI }}

      # "Parse dev tag" runs before the commit SHA is known, so build release-tools
      # here. The binary in /tmp survives the later checkout-at-SHA.
      - name: Checkout for tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install tools for tooling
        uses: ./.github/actions/install-tool-versions
        with:
          tools: |
            golang

      - name: Build release-tools
        run: cd scripts/release-tools && go build -o /tmp/release-tools .

      - name: Parse dev tag
        id: parse
        env:
          HARBOR_API: "https://${{ env.HARBOR_REGISTRY }}/api/v2.0"
          HARBOR_REPO: "projects/${{ env.HARBOR_PROJECT }}/repositories/camunda-platform"
          HARBOR_REGISTRY_USER: ${{ steps.test-credentials-secret.outputs.HARBOR_REGISTRY_USER }}
          HARBOR_REGISTRY_PASSWORD: ${{ steps.test-credentials-secret.outputs.HARBOR_REGISTRY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          input_tag="${{ inputs.dev-tag }}"

          # A rolling tag ({major}-dev-latest) needs the artifact's tag list to
          # resolve to a concrete {version}-dev-{sha}; fetch it for resolve-tag.
          tags_args=()
          if [[ "$input_tag" =~ ^[0-9]+-dev-latest$ ]]; then
            echo "::notice::Rolling tag detected: ${input_tag}, resolving to actual dev tag..."
            curl -sf "${HARBOR_API}/${HARBOR_REPO}/artifacts/${input_tag}/tags" \
              -u "${HARBOR_REGISTRY_USER}:${HARBOR_REGISTRY_PASSWORD}" \
              --retry 3 --retry-delay 5 --retry-all-errors > /tmp/dev-tags.json
            tags_args=(--tags-file /tmp/dev-tags.json)
          fi

          # With --dry-run, rc_tag/rc_latest_tag carry the isolated
          # {version}-rc-dryrun / {major}-rc-dryrun-latest names.
          if [[ "${DRY_RUN}" == "true" ]]; then
            tags_args+=(--dry-run)
          fi

          # Resolve + validate the dev tag; emit resolved_tag/version/chart_major/
          # rc_tag/rc_latest_tag to $GITHUB_OUTPUT. The short commit SHA is printed
          # to stdout and expanded to the full SHA below.
          sha=$(/tmp/release-tools resolve-tag --kind dev --input-tag "$input_tag" "${tags_args[@]}")

          # Resolve short SHA to full 40-char commit SHA (GitHub API stays glue).
          # actions/checkout treats short SHAs as branch/tag names and fails.
          if [[ ${#sha} -lt 40 ]]; then
            echo "::notice::Short SHA detected (${sha}); resolving via GitHub API..."
            full_sha=$(curl -sfL \
              -H "Authorization: Bearer ${{ steps.generate-github-token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${sha}" | jq -r '.sha')
            if [[ -z "${full_sha}" || "${full_sha}" == "null" ]]; then
              echo "::error::Failed to resolve short SHA '${sha}' to a full commit SHA"
              exit 1
            fi
            sha="${full_sha}"
            echo "::notice::Resolved to full SHA: ${sha}"
          fi

          echo "sha=${sha}" | tee -a $GITHUB_OUTPUT

      - name: Checkout at commit SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ steps.parse.outputs.sha }}
          fetch-depth: 0
          token: ${{ steps.generate-github-token.outputs.token }}

      - name: Validate commit is on main
        run: |
          if ! git branch -r --contains ${{ steps.parse.outputs.sha }} | grep -q "origin/main"; then
            echo "::error::Commit ${{ steps.parse.outputs.sha }} is not on main branch"
            exit 1
          fi

      - name: Login to Harbor
        env:
          HARBOR_REGISTRY_USER: ${{ steps.test-credentials-secret.outputs.HARBOR_REGISTRY_USER }}
          HARBOR_REGISTRY_PASSWORD: ${{ steps.test-credentials-secret.outputs.HARBOR_REGISTRY_PASSWORD }}
        run: |
          # Retrying registry login; harbor_helm_pull below also re-auths on 401.
          source "${GITHUB_WORKSPACE}/scripts/harbor-retry.sh"
          harbor_login

      - name: Install tools
        uses: ./.github/actions/install-tool-versions
        with:
          tools: |
            helm
            git-cliff
            yq

      - name: Pull and validate dev package
        id: package
        env:
          HARBOR_REGISTRY_USER: ${{ steps.test-credentials-secret.outputs.HARBOR_REGISTRY_USER }}
          HARBOR_REGISTRY_PASSWORD: ${{ steps.test-credentials-secret.outputs.HARBOR_REGISTRY_PASSWORD }}
        run: |
          source "${GITHUB_WORKSPACE}/scripts/harbor-retry.sh"
          echo "Checking for package: ${{ steps.parse.outputs.resolved_tag }}"

          PULL_RC=0
          harbor_helm_pull "oci://${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/camunda-platform" \
            --version "${{ steps.parse.outputs.resolved_tag }}" \
            --destination /tmp || PULL_RC=$?
          if [[ ${PULL_RC} -eq 2 ]]; then
            echo "::error::Harbor auth failure pulling dev package: ${{ steps.parse.outputs.resolved_tag }}"
            exit 1
          elif [[ ${PULL_RC} -ne 0 ]]; then
            echo "::error::Dev package not found in Harbor: ${{ steps.parse.outputs.resolved_tag }}"
            exit 1
          fi
          
          package_file=$(ls /tmp/camunda-platform-*.tgz)
          echo "✅ Dev package exists: ${package_file}"
          echo "package_file=${package_file}" | tee -a $GITHUB_OUTPUT
          
          # Extract camunda_version (appVersion, .x-stripped), chart_dir_id, the
          # component-image-versions annotation and has_image_overrides from the
          # package's Chart.yaml → $GITHUB_OUTPUT.
          tar -xzf "${package_file}" camunda-platform/Chart.yaml -O > /tmp/Chart.yaml
          /tmp/release-tools chart-metadata --chart-yaml /tmp/Chart.yaml

      - name: Install release-please
        run: npm i release-please -g

      - name: Run release-please
        id: release-please
        env:
          GH_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          chart_path="charts/camunda-platform-${{ steps.package.outputs.chart_dir_id }}"
          head_ref="release-please--branches--main--components--camunda-platform-${{ steps.package.outputs.chart_dir_id }}"

          dry_run_args=()
          if [[ "${DRY_RUN}" == "true" ]]; then
            dry_run_args=(--dry-run)
          fi

          # Always pass --release-as with the version from the dev tag. This ensures
          # the release-please PR version matches exactly what the dev build computed.
          # Without this, release-please recomputes the version from the release tag
          # baseline, which preserves alpha suffixes even after a stable transition.
          echo "::notice::Forcing release-please version to '${{ steps.parse.outputs.version }}'"

          release-please release-pr \
            --token="${{ steps.generate-github-token.outputs.token }}" \
            --repo-url="${{ github.repository }}" \
            --target-branch="main" \
            --path="${chart_path}" \
            --config-file="${{ env.RELEASE_PLEASE_CONFIG_FILE }}" \
            --manifest-file="${{ env.RELEASE_PLEASE_MANIFEST_FILE }}" \
            --release-as="${{ steps.parse.outputs.version }}" \
            "${dry_run_args[@]}" \
            --debug 2>&1 | tee release-please.log

          if grep -qiE 'aborting|untagged, merged release PRs outstanding' release-please.log; then
            echo "::error::release-please aborted (likely due to a merged release PR still labeled as pending)."
            echo "::error::Fix the outstanding release PR labels (e.g., set 'autorelease: published') and re-run this workflow."
            exit 1
          fi

          echo "head_ref=${head_ref}" | tee -a "$GITHUB_OUTPUT"

          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "::notice::[dry run] release-please ran with --dry-run; no PR was created or updated."
            echo "pr_url=" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine the release-please PR for this component deterministically.
          pr_url="$(gh pr list --state open --head "${head_ref}" --base main --json url --jq '.[0].url // empty' 2>/dev/null || true)"
          if [[ -z "${pr_url}" ]]; then
            echo "::error::No open release-please PR found for component head '${head_ref}'."
            echo "::error::This indicates release-please did not create/update a PR (or there are no releasable changes)."
            echo "::error::Refusing to retag Harbor RC without a corresponding open release-please PR for review/merge."
            exit 1
          fi
          echo "pr_url=${pr_url}" | tee -a "$GITHUB_OUTPUT"

          echo "::notice::Release-please PR: ${pr_url}"

      - name: Generate release files on the release-please PR
        env:
          GH_TOKEN: ${{ steps.generate-github-token.outputs.token }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail

          chart_version="${{ steps.parse.outputs.version }}"
          app_version="${{ steps.package.outputs.camunda_version }}"
          chart_path="charts/camunda-platform-${{ steps.package.outputs.chart_dir_id }}"
          head_ref="${{ steps.release-please.outputs.head_ref }}"

          # In dry-run no release-please branch exists; generate against the
          # dev-SHA checkout instead to keep real coverage of the generators.
          if [[ "${DRY_RUN}" != "true" ]]; then
            git fetch origin "${head_ref}"
            git checkout "${head_ref}"
          fi

          make helm.repos-add
          make helm.dependency-update chartPath="${chart_path}"

          # Chart.yaml release annotations + RELEASE-NOTES.md (body + image footer).
          /tmp/release-tools release-notes --main "${chart_path}"
          /tmp/release-tools release-notes --footer "${chart_path}"

          # version-matrix entry (standard + enterprise images) + per-app + index READMEs.
          version_matrix_file="version-matrix/camunda-${app_version}/version-matrix.json"
          /tmp/release-tools update-matrix \
            --chart-dir "${chart_path}" \
            --chart-version "${chart_version}" \
            --matrix-file "${version_matrix_file}" \
            --app "${app_version}"
          /tmp/release-tools version-matrix --readme "${app_version}"
          /tmp/release-tools version-matrix --index

          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "::notice::[dry run] Generated release files locally; skipping commit, push, and project-board add. Changes:"
            git status --short -- "${chart_path}" version-matrix
            exit 0
          fi

          git config user.name "distro-ci[bot]"
          git config user.email "122795778+distro-ci[bot]@users.noreply.github.com"
          git add "${chart_path}/Chart.yaml" "${chart_path}/RELEASE-NOTES.md" \
            "${version_matrix_file}" \
            "version-matrix/camunda-${app_version}/README.md" \
            "version-matrix/README.md"
          if git diff --cached --quiet; then
            echo "::notice::No release-file changes"
          else
            git commit -m "chore: generate release files from dev package ${{ steps.parse.outputs.resolved_tag }}"
            git push origin "${head_ref}"
            echo "::notice::Updated release files on release-please branch"
          fi

          # Add the release PR to the release board.
          gh project item-add 33 --owner camunda \
            --url "${{ steps.release-please.outputs.pr_url }}" >/dev/null || true

          git checkout "${{ steps.parse.outputs.sha }}"

      - name: Add RC tags to Harbor package
        env:
          HARBOR_API: "https://${{ env.HARBOR_REGISTRY }}/api/v2.0"
          HARBOR_REPO: "projects/${{ env.HARBOR_PROJECT }}/repositories/camunda-platform"
          HARBOR_REGISTRY_USER: ${{ steps.test-credentials-secret.outputs.HARBOR_REGISTRY_USER }}
          HARBOR_REGISTRY_PASSWORD: ${{ steps.test-credentials-secret.outputs.HARBOR_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          # Point {version}-rc and {major}-rc-latest at the dev artifact's digest,
          # idempotently (no-op if already there, else move). Untagging uses the
          # deleteTag endpoint (DELETE .../tags/{tag}) so only the tag is removed,
          # never the shared artifact. Auth is HARBOR_REGISTRY_USER/PASSWORD (env).
          # In dry-run, rc_tag/rc_latest_tag are the isolated {version}-rc-dryrun /
          # {major}-rc-dryrun-latest names, so real tags land in a deletable
          # namespace and the normal rc tags are never touched.
          api="${HARBOR_API}"
          repo="${HARBOR_REPO}"

          # Digest of the dev artifact the RC tags should point at.
          digest=$(/tmp/release-tools harbor-tag digest --api "$api" --repo "$repo" \
            --ref "${{ steps.parse.outputs.resolved_tag }}")
          echo "Digest: ${digest}"

          # RC version tag — reruns safe (overwrite if it points elsewhere).
          /tmp/release-tools harbor-tag ensure --api "$api" --repo "$repo" \
            --digest "${digest}" --tag "${{ steps.parse.outputs.rc_tag }}"

          # RC rolling latest tag — always move to the selected digest.
          /tmp/release-tools harbor-tag ensure --api "$api" --repo "$repo" \
            --digest "${digest}" --tag "${{ steps.parse.outputs.rc_latest_tag }}" --move

          echo "✅ RC tags added successfully"

      - name: Summary
        env:
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          RC_TAG="${{ steps.parse.outputs.rc_tag }}"
          DEV_TAG="${{ steps.parse.outputs.resolved_tag }}"
          COMMIT_SHA="${{ steps.parse.outputs.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          CAMUNDA_VERSION="${{ steps.package.outputs.camunda_version }}"
          IMAGE_VERSIONS="${{ steps.package.outputs.image_versions }}"

          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${COMMIT_SHA}"

          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "## 🧪 DRY RUN 🧪 RC Promotion Rehearsal: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ RC Promoted: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF

          | | |
          |---|---|
          | **RC Tag** | \`${RC_TAG}\` |
          | **Dev Tag** | \`${DEV_TAG}\` |
          | **Camunda** | \`${CAMUNDA_VERSION}\` |
          | **Source** | [\`${SHORT_SHA}\`](${COMMIT_URL}) |
          EOF

          # Add image versions if available
          if [[ -n "${IMAGE_VERSIONS}" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Component Images" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Component | Version |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
            echo "${IMAGE_VERSIONS}" | while IFS=': ' read -r component version; do
              [[ -n "${component}" && -n "${version}" ]] && echo "| ${component} | \`${version}\` |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          PR_URL="${{ steps.release-please.outputs.pr_url }}"
          if [[ -n "${PR_URL}" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Release Please PR" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "[${PR_URL}](${PR_URL})" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${DRY_RUN}" == "true" ]]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF

          ### Dry Run Notes

          - No release-please PR was created or updated.
          - Harbor tags \`${RC_TAG}\` and \`${{ steps.parse.outputs.rc_latest_tag }}\` are real but isolated dry-run residue — deletable at any time.
          - To rehearse the next stage: run **Chart - Release - Pipeline - 3 - Public** with \`${RC_TAG}\` and dry-run enabled.
          EOF
          else
            cat >> $GITHUB_STEP_SUMMARY << EOF

          ### Next Steps

          1. QA: Test RC from Harbor using \`${RC_TAG}\`
          2. Review release-please PR
          3. Run **Chart - Release - Pipeline - 3 - Public** with \`${RC_TAG}\`
          EOF
          fi

  notify-on-failure:
    name: Notify on Failure
    needs: [promote-rc]
    if: ${{ failure() && !inputs.dry-run }}
    runs-on: ubuntu-latest
    steps:
      - name: Import Vault secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/distribution/ci SLACK_DISTRO_BOT_WEBHOOK;
          exportEnv: false
      - name: Send Slack notification
        continue-on-error: true
        uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc # v3.0.5
        with:
          webhook: ${{ steps.secrets.outputs.SLACK_DISTRO_BOT_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "Chart RC Promotion Failed"
                  emoji: true
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    <!subteam^S05K9BK6RTK> :rotating_light:
                    The *Chart RC Promotion* pipeline has failed.

                    *Dev tag:* ${{ inputs.dev-tag }}

                    <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed workflow>
