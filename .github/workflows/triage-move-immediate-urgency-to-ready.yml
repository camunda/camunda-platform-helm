# type: Project Management
# owner: @camunda/distribution-team
---
# Move Immediate Urgency Issues to Ready
#
# This workflow automatically moves issues with urgency=immediate to the Ready status.
# It bypasses the normal Ready queue cap to ensure critical issues are prioritized.
#
# How it works:
# - Triggers after the Urgency field is updated (on labeled events)
# - Checks if an issue has urgency=immediate
# - Moves it to ⏭️ Ready status in Project #33
#
# Related workflows:
# - triage-assign-urgency-to-issue.yml - Sets the Urgency field
#
name: Triage - Move immediate urgency to ready

on:
  issues:
    types: [labeled, unlabeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process (optional)'
        required: false
      project_id:
        description: 'Target project ID (optional, defaults to 33)'
        required: false
      dry_run:
        description: 'Dry run mode - check urgency but do not move issue'
        required: false
        type: boolean
        default: 'false'

concurrency:
  group: move-to-ready-${{ github.event.inputs.issue_number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  move-immediate-to-ready:
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 10
    env:
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}
      ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
      PROJECT_NUMBER: ${{ github.event.inputs.project_id || '33' }}
      URGENCY_FIELD_NAME: 'Urgency'
      STATUS_FIELD_NAME: 'Status'
      READY_STATUS_NAME: '⏭️ Ready'
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Import Vault secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b  # v3.4.0
        id: vault-secrets
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/distribution/ci GH_APP_ID_DISTRO_CI;
            secret/data/products/distribution/ci GH_APP_PRIVATE_KEY_DISTRO_CI;
          exportEnv: true

      - name: Generate GitHub token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a  # v2
        id: generate-github-token
        with:
          app_id: ${{ env.GH_APP_ID_DISTRO_CI }}
          private_key: ${{ env.GH_APP_PRIVATE_KEY_DISTRO_CI }}

      - name: Set GitHub token
        run: |
          echo "GH_TOKEN=${{ steps.generate-github-token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Fetch issue and project data
        id: fetch_data
        run: |
          set -euo pipefail

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🔬 DRY RUN MODE - No changes will be made"
          fi

          echo "🔍 Fetching issue #${ISSUE_NUMBER} and project ${PROJECT_NUMBER} data"

          # Single GraphQL query fetches: project info, project item, current urgency and status values
          QUERY="query(\$owner:String!,\$repo:String!,\$issueNumber:Int!,\$projectNumber:Int!){
            repository(owner:\$owner,name:\$repo){
              issue(number:\$issueNumber){
                id
                projectItems(first:100){
                  nodes{
                    id
                    project{ id number }
                    fieldValues(first:50){
                      nodes{
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          field { ... on ProjectV2SingleSelectField { name } }
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
            organization(login:\$owner){
              projectV2(number:\$projectNumber){ id }
            }
          }"

          RESP=$(gh api graphql -f query="$QUERY" -F owner="$OWNER" -F repo="$REPO" -F issueNumber="$ISSUE_NUMBER" -F projectNumber="$PROJECT_NUMBER") || {
            echo "❌ GraphQL query failed:"
            echo "$RESP"
            exit 1
          }

          # Store raw response parts in outputs for extraction where needed
          ISSUE_DATA=$(echo "$RESP" | jq -c '.data.repository.issue')
          PROJECT_DATA=$(echo "$RESP" | jq -c '.data.organization.projectV2')

          echo "✅ Fetched issue and project data"

          # Store raw data in outputs for next steps
          {
            echo "issue_data<<EOF"
            echo "$ISSUE_DATA"
            echo "EOF"
            echo "project_data<<EOF"
            echo "$PROJECT_DATA"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate project membership
        id: validate_project
        run: |
          set -euo pipefail

          ISSUE_DATA='${{ steps.fetch_data.outputs.issue_data }}'
          PROJECT_DATA='${{ steps.fetch_data.outputs.project_data }}'

          # Extract project information
          TARGET_PROJECT_NODE_ID=$(echo "$PROJECT_DATA" | jq -r '.id // empty')
          PROJECT_ITEM_ID=$(echo "$ISSUE_DATA" | jq -r --argjson pn "$PROJECT_NUMBER" \
            '.projectItems.nodes[] | select(.project.number==$pn) | .id // empty')

          echo "📦 Project: #${PROJECT_NUMBER} (id: ${TARGET_PROJECT_NODE_ID:-not found})"
          echo "🔗 Project item: ${PROJECT_ITEM_ID:-not found}"

          # Check if project exists
          if [[ -z "$TARGET_PROJECT_NODE_ID" ]]; then
            echo "❌ Target project #${PROJECT_NUMBER} not found in organization ${OWNER}"
            echo "💡 Check that the project exists and PROJECT_NUMBER is correct"
            exit 1
          fi

          # Check if issue is in the project
          if [[ -z "$PROJECT_ITEM_ID" ]]; then
            echo "⏭️ Issue #${ISSUE_NUMBER} is not in target project #${PROJECT_NUMBER}; skipping"
            echo "in_target_project=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✅ Issue is in target project (item: $PROJECT_ITEM_ID)"

          # Store extracted IDs for later use
          {
            echo "in_target_project=true"
            echo "project_v2_id=$TARGET_PROJECT_NODE_ID"
            echo "project_item_id=$PROJECT_ITEM_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Check urgency and status
        id: check_fields
        if: steps.validate_project.outputs.in_target_project == 'true'
        run: |
          set -euo pipefail

          ISSUE_DATA='${{ steps.fetch_data.outputs.issue_data }}'

          # Extract current urgency and status values
          CURRENT_URGENCY=$(echo "$ISSUE_DATA" | jq -r --argjson pn "$PROJECT_NUMBER" --arg fieldName "$URGENCY_FIELD_NAME" \
            '.projectItems.nodes[] | select(.project.number==$pn) | .fieldValues.nodes[] | select(.field.name==$fieldName) | .name // empty')

          CURRENT_STATUS=$(echo "$ISSUE_DATA" | jq -r --argjson pn "$PROJECT_NUMBER" --arg fieldName "$STATUS_FIELD_NAME" \
            '.projectItems.nodes[] | select(.project.number==$pn) | .fieldValues.nodes[] | select(.field.name==$fieldName) | .name // empty')

          echo "🎯 Current urgency: '${CURRENT_URGENCY:-(empty)}'"
          echo "📊 Current status: '${CURRENT_STATUS:-(empty)}'"

          # Check if urgency is immediate
          if [[ "$CURRENT_URGENCY" != "immediate" ]]; then
            echo "⏭️ Urgency is not 'immediate' (current: '${CURRENT_URGENCY:-(empty)}'); skipping"
            echo "should_move=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if already in Ready status
          if [[ "$CURRENT_STATUS" == "$READY_STATUS_NAME" ]]; then
            echo "⏭️ Issue is already in '$READY_STATUS_NAME' status; skipping"
            echo "should_move=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✅ Issue has urgency=immediate and is not in Ready status; will move to Ready"
          {
            echo "should_move=true"
            echo "current_status=$CURRENT_STATUS"
          } >> "$GITHUB_OUTPUT"

      - name: Move to Ready status
        if: steps.check_fields.outputs.should_move == 'true'
        run: |
          set -euo pipefail

          PROJECT_V2_ID='${{ steps.validate_project.outputs.project_v2_id }}'
          PROJECT_ITEM_ID='${{ steps.validate_project.outputs.project_item_id }}'
          CURRENT_STATUS='${{ steps.check_fields.outputs.current_status }}'

          echo "📦 Moving issue from '${CURRENT_STATUS:-(empty)}' → '$READY_STATUS_NAME'"

          # Dry run check
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🔬 DRY RUN: Move skipped (dry run mode)"
            exit 0
          fi

          # Fetch project fields to get Status field and Ready option
          FIELD_DATA=$(gh api graphql -f query="
            query(\$projectId:ID!){
              node(id:\$projectId){
                ... on ProjectV2 {
                  fields(first:100){
                    nodes{
                      ... on ProjectV2SingleSelectField { id name options { id name } }
                    }
                  }
                }
              }
            }" -F projectId="$PROJECT_V2_ID") || {
            echo "❌ Failed to fetch project fields"
            exit 1
          }

          STATUS_FIELD_ID=$(echo "$FIELD_DATA" | jq -r --arg name "$STATUS_FIELD_NAME" \
            '.data.node.fields.nodes[] | select(.name==$name) | .id // empty')

          if [[ -z "$STATUS_FIELD_ID" ]]; then
            echo "❌ Field '$STATUS_FIELD_NAME' does not exist in project '$PROJECT_V2_ID'"
            echo "   Verify: The field exists in the target project"
            exit 1
          fi

          READY_OPTION_ID=$(echo "$FIELD_DATA" | jq -r --arg name "$STATUS_FIELD_NAME" --arg value "$READY_STATUS_NAME" \
            '.data.node.fields.nodes[] | select(.name==$name) | .options[]? | select(.name==$value) | .id // empty')

          if [[ -z "$READY_OPTION_ID" ]]; then
            echo "❌ Option '$READY_STATUS_NAME' not found in field '$STATUS_FIELD_NAME'"
            echo "   Verify: The Ready status is configured in the project"
            exit 1
          fi

          # Build mutation to update status
          JSON_PAYLOAD=$(jq -n \
            --arg projectId "$PROJECT_V2_ID" \
            --arg itemId "$PROJECT_ITEM_ID" \
            --arg fieldId "$STATUS_FIELD_ID" \
            --arg optionId "$READY_OPTION_ID" \
            '{
              "query": "mutation($input: UpdateProjectV2ItemFieldValueInput!) { updateProjectV2ItemFieldValue(input: $input) { projectV2Item { id } } }",
              "variables": {
                "input": {
                  "projectId": $projectId,
                  "itemId": $itemId,
                  "fieldId": $fieldId,
                  "value": { "singleSelectOptionId": $optionId }
                }
              }
            }')

          # Execute mutation
          MUTATION_RESP=$(gh api graphql -H "Content-Type: application/json" --input - <<< "$JSON_PAYLOAD" 2>&1) || {
            echo "❌ GraphQL mutation failed:"
            echo "$MUTATION_RESP"
            exit 1
          }

          if echo "$MUTATION_RESP" | jq -e '.errors' > /dev/null 2>&1; then
            echo "❌ GraphQL mutation returned errors:"
            echo "$MUTATION_RESP" | jq '.errors'
            exit 1
          fi

          echo "✅ Successfully moved issue #${ISSUE_NUMBER} to '$READY_STATUS_NAME' status"
