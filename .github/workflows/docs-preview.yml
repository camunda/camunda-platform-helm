# Build a preview of the Docusaurus docs site for every PR that touches
# docs/** or helm-docs-site/**, then post the preview URL as a PR comment.
#
# Preview URL pattern:
#   https://helm.camunda.io/camunda-platform-helm/pr-preview/pr-<number>/
#
# The BASE_URL env var overrides the default /camunda-platform-helm/ baseUrl so
# that assets resolve correctly from the preview sub-path.
name: "Docs - PR Preview"

on:
  pull_request:
    paths:
      - "docs/**"
      - "helm-docs-site/**"

permissions:
  contents: read

jobs:
  preview:
    name: Build and deploy PR preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: helm-docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: helm-docs-site

      - name: Build site (PR preview base URL)
        run: npm run build
        working-directory: helm-docs-site
        env:
          BASE_URL: /camunda-platform-helm/pr-preview/pr-${{ github.event.number }}/

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: helm-docs-site/build
          preview-branch: gh-pages
          # Scope previews to the camunda-platform-helm sub-path so they don't
          # collide with the Helm chart index at the gh-pages root.
          umbrella-dir: camunda-platform-helm/pr-preview
