# Mimic postUpgradeTasks which is only available for self-hosted Renovate instances.
# https://docs.renovatebot.com/configuration-options/#postupgradetasks
name: Renovate - Post Upgrade Tasks

on:
  push:
    branches:
      - 'renovate/*'
    paths:
      - 'charts/camunda-platform*/Chart.yaml'
      - 'charts/camunda-platform*/values.yaml'
      - 'charts/camunda-platform*/templates/**'
      - 'charts/camunda-platform*/charts/**'
      - '**/go.mod'
      - '**/go.sum'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    name: Update golden files
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Import Vault secrets for Harbor
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        id: vault-harbor
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/distribution/ci GH_APP_ID_DISTRO_CI;
            secret/data/products/distribution/ci GH_APP_PRIVATE_KEY_DISTRO_CI;
          exportEnv: true
      #
      # Checkout.
      #
      - name: Generate GitHub token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
        id: generate-github-token
        with:
          app_id: ${{ env.GH_APP_ID_DISTRO_CI }}
          private_key: ${{ env.GH_APP_PRIVATE_KEY_DISTRO_CI }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: '${{ steps.generate-github-token.outputs.token }}'
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Configure curl and wget
        uses: ./.github/actions/setup-curl
      #
      # Dependencies.
      #
      - name: Install readme-generator-for-helm
        run: |
          # renovate: datasource=npm depName=@bitnami/readme-generator-for-helm
          npm install -g @bitnami/readme-generator-for-helm@2.7.2
      - name: Install tools
        uses: ./.github/actions/install-tool-versions
        with:
          tools: |
            golang
            helm
            helm-ct
            yq
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.asdf/installs/golang/*/packages/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      #
      # Post Upgrade Tasks.
      #
      # SUPPORTED_CHANGED = CHANGED_CHARTS minus out-of-support chart versions.
      # The exclusion list is derived dynamically from charts/chart-versions.yaml
      # (supportExtended + endOfLife), so updating that file is the only thing
      # needed when a version transitions to end-of-support — no changes here.
      - name: Set vars
        run: |
          CHANGED_CHARTS=$(ct list-changed | tr '\n' ' ')
          echo "CHANGED_CHARTS=${CHANGED_CHARTS}" | tee -a $GITHUB_ENV
          # Build exclude pattern from supportExtended + endOfLife in charts/chart-versions.yaml.
          EOL_VERSIONS=$(yq '.camundaVersions.supportExtended + .camundaVersions.endOfLife | join("|")' charts/chart-versions.yaml)
          SUPPORTED_CHANGED=$(echo "${CHANGED_CHARTS}" | tr ' ' '\n' | grep -Ev "camunda-platform-(${EOL_VERSIONS})([^0-9]|$)" | tr '\n' ' ' | xargs || true)
          echo "SUPPORTED_CHANGED=${SUPPORTED_CHANGED}" | tee -a $GITHUB_ENV
      - name: Run go mod tidy
        run: |
          set -euo pipefail
          echo "Running 'go mod tidy' on all go.mod files..."
          while IFS= read -r -d '' go_mod_file; do
            module_dir="$(dirname "${go_mod_file}")"
            (
              cd "${module_dir}"
              echo "Processing $(pwd)/go.mod"
              go mod tidy
            )
          done < <(find . -name 'go.mod' -print0)
          echo "✅ 'go mod tidy' completed successfully"
      - name: Update golden files
        run: |
          if [ -n "${SUPPORTED_CHANGED}" ]; then
            chartPath="${SUPPORTED_CHANGED}" make go.update-golden-only
          else
            echo "No supported chart changes, skipping golden file update."
          fi
      - name: Update README
        run: |
          if [ -n "${SUPPORTED_CHANGED}" ]; then
            chartPath="${SUPPORTED_CHANGED}" make helm.readme-update
          else
            echo "No supported chart changes, skipping README update."
          fi
      - name: Update Schema
        run: |
          if [ -n "${SUPPORTED_CHANGED}" ]; then
            chartPath="${SUPPORTED_CHANGED}" make helm.schema-update
          else
            echo "No supported chart changes, skipping schema update."
          fi
      - name: Git pull
        run: git pull --rebase --autostash .
      - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          author_name: "renovate[bot]"
          author_email: "29139614+renovate[bot]@users.noreply.github.com"
          message: "chore(deps): post upgrade tasks - go mod tidy, update golden files, readme, and schema"
