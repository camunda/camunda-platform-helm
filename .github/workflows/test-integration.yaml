name: "Test - Integration"

on:
  pull_request:
    paths:
    - '.github/workflows/test-integration-template.yaml'
    - '.github/workflows/test-integration.yaml'
    - '.github/actions/gke-login/**'
    - '.github/actions/workflow-vars/**'
    - '.github/actions/test-type-vars/**'
    - '.tool-versions'
    - 'charts/camunda-platform-latest/**'
    types: [opened, closed, reopened, synchronize]
  push:
    branches:
      - 1773-aa-add-pvc-selector-zeebe

permissions:
  contents: read

jobs:
  test:
    name: Main
    permissions:
      contents: read
      id-token: write
      deployments: write
    secrets: inherit
    uses: ./.github/workflows/test-integration-template.yaml
    with:
      identifier: "1773"
      platforms: "gke,rosa"
      deployment-ttl: ""
      flows: "install,upgrade"
      caller-git-ref: 1773-aa-add-pvc-selector-zeebe
      camunda-helm-git-ref: 1773-aa-add-pvc-selector-zeebe
