name: "Test - Local Cluster - Template"

on:
  workflow_call:
    inputs:
      identifier:
        description: The unique identifier of used in the deployment.
        required: true
        type: string
      camunda-helm-git-ref:
        required: false
        default: main
        type: string
      camunda-helm-dir:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.identifier }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  local:
    name: Local cluster - KIND
    # This job needs to run on self-hosted runners because it requires more resources
    # than the default GitHub runners provide.
    runs-on: gcp-core-8-release
    env:
      TEST_NAMESPACE: camunda-platform
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: "${{ inputs.camunda-helm-git-ref }}"
      - name: Import Vault secrets
        id: test-credentials-secret
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/distribution/ci DOCKERHUB_USERNAME | TEST_DOCKER_USERNAME;
            secret/data/products/distribution/ci DOCKERHUB_PASSWORD | TEST_DOCKER_PASSWORD;
          exportEnv: false
      - name: Install common software tooling
        uses: camunda/infra-global-github-actions/common-tooling@578da31683cd0f8956900e29db94fc0919b4ad35 # main
        with:
          overwrite: "false"
          build-essential-enabled: "true"
          node-enabled: "false"
          yarn-enabled: "false"
          buildx-enabled: "false"
          java-enabled: "false"
          python-enabled: "false"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential gawk make
      - name: Install tools
        uses: ./.github/actions/install-tool-versions
        with:
          tools: |
            helm
            kind
            kubectl
            task
      - name: Docker Hub login
        env:
          TEST_DOCKER_USERNAME: ${{ steps.test-credentials-secret.outputs.TEST_DOCKER_USERNAME }}
          TEST_DOCKER_PASSWORD: ${{ steps.test-credentials-secret.outputs.TEST_DOCKER_PASSWORD }}
        run: |
          echo "${TEST_DOCKER_PASSWORD}" | docker login -u "${TEST_DOCKER_USERNAME}" --password-stdin
      - name: CI Setup - Set test type vars
        uses: ./.github/actions/test-type-vars
        with:
          chart-dir: "${{ inputs.camunda-helm-dir }}"
          values-enterprise: false
          values-digest: true
      - name: Create KIND cluster
        run: |
          kind create cluster --name camunda-platform-local
          kubectl config use-context kind-camunda-platform-local
      # Login to Docker registry to avoid image pull rate limit.
      - name: Create Docker login secret
        env:
          TEST_CREATE_DOCKER_LOGIN_SECRET: "TRUE"
          TEST_DOCKER_USERNAME: ${{ steps.test-credentials-secret.outputs.TEST_DOCKER_USERNAME }}
          TEST_DOCKER_PASSWORD: ${{ steps.test-credentials-secret.outputs.TEST_DOCKER_PASSWORD }}
        run: |
          kubectl create namespace ${{ env.TEST_NAMESPACE }}
          # Docker Hub pull secret (replaces legacy `task docker-login --taskfile lib/init-seed-taskfile.yaml`).
          if [[ -n "${TEST_DOCKER_USERNAME:-}" && -n "${TEST_DOCKER_PASSWORD:-}" ]]; then
            kubectl create secret docker-registry index-docker-io \
              --namespace ${{ env.TEST_NAMESPACE }} \
              --docker-server "https://index.docker.io/v1/" \
              --docker-username "${TEST_DOCKER_USERNAME}" \
              --docker-password "${TEST_DOCKER_PASSWORD}" \
              --dry-run=client -o yaml | kubectl apply -f -
          fi
      - name: Install ECK operator + Elasticsearch (8.10+)
        if: ${{ inputs.camunda-helm-dir == 'camunda-platform-8.10' }}
        run: |
          # renovate: datasource=github-releases depName=elastic/cloud-on-k8s
          ECK_VERSION="3.3.2"
          kubectl apply --server-side -f \
            "https://download.elastic.co/downloads/eck/${ECK_VERSION}/crds.yaml"
          kubectl apply --server-side -f \
            "https://download.elastic.co/downloads/eck/${ECK_VERSION}/operator.yaml"
          kubectl wait --for=jsonpath='{.status.readyReplicas}'=1 \
            --timeout=300s statefulset/elastic-operator -n elastic-system
          kubectl apply -n ${{ env.TEST_NAMESPACE }} -f \
            "charts/${{ inputs.camunda-helm-dir }}/test/integration/scenarios/kind/elasticsearch-cluster.yaml"
          kubectl wait --for=jsonpath='{.status.phase}'=Ready --timeout=600s \
            elasticsearch/elasticsearch -n ${{ env.TEST_NAMESPACE }}
      - name: Prepare Camunda Helm chart installation
        run: |
          make helm.repos-add
          helm package --dependency-update "charts/${{ inputs.camunda-helm-dir }}"
      - name: ⭐ Install Camunda Helm chart ⭐
        timeout-minutes: 10
        run: |
          test -n "${{ env.TEST_HELM_DIGEST_VALUES }}" &&
            TEST_HELM_EXTRA_ARGS="--values charts/${{ inputs.camunda-helm-dir }}/values-digest.yaml"
          if [[ "${{ inputs.camunda-helm-dir }}" == "camunda-platform-8.10" ]]; then
            TEST_HELM_EXTRA_ARGS="${TEST_HELM_EXTRA_ARGS} \
              --set orchestration.service.appProtocols.grpc=kubernetes.io/h2c \
              --set orchestration.service.appProtocols.management=http \
              --set orchestration.service.appProtocols.internal=kubernetes.io/h2c \
              --set orchestration.service.appProtocols.command=kubernetes.io/h2c"
          fi
          helm install camunda-platform *.tgz --wait --timeout 10m0s \
            --namespace ${{ env.TEST_NAMESPACE }} \
            --values "charts/${{ inputs.camunda-helm-dir }}/test/integration/scenarios/common/values-integration-test-pull-secrets.yaml" \
            --values "charts/${{ inputs.camunda-helm-dir }}/values-local.yaml" \
            ${TEST_HELM_EXTRA_ARGS}
      - name: Verify appProtocol is set on live Service objects (8.10)
        if: ${{ inputs.camunda-helm-dir == 'camunda-platform-8.10' }}
        run: |
          set -euo pipefail
          check() {
            local svc="$1" port="$2" expected="$3"
            actual=$(kubectl get svc "$svc" -n ${{ env.TEST_NAMESPACE }} \
              -o jsonpath="{.spec.ports[?(@.name==\"$port\")].appProtocol}")
            if [[ "$actual" != "$expected" ]]; then
              echo "FAIL: $svc port $port appProtocol='$actual', expected '$expected'"
              exit 1
            fi
            echo "OK: $svc port $port appProtocol=$expected"
          }
          check camunda-platform-zeebe-gateway grpc kubernetes.io/h2c
          check camunda-platform-zeebe-gateway server http
          # camunda-platform-zeebe (headless) shares the same orchestration.service.appProtocols
          # map as camunda-platform-zeebe-gateway above, with a wider knownPorts allow-list
          # (internal/command are headless-only ports) -- exercise both to guard against the
          # two manifests validating against divergent port allow-lists.
          check camunda-platform-zeebe internal kubernetes.io/h2c
          check camunda-platform-zeebe command kubernetes.io/h2c
      - name: Get Pods
        if: failure()
        run: |
          kubectl get pods --namespace ${{ env.TEST_NAMESPACE }}
      - name: Debug - Get Pods info
        if: failure()
        run: |
          kubectl get pods --namespace ${{ env.TEST_NAMESPACE }} -o yaml
          kubectl describe pods --namespace ${{ env.TEST_NAMESPACE }}
