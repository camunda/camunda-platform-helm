---
name: Check values-enterprise.yaml

"on":
  schedule:
    - cron: '0 7 * * *'
  pull_request:
    paths:
      - 'charts/camunda-platform-*/values-enterprise.yaml'
      - 'scripts/check-values-enterprise.sh'
      - '.github/workflows/check-values-enterprise.yaml'
  workflow_dispatch:
    inputs:
      chart-version:
        description: |
          Specific chart version to check (e.g., 8.7), leave empty for all
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  check-values-enterprise:
    name: Check values-enterprise.yaml files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 1

      - name: Install tools
        uses: ./.github/actions/install-tool-versions
        with:
          tools: |
            yq

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Import secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b  # v3.4.0
        id: secrets
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/infrastructure-experience/ci/common MACHINE_PWD;
            secret/data/products/infrastructure-experience/ci/common MACHINE_USR;

      - name: Login to Camunda registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: registry.camunda.cloud
          username: ${{ steps.secrets.outputs.MACHINE_USR }}
          password: ${{ steps.secrets.outputs.MACHINE_PWD }}

      - name: Run validation script
        run: |
          if [[ -n "${{ inputs.chart-version }}" ]]; then
            bash scripts/check-values-enterprise.sh \
              "${{ inputs.chart-version }}"
          else
            bash scripts/check-values-enterprise.sh
          fi

      - name: Comment on PR (if validation failed)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **values-enterprise.yaml validation failed**\n\n' +
                'Some image tags referenced in `values-enterprise.yaml` do not exist or are not accessible in `registry.camunda.cloud`. ' +
                'Please check workflow logs for failing image references.'
            })
