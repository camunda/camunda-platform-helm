# Build CI Runner Images
# Builds and pushes Docker images for integration test runners to GitHub Container Registry
# Triggered on .tool-versions changes or manual dispatch
#
# Local build: ./scripts/build-ci-runner-local.sh [--push]

name: "Build - CI Runner Images"

on:
  push:
    branches:
      - main
    paths:
      - ".tool-versions"
      - ".github/docker/**"
      - ".github/workflows/build-ci-runner-image.yaml"
      - "scripts/build-ci-runner-local.sh"
      # Rebuild when the e2e test-suite's pinned deps change so the image's
      # prebuilt /opt/e2e-prebuilt/node_modules stays in sync.
      - "charts/camunda-platform-*/test/e2e/package.json"
  schedule:
    # Weekly refresh so the prebuilt node_modules tracks any package.json drift
    # we missed and picks up new transitive versions within semver ranges.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      force-rebuild:
        description: "Force rebuild even if cache exists"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  CI_RUNNER_IMAGE: ghcr.io/camunda/team-distribution/ci-runner
  PLAYWRIGHT_RUNNER_IMAGE: ghcr.io/camunda/team-distribution/playwright-runner

permissions:
  contents: read
  packages: write

jobs:
  build-ci-runner:
    name: Build CI Runner Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Generate image tags
        id: tags
        run: |
          TOOLS_HASH=$(sha256sum .tool-versions | cut -c1-8)
          DATE_TAG=$(date +%Y%m%d)
          echo "tools-hash=sha-${TOOLS_HASH}" >> "$GITHUB_OUTPUT"
          echo "date-tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

          CI_TAGS="${CI_RUNNER_IMAGE}:latest"
          CI_TAGS="${CI_TAGS},${CI_RUNNER_IMAGE}:sha-${TOOLS_HASH}"
          CI_TAGS="${CI_TAGS},${CI_RUNNER_IMAGE}:${DATE_TAG}"
          echo "ci-tags=${CI_TAGS}" >> "$GITHUB_OUTPUT"
          echo "Generated tags: ${CI_TAGS}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy .tool-versions for CI Runner build
        run: |
          cp .tool-versions .github/docker/ci-runner/.tool-versions

      - name: Build and push CI Runner image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .github/docker/ci-runner
          file: .github/docker/ci-runner/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.ci-tags }}
          no-cache: ${{ github.event_name == 'schedule' || inputs.force-rebuild == true }}
          cache-from: type=gha,scope=ci-runner
          cache-to: type=gha,mode=max,scope=ci-runner
          platforms: linux/amd64
          provenance: false

      - name: Output image digests
        run: |
          {
            echo "## 🐳 CI Runner Image Built"
            echo ""
            echo "- \`${CI_RUNNER_IMAGE}:latest\`"
            echo "- \`${CI_RUNNER_IMAGE}:${{ steps.tags.outputs.tools-hash }}\`"
            echo "- \`${CI_RUNNER_IMAGE}:${{ steps.tags.outputs.date-tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-playwright-runner:
    name: Build Playwright Runner Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Generate image tags
        id: tags
        run: |
          TOOLS_HASH=$(sha256sum .tool-versions | cut -c1-8)
          DATE_TAG=$(date +%Y%m%d)
          echo "tools-hash=sha-${TOOLS_HASH}" >> "$GITHUB_OUTPUT"
          echo "date-tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

          PW_TAGS="${PLAYWRIGHT_RUNNER_IMAGE}:latest"
          PW_TAGS="${PW_TAGS},${PLAYWRIGHT_RUNNER_IMAGE}:sha-${TOOLS_HASH}"
          PW_TAGS="${PW_TAGS},${PLAYWRIGHT_RUNNER_IMAGE}:${DATE_TAG}"
          echo "playwright-tags=${PW_TAGS}" >> "$GITHUB_OUTPUT"
          echo "Generated tags: ${PW_TAGS}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy .tool-versions for Playwright Runner build
        run: |
          cp .tool-versions .github/docker/playwright-runner/.tool-versions

      - name: Copy chart e2e package.json for Playwright Runner build
        id: e2e-pkg
        run: |
          # Pre-installs all pinned e2e deps (except the moving-target
          # @camunda/e2e-test-suite) into /opt/e2e-prebuilt/node_modules.
          # All chart versions must pin @playwright/test to the same exact
          # version: the image bakes browsers for ONE playwright version, and
          # any chart with a different pin would re-download browsers at
          # runtime, undoing this optimization.
          pins=()
          for f in charts/camunda-platform-*/test/e2e/package.json; do
            v=$(jq -r '.devDependencies["@playwright/test"] // .dependencies["@playwright/test"] // empty' "$f")
            if [[ -z "$v" ]]; then
              echo "ERROR: $f does not declare @playwright/test"
              exit 1
            fi
            if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "ERROR: $f pins @playwright/test as '$v'; must be an exact version (e.g. 1.61.0) so the playwright-runner image's baked browser revision matches what npm install resolves at runtime."
              exit 1
            fi
            pins+=("$f=$v")
          done
          uniq_versions=$(printf '%s\n' "${pins[@]}" | awk -F= '{print $2}' | sort -u)
          if [[ $(echo "$uniq_versions" | wc -l) -ne 1 ]]; then
            echo "ERROR: chart versions disagree on @playwright/test pin:"
            printf '  %s\n' "${pins[@]}"
            exit 1
          fi
          pw_version="$uniq_versions"
          src=$(ls -d charts/camunda-platform-*/test/e2e/package.json \
                | sort -V | tail -n1)
          echo "Using $src as e2e-package.json source (pinned @playwright/test=$pw_version)"
          cp "$src" .github/docker/playwright-runner/e2e-package.json
          echo "playwright-version=$pw_version" >> "$GITHUB_OUTPUT"

      - name: Build and push Playwright Runner image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .github/docker/playwright-runner
          file: .github/docker/playwright-runner/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.playwright-tags }}
          build-args: |
            PLAYWRIGHT_VERSION=${{ steps.e2e-pkg.outputs.playwright-version }}
          no-cache: ${{ github.event_name == 'schedule' || inputs.force-rebuild == true }}
          cache-from: type=gha,scope=playwright-runner
          cache-to: type=gha,mode=max,scope=playwright-runner
          platforms: linux/amd64
          provenance: false

      - name: Output image digests
        run: |
          {
            echo "## 🐳 Playwright Runner Image Built"
            echo ""
            echo "- \`${PLAYWRIGHT_RUNNER_IMAGE}:latest\`"
            echo "- \`${PLAYWRIGHT_RUNNER_IMAGE}:${{ steps.tags.outputs.tools-hash }}\`"
            echo "- \`${PLAYWRIGHT_RUNNER_IMAGE}:${{ steps.tags.outputs.date-tag }}\`"
            echo ""
            echo "Pinned \`@playwright/test=${{ steps.e2e-pkg.outputs.playwright-version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-images:
    name: Verify Images
    runs-on: ubuntu-latest
    needs:
      - build-ci-runner
      - build-playwright-runner
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify CI Runner image
        run: |
          echo "Pulling and verifying CI Runner image..."
          docker pull ${CI_RUNNER_IMAGE}:latest

          echo "Testing CI Runner tools..."
          docker run --rm ${CI_RUNNER_IMAGE}:latest "helm version --short && kubectl version --client && go version && yq --version && jq --version"

          echo "✅ CI Runner image verified successfully"

      - name: Verify Playwright Runner image
        run: |
          echo "Pulling and verifying Playwright Runner image..."
          docker pull ${PLAYWRIGHT_RUNNER_IMAGE}:latest

          echo "Testing Playwright Runner tools..."
          docker run --rm ${PLAYWRIGHT_RUNNER_IMAGE}:latest "helm version --short && kubectl version --client && go version && yq --version && jq --version && npx playwright --version"

          echo "Verifying prebuilt e2e node_modules and baked browser revision..."
          docker run --rm --entrypoint sh ${PLAYWRIGHT_RUNNER_IMAGE}:latest -c '
            set -e
            test -d /opt/e2e-prebuilt/node_modules/@playwright/test
            test ! -d /opt/e2e-prebuilt/node_modules/@camunda/e2e-test-suite
            # Confirm at least one chromium-headless-shell revision is baked in;
            # the exact rev is set by ARG PLAYWRIGHT_VERSION at build time.
            ls -1 /ms-playwright/ | grep -q "^chromium_headless_shell-"
          '

          echo "✅ Playwright Runner image verified successfully"
