# This workflow validates backward compatibility of test-integration-template.yaml
# by invoking it with the exact same input patterns used by external caller repos:
#   - c8-cross-component-e2e-tests (8.8+ and 8.7- variants)
#   - camunda (docker-build-helm-integration and camunda-helm-integration)
#
# Each job mirrors a real caller's `with:` block. If any job fails to start,
# it means the template contract has broken for that caller.
#
# NOTE: This workflow uses test-enabled: true so no actual infrastructure is
# provisioned -- we are only validating that the workflow_call interface accepts
# all the inputs the callers send and that the init/matrix generation succeeds.
#
# Scenario matrices are derived from the simple (install-only) sm-manual
# workflows in c8-cross-component-e2e-tests. Each unique scenario/shortname
# combination is tested to ensure the template accepts that input pattern.

name: "Test - Backward Compatibility"

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run mode (test-enabled=false, no infra provisioned)"
        type: boolean
        default: true
  pull_request:
    paths:
      - ".github/workflows/test-integration-template.yaml"
      - ".github/workflows/test-integration-runner.yaml"
      - ".github/workflows/test-chart-version-template.yaml"
      - ".github/workflows/test-backward-compat.yaml"

permissions:
  contents: read
  id-token: write
  deployments: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Caller 1: c8-cross-component-e2e-tests — playwright_sm_reusable_flow_8_8_plus.yaml
  # Source: https://github.com/camunda/c8-cross-component-e2e-tests
  #
  # Matrix of unique scenario/shortname combinations from simple install-only
  # sm-manual workflows targeting 8.8+.
  # ===========================================================================
  compat-e2e-8-8-plus:
    name: "Compat: e2e 8.8+ (${{ matrix.scenario.shortname }})"
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - name: qa-elasticsearch
            shortname: qael
          - name: qa-opensearch
            shortname: qaos
          - name: qa-elasticsearch-rba
            shortname: qaelrba
          - name: qa-elasticsearch-mt
            shortname: qaelmt
            e2e-enabled: false
          - name: qa-license
            shortname: lic
            licenseVaultMapping: "secret/data/products/qa/ci/cross-component-e2e-test-suite LICENSE_VALID_COMMERCIAL_UNLIMITED | E2E_TESTS_LICENSE_KEY;"
          - name: qa-entra
            shortname: qaen
            auth: oidc
            initialClaimValue: placeholder-for-compat-test
          - name: qa-document-store
            shortname: qadoc
    uses: ./.github/workflows/test-integration-template.yaml
    secrets: inherit
    with:
      auth: ${{ matrix.scenario.auth || 'keycloak' }}
      helmChartVersion: ""
      identifier: compat-88p-${{ matrix.scenario.shortname }}
      platforms: gke
      infra-type: preemptible
      camunda-helm-git-ref: ${{ github.event.pull_request.head.sha || github.sha }}
      camunda-helm-dir: camunda-platform-8.8
      teleport-token: infra-ci-prod-github-action-distribution
      namespace-prefix: "bc88p${{ matrix.scenario.shortname }}-"
      deployment-ttl: ""
      test-enabled: true
      e2e-enabled: ${{ matrix.scenario.e2e-enabled != false }}
      scenario: ${{ matrix.scenario.name }}
      shortname: ${{ matrix.scenario.shortname }}
      always-delete-namespace: true
      flows: install
      initialClaimValue: ${{ matrix.scenario.initialClaimValue || '' }}
      values-config: |
        {
          "E2E_TESTS_CAMUNDA_HELM_DIR": "camunda-platform-8.8",
          "E2E_TESTS_IDENTITY_IMAGE_TAG": "8.8-SNAPSHOT",
          "E2E_TESTS_CONNECTORS_IMAGE_TAG": "8.8-SNAPSHOT",
          "E2E_TESTS_CONSOLE_IMAGE_TAG": "8.8-SNAPSHOT",
          "E2E_TESTS_OPTIMIZE_IMAGE_TAG": "8.8-SNAPSHOT",
          "E2E_TESTS_WEBMODELER_IMAGE_TAG": "8.8",
          "E2E_TESTS_ORCHESTRATION_IMAGE_TAG": "8.8-SNAPSHOT",
          "E2E_TESTS_CORE_IMAGE_TAG": "8.8-SNAPSHOT",
          "E2E_TESTS_SEARCH_ENGINE": "opensearch",
          "E2E_AWS_OS_INDEX_PREFIX": "compat-test",
          "E2E_AWS_OS_INDEX_PREFIX_ZEEBE": "compat-test-zeebe",
          "E2E_AWS_OS_INDEX_PREFIX_OPERATE": "compat-test-operate",
          "E2E_AWS_OS_INDEX_PREFIX_TASKLIST": "compat-test-tasklist",
          "E2E_AWS_OS_INDEX_PREFIX_OPTIMIZE": "compat-test-optimize"
        }
      vault-secret-mapping: |
        secret/data/products/qa/ci/common DOCKERHUB_USERNAME | TEST_DOCKER_USERNAME;
        secret/data/products/qa/ci/common DOCKERHUB_PASSWORD | TEST_DOCKER_PASSWORD;
        secret/data/products/qa/ci/common HARBOR_USERNAME | TEST_DOCKER_USERNAME_CAMUNDA_CLOUD;
        secret/data/products/qa/ci/common HARBOR_PASSWORD | TEST_DOCKER_PASSWORD_CAMUNDA_CLOUD;
        secret/data/products/qa/ci/cross-component-e2e-test-suite DISTRO_QA_E2E_TESTS_KEYCLOAK_ADMIN_SECRET;
        secret/data/products/qa/ci/cross-component-e2e-test-suite DISTRO_QA_E2E_TESTS_KEYCLOAK_CLIENTS_SECRET;
        secret/data/products/qa/ci/cross-component-e2e-test-suite DISTRO_QA_E2E_TESTS_IDENTITY_FIRSTUSER_PASSWORD;
        secret/data/products/qa/ci/cross-component-e2e-test-suite DISTRO_QA_E2E_TESTS_IDENTITY_SECONDUSER_PASSWORD;
        secret/data/products/qa/ci/cross-component-e2e-test-suite DISTRO_QA_E2E_TESTS_IDENTITY_THIRDUSER_PASSWORD;
        secret/data/products/qa/ci/cross-component-e2e-test-suite OPENSEARCH_USERNAME;
        secret/data/products/qa/ci/cross-component-e2e-test-suite OPENSEARCH_PASSWORD;
        secret/data/products/qa/ci/cross-component-e2e-test-suite AWS_HOST_URL;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_AWS_ACCESSKEY;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_AWS_BUCKET_NAME;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_AWS_REGION;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_AWS_SECRETKEY;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_GCP_SERVICE_ACCOUNT;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_GCP_VERTEX_BUCKET_NAME;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_GCP_VERTEX_PROJECT_ID;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_GCP_DOCUMENT_AI_PROJECT_ID;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_GCP_DOCUMENT_AI_PROCESSOR_ID;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_GCP_DOCUMENT_AI_REGION;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_GCP_VERTEX_REGION;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_AZURE_DOCUMENT_INTELLIGENCE_KEY;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_AZURE_AI_FOUNDRY_ENDPOINT;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_AZURE_AI_FOUNDRY_KEY;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_AZURE_OPEN_AI_ENDPOINT;
        secret/data/products/qa/ci/cross-component-e2e-test-suite IDP_AZURE_OPEN_AI_KEY;
        secret/data/products/qa/ci/cross-component-e2e-test-suite OPENAI_API_KEY;
        secret/data/products/distribution/ci ENTRA_APP_CLIENT_ID;
        secret/data/products/distribution/ci ENTRA_APP_CLIENT_SECRET;
        secret/data/products/distribution/ci ENTRA_APP_DIRECTORY_ID;
        secret/data/products/distribution/ci ENTRA_APP_OBJECT_ID;
        ${{ matrix.scenario.licenseVaultMapping }}

  # ===========================================================================
  # Caller 2: c8-cross-component-e2e-tests — playwright_sm_reusable_flow_8_7_minus.yaml
  # Source: https://github.com/camunda/c8-cross-component-e2e-tests
  #
  # Matrix of unique scenario/shortname combinations from simple install-only
  # sm-manual workflows targeting 8.7-.
  # Uses per-component image tags instead of unified orchestration/core tags.
  # ===========================================================================
  compat-e2e-8-7-minus:
    name: "Compat: e2e 8.7- (${{ matrix.scenario.shortname }})"
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - name: qa-elasticsearch
            shortname: qael
          - name: qa-opensearch
            shortname: qaos
          - name: qa-elasticsearch-rba
            shortname: qarba
          - name: qa-elasticsearch-mt
            shortname: qamt
          - name: qa-license
            shortname: lic
            licenseVaultMapping: "secret/data/products/qa/ci/cross-component-e2e-test-suite LICENSE_VALID_COMMERCIAL_UNLIMITED | E2E_TESTS_LICENSE_KEY;"
    uses: ./.github/workflows/test-integration-template.yaml
    secrets: inherit
    with:
      helmChartVersion: ""
      identifier: compat-87m-${{ matrix.scenario.shortname }}
      platforms: gke
      infra-type: preemptible
      camunda-helm-git-ref: ${{ github.event.pull_request.head.sha || github.sha }}
      camunda-helm-dir: camunda-platform-8.7
      teleport-token: infra-ci-prod-github-action-distribution
      namespace-prefix: "bc87m${{ matrix.scenario.shortname }}-"
      deployment-ttl: ""
      test-enabled: true
      e2e-enabled: false
      scenario: ${{ matrix.scenario.name }}
      shortname: ${{ matrix.scenario.shortname }}
      always-delete-namespace: true
      values-config: |
        {
          "E2E_TESTS_CAMUNDA_HELM_DIR": "camunda-platform-8.7",
          "E2E_TESTS_IDENTITY_IMAGE_TAG": "8.7-SNAPSHOT",
          "E2E_TESTS_CONNECTORS_IMAGE_TAG": "8.7-SNAPSHOT",
          "E2E_TESTS_CONSOLE_IMAGE_TAG": "8.7-SNAPSHOT",
          "E2E_TESTS_OPERATE_IMAGE_TAG": "8.7-SNAPSHOT",
          "E2E_TESTS_OPTIMIZE_IMAGE_TAG": "8.7-SNAPSHOT",
          "E2E_TESTS_TASKLIST_IMAGE_TAG": "8.7-SNAPSHOT",
          "E2E_TESTS_WEBMODELER_IMAGE_TAG": "8.7.16",
          "E2E_TESTS_ZEEBE_IMAGE_TAG": "8.7-SNAPSHOT",
          "E2E_TESTS_SEARCH_ENGINE": "opensearch",
          "E2E_AWS_OS_INDEX_PREFIX": "compat-test",
          "E2E_AWS_OS_INDEX_PREFIX_ZEEBE": "compat-test-zeebe",
          "E2E_AWS_OS_INDEX_PREFIX_OPERATE": "compat-test-operate",
          "E2E_AWS_OS_INDEX_PREFIX_TASKLIST": "compat-test-tasklist",
          "E2E_AWS_OS_INDEX_PREFIX_OPTIMIZE": "compat-test-optimize",
          "OPENSEARCH_PORT": "443",
          "OPENSEARCH_PROTOCOL": "https"
        }
      vault-secret-mapping: |
        secret/data/products/qa/ci/common DOCKERHUB_USERNAME | TEST_DOCKER_USERNAME;
        secret/data/products/qa/ci/common DOCKERHUB_PASSWORD | TEST_DOCKER_PASSWORD;
        secret/data/products/qa/ci/common HARBOR_USERNAME | TEST_DOCKER_USERNAME_CAMUNDA_CLOUD;
        secret/data/products/qa/ci/common HARBOR_PASSWORD | TEST_DOCKER_PASSWORD_CAMUNDA_CLOUD;
        secret/data/products/qa/ci/cross-component-e2e-test-suite DISTRO_QA_E2E_TESTS_KEYCLOAK_ADMIN_SECRET;
        secret/data/products/qa/ci/cross-component-e2e-test-suite DISTRO_QA_E2E_TESTS_KEYCLOAK_CLIENTS_SECRET;
        secret/data/products/qa/ci/cross-component-e2e-test-suite DISTRO_QA_E2E_TESTS_IDENTITY_FIRSTUSER_PASSWORD;
        secret/data/products/qa/ci/cross-component-e2e-test-suite DISTRO_QA_E2E_TESTS_IDENTITY_SECONDUSER_PASSWORD;
        secret/data/products/qa/ci/cross-component-e2e-test-suite DISTRO_QA_E2E_TESTS_IDENTITY_THIRDUSER_PASSWORD;
        secret/data/products/qa/ci/cross-component-e2e-test-suite OPENSEARCH_USERNAME;
        secret/data/products/qa/ci/cross-component-e2e-test-suite OPENSEARCH_PASSWORD;
        secret/data/products/qa/ci/cross-component-e2e-test-suite AWS_HOST_URL | OPENSEARCH_HOST;
        secret/data/products/qa/ci/cross-component-e2e-test-suite AWS_HOST_URL;
        secret/data/products/distribution/ci ENTRA_APP_CLIENT_ID;
        secret/data/products/distribution/ci ENTRA_APP_CLIENT_SECRET;
        secret/data/products/distribution/ci ENTRA_APP_DIRECTORY_ID;
        secret/data/products/distribution/ci ENTRA_APP_OBJECT_ID;
        ${{ matrix.scenario.licenseVaultMapping }}

  # ===========================================================================
  # Caller 3: camunda — docker-build-helm-integration.yml
  # Sets e2e-enabled: true and extra-values with Harbor image overrides.
  # Uses || fallback expressions in the real caller (hardcoded here).
  # ===========================================================================
  compat-camunda-docker:
    name: "Compat: camunda docker-build"
    uses: ./.github/workflows/test-integration-template.yaml
    secrets: inherit
    with:
      identifier: compat-cam-dock
      platforms: gke
      camunda-helm-git-ref: ${{ github.event.pull_request.head.sha || github.sha }}
      camunda-helm-dir: camunda-platform-8.9
      namespace-prefix: "backcompcamdock-"
      deployment-ttl: ""
      test-enabled: true
      e2e-enabled: true
      scenario: keycloak-original
      shortname: kcor
      always-delete-namespace: true
      flows: install
      vault-secret-mapping: ""

  # ===========================================================================
  # Caller 4: camunda — camunda-helm-integration.yml
  # Simplest caller: only 6 inputs explicitly set.
  # This is the best canary — if this breaks, something fundamental changed.
  # ===========================================================================
  compat-camunda-simple:
    name: "Compat: camunda simple"
    uses: ./.github/workflows/test-integration-template.yaml
    secrets: inherit
    with:
      identifier: compat-cam-simp
      camunda-helm-dir: camunda-platform-8.8
      camunda-helm-git-ref: ${{ github.event.pull_request.head.sha || github.sha }}
      namespace-prefix: "backcompcamsimp-"
      deployment-ttl: ""
      test-enabled: true
      e2e-enabled: true
      caller-git-ref: main
      vault-secret-mapping: ""

  # ===========================================================================
  # Summary gate: all compat jobs must pass
  # ===========================================================================
  compat-gate:
    name: "Backward Compatibility Gate"
    runs-on: ubuntu-latest
    needs:
      - compat-e2e-8-8-plus
      - compat-e2e-8-7-minus
      - compat-camunda-docker
      - compat-camunda-simple
    if: always()
    steps:
      - name: Check all compatibility jobs
        run: |
          echo "=== Backward Compatibility Results ==="
          echo ""
          echo "Caller: c8-cross-component-e2e-tests 8.8+ → ${{ needs.compat-e2e-8-8-plus.result }}"
          echo "Caller: c8-cross-component-e2e-tests 8.7- → ${{ needs.compat-e2e-8-7-minus.result }}"
          echo "Caller: camunda/docker-build-helm-integration → ${{ needs.compat-camunda-docker.result }}"
          echo "Caller: camunda/camunda-helm-integration → ${{ needs.compat-camunda-simple.result }}"
          echo ""

          FAILED=false
          for result in \
            "${{ needs.compat-e2e-8-8-plus.result }}" \
            "${{ needs.compat-e2e-8-7-minus.result }}" \
            "${{ needs.compat-camunda-docker.result }}" \
            "${{ needs.compat-camunda-simple.result }}"; do
            if [[ "$result" == "failure" ]]; then
              FAILED=true
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "::error::One or more backward compatibility checks failed!"
            exit 1
          fi

          echo "All backward compatibility checks passed."
