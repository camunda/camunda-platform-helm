# Basic test for maintenance Camunda 8 Helm charts.
name: "Test - nightly integration testsing"

on:
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CAMUNDA_DISTRO_TEST_DELETE_NAMESPACE: ${{ !secrets.ACTIONS_STEP_DEBUG }}
  GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
  GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
  GITHUB_WORKFLOW_RUN_ID: ${{ github.run_id }}
  KUBECONFIG: .github/config/kubeconfig

permissions:
  contents: read

jobs:
  init:
    name: Nightly - Generate matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-workflow-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Generate workflow matrix
        id: generate-nightly-workflow-matrix
        env:
          CI_NIGHTLY_MATRIX_FILE: ".github/config/test-integration-nightly-matrix.yaml"
          # Use GH env to safly load JSON matrix input.
          CI_NIGHTLY_MATRIX_INPUT: "${{ inputs.matrix-data }}"
        run: |
          cat ${CI_NIGHTLY_MATRIX_FILE} | envsubst | tee /tmp/matrix.yaml
          # Read matrix YAML file.
          matrix_defult="$(yq '.matrix' --indent=0 --output-format json /tmp/matrix.yaml)"
          matrix="${CI_NIGHTLY_MATRIX_INPUT:-${matrix_defult}}"
          # Print and set matrix JSON object as an output.
          echo "${matrix}" | jq
          echo "matrix=$(echo ${matrix} | jq -c)" > "$GITHUB_OUTPUT"
      - name: Generate directory matrix
        shell: bash
        id: set-chart-versions
        run: |
          echo "Setting matrix based on files"
          touch matrix_versions.txt

          # Dynamically list directories and extract versions
          ls -d charts/camunda-platform* | while read chart_dir; do
              camunda_version="$(basename ${chart_dir} | sed 's/camunda-platform-//')";
              echo "Camunda version: ${camunda_version}"
              echo "${camunda_version}" >> matrix_versions.txt;
          done

          # Convert dynamic versions to JSON array
          matrix_versions="$(cat matrix_versions.txt | jq --slurp --compact-output --raw-input 'split("\n") | .[:-1]')"

          # Define static scenarios as JSON array
          scenarios='[
            {
              "name": "multitenancy",
              "file-name": "values-integration-test-multitenancy.yaml"
            }
          ]'

          # Combine dynamic versions with static scenarios into a single JSON object
          combined_matrix=$(jq -n \
            --argjson versions "$matrix_versions" \
            --argjson scenarios "$scenarios" \
            '{versions: $versions, scenarios: $scenarios}')

          echo "matrix=${combined_matrix}" | tee -a $GITHUB_OUTPUT
  # need to grab the directory names before this step and run integration tests on each directory
  integration:
    if: ${{ needs.init.outputs.matrix != '[]' }}
    name: Integration Test - Camunda ${{ matrix.version }}
    needs: init
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.init.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
      deployments: write
    secrets: inherit
    uses: ./.github/workflows/test-integration-template.yaml
    with:
      identifier: "${{ github.event.pull_request.number }}-intg-${{ matrix.version }}"
      deployment-ttl: "${{ contains(github.event.pull_request.labels.*.name, 'test-persistent') && '1w' || '' }}"
      platforms: "gke"
      flows: "install,upgrade"
      camunda-helm-dir: "camunda-platform-${{ matrix.version }}"
      camunda-helm-git-ref: "${{ github.event.pull_request.head.sha }}"
      caller-git-ref: "${{ github.event.pull_request.head.sha }}"
