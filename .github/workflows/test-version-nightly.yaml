# Basic test for maintenance Camunda 8 Helm charts.
name: "Test - nightly integration testsing"

on:
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  deployments: write

jobs:
  init:
    name: Nightly - Generate matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-nightly-workflow-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Generate workflow matrix
        id: generate-nightly-workflow-matrix
        env:
          CI_NIGHTLY_MATRIX_FILE: ".github/config/integration-testing-scenarios/multitenancy.yaml"
        run: |
          cat ${CI_NIGHTLY_MATRIX_FILE} | envsubst | tee /tmp/matrix.yaml
          # Read matrix YAML file.
          matrix="$(yq '.matrix' --indent=0 --output-format json /tmp/matrix.yaml)"
          # Print and set matrix JSON object as an output.
          echo "${matrix}" | jq
          echo "matrix=$(echo ${matrix} | jq -c)" > "$GITHUB_OUTPUT"
  read-values:
    needs: init
    runs-on: ubuntu-latest
    outputs:
      values-content: ${{ steps.cat-file.outputs.values_content }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          repository: camunda/camunda-platform-helm
      # - name: Read Values File
      #   id: cat-file
      #   env:
      #     CHART_VERSION: ${{ matrix.version }}
      #     SCENARIO_FILE: ${{ matrix.scenario-file }}
      #   run: |
      #     set -euo pipefail
      #     values_content=$(cat charts/camunda-platform-${CHART_VERSION}/test/integration/scenarios/extra-scenarios/${SCENARIO_FILE})
      #     echo "values_content_output=${values_content}" >> "$GITHUB_OUTPUT"
      - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # v1
        id: out
        with:
          matrix-step-name: ${{ github.job }}
          matrix-key: ${{ matrix.version }}
          outputs: |-
            values_content_output:
              global:
                multitenancy:
                  enabled: true

              identity:
                env:
                  - name: IDENTITY_TENANTS_0_NAME
                    value: Default
                  - name: IDENTITY_TENANTS_0_TENANTID
                    value: <default>
                  - name: IDENTITY_TENANTS_0_MEMBERS_0_TYPE
                    value: USER
                  - name: IDENTITY_TENANTS_0_MEMBERS_0_USERNAME
                    value: demo
                  - name: IDENTITY_TENANTS_0_MEMBERS_1_TYPE
                    value: APPLICATION
                  - name: IDENTITY_TENANTS_0_MEMBERS_1_APPLICATIONID
                    value: operate
                  - name: IDENTITY_TENANTS_0_MEMBERS_2_TYPE
                    value: APPLICATION
                  - name: IDENTITY_TENANTS_0_MEMBERS_2_APPLICATIONID
                    value: test
                  - name: IDENTITY_TENANTS_0_MEMBERS_3_TYPE
                    value: APPLICATION
                  - name: IDENTITY_TENANTS_0_MEMBERS_3_APPLICATIONID
                    value: connectors
                  - name: IDENTITY_TENANTS_0_MEMBERS_4_TYPE
                    value: APPLICATION
                  - name: IDENTITY_TENANTS_0_MEMBERS_4_APPLICATIONID
                    value: zeebe
                  - name: KEYCLOAK_CLIENTS_2_ID
                    value: test
                  - name: KEYCLOAK_CLIENTS_2_NAME
                    value: Test
                  - name: KEYCLOAK_CLIENTS_2_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: integration-test-credentials
                        key: identity-admin-client-password
                  - name: KEYCLOAK_CLIENTS_2_REDIRECT_URIS_0
                    value: /dummy
                  - name: KEYCLOAK_CLIENTS_2_ROOT_URL
                    value: http://dummy
                  - name: KEYCLOAK_CLIENTS_2_TYPE
                    value: CONFIDENTIAL
                  # Identity access.
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_0_RESOURCE_SERVER_ID
                    value: camunda-identity-resource-server
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_0_DEFINITION
                    value: read
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_1_RESOURCE_SERVER_ID
                    value: camunda-identity-resource-server
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_1_DEFINITION
                    value: write
                  # Operate access.
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_2_RESOURCE_SERVER_ID
                    value: "operate-api"
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_2_DEFINITION
                    value: "read:*"
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_3_RESOURCE_SERVER_ID
                    value: "operate-api"
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_3_DEFINITION
                    value: "write:*"
                  # Tasklist access.
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_4_RESOURCE_SERVER_ID
                    value: tasklist-api
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_4_DEFINITION
                    value: "read:*"
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_5_RESOURCE_SERVER_ID
                    value: tasklist-api
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_5_DEFINITION
                    value: "write:*"
                  # Optimize access.
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_6_RESOURCE_SERVER_ID
                    value: optimize-api
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_6_DEFINITION
                    value: "write:*"
                  # Zeebe access.
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_7_RESOURCE_SERVER_ID
                    value: zeebe-api
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_7_DEFINITION
                    value: "write:*"
                  # WebModeler access.
                  # NOTE: This actually should be only in the chart-with-web-modeler scenarios,
                  # but since Helm doesn't support merge lists it's added here.
                  # It could be removed later when the env vars could be configured via ConfigMap.
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_8_RESOURCE_SERVER_ID
                    value: web-modeler-api
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_8_DEFINITION
                    value: "write:*"
                  # Console access.
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_9_RESOURCE_SERVER_ID
                    value: console-api
                  - name: KEYCLOAK_CLIENTS_2_PERMISSIONS_9_DEFINITION
                    value: "write:*"

              identityPostgresql:
                enabled: true

  access-info:
    name: Read values files from matrix
    runs-on: ubuntu-latest
    needs: read-values
    outputs:
      values-file: ${{ steps.read.outputs.result }}
    steps:
      - uses: cloudposse/github-action-matrix-outputs-read@33cac12fa9282a7230a418d859b93fdbc4f27b5a # v1
        id: read
        with:
          matrix-step-name: read-values
  test:
    name: test
    runs-on: ubuntu-latest
    needs: [init, access-info]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.matrix) }}
    steps:
      - name: testing
        run: |
          echo "${{ fromJson(needs.access-info.outputs.values-file).values_content[matrix.version] }}"

