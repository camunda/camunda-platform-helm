# Basic test for maintenance Camunda 8 Helm charts.
name: "Test - nightly integration testsing"

on:
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  deployments: write

jobs:
  init:
    name: Nightly - Generate matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-nightly-workflow-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Generate workflow matrix
        id: generate-nightly-workflow-matrix
        env:
          CI_NIGHTLY_MATRIX_FILE: ".github/config/integration-testing-scenarios/multitenancy.yaml"
        run: |
          cat ${CI_NIGHTLY_MATRIX_FILE} | envsubst | tee /tmp/matrix.yaml
          # Read matrix YAML file.
          matrix="$(yq '.matrix' --indent=0 --output-format json /tmp/matrix.yaml)"
          # Print and set matrix JSON object as an output.
          echo "${matrix}" | jq
          echo "matrix=$(echo ${matrix} | jq -c)" > "$GITHUB_OUTPUT"
  read-values:
    needs: init
    runs-on: ubuntu-latest
    outputs:
      values-content: ${{ steps.cat-file.outputs.value_content }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
      deployments: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          repository: camunda/camunda-platform-helm
      - name: cat-file
        id: cat-file
        env:
          CHART_VERSION: ${{ matrix.version }}
          SCENARIO_FILE: ${{ matrix.scenario-file }}
        run: |
          VALUES_CONTENT=$(cat "charts/camunda-platform-${CHART_VERSION}/test/integration/scenarios/chart-full-setup/${SCENARIO_FILE}")
          echo $VALUES_CONTENT
          {
            echo 'test<<EOF'
            echo "${VALUES_CONTENT}"
            echo EOF
          } >> $GITHUB_OUTPUT
  check:
    needs: [init, read-values]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.matrix) }}
    env:
      VALUES_CONTENT: ${{ needs.read-values.outputs.values-content }}
    steps:
      - name: test
        run: |
          echo ${{ matrix.version }}
          echo ${{ matrix.scenario-file }}
          echo "below are the values:"
          echo $VALUES_CONTENT
