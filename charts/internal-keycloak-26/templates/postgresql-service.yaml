{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "keycloak.postgresql.fullname" . }}
  labels:
    {{- include "keycloak.postgresql.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "keycloak.postgresql.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
{{- end }}
