# Document Store feature configuration for 8.8
# Layer 4: Feature - Document Store (AWS S3)

global:
  documentStore:
    activeStoreId: "aws"
    type:
      aws:
        enabled: true
        storeId: "aws"
        bucket: "camunda-ci-eks-prod-team-bucket-qa"
        region: "eu-central-1"
        bucketPath: "documents"
        class: "io.camunda.document.store.aws.AwsDocumentStoreProvider"
        existingSecret: "vault-mapped-secrets"
        accessKeyIdKey: "IDP_AWS_ACCESSKEY"
        secretAccessKeyKey: "IDP_AWS_SECRETKEY"
connectors:
  env:
    - name: username
      value: username
    - name: password
      value: password
    - name: IDP_AWS_BUCKET_NAME
      value: "$IDP_AWS_BUCKET_NAME"
    - name: IDP_AWS_REGION
      value: "$IDP_AWS_REGION"
    - name: IDP_AWS_SECRETKEY
      value: "$IDP_AWS_SECRETKEY"
    - name: IDP_AWS_ACCESSKEY
      value: "$IDP_AWS_ACCESSKEY"
      #    - name: IDP_GCP_SERVICE_ACCOUNT
      #      value: "$IDP_GCP_SERVICE_ACCOUNT"
      #    - name: IDP_GCP_VERTEX_BUCKET_NAME
      #      value: "$IDP_GCP_VERTEX_BUCKET_NAME"
      #    - name: IDP_GCP_VERTEX_PROJECT_ID
      #      value: "$IDP_GCP_VERTEX_PROJECT_ID"
      #    - name: IDP_GCP_DOCUMENT_AI_PROJECT_ID
      #      value: "$IDP_GCP_DOCUMENT_AI_PROJECT_ID"
      #    - name: IDP_GCP_DOCUMENT_AI_PROCESSOR_ID
      #      value: "$IDP_GCP_DOCUMENT_AI_PROCESSOR_ID"
      #    - name: IDP_GCP_DOCUMENT_AI_REGION
      #      value: "$IDP_GCP_DOCUMENT_AI_REGION"
      #    - name: IDP_GCP_VERTEX_REGION
      #      value: "$IDP_GCP_VERTEX_REGION"
    - name: IDP_AZURE_DOCUMENT_INTELLIGENCE_KEY
      value: "$IDP_AZURE_DOCUMENT_INTELLIGENCE_KEY"
    - name: IDP_AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
      value: "$IDP_AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT"
    - name: IDP_AZURE_AI_FOUNDRY_ENDPOINT
      value: "$IDP_AZURE_AI_FOUNDRY_ENDPOINT"
    - name: IDP_AZURE_AI_FOUNDRY_KEY
      value: "$IDP_AZURE_AI_FOUNDRY_KEY"
    - name: IDP_AZURE_OPEN_AI_ENDPOINT
      value: "$IDP_AZURE_OPEN_AI_ENDPOINT"
    - name: IDP_AZURE_OPEN_AI_KEY
      value: "$IDP_AZURE_OPEN_AI_KEY"
    - name: OPENAI_API_KEY
      value: "$OPENAI_API_KEY"
