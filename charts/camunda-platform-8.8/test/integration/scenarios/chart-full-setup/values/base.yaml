# Base values for all 8.8 integration test deployments
# Layer 1: Common configuration shared across all scenarios

global:
  # for bitnami images
  imagePullSecrets:
    - index-docker-io
    - registry-camunda-cloud
  # for camunda images
  image:
    pullSecrets:
      - name: index-docker-io
  secrets:
    autoGenerated: false
  ingress:
    enabled: true
    className: nginx
    # The Ingress host will be added via CLI.
    host: "$CAMUNDA_HOSTNAME"
    tls:
      enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/hostname: "{{ .Values.global.ingress.host }}"
      external-dns.alpha.kubernetes.io/ttl: "60"

# Identity base setup
identity:
  enabled: true
  contextPath: "/identity"
  startupProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 2
    failureThreshold: 60
    timeoutSeconds: 1
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  firstUser:
    existingSecret: "integration-test-credentials"
    existingSecretKey: "identity-user-password"
  clients:
    - id: venom
      name: Venom
      secret:
        existingSecret: integration-test-credentials
        existingSecretKey: identity-admin-client-password
      redirectUris: /dummy
      rootUrl: http://dummy
      type: confidential
      permissions:
        - resourceServerId: camunda-identity-resource-server
          definition: read
        - resourceServerId: camunda-identity-resource-server
          definition: write
        - resourceServerId: orchestration-api
          definition: read:*
        - resourceServerId: orchestration-api
          definition: write:*
        - resourceServerId: optimize-api
          definition: write:*
        - resourceServerId: web-modeler-api
          definition: write:*
        - resourceServerId: console-api
          definition: write:*
identityPostgresql:
  enabled: true
  auth:
    existingSecret: "integration-test-credentials"
    secretKeys:
      adminPasswordKey: "identity-keycloak-postgresql-admin-password"
      userPasswordKey: "identity-keycloak-postgresql-user-password"

optimize:
  enabled: true
  contextPath: "/optimize"
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 40
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  caches:
    cloudTenantAuthorizations:
      minFetchIntervalSeconds: 300

connectors:
  contextPath: "/connectors"
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 1
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  env:
    - name: username
      value: username
    - name: password
      value: password

webModeler:
  enabled: true
  contextPath: "/modeler"
  image:
    pullSecrets:
      - name: index-docker-io
      - name: registry-camunda-cloud
  restapi:
    # Wait for PostgreSQL to accept connections before starting restapi.
    # Prevents restapi from failing on DB connection during Spring context init.
    initContainers:
      - name: wait-for-postgresql
        image: busybox:1.36
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        command:
          - sh
          - -c
          - |
            echo "Waiting for PostgreSQL at {{ .Release.Name }}-postgresql-web-modeler:5432 ..."
            until nc -z "{{ .Release.Name }}-postgresql-web-modeler" 5432; do
              sleep 2
            done
            echo "PostgreSQL is ready"
    startupProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 30
      timeoutSeconds: 1
    mail:
      fromAddress: noreply@example.com
  webapp:
    replicas: 2
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - webapp
              topologyKey: kubernetes.io/hostname

webModelerPostgresql:
  enabled: true
  auth:
    existingSecret: "integration-test-credentials"
    secretKeys:
      adminPasswordKey: "webmodeler-postgresql-admin-password"
      userPasswordKey: "webmodeler-postgresql-user-password"
  primary:
    # No persistent storage needed in CI — use emptyDir instead of PVC.
    persistence:
      enabled: false
    # Resource allocation for faster startup
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    # PostgreSQL configuration optimized for fast startup in integration tests.
    # WARNING: These settings trade durability for speed — NOT suitable for production.
    extendedConfiguration: |
      shared_buffers = 64MB
      work_mem = 8MB
      max_connections = 50
      fsync = off
      full_page_writes = off
      synchronous_commit = off

orchestration:
  contextPath: "/orchestration"
  # JVM startup optimizations: TieredStopAtLevel=1 skips C2 compiler for ~30-50% faster startup,
  # pre-sized heap avoids resizing overhead, G1GC with string deduplication for efficiency.
  resources:
    requests:
      cpu: 2000m
      memory: 2000Mi
    limits:
      cpu: 2000m
      memory: 3000Mi
  startupProbe:
    enabled: true
    # Use /readiness instead of /startup because the migration importer Deployment
    # reuses orchestration probe settings but doesn't register the "startup" health
    # group (only broker profile does). /readiness works on both StatefulSet and importer.
    probePath: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5
  livenessProbe:
    enabled: false
  ingress:
    grpc:
      enabled: true
      className: nginx
      host: "grpc-{{ .Values.global.ingress.host }}"
      tls:
        enabled: true
        secretName: camunda-platform-zeebe-gateway
      annotations:
        external-dns.alpha.kubernetes.io/hostname: "orchestration-{{ .Values.global.ingress.host }}"
        external-dns.alpha.kubernetes.io/ttl: "60"
  importer:
    enabled: true

console:
  replicas: 2
  enabled: true
  contextPath: "/"
  env:
    - name: CAMUNDA_CONSOLE_EXPERIMENTAL_TAGS
      value: 'true'
  image:
    pullSecrets:
      - name: index-docker-io
      - name: registry-camunda-cloud
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - console
            topologyKey: kubernetes.io/hostname

prometheusServiceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
