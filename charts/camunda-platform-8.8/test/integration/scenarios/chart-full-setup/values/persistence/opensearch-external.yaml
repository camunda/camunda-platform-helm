# External OpenSearch backend configuration for 8.8
# Layer 3: Backend - OpenSearch (external, pool-routed)
#
# Uses one of 4 internal OpenSearch pools (pool-0 through pool-3) based on
# the $OS_POOL_INDEX variable, mirroring the Elasticsearch external pool pattern.
#
# NOTE: The legacy Zeebe exporter (global.opensearch.prefix) and the Camunda
# exporter (orchestration.index.prefix) MUST use different prefixes. If they
# share a prefix, the Camunda exporter creates indices before the legacy
# exporter creates its templates, causing mapping conflicts that silently
# prevent template (and alias) creation. Optimize reads from the legacy
# exporter's aliases, so CAMUNDA_OPTIMIZE_ZEEBE_NAME must match global.opensearch.prefix.

global:
  elasticsearch:
    enabled: false
  opensearch:
    enabled: true
    aws:
      enabled: false
    auth:
      username: admin
      secret:
        existingSecret: infra-credentials
        existingSecretKey: opensearch-password
    url:
      protocol: https
      host: "opensearch-2-19-pool-${OS_POOL_INDEX}.ci.distro.ultrawombat.com"
      port: 443
    prefix: zeebe-$ORCHESTRATION_INDEX_PREFIX-$FLOW

orchestration:
  data:
    secondaryStorage:
      type: opensearch
  index:
    prefix: $ORCHESTRATION_INDEX_PREFIX-$FLOW

optimize:
  enabled: true
  env:
    - name: CAMUNDA_OPTIMIZE_ZEEBE_NAME
      value: zeebe-$ORCHESTRATION_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_OPTIMIZE_OPENSEARCH_SETTINGS_INDEX_PREFIX
      value: $OPTIMIZE_INDEX_PREFIX-$FLOW
  migration:
    env:
      - name: CAMUNDA_OPTIMIZE_ZEEBE_NAME
        value: zeebe-$ORCHESTRATION_INDEX_PREFIX-$FLOW
      - name: CAMUNDA_OPTIMIZE_OPENSEARCH_SETTINGS_INDEX_PREFIX
        value: $OPTIMIZE_INDEX_PREFIX-$FLOW

elasticsearch:
  enabled: false
