# =============================================================================
# Elasticsearch Backend with Self-Signed TLS — caBundle ONLY (no JKS path)
# =============================================================================
# Layer 3: Data backend - Elasticsearch (bundled Bitnami, self-signed TLS)
# Used with: --persistence elasticsearch-self-signed-os-trust
#
# Validates the backported global.tls.caBundle wiring (helm#3498) on 8.8.
# Identical infrastructure to elasticsearch-self-signed (same bundled ES
# subchart with X-Pack security + self-signed TLS), but DELIBERATELY OMITS
# the legacy global.elasticsearch.tls.existingSecret / .tls.jks truststore.
# The Camunda Java components — including the 8.8-only importer Deployment
# and the data-migration Job, which both import into ES over TLS — must trust
# the self-signed ES endpoint solely via the chart-built combined truststore
# (JDK cacerts + the user CA), assembled at runtime by the caBundle init
# container running keytool.
#
# Prerequisites (created by pre-install-elasticsearch-self-signed-os-trust.sh,
# openssl-only — no keytool/JDK on the CI runner):
#   - Secret "elasticsearch-tls-pem" with keys:
#       tls.crt, tls.key  (ES node PEM certs; security.tls.usePemCerts)
#       ca.crt            (ES trust + global.tls.caBundle input)
# =============================================================================

global:
  elasticsearch:
    enabled: true
    url:
      protocol: https
      host: "{{ .Release.Name }}-elasticsearch"
      port: 9200
    auth:
      username: elastic
      secret:
        existingSecret: "{{ .Release.Name }}-elasticsearch"
        existingSecretKey: elasticsearch-password
    # Intentionally NO tls.existingSecret / tls.jks — trust comes only from
    # the global.tls.caBundle truststore below.
  tls:
    caBundle:
      secret:
        # Same secret + CA the bundled ES serves with — Camunda trusts ES via this bundle.
        existingSecret: elasticsearch-tls-pem
        existingSecretKey: ca.crt

# The unified orchestration component (zeebe + operate + tasklist in 8.8).
# The importer Deployment and data-migration Job also include orchestration.env,
# so these env vars reach all those pods.
orchestration:
  env:
    - name: VALUES_ELASTICSEARCH_PASSWORD
      value: "camunda-ci-es-password"
    - name: CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_USERNAME
      value: "elastic"
    - name: CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_PASSWORD
      value: "camunda-ci-es-password"
    - name: CAMUNDA_TASKLIST_ZEEBEELASTICSEARCH_USERNAME
      value: "elastic"
    - name: CAMUNDA_TASKLIST_ZEEBEELASTICSEARCH_PASSWORD
      value: "camunda-ci-es-password"
    - name: ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_AUTHENTICATION_USERNAME
      value: "elastic"
    - name: ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_AUTHENTICATION_PASSWORD
      value: "camunda-ci-es-password"

optimize:
  # No -Djavax.net.ssl.trustStoreType=jks here: the caBundle truststore is
  # PKCS12, and the chart appends its truststore flags to optimize.javaOpts.
  env:
    - name: CAMUNDA_OPTIMIZE_ELASTICSEARCH_SECURITY_USERNAME
      value: "elastic"
    - name: CAMUNDA_OPTIMIZE_ELASTICSEARCH_SSL_ENABLED
      value: "true"
    - name: CAMUNDA_OPTIMIZE_ELASTICSEARCH_SECURITY_PASSWORD
      value: "camunda-ci-es-password"

# NOTE: connectors deliberately sets NO JAVA_TOOL_OPTIONS override here — the
# caBundle path injects the chart-built truststore via caBundleJavaToolOptionsEnv.
# A manual JAVA_TOOL_OPTIONS would override it (and trips a constraints warning).

elasticsearch:
  enabled: true
  security:
    enabled: true
    elasticPassword: "camunda-ci-es-password"
    tls:
      restEncryption: true
      autoGenerated: false
      verificationMode: certificate
      # PEM mode: the pre-install script ships tls.crt/tls.key/ca.crt (PEM) in
      # elasticsearch-tls-pem — no JKS, so no keytool is needed on the CI runner.
      usePemCerts: true
      master:
        existingSecret: elasticsearch-tls-pem
  master:
    extraEnvVars: []
