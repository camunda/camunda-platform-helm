# OpenSearch backend configuration for 8.8
# Layer 3: Backend - OpenSearch (external)

global:
  elasticsearch:
    enabled: false
  exporter:
    zeebe:
      enabled: true
  opensearch:
    enabled: true
    aws:
      enabled: false
    auth:
      username: "$OPENSEARCH_USERNAME"
      password: "$OPENSEARCH_PASSWORD"
    url:
      protocol: $OPENSEARCH_PROTOCOL
      host: "$OPENSEARCH_HOST"
      port: $OPENSEARCH_PORT
    prefix: $ORCHESTRATION_INDEX_PREFIX-$FLOW

orchestration:
  data:
    secondaryStorage:
      type: opensearch
  index:
    prefix: $ORCHESTRATION_INDEX_PREFIX-$FLOW
  env:
    - name: ZEEBE_BROKER_EXPORTERS_OPENSEARCH_ARGS_INDEX_PREFIX
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_DATA_SECONDARYSTORAGE_OPENSEARCH_INDEXPREFIX
      value: "$ORCHESTRATION_INDEX_PREFIX-operate-$FLOW"
    - name: ZEEBE_BROKER_EXPORTERS_CAMUNDAEXPORTER_ARGS_CONNECT_INDEXPREFIX
      value: "$ORCHESTRATION_INDEX_PREFIX-operate-$FLOW"
    # Upgrade-compat: these env vars are set in common/values-integration-test.yaml
    # but must be replayed here because orchestration.env is a YAML array and this
    # layer replaces (not merges) the one from common.
    - name: CAMUNDA_SYSTEM_UPGRADE_ENABLEVERSIONCHECK
      value: "false"
    - name: CAMUNDA_DATABASE_SCHEMAMANAGER_VERSIONCHECKRESTRICTIONENABLED
      value: "false"

optimize:
  enabled: true
  env:
    - name: CAMUNDA_OPTIMIZE_ZEEBE_NAME
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_OPTIMIZE_OPENSEARCH_SETTINGS_INDEX_PREFIX
      value: $OPTIMIZE_INDEX_PREFIX-$FLOW
  migration:
    env:
      - name: CAMUNDA_OPTIMIZE_ZEEBE_NAME
        value: $ORCHESTRATION_INDEX_PREFIX-$FLOW
      - name: CAMUNDA_OPTIMIZE_OPENSEARCH_SETTINGS_INDEX_PREFIX
        value: $OPTIMIZE_INDEX_PREFIX-$FLOW

elasticsearch:
  enabled: false
