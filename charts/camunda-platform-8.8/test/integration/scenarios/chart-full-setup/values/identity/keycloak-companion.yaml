# Companion Keycloak auth configuration for 8.8 (upgrade-path layer)
# Layer 2: Auth method — external companion internal-keycloak-26 release.
#
# Bundled-Keycloak-free variant of keycloak.yaml, selected by the upgrade-minor
# scenarios so the realm/users/clients live in a companion Keycloak (separate
# Helm release) rather than the in-chart Bitnami subchart. This makes the
# 8.8 deployment match the external-Keycloak topology that survives the later
# removal of Bitnami subcharts in 8.10, so the upgrade chain preserves identity.
#
# The companion internal-keycloak-26 chart creates a Service named "keycloak";
# Identity + WebModeler external databases point at the "postgresql" service
# from the internal-postgresql companion chart.

global:
  ingress:
    enabled: true
    className: nginx
    # The Ingress host will be added via CLI.
    host: "$CAMUNDA_HOSTNAME"
    tls:
      enabled: true
      # A wildcard certificate will be used.

    annotations:
      external-dns.alpha.kubernetes.io/hostname: "{{ .Values.global.ingress.host }}"
      external-dns.alpha.kubernetes.io/ttl: "60"
  identity:
    keycloak:
      url:
        protocol: http
        host: "keycloak.{{ .Release.Namespace }}.svc.cluster.local"
        port: "80"
      internal: true
      auth:
        adminUser: admin
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-keycloak-admin-password"
    auth:
      enabled: true
      publicIssuerUrl: "https://{{ .Values.global.ingress.host }}/auth/realms/camunda-platform"
      admin:
        enabled: true
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-admin-client-token"
      webModeler:
        redirectUrl: "https://{{ .Values.global.ingress.host }}/modeler"
      console:
        redirectUrl: "https://{{ .Values.global.ingress.host }}"
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-console-client-token"
      optimize:
        redirectUrl: "https://{{ .Values.global.ingress.host }}/optimize"
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-optimize-client-token"
  security:
    authentication:
      method: oidc

# -- Wait for the companion Keycloak before starting Identity ------------------
identity:
  initContainers:
    - name: wait-for-keycloak
      image: busybox:1.36
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      command:
        - sh
        - -c
        - |
          echo "Waiting for Keycloak at keycloak:80/auth/ ..."
          until wget -q --spider --timeout=2 "http://keycloak:80/auth/"; do
            sleep 2
          done
          echo "Keycloak is ready"
  externalDatabase:
    enabled: true
    host: postgresql
    port: 5432
    database: identity
    username: $RDBMS_POSTGRESQL_USERNAME
    secret:
      inlineSecret: $RDBMS_POSTGRESQL_PASSWORD

# -- Bundled Bitnami subcharts disabled (provided by companion releases). ------
identityKeycloak:
  enabled: false

identityPostgresql:
  enabled: false

webModeler:
  restapi:
    externalDatabase:
      enabled: true
      host: postgresql
      port: 5432
      database: webmodeler
      username: $RDBMS_POSTGRESQL_USERNAME
      secret:
        inlineSecret: $RDBMS_POSTGRESQL_PASSWORD

connectors:
  security:
    authentication:
      oidc:
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-connectors-client-token"

orchestration:
  env:
    # Security mapping rules — written into the Zeebe raft log on first boot of
    # the 8.8 cluster so the orchestration layer can authenticate Keycloak users.
    # Placed in the identity layer rather than the persistence layer so they
    # don't clobber the Entra/OIDC mapping rules in oidc.yaml (persistence is
    # applied after identity in the layered-values merge).
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_0_MAPPINGRULEID
      value: "demo-user-mapping-rule"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_0_CLAIMNAME
      value: "preferred_username"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_0_CLAIMVALUE
      value: "demo"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_1_MAPPINGRULEID
      value: "venom-client-mapping-rule"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_1_CLAIMNAME
      value: "client_id"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_1_CLAIMVALUE
      value: "venom"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_2_MAPPINGRULEID
      value: "connectors-client-mapping-rule"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_2_CLAIMNAME
      value: "client_id"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_2_CLAIMVALUE
      value: "connectors"
    - name: CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_MAPPINGRULES_0
      value: "demo-user-mapping-rule"
    - name: CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_MAPPINGRULES_1
      value: "venom-client-mapping-rule"
    - name: CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_MAPPINGRULES_2
      value: "connectors-client-mapping-rule"
  security:
    initialization:
      mappingRules:
        - mappingRuleID: demo-admin-mapping-rule
          claimName: preferred_username
          claimValue: demo
      defaultRoles:
        admin:
          mappingRules:
            - demo-admin-mapping-rule
          users:
            - demo
          clients:
            - venom
    authentication:
      authenticationRefreshInterval: "PT30S"
      oidc:
        redirectUrl: "https://{{ .Values.global.ingress.host }}/orchestration"
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-orchestration-client-token"
        backwardsCompatibleAudiences:
          - operate-api
          - tasklist-api
          - zeebe-api
