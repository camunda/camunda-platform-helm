# Used in the GitHub Actions unit test CI workflow. auth can be the following values: basic, keycloak, oidc
unit:
  enabled: true
  matrix:
    - name: Management
      packages: identity common console
    - name: Orchestration
      packages: orchestration connectors optimize
    - name: Design
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          auth: keycloak
          shortname: eske
          exclude: []
          infra-type:
            gke: distroci
          flow: install
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]  # EKS removed: Playwright ITs and E2E consistently fail on EKS for 8.8 eske
        - name: upgrade-migration
          enabled: false
          flow: upgrade-minor
          auth: keycloak
          shortname: eske-upgm
          exclude: []
          features: [migrator]
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: elasticsearch-basic
          enabled: false
          shortname: esba
          auth: basic
          flow: install
          identity: basic
          persistence: elasticsearch
          exclude: [identity,console,orchestration-grpc]
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: oidc
          enabled: true
          exclude: [identity,console,orchestration-grpc]
          shortname: esoi
          auth: oidc
          flow: install,upgrade-minor
          skip-e2e: true  # OIDC auth incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          identity: oidc
          persistence: elasticsearch
          platforms: [gke]
        - name: keycloak-mt
          enabled: false # our upgrade testing has issues with credentials on 8.7 -> 8.8 upgrade, so disabling for now to get green CI while we investigate
          exclude: []
          shortname: kemt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: upgrade-minor
          skip-e2e: true  # 8.8 Playwright smoke test enters retry loop exceeding timeout
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-rba
          enabled: false
          exclude: []
          shortname: kerba
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          platforms: [gke]
        - name: elasticsearch-self-signed-upgrade
          enabled: false
          exclude: []
          shortname: esss
          auth: keycloak
          flow: upgrade-minor
          features: [migrator]
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch-self-signed
          platforms: [gke]
        - name: keycloak-original
          enabled: false
          exclude: []
          shortname: keyc
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: elasticsearch
          enabled: false
          exclude: [orchestration-grpc]
          shortname: eshy
          identity: hybrid
          persistence: elasticsearch
          auth: hybrid
          flow: install
          skip-e2e: true  # Hybrid auth incompatible with Keycloak-dependent smoke tests
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: elasticsearch-arm
          enabled: true
          auth: keycloak
          shortname: esarm
          exclude: []
          platforms: [gke]
          infra-type:
            gke: arm
          flow: install
          skip-e2e: true  # 8.8 ARM frontend bug: Deploy-and-Run API call never reaches restapi
          identity: keycloak-external
          features: [arm]
          persistence: elasticsearch-external
        - name: opensearch
          enabled: false
          exclude: []
          shortname: oske
          auth: keycloak
          identity: keycloak
          persistence: opensearch
          qa: false
          flow: install
        - name: opensearch-external
          enabled: true
          shortname: osex
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-external
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: opensearch-embedded
          enabled: false
          shortname: osem
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          dependencies:
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: documentstore
          enabled: true
          exclude: []
          shortname: docstr
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
          platforms: [eks]

        # ===========================================================================
        # Backward-compat scenarios — referenced by .github/workflows/test-backward-compat.yaml
        # (callers: c8-cross-component-e2e-tests playwright_sm_reusable_flow_8_8_plus.yaml,
        #  sm_manual_upgrade_minor_8_8). All disabled so they don't appear in the regular
        # CI matrix; matrix run resolves them via --shortname-filter + --include-disabled.
        #
        # Note on duplicate shortnames: compat workflow reuses qaosupg/qaelmtupg across
        # tasklist-v1 install scenarios and *-upg upgrade-minor scenarios. Both deploy
        # via the same flow=install path here. One entry per shortname covers both.
        # ===========================================================================
        # `es` is the test-integration-template default shortname; used by the
        # compat-camunda-simple job (camunda/camunda-helm-integration.yml).
        - name: elasticsearch
          enabled: false
          flow: install
          shortname: es
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: qa-elasticsearch
          enabled: false
          flow: install
          shortname: qael
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          qa: true
          platforms: [gke]
        - name: qa-opensearch
          enabled: false
          flow: install
          shortname: qaos
          auth: keycloak
          identity: keycloak
          persistence: opensearch
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-rba
          enabled: false
          flow: install
          shortname: qaelrba
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-mt
          enabled: false
          flow: install
          shortname: qaelmt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [multitenancy]
          qa: true
          platforms: [gke]
        - name: qa-license
          enabled: false
          flow: install
          shortname: lic
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [license]
          qa: true
          platforms: [gke]
        - name: qa-entra
          enabled: false
          flow: install
          shortname: qaen
          auth: oidc
          identity: oidc
          persistence: elasticsearch
          qa: true
          platforms: [gke]
        - name: qa-document-store
          enabled: false
          flow: install
          shortname: qadoc
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-tasklist-v1
          enabled: false
          flow: install
          shortname: qaeltlv1
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [tasklist-v1]
          qa: true
          platforms: [gke]
        - name: qa-opensearch-tasklist-v1
          enabled: false
          flow: install
          shortname: qaosupg
          auth: keycloak
          identity: keycloak
          persistence: opensearch
          features: [tasklist-v1]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-rba-tasklist-v1
          enabled: false
          flow: install
          shortname: qaelrbaupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [rba, tasklist-v1]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-mt-tasklist-v1
          enabled: false
          flow: install
          shortname: qaelmtupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [multitenancy, tasklist-v1]
          qa: true
          platforms: [gke]
        - name: qa-license-tasklist-v1
          enabled: false
          flow: install
          shortname: licupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [license, tasklist-v1]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-upg
          enabled: false
          flow: install
          shortname: qaelupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-document-upg
          enabled: false
          flow: install
          shortname: qaeldocupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
          qa: true
          platforms: [gke]
    nightly:
      scenario:
        - name: elasticsearch
          enabled: true
          exclude: []
          shortname: eskey
          auth: keycloak
          # The following integration tests need to be exluded when basic-auth is enabled.
        - name: elasticsearch-basic
          enabled: true
          auth: basic
          shortname: esba
          identity: basic
          persistence: elasticsearch
          exclude: [identity,console,orchestration-grpc]
          # deployment should work but integration tests are not passing
        - name: elasticsearch-oidc
          enabled: false
          exclude: []
          shortname: esoi
          auth: oidc
          identity: oidc
          persistence: elasticsearch
        - name: multitenancy
          enabled: true
          shortname: mtke
          exclude: []
          auth: keycloak
          identity: keycloak-external
          persistence: elasticsearch
          features: [multitenancy]
          # not supported
        - name: opensearch
          enabled: true
          exclude: []
          shortname: oske
          auth: keycloak
          identity: keycloak
          persistence: opensearch
          flow: install
        - name: opensearch
          enabled: true
          shortname: osba
          exclude: [identity,console,orchestration-grpc]
          auth: basic
          identity: basic
          persistence: opensearch
        - name: identity-migration
          enabled: true
          exclude: []
          shortname: idmike
          auth: keycloak
        - name: elasticsearch
          enabled: true
          exclude: []
          auth: basic
          shortname: elbae
          enterprise: true
        - name: documentstore
          enabled: false
          exclude: []
          shortname: docstr
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
        - name: keycloak-external-mimic
          enabled: true
          exclude: []
          shortname: kcextm
          auth: keycloak
