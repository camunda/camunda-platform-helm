# Used in the GitHub Actions unit test CI workflow. auth can be the following values: basic, keycloak, oidc
unit:
  enabled: true
  matrix:
    - name: Management
      packages: identity common console
    - name: Orchestration
      packages: orchestration connectors optimize
    - name: Design
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  flows:
    upgrade-patch:
      pre-upgrade:
        script: pre-upgrade-patch.sh
        description: |
          Deletes orchestration StatefulSets and the postgresql-web-modeler
          StatefulSet + PVC before the 8.7→8.8 patch upgrade. PostgreSQL 15→14
          rollback requires fresh statefulset spec.
    upgrade-minor:
      pre-upgrade:
        script: pre-upgrade-minor.sh
        description: |
          Deletes the postgresql and postgresql-web-modeler StatefulSets to
          handle immutable spec diffs across the 8.7→8.8 minor upgrade.
          Helm recreates them with the new spec while keeping PVC data.
    # modular-upgrade-minor uses the same pre-upgrade work as upgrade-minor
    # (the old PreUpgradeScriptName aliased both to pre-upgrade-minor.sh).
    # Duplicated here as an explicit map key so the flow-hook lookup in
    # matrix.Generate resolves it. Currently dormant — all
    # modular-upgrade-minor scenarios are disabled — but kept correct for
    # the day one is enabled.
    modular-upgrade-minor:
      pre-upgrade:
        script: pre-upgrade-minor.sh
        description: |
          Deletes the postgresql and postgresql-web-modeler StatefulSets to
          handle immutable spec diffs across the 8.7→8.8 minor upgrade.
          Helm recreates them with the new spec while keeping PVC data.
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          auth: keycloak
          shortname: eske
          tier: 1
          exclude: []
          infra-type:
            gke: distroci
          flow: install
          helmVersion: 3.20.2
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]  # EKS removed: Playwright ITs and E2E consistently fail on EKS for 8.8 eske
        - name: enterprise-values
          enabled: false # Disabled: entv Playwright runner resource flakiness is unrelated to chart changes
          shortname: entv
          tier: 2
          auth: keycloak
          flow: install
          exclude: []
          helmVersion: 3.20.2
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features: [enterprise]  # symlink: values/features/enterprise.yaml -> values-enterprise.yaml
          platforms: [gke]
        - name: upgrade-migration
          enabled: false
          flow: upgrade-minor
          helmVersion: 3.20.2
          auth: keycloak
          shortname: eske-upgm
          exclude: []
          features: [migrator]
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: elasticsearch-basic
          enabled: false
          shortname: esba
          auth: basic
          flow: install
          helmVersion: 3.20.2
          identity: basic
          persistence: elasticsearch
          exclude: [identity,console,orchestration-grpc]
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: oidc
          enabled: true
          exclude: [identity,console,orchestration-grpc]
          shortname: esoi
          tier: 2
          auth: oidc
          flow: install,upgrade-minor
          helmVersion: 3.20.2
          skip-e2e: true  # OIDC auth incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          identity: oidc
          persistence: elasticsearch
          platforms: [gke]
        - name: keycloak-mt
          enabled: false # our upgrade testing has issues with credentials on 8.7 -> 8.8 upgrade, so disabling for now to get green CI while we investigate
          exclude: []
          shortname: kemt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: upgrade-minor
          helmVersion: 3.20.2
          skip-e2e: true  # 8.8 Playwright smoke test enters retry loop exceeding timeout
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-rba
          enabled: false
          exclude: []
          shortname: kerba
          auth: keycloak
          flow: upgrade-minor
          helmVersion: 3.20.2
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          platforms: [gke]
        - name: elasticsearch-self-signed-upgrade
          enabled: false
          exclude: []
          shortname: esss
          auth: keycloak
          flow: upgrade-minor
          features: [migrator]
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch-self-signed
          platforms: [gke]
          pre-install:
            script: pre-install-elasticsearch-self-signed-upgrade.sh
            description: |
              Generates a self-signed CA plus node certificate via openssl,
              packages them into JKS keystore + truststore via keytool, and
              creates the elasticsearch-tls-certs, elasticsearch-tls-passwords,
              and elasticsearch-jks Secrets consumed by the Elasticsearch
              StatefulSet's TLS config.
        - name: keycloak-original
          enabled: false
          exclude: []
          shortname: keyc
          auth: keycloak
          flow: upgrade-minor
          helmVersion: 3.20.2
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: elasticsearch
          enabled: false
          exclude: [orchestration-grpc]
          shortname: eshy
          identity: hybrid
          persistence: elasticsearch
          auth: hybrid
          flow: install
          helmVersion: 3.20.2
          skip-e2e: true  # Hybrid auth incompatible with Keycloak-dependent smoke tests
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: elasticsearch-arm
          enabled: true
          auth: keycloak
          shortname: esarm
          tier: 2
          exclude: []
          platforms: [gke]
          infra-type:
            gke: arm
          flow: install
          helmVersion: 3.20.2
          skip-e2e: true  # 8.8 ARM frontend bug: Deploy-and-Run API call never reaches restapi
          identity: keycloak-external
          features: [arm]
          persistence: elasticsearch-external
        - name: opensearch
          enabled: true
          exclude: []
          shortname: oske
          tier: 2
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          flow: install
          helmVersion: 3.20.2
          infra-type:
            gke: distroci
          platforms: [gke]
          dependencies:
            - chart: opensearch/opensearch
              version: "2.31.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: opensearch-external
          enabled: false  # Disabled: external AWS OpenSearch tests are unstable; tracked in #6119
          shortname: osex
          tier: 2
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-external
          flow: install
          helmVersion: 3.20.2
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: documentstore
          enabled: true
          exclude: []
          shortname: docstr
          tier: 2
          auth: keycloak
          helmVersion: 3.20.2
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
          platforms: [eks]
          infra-type:
            eks: preemptible

        # ===========================================================================
        # Backward-compat scenarios — referenced by .github/workflows/test-backward-compat.yaml
        # (callers: c8-cross-component-e2e-tests playwright_sm_reusable_flow_8_8_plus.yaml,
        #  sm_manual_upgrade_minor_8_8). All disabled so they don't appear in the regular
        # CI matrix; matrix run resolves them via --shortname-filter + --include-disabled.
        #
        # Note on duplicate shortnames: compat workflow reuses qaosupg/qaelmtupg across
        # tasklist-v1 install scenarios and *-upg upgrade-minor scenarios. Both deploy
        # via the same flow=install path here. One entry per shortname covers both.
        # ===========================================================================
        # Used by camunda/connectors FEATURE_BRANCH_HELM_TEST workflow (stable/8.8).
        - name: keycloak-original
          enabled: true
          flow: install
          shortname: keyco
          tier: 1
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          infra-type:
            gke: distroci
        # AlwaysGreen scenario — referenced by camunda/camunda's
        # docker-build-helm-integration.yml. Deploys onto dedicated alwaysgreen
        # GKE node pool (workload=alwaysgreen label + NoSchedule taint).
        - name: alwaysgreen
          enabled: false
          flow: install
          shortname: agrn
          auth: keycloak
          infra-type:
            gke: alwaysgreen
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        # kcor is referenced by .github/workflows/test-backward-compat.yaml's
        # compat-camunda-docker job (camunda/docker-build-helm-integration.yml).
        - name: keycloak-original
          enabled: false
          flow: install
          shortname: kcor
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          infra-type:
            gke: distroci
        # `es` is the test-integration-template default shortname; used by the
        # compat-camunda-simple job (camunda/camunda-helm-integration.yml).
        - name: elasticsearch
          enabled: false
          flow: install
          shortname: es
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          infra-type:
            gke: distroci
