script: pre-install-elasticsearch-self-signed-os-trust.sh
description: |
  Same self-signed Elasticsearch infra as elasticsearch-self-signed
  (reuses the cert generator, which additionally creates the
  elasticsearch-tls-ca PEM Secret). This scenario validates the
  backported global.tls.caBundle path: Camunda — including the importer
  and data-migration workloads — trusts the self-signed ES endpoint solely
  via the chart-built JVM truststore (JDK cacerts + the user CA), with NO
  legacy JKS tls.secret configured.
