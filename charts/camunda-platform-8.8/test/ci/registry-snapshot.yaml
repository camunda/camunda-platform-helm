integration:
  vars:
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          shortname: eske
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 1
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          helmVersion: 3.20.2
        - name: orchestration-tls
          enabled: true
          shortname: estls
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features:
            - orchestration-tls
          helmVersion: 3.20.2
          pre-install:
            script: pre-install-orchestration-tls.sh
            description: |
              Generates a self-signed certificate/key pair for the Orchestration
              Cluster gRPC endpoint, creates the server TLS Secret, and creates
              a truststore Secret consumed by Web Modeler restapi.
        - name: enterprise-values
          enabled: false
          shortname: entv
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features:
            - enterprise
          helmVersion: 3.20.2
        - name: upgrade-migration
          enabled: false
          shortname: eske-upgm
          auth: keycloak
          flow: upgrade-minor
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            eks: preemptible
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features:
            - migrator
          helmVersion: 3.20.2
        - name: elasticsearch-basic
          enabled: false
          shortname: esba
          auth: basic
          flow: install
          platforms:
            - gke
          exclude:
            - identity
            - console
            - orchestration-grpc
          infra-type:
            eks: preemptible
            gke: distroci
          identity: basic
          persistence: elasticsearch
          helmVersion: 3.20.2
        - name: oidc
          enabled: true
          shortname: esoi
          auth: oidc
          flow: install,upgrade-minor
          platforms:
            - gke
          exclude:
            - identity
            - console
            - orchestration-grpc
          tier: 2
          infra-type:
            eks: preemptible
            gke: distroci
          identity: oidc
          persistence: elasticsearch
          helmVersion: 3.20.2
          skip-e2e: true
          skip-it: true
        - name: keycloak-mt
          enabled: false
          shortname: kemt
          auth: keycloak
          flow: upgrade-minor
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            eks: preemptible
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          helmVersion: 3.20.2
          skip-e2e: true
        - name: keycloak-rba
          enabled: false
          shortname: kerba
          auth: keycloak
          flow: upgrade-minor
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            eks: preemptible
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features:
            - rba
          helmVersion: 3.20.2
        - name: elasticsearch-self-signed-upgrade
          enabled: false
          shortname: esss
          auth: keycloak
          flow: upgrade-minor
          platforms:
            - gke
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch-self-signed
          features:
            - migrator
            - zeebe-tls
          pre-install:
            script: pre-install-elasticsearch-self-signed-upgrade.sh
            description: |
              Generates a self-signed CA plus node certificate via openssl,
              packages them into JKS keystore + truststore via keytool, and
              creates the elasticsearch-tls-certs, elasticsearch-tls-passwords,
              elasticsearch-jks, and camunda-zeebe-tls Secrets consumed by the
              8.7 Elasticsearch and Zeebe StatefulSets' TLS config before the
              8.7→8.8 upgrade.
        - name: elasticsearch-self-signed-os-trust
          enabled: true
          shortname: esot
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch-self-signed-os-trust
          pre-install:
            script: pre-install-elasticsearch-self-signed-os-trust.sh
            description: |
              openssl-only (no keytool/JDK on the runner): generates a self-signed CA plus
              an ES node cert/key as PEM and creates the elasticsearch-tls-pem Secret
              (tls.crt, tls.key, ca.crt). The bundled Elasticsearch runs in PEM mode
              (usePemCerts), and the same ca.crt feeds global.tls.caBundle. Validates the
              backported caBundle path: Camunda — including the importer and data-migration
              workloads — trusts the self-signed ES endpoint solely via the chart-built JVM
              truststore, with NO legacy JKS tls.secret configured.
        - name: keycloak-original
          enabled: false
          shortname: keyc
          auth: keycloak
          flow: upgrade-minor
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            eks: preemptible
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          helmVersion: 3.20.2
        - name: elasticsearch
          enabled: false
          shortname: eshy
          auth: hybrid
          flow: install
          platforms:
            - gke
          exclude:
            - orchestration-grpc
          infra-type:
            gke: distroci
          identity: hybrid
          persistence: elasticsearch
          helmVersion: 3.20.2
          skip-e2e: true
        - name: elasticsearch-arm
          enabled: true
          shortname: esarm
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: arm
          identity: keycloak
          persistence: elasticsearch
          features:
