{{- if .Values.webModeler.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webModeler.restapi.fullname" . }}
  labels:
    {{- include "webModeler.restapi.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.global.annotations}}
      {{- toYaml .Values.global.annotations | nindent 4 }}
    {{- end }}
    {{- if .Values.webModeler.restapi.service.annotations}}
      {{- toYaml .Values.webModeler.restapi.service.annotations | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.webModeler.restapi.service.type }}
  ports:
    - port: {{ .Values.webModeler.restapi.service.port }}
      name: http
      targetPort: 8081
      protocol: TCP
      {{- with include "camundaPlatform.appProtocol" (dict "portName" "http" "knownPorts" (list "http" "http-management") "appProtocols" .Values.webModeler.restapi.service.appProtocols) }}
      appProtocol: {{ . | quote }}
      {{- end }}
    - port: {{ .Values.webModeler.restapi.service.managementPort }}
      name: http-management
      targetPort: 8091
      protocol: TCP
      {{- with include "camundaPlatform.appProtocol" (dict "portName" "http-management" "knownPorts" (list "http" "http-management") "appProtocols" .Values.webModeler.restapi.service.appProtocols) }}
      appProtocol: {{ . | quote }}
      {{- end }}
  selector:
    {{- include "webModeler.restapi.matchLabels" . | nindent 4 }}
{{- end }}
