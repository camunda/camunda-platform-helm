apiVersion: v2
name: camunda-platform
version: 13.8.0
appVersion: 8.8.x
description: |
  Camunda 8 Self-Managed Helm charts.
  Camunda's process automation platform allows developers to design, automate and improve processes.
type: application
icon: https://helm.camunda.io/imgs/camunda.svg
home: https://docs.camunda.io/docs/self-managed/about-self-managed/
sources:
  - https://github.com/camunda/camunda-platform-helm
keywords:
  - automation
  - business-rules
  - bpm
  - bpmn
  - camunda-platform
  - decision-engine
  - dmn
  - modeling
  - orchestration
  - process-automation
  - process-engine
  - process-orchestration
  - workflow
  - workflow-engine
dependencies:
  # Identity Dependencies.
  - name: keycloak
    alias: identityKeycloak
    repository: "file://../keycloak-24"
    version: 24.x.x
    condition: "identityKeycloak.enabled"
  - name: postgresql
    alias: identityPostgresql
    repository: "file://../identity-postgresql-15"
    version: 15.x.x
    condition: "identityPostgresql.enabled"
  # WebModeler Dependencies.
  - name: web-modeler-postgresql
    alias: webModelerPostgresql
    repository: "file://../web-modeler-postgresql-15"
    version: 15.x.x
    condition: "webModelerPostgresql.enabled"
  # Shared Dependencies.
  - name: elasticsearch
    repository: "file://../elasticsearch-21"
    version: 21.6.3
    condition: "elasticsearch.enabled"
  # Helpers.
  - name: common
    repository: "file://../common-2"
    version: 2.x.x
maintainers:
  - name: aabouzaid
    email: ahmed.abouzaid@camunda.com
  - name: drodriguez-305
    email: daniel.rodriguez@camunda.com
  - name: hamza-m-masood
    email: hamza.masood@camunda.com
  - name: jessesimpson36
    email: jesse.simpson@camunda.com
annotations:
  camunda.io/helmCLIVersion: "3.20.2"
  artifacthub.io/links: |
    - name: Camunda 8 docs
      url: https://docs.camunda.io/
    - name: Camunda 8 Self-Managed docs
      url: https://docs.camunda.io/docs/self-managed/about-self-managed/
    - name: Camunda 8 Self-Managed Helm charts
      url: https://github.com/camunda/camunda-platform-helm
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: added
      description: "Add elasticsearch-self-signed-upgrade scenario for 8.7->8.8 TLS upgrade testing"
    - kind: added
      description: "Add companion chart deployment support to deploy-camunda"
    - kind: fixed
      description: "Add missing properties and annotations to values.schema.json"
    - kind: fixed
      description: "Resolve SM nightly upgrade scenario failures for groups 2-4"
    - kind: fixed
      description: "Set service account on orchestration migration jobs"
    - kind: fixed
      description: "Migration-data-job volume mount to /tmp"
    - kind: fixed
      description: "Support extraVolumeMounts and extraVolumes for migration jobs"
