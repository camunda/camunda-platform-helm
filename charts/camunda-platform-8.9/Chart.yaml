apiVersion: v2
name: camunda-platform
version: 14.7.0
appVersion: 8.9.x
description: |
  Camunda 8 Self-Managed Helm charts.
  Camunda's process automation platform allows developers to design, automate and improve processes.
type: application
icon: https://helm.camunda.io/imgs/camunda.svg
home: https://docs.camunda.io/docs/self-managed/about-self-managed/
sources:
  - https://github.com/camunda/camunda-platform-helm
keywords:
  - automation
  - business-rules
  - bpm
  - bpmn
  - camunda-platform
  - decision-engine
  - dmn
  - modeling
  - orchestration
  - process-automation
  - process-engine
  - process-orchestration
  - workflow
  - workflow-engine
dependencies:
  # Identity Dependencies.
  - name: keycloak
    alias: identityKeycloak
    repository: "file://../keycloak-24"
    version: 24.x.x
    condition: "identityKeycloak.enabled"
  - name: postgresql
    alias: identityPostgresql
    repository: "file://../identity-postgresql-16"
    version: 16.x.x
    condition: "identityPostgresql.enabled"
  # WebModeler Dependencies.
  - name: web-modeler-postgresql
    alias: webModelerPostgresql
    repository: "file://../web-modeler-postgresql-15"
    version: 15.x.x
    condition: "webModelerPostgresql.enabled"
  # Shared Dependencies.
  - name: elasticsearch
    repository: "file://../elasticsearch-21"
    version: 21.6.3
    condition: "elasticsearch.enabled"
  # Helpers.
  - name: common
    repository: "file://../common-2"
    version: 2.x.x
maintainers:
  - name: eamonnmoloney
    email: eamonn.moloney@camunda.com
  - name: Ian-wang-liyang
    email: ian.wang@camunda.com
  - name: hisImminence
    email: immanuel.monma@camunda.com
  - name: bkenez
    email: balazs.kenez@camunda.com
annotations:
  # Comma-separated list of supported Helm CLI versions; first entry is the minimum.
  # 8.9 is the last chart minor that supports Helm v3 — listed alongside v4.
  camunda.io/helmCLIVersion: "3.20.2,4.2.2"
  artifacthub.io/links: |
    - name: Camunda 8 docs
      url: https://docs.camunda.io/
    - name: Camunda 8 Self-Managed docs
      url: https://docs.camunda.io/docs/self-managed/about-self-managed/
    - name: Camunda 8 Self-Managed Helm charts
      url: https://github.com/camunda/camunda-platform-helm
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: fixed
      description: "Repair failing scheduled workflows for docs links, lychee, and values-latest"
    - kind: fixed
      description: "Fail clearly when an image override has an empty tag and no digest"
    - kind: fixed
      description: "Surface deprecation warnings on the gitops render path"
