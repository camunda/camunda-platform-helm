apiVersion: v2
name: camunda-platform
version: 14.0.0
appVersion: 8.9.x
description: |
  Camunda 8 Self-Managed Helm charts.
  Camunda's process automation platform allows developers to design, automate and improve processes.
type: application
icon: https://helm.camunda.io/imgs/camunda.svg
home: https://docs.camunda.io/docs/self-managed/about-self-managed/
sources:
  - https://github.com/camunda/camunda-platform-helm
keywords:
  - automation
  - business-rules
  - bpm
  - bpmn
  - camunda-platform
  - decision-engine
  - dmn
  - modeling
  - orchestration
  - process-automation
  - process-engine
  - process-orchestration
  - workflow
  - workflow-engine
dependencies:
  # Identity Dependencies.
  - name: keycloak
    alias: identityKeycloak
    repository: "file://../keycloak-24"
    version: 24.x.x
    condition: "identityKeycloak.enabled"
  - name: postgresql
    alias: identityPostgresql
    repository: "file://../identity-postgresql-16"
    version: 16.x.x
    condition: "identityPostgresql.enabled"
  # WebModeler Dependencies.
  - name: web-modeler-postgresql
    alias: webModelerPostgresql
    repository: "file://../web-modeler-postgresql-15"
    version: 15.x.x
    condition: "webModelerPostgresql.enabled"
  # Shared Dependencies.
  - name: elasticsearch
    repository: "file://../elasticsearch-21"
    version: 21.6.3
    condition: "elasticsearch.enabled"
  # Helpers.
  - name: common
    repository: "file://../common-2"
    version: 2.x.x
maintainers:
  - name: aabouzaid
    email: ahmed.abouzaid@camunda.com
  - name: drodriguez-305
    email: daniel.rodriguez@camunda.com
  - name: hamza-m-masood
    email: hamza.masood@camunda.com
  - name: jessesimpson36
    email: jesse.simpson@camunda.com
annotations:
  artifacthub.io/prerelease: "true"
  camunda.io/helmCLIVersion: "3.20.1"
  artifacthub.io/links: |
    - name: Camunda 8 docs
      url: https://docs.camunda.io/
    - name: Camunda 8 Self-Managed docs
      url: https://docs.camunda.io/docs/self-managed/about-self-managed/
    - name: Camunda 8 Self-Managed Helm charts
      url: https://github.com/camunda/camunda-platform-helm
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: added
      description: "Add tpl rendering for global identity auth URL values"
    - kind: added
      description: "Add MCP feature scenario for 8.9 integration tests"
    - kind: added
      description: "Add tpl rendering for global.identity.keycloak.url.host in charts 8.8-8.10"
    - kind: added
      description: "Add springImport flag to extraConfiguration entries"
    - kind: changed
      description: "Drop global.image.tag option"
    - kind: fixed
      description: "Restore backward compatibility for 3rd party e2e callers and fix 8.9 documentstore corruption"
    - kind: fixed
      description: "Use dedicated liveness endpoint for orchestration app"
    - kind: fixed
      description: "Add env vars to web-modeler restapi deployment for Spring Boot 4.0.4 compatibility"
    - kind: fixed
      description: "Optimize prefix defaults to empty so global.elasticsearch.prefix is respected"
    - kind: fixed
      description: "Reference bitnami subcharts internally rather than relying on external repositories"
    - kind: fixed
      description: "Fix links in helpers 8.9+ to upgrade docs"
    - kind: fixed
      description: "Set basic.allow-unauthenticated-api-access on unprotectedApi"
    - kind: fixed
      description: "Skip initial-contact-points generation for multi-region deployments in 8.9 and 8.10"
    - kind: fixed
      description: "Consolidated-auth should be disabled"
    - kind: fixed
      description: "Remove importer from 8.9 and 8.10"

