    - kind: fixed
      description: "Drop secondary storage constraint if orchestration.enabled is false"
    - kind: fixed
      description: "Add operate setting back"
    - kind: fixed
      description: "Zeebe.broker.exporters nil rendered"
    - kind: fixed
      description: "Support all restore modes"
    - kind: fixed
      description: "Prevent invalid YAML when zeebe exporter enabled without camunda…"
    - kind: fixed
      description: "Remove double braces"
    - kind: fixed
      description: "Add initContainer to connectors"
    - kind: fixed
      description: "Migrate keycloak auth configuration to standard secret pattern for 8.9"
    - kind: fixed
