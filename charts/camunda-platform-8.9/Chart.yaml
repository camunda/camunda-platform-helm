apiVersion: v2
name: camunda-platform
version: 14.0.0-alpha5
appVersion: 8.9.x
description: |
  Camunda 8 Self-Managed Helm charts.
  Camunda's process automation platform allows developers to design, automate and improve processes.
type: application
icon: https://helm.camunda.io/imgs/camunda.svg
home: https://docs.camunda.io/docs/self-managed/about-self-managed/
sources:
  - https://github.com/camunda/camunda-platform-helm
keywords:
  - automation
  - business-rules
  - bpm
  - bpmn
  - camunda-platform
  - decision-engine
  - dmn
  - modeling
  - orchestration
  - process-automation
  - process-engine
  - process-orchestration
  - workflow
  - workflow-engine
dependencies:
  # Identity Dependencies.
  - name: keycloak
    alias: identityKeycloak
    repository: "file://../keycloak-24"
    version: 24.x.x
    condition: "identityKeycloak.enabled"
  - name: postgresql
    alias: identityPostgresql
    repository: "file://../identity-postgresql-16"
    version: 16.x.x
    condition: "identityPostgresql.enabled"
  # WebModeler Dependencies.
  - name: web-modeler-postgresql
    alias: webModelerPostgresql
    repository: "file://../web-modeler-postgresql-15"
    version: 15.x.x
    condition: "webModelerPostgresql.enabled"
  # Shared Dependencies.
  - name: elasticsearch
    repository: "file://../elasticsearch-21"
    version: 21.6.3
    condition: "elasticsearch.enabled"
  # Helpers.
  - name: common
    repository: "file://../common-2"
    version: 2.x.x
maintainers:
  - name: aabouzaid
    email: ahmed.abouzaid@camunda.com
  - name: drodriguez-305
    email: daniel.rodriguez@camunda.com
  - name: hamza-m-masood
    email: hamza.masood@camunda.com
  - name: jessesimpson36
    email: jesse.simpson@camunda.com
annotations:
  artifacthub.io/prerelease: "true"
  camunda.io/helmCLIVersion: "3.20.0"
  artifacthub.io/links: |
    - name: Camunda 8 docs
      url: https://docs.camunda.io/
    - name: Camunda 8 Self-Managed docs
      url: https://docs.camunda.io/docs/self-managed/about-self-managed/
    - name: Camunda 8 Self-Managed Helm charts
      url: https://github.com/camunda/camunda-platform-helm
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: added
      description: "Do not disable persistent web sessions on RDBMS"
    - kind: added
      description: "Add tpl support to podLabels, podAnnotations, and global.ingress.host"
    - kind: added
      description: "Add values.yaml keys for gateway api resources"
    - kind: added
      description: "Continuous backups scheduler config"
    - kind: added
      description: "Expose options in values.yaml for helm v4 support"
    - kind: added
      description: "Add App Integrations exporter config"
    - kind: added
      description: "Support admin profile"
    - kind: added
      description: "Copy global.es/os options to optimize and deprecate global.es/os"
    - kind: added
      description: "Warn when web modeler pusher secret is auto-generated"
    - kind: added
      description: "Remove Web Modeler webapp component"
    - kind: added
      description: "Create Camunda 8.10 chart v15.0.0-alpha0 and EOL 8.2"
    - kind: changed
      description: "Deprecate webModeler.restapi.externalDatabase.user for .username"
    - kind: changed
      description: "Remove secondary storage"
    - kind: changed
      description: "Clean up redundant helpers in chart 8.9"
    - kind: fixed
      description: "Expose public API in headless service"
    - kind: fixed
      description: "Add type to headless orchestration cluster service"
    - kind: fixed
      description: "Normalize authIssuerBackendUrl to prevent double-slash when contextPath is root"
    - kind: fixed
      description: "Modify extraConfiguration property for all relevant components"
    - kind: fixed
