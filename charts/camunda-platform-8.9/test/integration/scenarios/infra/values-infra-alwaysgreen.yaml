# GKE alwaysgreen nodes need nodeSelector and tolerations config.

# Auth.
identity:
  nodeSelector:
    workload: alwaysgreen
  tolerations:
  - effect: NoSchedule
    key: workload
    operator: Equal
    value: alwaysgreen
identityKeycloak:
  nodeSelector:
    workload: alwaysgreen
  tolerations:
  - effect: NoSchedule
    key: workload
    operator: Equal
    value: alwaysgreen
  postgresql:
    primary:
      nodeSelector:
        workload: alwaysgreen
      tolerations:
      - effect: NoSchedule
        key: workload
        operator: Equal
        value: alwaysgreen
identityPostgresql:
  primary:
    nodeSelector:
      workload: alwaysgreen
    tolerations:
    - effect: NoSchedule
      key: workload
      operator: Equal
      value: alwaysgreen

