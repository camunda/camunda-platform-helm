global:
  documentStore:
    activeStoreId: "azure"
    type:
      azure:
        enabled: true
        connectionString:
          secret:
            existingSecret: "azure-storage-credentials"
            existingSecretKey: "connection-string"

# Azure document store application-level config is provided via extraConfiguration.
# The connection string secret is injected as an env var by the chart automatically.
orchestration:
  extraConfiguration:
    - file: azure-documentstore.yaml
      content: |
        camunda:
          document:
            store:
              azure:
                class: io.camunda.document.store.azure.AzureBlobDocumentStoreProvider
                container: camunda-ci-integration-test-container
  data:
    secondaryStorage:
      type: elasticsearch
      elasticsearch:
        url: "http://integration-elasticsearch:9200"

connectors:
  extraConfiguration:
    - file: azure-documentstore.yaml
      content: |
        camunda:
          document:
            store:
              azure:
                class: io.camunda.document.store.azure.AzureBlobDocumentStoreProvider
                container: camunda-ci-integration-test-container

elasticsearch:
  enabled: true
