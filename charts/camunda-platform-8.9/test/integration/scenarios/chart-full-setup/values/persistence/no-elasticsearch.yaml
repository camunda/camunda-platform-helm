# Elasticsearch backend configuration for 8.9
# Layer 3: Backend - Elasticsearch (internal)

global:
  elasticsearch:
    enabled: false

  noSecondaryStorage: true

elasticsearch:
  enabled: false

optimize:
  enabled: false

identity:
  enabled: false

identityKeycloak:
  enabled: false

console:
  enabled: false

webModeler:
  enabled: false
