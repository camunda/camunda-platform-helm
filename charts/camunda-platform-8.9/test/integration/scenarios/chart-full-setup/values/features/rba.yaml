# Resource-Based Access (RBA) feature configuration for 8.9
# Layer 6: Feature - Resource-Based Access control
global:
  rba:
    enabled: true

orchestration:
  env:
    - name: CAMUNDA_DATABASE_SCHEMAMANAGER_VERSIONCHECKRESTRICTIONENABLED
      value: "false"

identityPostgresql:
  enabled: true
  auth:
    existingSecret: "integration-test-credentials"
    secretKeys:
      adminPasswordKey: "identity-keycloak-postgresql-admin-password"
      userPasswordKey: "identity-keycloak-postgresql-user-password"

identity:
  externalDatabase:
    enabled: false
