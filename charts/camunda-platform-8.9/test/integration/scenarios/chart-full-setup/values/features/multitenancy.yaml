# Multi-tenancy feature configuration for 8.9
# Layer 4: Feature - Multi-tenancy

global:
  multitenancy:
    enabled: true
    checksEnabled: true
    apiEnabled: true

orchestration:
  security:
    authorization:
      enabled: true
    initialization:
      mappings:
        - mappingID: "admin-mapping"
          claimName: "group"
          claimValue: "admin"
        - mappingID: "tenant-a-mapping"
          claimName: "tenant"
          claimValue: "tenant-a"
        - mappingID: "tenant-b-mapping"
          claimName: "tenant"
          claimValue: "tenant-b"

identityPostgresql:
  enabled: true
  auth:
    existingSecret: "integration-test-credentials"
    secretKeys:
      adminPasswordKey: "identity-keycloak-postgresql-admin-password"
      userPasswordKey: "identity-keycloak-postgresql-user-password"

identity:
  externalDatabase:
    enabled: false
  env:
    - name: IDENTITY_ENVIRONMENT_TENANTS_0_TENANTID
      value: "<default>"
    - name: IDENTITY_ENVIRONMENT_TENANTS_0_NAME
      value: "Default"
    - name: IDENTITY_ENVIRONMENT_TENANTS_0_MEMBERS_0_TYPE
      value: "USER"
    - name: IDENTITY_ENVIRONMENT_TENANTS_0_MEMBERS_0_USERNAME
      value: "demo"
    - name: IDENTITY_ENVIRONMENT_TENANTS_0_MEMBERS_1_TYPE
      value: "APPLICATION"
    - name: IDENTITY_ENVIRONMENT_TENANTS_0_MEMBERS_1_APPLICATIONID
      value: "venom"
    - name: IDENTITY_ENVIRONMENT_TENANTS_0_MEMBERS_2_TYPE
      value: "APPLICATION"
    - name: IDENTITY_ENVIRONMENT_TENANTS_0_MEMBERS_2_APPLICATIONID
      value: "connectors"
    - name: IDENTITY_ENVIRONMENT_TENANTS_0_MEMBERS_3_TYPE
      value: "APPLICATION"
    - name: IDENTITY_ENVIRONMENT_TENANTS_0_MEMBERS_3_APPLICATIONID
      value: "optimize"

connectors:
  env:
    - name: username
      value: username
    - name: password
      value: password
    - name: CAMUNDA_CLIENT_WORKER_DEFAULTS_TENANTIDS
      value: "<default>, Tenant_Main_Connectors, Tenant_Second_Connectors, Tenant_1_Connectors, Tenant_2_Connectors"
