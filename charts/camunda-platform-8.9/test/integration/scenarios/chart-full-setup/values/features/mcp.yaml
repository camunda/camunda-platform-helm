# MCP (Model Context Protocol) feature configuration for 8.9
# Layer 4: Feature - MCP
#
# Note: MCP works with any secondary storage type (elasticsearch, opensearch, or rdbms).
# The secondary storage deployment is controlled by the persistence layer selection.
# This feature file configures MCP-specific settings only and relies on the
# persistence layer for storage configuration.

# Configure orchestration with MCP enabled
orchestration:
  data:
    secondaryStorage:
      type: elasticsearch

  extraConfiguration:
    - file: mcp-gateway.yaml
      content: |
        camunda:
          mcp:
            enabled: true

# Enable connectors (required for MCP client connector)
connectors:
  enabled: true
