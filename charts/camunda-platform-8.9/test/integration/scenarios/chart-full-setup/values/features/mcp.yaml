# MCP (Model Context Protocol) feature configuration for 8.9
# Layer 4: Feature - MCP
#
# Note: MCP requires Elasticsearch for secondary storage.
# The Elasticsearch deployment is controlled by the persistence layer selection
# (elasticsearch or elasticsearch-external). This feature file configures MCP-specific
# settings only and relies on the persistence layer for ES configuration.

# Configure orchestration with MCP enabled
orchestration:
  data:
    secondaryStorage:
      type: elasticsearch

  extraConfiguration:
    - file: mcp-gateway.yaml
      content: |
        camunda:
          mcp:
            enabled: true

# Enable connectors (required for MCP client connector)
connectors:
  enabled: true
