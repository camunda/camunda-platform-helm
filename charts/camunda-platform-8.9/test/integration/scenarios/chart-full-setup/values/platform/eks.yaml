# EKS infrastructure configuration for 8.9
# Layer 6: Infrastructure - AWS EKS specific settings
# Networking uses the chart-native Traefik Gateway API (global.gateway.*, listeners on 8443).

global:
  host: "$CAMUNDA_HOSTNAME"
  commonLabels:
    janitor/ttl: 1h
    camunda.cloud/ephemeral: "true"
  ingress:
    enabled: false
  gateway:
    enabled: true
    createGatewayResource: true
    className: traefik
    tls:
      enabled: true
      secretName: aws-camunda-cloud-tls
      port: 8443

identityKeycloak:
  commonLabels:
    janitor/ttl: 1h
    camunda.cloud/ephemeral: "true"
  postgresql:
    commonLabels:
      janitor/ttl: 1h
      camunda.cloud/ephemeral: "true"

webModelerPostgresql:
  commonLabels:
    janitor/ttl: 1h
    camunda.cloud/ephemeral: "true"

orchestration:
  ingress:
    grpc:
      enabled: false
  gateway:
    grpc:
      enabled: true

elasticsearch:
  commonLabels:
    janitor/ttl: 1h
    camunda.cloud/ephemeral: "true"

prometheusServiceMonitor:
  enabled: false
