              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: qa-elasticsearch-rba
          enabled: false
          flow: install
          shortname: qaelrba
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
        - name: qa-elasticsearch-mt
          enabled: false
          flow: install
          shortname: qaelmt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [multitenancy]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
        - name: qa-license
          enabled: false
          flow: install
          shortname: lic
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [license]
          qa: true
