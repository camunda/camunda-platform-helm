# Used in the GitHub Actions unit test CI workflow.
# auth can be the following values: basic, keycloak, oidc
unit:
  enabled: true
  matrix:
    - name: Management
      packages: identity common console
    - name: Orchestration
      packages: orchestration connectors optimize
    - name: Design
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
# 
# Scenarios support two configuration approaches:
#
# 1. Legacy (scenario name parsing - still supported):
#    - name: elasticsearch        # Scenario name is parsed to derive settings
#    - name: keycloak-mt         # Multitenancy derived from "-mt" suffix
#    - name: opensearch-rba      # RBA feature derived from "-rba" suffix
#
# 2. Selection + Composition (new - preferred for clarity):
#    - name: my-test
#      identity: keycloak        # Explicit: keycloak, keycloak-external, oidc, basic, hybrid
#      persistence: elasticsearch # Explicit: elasticsearch, opensearch, rdbms, rdbms-oracle
#      platform: gke             # Explicit: gke, eks, openshift
#      features: [multitenancy]  # Explicit: multitenancy, rba, documentstore
#      qa: true                  # Enable QA config
#      upgrade: false            # Enable upgrade flow config
#
# Both approaches work - the legacy format is automatically mapped to the new model.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          auth: keycloak
          shortname: eskee
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: elasticsearch
          enabled: true
          flow: install,upgrade-minor
          auth: keycloak
          shortname: eske
          exclude: []
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]  # EKS removed: external ES connectivity issues cause Zeebe pods to never become ready on EKS
        - name: opensearch
          enabled: false
          auth: keycloak
          shortname: oske
          exclude: []
          identity: keycloak
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: opensearch-external
          enabled: true
          shortname: osex
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-external
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: opensearch-embedded
          enabled: false
          shortname: osem
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          dependencies:
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: elasticsearch-basic
          enabled: false
          shortname: esba
          auth: basic
          flow: install
          identity: basic
          persistence: elasticsearch
          exclude: [identity,console,orchestration-grpc]
          infra-type:
            gke: distroci
            eks: preemptible
        - name: oidc
          enabled: true
          exclude: [identity,console,orchestration-grpc]
          shortname: esoi
          auth: oidc
          flow: install,upgrade-minor
          skip-e2e: true  # OIDC auth incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          identity: oidc
          persistence: elasticsearch
          platforms: [gke]
        - name: keycloak-mt
          enabled: true
          exclude: []
          shortname: kemt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-rba
          enabled: true
          exclude: []
          shortname: kerba
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          platforms: [gke]
        - name: keycloak-original
          enabled: true
          exclude: []
          shortname: keorg
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: gateway-keycloak
          enabled: true
          exclude: []
          shortname: gatkc
          auth: keycloak
          flow: install
          identity: keycloak
          persistence: elasticsearch
          features: [gateway]
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: elasticsearch-arm
          enabled: true
          auth: keycloak
          shortname: esarm
          exclude: []
          infra-type:
            gke: arm
          flow: install
          skip-e2e: true # Test are unstable
          identity: keycloak-external
          persistence: elasticsearch-external
          features: [arm]
          platforms: [gke]
        - name: noSecondaryStorage
          enabled: true
          auth: keycloak
          shortname: nosec
          exclude: []
          flow: install
          skip-e2e: true  # No Elasticsearch means no secondary storage for E2E tests
          skip-it: true   # Integration tests require Elasticsearch
          identity: keycloak
          persistence: no-elasticsearch
          features: [no-secondary-storage]
          platforms: [gke]
        - name: documentstore
          enabled: true
          exclude: []
          shortname: docstr
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
          platforms: [eks]
        - name: rdbms-external
          enabled: false
          auth: keycloak
          shortname: rdbme
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms-external
          platforms: [gke]
        # rdbms: persistence layer points Camunda at an external PostgreSQL cluster
        # (postgresql-cluster-rw.<namespace>.svc.cluster.local). The CloudNativePG
        # `Cluster` + auth Secret are NOT part of the chart — they're a CI-only
        # fixture that must exist before helm install or Camunda pods crash-loop
        # connecting. Provisioned by `pre-setup-scripts/pre-install-rdbms.sh`,
        # auto-discovered by versionmatrix.HasPreInstallScript and run by the
        # matrix runner immediately before `helm install` (replaces the legacy
        # Taskfile `setup.pre` rdbms branch).
        - name: rdbms
          enabled: true
          auth: keycloak
          shortname: rdbms
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms
          platforms: [gke]

        # ===========================================================================
        # Backward-compat scenarios — referenced by .github/workflows/test-backward-compat.yaml
        # (callers: c8-cross-component-e2e-tests playwright_sm_reusable_flow_8_8_plus.yaml,
        #  sm_manual_upgrade_minor_8_9, and camunda/docker-build-helm-integration.yml).
        # All disabled so they don't appear in the regular CI matrix; matrix run resolves
        # them via --shortname-filter + --include-disabled.
        #
        # Note on duplicate shortnames: compat workflow reuses qaosupg/qaelmtupg across
        # tasklist-v1 install scenarios and *-upg upgrade-minor scenarios. Both deploy
        # via the same flow=install path here (compat workflow uses flow: install for
        # both because modular-upgrade-minor requires real infra it doesn't provision).
        # One entry per shortname covers both.
        # ===========================================================================
        - name: qa-elasticsearch
          enabled: false
          flow: install
          shortname: qael
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          qa: true
          platforms: [gke]
        - name: qa-opensearch
          enabled: false
          flow: install
          shortname: qaos
          auth: keycloak
          identity: keycloak
          persistence: opensearch
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-rba
          enabled: false
          flow: install
          shortname: qaelrba
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-mt
          enabled: false
          flow: install
          shortname: qaelmt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [multitenancy]
          qa: true
          platforms: [gke]
        - name: qa-license
          enabled: false
          flow: install
          shortname: lic
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [license]
          qa: true
          platforms: [gke]
        - name: qa-entra
          enabled: false
          flow: install
          shortname: qaen
          auth: oidc
          identity: oidc
          persistence: elasticsearch
          qa: true
          platforms: [gke]
        - name: qa-document-store
          enabled: false
          flow: install
          shortname: qadoc
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-tasklist-v1
          enabled: false
          flow: install
          shortname: qaeltlv1
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [tasklist-v1]
          qa: true
          platforms: [gke]
        - name: qa-opensearch-tasklist-v1
          enabled: false
          flow: install
          shortname: qaosupg
          auth: keycloak
          identity: keycloak
          persistence: opensearch
          features: [tasklist-v1]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-rba-tasklist-v1
          enabled: false
          flow: install
          shortname: qaelrbaupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [rba, tasklist-v1]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-mt-tasklist-v1
          enabled: false
          flow: install
          shortname: qaelmtupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [multitenancy, tasklist-v1]
          qa: true
          platforms: [gke]
        - name: qa-license-tasklist-v1
          enabled: false
          flow: install
          shortname: licupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [license, tasklist-v1]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-upg
          enabled: false
          flow: install
          shortname: qaelupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-document-upg
          enabled: false
          flow: install
          shortname: qaeldocupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
          qa: true
          platforms: [gke]
        # kcor is referenced by .github/workflows/test-backward-compat.yaml's
        # compat-camunda-docker job (camunda/docker-build-helm-integration.yml).
        # The 8.10 chart already exposes keycloak-original under shortname `keorg`;
        # this 8.9 entry mirrors that mapping for the compat caller's shortname.
        - name: keycloak-original
          enabled: false
          flow: install
          shortname: kcor
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
    nightly:
      scenario:
        - name: elasticsearch
          enabled: true
          exclude: []
          shortname: eskey
          auth: keycloak
          # The following integration tests need to be exluded when basic-auth is enabled.
        - name: elasticsearch-basic
          enabled: true
          auth: basic
          shortname: esba
          identity: basic
          persistence: elasticsearch
          exclude: [identity,console,orchestration-grpc]
          # deployment should work but integration tests are not passing
        - name: elasticsearch-oidc
          enabled: false
          exclude: []
          shortname: esoi
          auth: oidc
          identity: oidc
          persistence: elasticsearch
        - name: multitenancy
          enabled: true
          shortname: mtke
          exclude: []
          auth: keycloak
          identity: keycloak-external
          persistence: elasticsearch
          features: [multitenancy]
          # not supported
        - name: opensearch
          enabled: false
          exclude: []
          shortname: oske
          auth: keycloak
        - name: opensearch
          enabled: true
          shortname: osba
          exclude: [identity,console,orchestration-grpc]
          auth: basic
          identity: basic
          persistence: opensearch
        - name: identity-migration
          enabled: true
          exclude: []
          shortname: idmike
          auth: keycloak
        - name: elasticsearch
          enabled: true
          exclude: []
          auth: basic
          shortname: elbae
          enterprise: true
        - name: documentstore
          enabled: false
          exclude: []
          shortname: docstr
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
        - name: keycloak-external-mimic
          enabled: true
          exclude: []
          shortname: kcextm
          auth: keycloak
