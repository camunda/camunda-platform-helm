# Used in the GitHub Actions unit test CI workflow.
# auth can be the following values: basic, keycloak, oidc
unit:
  enabled: true
  matrix:
    - name: Management
      packages: identity common console
    - name: Orchestration
      packages: orchestration connectors optimize
    - name: Design
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
# 
# Scenarios support two configuration approaches:
#
# 1. Legacy (scenario name parsing - still supported):
#    - name: elasticsearch        # Scenario name is parsed to derive settings
#    - name: keycloak-mt         # Multitenancy derived from "-mt" suffix
#    - name: opensearch-rba      # RBA feature derived from "-rba" suffix
#
# 2. Selection + Composition (new - preferred for clarity):
#    - name: my-test
#      identity: keycloak        # Explicit: keycloak, keycloak-external, oidc, basic, hybrid
#      persistence: elasticsearch # Explicit: elasticsearch, opensearch, rdbms, rdbms-oracle
#      platform: gke             # Explicit: gke, eks, openshift
#      features: [multitenancy]  # Explicit: any filename (without .yaml) from test/integration/scenarios/chart-full-setup/values/features/
#      qa: true                  # Enable QA config
#      upgrade: false            # Enable upgrade flow config
#
# Both approaches work - the legacy format is automatically mapped to the new model.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  flows:
    upgrade-patch:
      pre-upgrade:
        script: pre-upgrade-patch.sh
        description: |
          Deletes orchestration StatefulSets and the postgresql-web-modeler
          StatefulSet + PVC before the patch upgrade. Required because the
          target chart's PostgreSQL spec has immutable diffs vs the prior
          patch (PSQL 15→14 rollback path) — Helm cannot reconcile in place.
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          flow: install,upgrade-minor
          auth: keycloak
          shortname: eske
          tier: 1
          exclude: []
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]  # EKS removed: external ES connectivity issues cause Zeebe pods to never become ready on EKS
        - name: enterprise-values
          enabled: true
          shortname: entv
          tier: 2
          auth: keycloak
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features: [enterprise]  # symlink: values/features/enterprise.yaml -> values-enterprise.yaml
          platforms: [gke]
        - name: opensearch
          enabled: true
          auth: keycloak
          shortname: oske
          tier: 2
          exclude: []
          identity: keycloak
          persistence: opensearch-embedded
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          dependencies:
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: opensearch-external
          enabled: false  # Disabled: external AWS OpenSearch tests are unstable; tracked in #6119
          shortname: osex
          tier: 2
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-external
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: elasticsearch-basic
          enabled: false
          shortname: esba
          auth: basic
          flow: install
          identity: basic
          persistence: elasticsearch
          exclude: [identity,console,orchestration-grpc]
          infra-type:
            gke: distroci
            eks: preemptible
        - name: oidc
          enabled: true
          exclude: [identity,console,orchestration-grpc]
          shortname: esoi
          tier: 2
          auth: oidc
          flow: install,upgrade-minor
          skip-e2e: true  # OIDC auth incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          identity: oidc
          persistence: elasticsearch
          platforms: [gke]
        - name: keycloak-mt
          enabled: true
          exclude: []
          shortname: kemt
          tier: 2
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-rba
          enabled: true
          exclude: []
          shortname: kerba
          tier: 2
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          platforms: [gke]
        - name: keycloak-original
          enabled: true
          exclude: []
          shortname: keorg
          tier: 2
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: elasticsearch-self-signed
          enabled: false
          exclude: []
          shortname: esss
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch-self-signed
          platforms: [gke]
          pre-install:
            script: pre-install-elasticsearch-self-signed.sh
            description: |
              Generates a self-signed CA plus node certificate via openssl,
              packages them into JKS keystore + truststore via keytool, and
              creates the elasticsearch-tls-certs, elasticsearch-tls-passwords,
              and elasticsearch-jks Secrets consumed by the Elasticsearch
              StatefulSet's TLS config.
        - name: gateway-keycloak
          enabled: true
          exclude: []
          shortname: gatkc
          tier: 2
          auth: keycloak
          flow: install
          identity: keycloak
          persistence: elasticsearch
          features: [gateway]
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
          post-deploy:
            fixtures:
              - gateway-proxy-settings.yaml
            description: |
              Applies the NGINX ProxySettingsPolicy that bumps gateway buffer
              sizes so the Camunda Gateway can carry Keycloak auth headers
              without 502s. Runs after helm install because the Gateway API
              CRD is only registered by the chart itself.
        - name: elasticsearch-arm
          enabled: true
          auth: keycloak
          shortname: esarm
          tier: 2
          exclude: []
          infra-type:
            gke: arm
          flow: install
          skip-e2e: true # Test are unstable
          identity: keycloak-external
          persistence: elasticsearch-external
          features: [arm]
          platforms: [gke]
        - name: noSecondaryStorage
          enabled: true
          auth: keycloak
          shortname: nosec
          tier: 2
          exclude: []
          flow: install
          skip-e2e: true  # No Elasticsearch means no secondary storage for E2E tests
          skip-it: true   # Integration tests require Elasticsearch
          identity: keycloak
          persistence: no-elasticsearch
          features: [no-secondary-storage]
          platforms: [gke]
          infra-type:
            gke: distroci
        - name: documentstore
          enabled: true
          exclude: []
          shortname: docstr
          tier: 2
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
          platforms: [eks]
          infra-type:
            eks: preemptible
        - name: rdbms-external
          enabled: false
          auth: keycloak
          shortname: rdbme
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms-external
          platforms: [gke]
        # rdbms: persistence layer points Camunda at an external PostgreSQL
        # cluster (postgresql-cluster-rw.<namespace>.svc.cluster.local). The
        # CloudNativePG `Cluster` + auth Secret are NOT part of the chart —
        # they're a CI-only fixture that must exist before helm install or
        # Camunda pods crash-loop connecting. Provisioned via the
        # `pre-install: fixtures: [postgresql-cluster.yaml]` declaration below;
        # the matrix runner applies it via Go server-side apply immediately
        # before `helm install` (replaces the legacy Taskfile `setup.pre`
        # rdbms branch).
        - name: rdbms
          enabled: true
          auth: keycloak
          shortname: rdbms
          tier: 2
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms
          platforms: [gke]
          pre-install:
            fixtures:
              - postgresql-cluster.yaml
            description: |
              Provisions a CloudNativePG `Cluster` plus auth Secret in the
              scenario namespace. The CloudNativePG operator reconciles the
              Cluster into a running PostgreSQL instance reachable as
              postgresql-cluster-rw.<namespace>.svc.cluster.local — required
              before helm install or the Camunda OrchestrationCluster pods
              crash-loop trying to reach RDBMS.

        # ===========================================================================
        # Backward-compat scenarios — referenced by .github/workflows/test-backward-compat.yaml
        # (callers: c8-cross-component-e2e-tests playwright_sm_reusable_flow_8_8_plus.yaml,
        #  sm_manual_upgrade_minor_8_9, and camunda/docker-build-helm-integration.yml).
        # All disabled so they don't appear in the regular CI matrix; matrix run resolves
        # them via --shortname-filter + --include-disabled.
        #
        # Note on duplicate shortnames: matrix lookup is keyed by (shortname, flow), so
        # the same shortname can appear on multiple rows when each row carries a distinct
        # flow. Specifically:
        #   - qaosupg / qaelmtupg are reused by the compat workflow across tasklist-v1
        #     install scenarios and *-upg upgrade-minor scenarios. The compat workflow
        #     uses flow=install for both (modular-upgrade-minor requires real infra it
        #     doesn't provision), so for compat purposes one flow=install entry per
        #     shortname is enough.
        #   - The OpenSearch nightly upgrade-minor workflow additionally needs a
        #     (qaosupg, flow=modular-upgrade-minor) row pointing at qa-opensearch-upg;
        #     that row coexists with the compat entry because (shortname, flow) differs.
        # When adding new dual-purpose shortnames, keep one row per (shortname, flow)
        # pair and use shortname suffixes (e.g. qaosupg2) only when both rows would
        # otherwise share the same flow.
        # ===========================================================================
        - name: keycloak-original
          enabled: true
          flow: install
          shortname: keyco
          tier: 1
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          infra-type:
            gke: distroci
        # AlwaysGreen scenario — referenced by camunda/camunda's
        # docker-build-helm-integration.yml. Deploys onto dedicated alwaysgreen
        # GKE node pool (workload=alwaysgreen label + NoSchedule taint).
        - name: alwaysgreen
          enabled: false
          flow: install
          shortname: agrn
          auth: keycloak
          infra-type:
            gke: alwaysgreen
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: qa-elasticsearch
          enabled: false
          flow: install
          shortname: qael
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
        - name: qa-opensearch
          enabled: false
          flow: install
          shortname: qaos
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
