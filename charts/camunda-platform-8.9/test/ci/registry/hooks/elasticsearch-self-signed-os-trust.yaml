script: pre-install-elasticsearch-self-signed.sh
description: |
  Same self-signed Elasticsearch infra as elasticsearch-self-signed
  (reuses the cert generator, which additionally creates the
  elasticsearch-tls-ca PEM Secret). This scenario validates the
  backported global.tls.caBundle path: Camunda trusts the self-signed
  ES endpoint solely via the chart-built JVM truststore (JDK cacerts +
  the user CA), with NO legacy JKS tls.secret configured.
