integration:
  vars:
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          shortname: eske
          auth: keycloak
          flow: install,upgrade-minor
          platforms:
            - gke
          exclude: []
          tier: 1
          infra-type:
            eks: preemptible
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
        - name: orchestration-tls
          enabled: true
          shortname: estls
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features:
            - orchestration-tls
          helmVersion: 3.20.2
          pre-install:
            script: pre-install-orchestration-tls.sh
            description: |
              Generates a self-signed certificate/key pair for the Orchestration
              Cluster gRPC endpoint, creates the server TLS Secret, and creates
              a truststore Secret consumed by Web Modeler restapi.
        - name: enterprise-values
          enabled: true
          shortname: entv
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features:
            - enterprise
        - name: opensearch
          enabled: true
          shortname: oske
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: opensearch-embedded
          dependencies:
            - chart: opensearch/opensearch
              version: 3.6.0
              release-name: opensearch
              values-file: test/integration/companion-values/opensearch.yaml
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
        - name: elasticsearch-basic
          enabled: false
          shortname: esba
          auth: basic
          flow: install
          platforms: []
          exclude:
            - identity
            - console
            - orchestration-grpc
          infra-type:
            eks: preemptible
            gke: distroci
          identity: basic
          persistence: elasticsearch
        - name: oidc
          enabled: true
          shortname: esoi
          auth: oidc
          flow: install,upgrade-minor
          platforms:
            - gke
          exclude:
            - identity
            - console
            - orchestration-grpc
          tier: 2
          infra-type:
            eks: preemptible
            gke: distroci
          identity: oidc
          persistence: elasticsearch
          skip-e2e: true
          skip-it: true
        - name: keycloak-mt
          enabled: true
          shortname: kemt
          auth: keycloak
          flow: upgrade-minor
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            eks: preemptible
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
        - name: keycloak-rba
          enabled: true
          shortname: kerba
          auth: keycloak
          flow: upgrade-minor
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            eks: preemptible
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features:
            - rba
        - name: keycloak-original
          enabled: true
          shortname: keorg
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            eks: preemptible
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
        - name: elasticsearch-self-signed
          enabled: false
          shortname: esss
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch-self-signed
          pre-install:
            script: pre-install-elasticsearch-self-signed.sh
            description: |
              Generates a self-signed CA plus node certificate via openssl,
              packages them into JKS keystore + truststore via keytool, and
              creates the elasticsearch-tls-certs, elasticsearch-tls-passwords,
              and elasticsearch-jks Secrets consumed by the Elasticsearch
              StatefulSet's TLS config.
        - name: gateway-keycloak
          enabled: true
          shortname: gatkc
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            eks: preemptible
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features:
            - gateway
          post-deploy:
            fixtures:
              - gateway-proxy-settings.yaml
            description: |
              Applies the NGINX ProxySettingsPolicy that bumps gateway buffer
              sizes so the Camunda Gateway can carry Keycloak auth headers
              without 502s. Runs after helm install because the Gateway API
              CRD is only registered by the chart itself.
        - name: elasticsearch-arm
          enabled: true
          shortname: esarm
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: arm
          identity: keycloak
          persistence: elasticsearch
          features:
            - arm
        - name: noSecondaryStorage
          enabled: true
          shortname: nosec
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: no-elasticsearch
          features:
            - no-secondary-storage
          skip-e2e: true
          skip-it: true
        - name: documentstore
          enabled: true
          shortname: docstr
          auth: keycloak
          flow: ""
          platforms:
            - eks
          exclude: []
          tier: 2
          infra-type:
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          features:
            - documentstore
        - name: rdbms-external
          enabled: false
          shortname: rdbme
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms-external
        - name: rdbms
          enabled: true
          shortname: rdbms
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms
          pre-install:
            fixtures:
              - postgresql-cluster.yaml
            description: |
              Provisions a CloudNativePG `Cluster` plus auth Secret in the
              scenario namespace. The CloudNativePG operator reconciles the
              Cluster into a running PostgreSQL instance reachable as
              postgresql-cluster-rw.<namespace>.svc.cluster.local — required
              before helm install or the Camunda OrchestrationCluster pods
              crash-loop trying to reach RDBMS.
        - name: keycloak-original
          enabled: true
          shortname: keyco
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 1
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
        - name: alwaysgreen
          enabled: false
          shortname: agrn
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          infra-type:
            gke: alwaysgreen
          identity: keycloak
          persistence: elasticsearch
        - name: qa-elasticsearch
          enabled: false
          shortname: qael
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          infra-type:
            gke: qa-workloads
          identity: keycloak
          persistence: elasticsearch
          qa: true
          image-tags: true
        - name: qa-opensearch
          enabled: false
          shortname: qaos
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          infra-type:
