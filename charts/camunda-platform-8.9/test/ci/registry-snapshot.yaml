          auth: oidc
          flow: install
          platforms:
            - gke
          exclude: []
          infra-type:
            gke: qa-workloads
          identity: oidc
          persistence: elasticsearch
          qa: true
          image-tags: true
        - name: qa-document-store
          enabled: false
