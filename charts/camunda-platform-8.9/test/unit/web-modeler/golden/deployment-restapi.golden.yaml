---
# Source: camunda-platform/templates/web-modeler/deployment-restapi.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: camunda-platform-test-web-modeler-restapi
  labels:
    app: camunda-platform
    app.kubernetes.io/name: web-modeler
    app.kubernetes.io/instance: camunda-platform-test
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: camunda-platform
    app.kubernetes.io/component: restapi
  annotations:
    {}
spec:
  strategy:
    type: RollingUpdate
  replicas: 1
  selector:
    matchLabels:
      app: camunda-platform
      app.kubernetes.io/name: web-modeler
      app.kubernetes.io/instance: camunda-platform-test
      app.kubernetes.io/managed-by: Helm
      app.kubernetes.io/part-of: camunda-platform
      app.kubernetes.io/component: restapi
  template:
    metadata:
      labels:
        app: camunda-platform
        app.kubernetes.io/name: web-modeler
        app.kubernetes.io/instance: camunda-platform-test
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: camunda-platform
        app.kubernetes.io/component: restapi
    spec:
      imagePullSecrets:
        []
      initContainers:
        []
      containers:
        - name: web-modeler-restapi
          image: "camunda/web-modeler-restapi:8.9.0-alpha5-rc1"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          env:
            
            - name: JAVA_OPTIONS
              value: "-XX:MaxRAMPercentage=80.0"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: camunda-platform-test-postgresql-web-modeler
                  key: web-modeler-postgresql-user-password
            
            - name: RESTAPI_PUSHER_APP_ID
              valueFrom:
                configMapKeyRef:
                  name: camunda-platform-test-web-modeler-configuration
                  key: pusher-app-id
            - name: RESTAPI_PUSHER_KEY
              valueFrom:
                secretKeyRef:
                  name: camunda-platform-test-web-modeler
                  key: pusher-app-key
            - name: RESTAPI_PUSHER_SECRET
              valueFrom:
                secretKeyRef:
                  name: camunda-platform-test-web-modeler
                  key: pusher-app-secret
            - name: ZEEBE_CLIENT_CONFIG_PATH
              value: "/tmp/zeebe_client_cache.txt"
            # -- Pusher (WebSocket) configuration env vars --
            # Required because the in-JAR application-self-managed.yml uses ${ENV_VAR:} placeholders
            # that must be resolved via environment variables (not overridable via external configmap).
            - name: RESTAPI_PUSHER_HOST
              value: "camunda-platform-test-web-modeler-websockets"
            - name: RESTAPI_PUSHER_PORT
              value: "80"
            - name: CLIENT_PUSHER_HOST
              value: "localhost"
            - name: CLIENT_PUSHER_PORT
              value: "8085"
            - name: CLIENT_PUSHER_FORCE_TLS
              value: "false"
            # -- Server configuration env vars --
            - name: RESTAPI_SERVER_URL
              value: "http://localhost:8070"
            - name: SERVER_HTTPS_ONLY
              value: "false"
            # -- OAuth2 / Identity env vars --
            - name: OAUTH2_CLIENT_ID
              value: "web-modeler"
            # -- Mail env vars --
            - name: RESTAPI_MAIL_FROM_ADDRESS
              value: "example@example.com"
            - name: RESTAPI_MAIL_FROM_NAME
              value: "Camunda 8"
            # -- Identity / Auth env vars (conditional) --
            - name: RESTAPI_IDENTITY_BASE_URL
              value: "http://camunda-platform-test-identity:80"
            - name: RESTAPI_OAUTH2_TOKEN_ISSUER
              value: "http://localhost:18080/auth/realms/camunda-platform"
            - name: RESTAPI_OAUTH2_TOKEN_ISSUER_BACKEND_URL
              value: "http://camunda-platform-test-keycloak/auth/realms/camunda-platform"
          envFrom:
            - configMapRef:
                name: camunda-platform-test-documentstore-env-vars
          resources:
            limits:
              cpu: 1800m
              memory: 2560Mi
            requests:
              cpu: 900m
              memory: 1280Mi
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
            - containerPort: 8091
              name: http-management
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health/readiness
              scheme: HTTP
              port: http-management
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
            timeoutSeconds: 1
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /home/runner/config/application.yaml
              subPath: application.yaml
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: camunda-platform-test-web-modeler-restapi-configuration
      serviceAccountName: camunda-platform-test-web-modeler
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault