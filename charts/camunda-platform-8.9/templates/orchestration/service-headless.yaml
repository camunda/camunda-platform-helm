{{/*
The headless service is used for Zeebe brokers Pod-to-Pod communication.
*/}}
{{- if .Values.orchestration.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "orchestration.serviceNameHeadless" . }}
  labels:
    {{- include "orchestration.serviceLabelsHeadless" . | nindent 4 }}
  annotations:
    {{- include "common.tplvalues.merge-overwrite" (dict
      "values" (list
        .Values.global.annotations
        .Values.orchestration.service.headless.annotations
      )
      "context" .
    ) | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  type: {{ .Values.orchestration.service.headless.type }}
  ports:
    - port: {{ .Values.orchestration.service.managementPort }}
      protocol: TCP
      name: {{ default "management" .Values.orchestration.service.managementName }}
      {{- with include "camundaPlatform.appProtocol" (dict "portName" "management" "knownPorts" (list "management" "internal" "command" "http" "grpc") "appProtocols" .Values.orchestration.service.appProtocols) }}
      appProtocol: {{ . | quote }}
      {{- end }}
    - port: {{ .Values.orchestration.service.internalPort }}
      protocol: TCP
      name: {{ default "internal" .Values.orchestration.service.internalName  }}
      {{- with include "camundaPlatform.appProtocol" (dict "portName" "internal" "knownPorts" (list "management" "internal" "command" "http" "grpc") "appProtocols" .Values.orchestration.service.appProtocols) }}
      appProtocol: {{ . | quote }}
      {{- end }}
    - port: {{ .Values.orchestration.service.commandPort }}
      protocol: TCP
      name: {{ default "command" .Values.orchestration.service.commandName }}
      {{- with include "camundaPlatform.appProtocol" (dict "portName" "command" "knownPorts" (list "management" "internal" "command" "http" "grpc") "appProtocols" .Values.orchestration.service.appProtocols) }}
      appProtocol: {{ . | quote }}
      {{- end }}
    - port: {{ .Values.orchestration.service.httpPort }}
      protocol: TCP
      name: {{ default "http" .Values.orchestration.service.httpName  }}
      {{- with include "camundaPlatform.appProtocol" (dict "portName" "http" "knownPorts" (list "management" "internal" "command" "http" "grpc") "appProtocols" .Values.orchestration.service.appProtocols) }}
      appProtocol: {{ . | quote }}
      {{- end }}
    - port: {{ .Values.orchestration.service.grpcPort }}
      protocol: TCP
      name: {{ default "grpc" .Values.orchestration.service.grpcName }}
      {{- with include "camundaPlatform.appProtocol" (dict "portName" "grpc" "knownPorts" (list "management" "internal" "command" "http" "grpc") "appProtocols" .Values.orchestration.service.appProtocols) }}
      appProtocol: {{ . | quote }}
      {{- end }}
    {{- if .Values.orchestration.service.extraPorts }}
    {{ .Values.orchestration.service.extraPorts | toYaml | nindent 4 }}
    {{- end }}
  selector:
    {{- include "orchestration.matchLabels" . | nindent 4 }}
{{- end }}
