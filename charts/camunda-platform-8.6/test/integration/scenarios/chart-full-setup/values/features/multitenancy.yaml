global:
  multitenancy:
    enabled: true
orchestration:
  security:
    authentication:
      method: oidc
      authenticationRefreshInterval: "PT30S"
optimize:
  enabled: true
  caches:
    cloudTenantAuthorizations:
      minFetchIntervalSeconds: 300
identityPostgresql:
  enabled: true
identity:
  enabled: true

connectors:
  env:
    - name: username
      value: username
    - name: password
      value: password
    - name: ZEEBE_CLIENT_DEFAULT_JOB_WORKER_TENANT_IDS
      value: "<default>, Tenant_Main_Connectors, Tenant_Second_Connectors, Tenant_1_Connectors, Tenant_2_Connectors"
