# =============================================================================
# Base Configuration - Common to all deployments (8.6)
# =============================================================================
# Layer 1: Fundamental settings shared across all auth types and scenarios
# This file is ALWAYS loaded first.
# Note: 8.6 uses separate operate, tasklist, zeebeGateway components
# =============================================================================

global:
  elasticsearch:
    enabled: true
  # for bitnami images
  imagePullSecrets:
    - index-docker-io
    - registry-camunda-cloud
  # for camunda images
  image:
    pullSecrets:
      - name: index-docker-io
  secrets:
    autoGenerated: false
  ingress:
    enabled: true
    className: nginx
    # The Ingress host will be added via CLI.
    host: "$CAMUNDA_HOSTNAME"
    tls:
      enabled: true
      # A wildcard certificate will be used.

    annotations:
      external-dns.alpha.kubernetes.io/hostname: "{{ .Values.global.ingress.host }}"
      external-dns.alpha.kubernetes.io/ttl: "60"

# -----------------------------------------------------------------------------
# Operate
# -----------------------------------------------------------------------------
operate:
  contextPath: "/operate"
  javaOpts: >-
    -XX:+TieredCompilation
    -XX:TieredStopAtLevel=1
    -XX:+UseG1GC
    -XX:+UseStringDeduplication
    -Xms512m
    -Xmx1536m
  env:
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 1
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1

# -----------------------------------------------------------------------------
# Tasklist
# -----------------------------------------------------------------------------
tasklist:
  contextPath: "/tasklist"
  javaOpts: >-
    -XX:+TieredCompilation
    -XX:TieredStopAtLevel=1
    -XX:+UseG1GC
    -XX:+UseStringDeduplication
    -Xms512m
    -Xmx1536m
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 1
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1

# -----------------------------------------------------------------------------
# Zeebe Gateway
# -----------------------------------------------------------------------------
zeebeGateway:
  contextPath: "/zeebe"
  javaOpts: >-
    -XX:+ExitOnOutOfMemoryError
    -XX:+TieredCompilation
    -XX:TieredStopAtLevel=1
    -XX:+UseG1GC
    -XX:+UseStringDeduplication
    -Xms512m
    -Xmx1536m
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 1
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  ingress:
    grpc:
      enabled: true
      className: nginx
      host: "zeebe-{{ .Values.global.ingress.host }}"
      tls:
        enabled: true
        # A wildcard certificate will be used.
        secretName: camunda-platform-zeebe-gateway
      annotations:
        external-dns.alpha.kubernetes.io/hostname: "zeebe-{{ .Values.global.ingress.host }}"
        external-dns.alpha.kubernetes.io/ttl: "60"

# -----------------------------------------------------------------------------
# Identity
# -----------------------------------------------------------------------------
identity:
  enabled: true
  contextPath: "/identity"
  env:
    # JVM startup optimizations: identity has no javaOpts field, so JAVA_TOOL_OPTIONS must be set via env.
    - name: JAVA_TOOL_OPTIONS
      value: >-
        -XX:+TieredCompilation
        -XX:TieredStopAtLevel=1
        -XX:+UseG1GC
        -XX:+UseStringDeduplication
        -Xms512m
        -Xmx1536m
  startupProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 2
    failureThreshold: 60
    timeoutSeconds: 1
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  firstUser:
    existingSecret: "integration-test-credentials"
    existingSecretKey: "identity-user-password"
  clients:
    - id: venom
      name: Venom
      secret:
        existingSecret: integration-test-credentials
        existingSecretKey: identity-admin-client-password
      redirectUris: /dummy
      rootUrl: http://dummy
      type: confidential
      permissions:
        - resourceServerId: camunda-identity-resource-server
          definition: read
        - resourceServerId: camunda-identity-resource-server
          definition: write
        - resourceServerId: operate-api
          definition: read:*
        - resourceServerId: operate-api
          definition: write:*
        - resourceServerId: tasklist-api
          definition: read:*
        - resourceServerId: tasklist-api
          definition: write:*
        - resourceServerId: optimize-api
          definition: write:*
        - resourceServerId: zeebe-api
          definition: write:*
        - resourceServerId: web-modeler-api
          definition: write:*
        - resourceServerId: console-api
          definition: write:*

# -----------------------------------------------------------------------------
# Connectors
# -----------------------------------------------------------------------------
connectors:
  contextPath: "/connectors"
  env:
    - name: JAVA_TOOL_OPTIONS
      value: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1 -XX:+UseG1GC -XX:+UseStringDeduplication -Xms512m -Xmx1536m"
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 1
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1

# -----------------------------------------------------------------------------
# Optimize
# -----------------------------------------------------------------------------
optimize:
  enabled: true
  database:
    elasticsearch:
      enabled: true
  contextPath: "/optimize"
  javaOpts: >-
    -XX:+TieredCompilation
    -XX:TieredStopAtLevel=1
    -XX:+UseG1GC
    -XX:+UseStringDeduplication
    -Xms512m
    -Xmx1536m
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 40
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

# -----------------------------------------------------------------------------
# Console
# -----------------------------------------------------------------------------
console:
  replicas: 2
  enabled: true
  contextPath: "/"
  image:
    pullSecrets:
      - name: index-docker-io
      - name: registry-camunda-cloud
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - console
            topologyKey: kubernetes.io/hostname

# -----------------------------------------------------------------------------
# Web Modeler
# -----------------------------------------------------------------------------
webModeler:
  enabled: true
  contextPath: "/modeler"
  image:
    pullSecrets:
      - name: index-docker-io
      - name: registry-camunda-cloud
  restapi:
    javaOpts: >-
      -XX:MaxRAMPercentage=80.0
      -XX:+TieredCompilation
      -XX:TieredStopAtLevel=1
      -XX:+UseG1GC
      -XX:+UseStringDeduplication
    # Wait for PostgreSQL to accept connections before starting restapi.
    # Prevents restapi from failing on DB connection during Spring context init.
    initContainers:
      - name: wait-for-postgresql
        image: busybox:1.36
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        command:
          - sh
          - -c
          - |
            echo "Waiting for PostgreSQL at {{ .Release.Name }}-postgresql-web-modeler:5432 ..."
            until nc -z "{{ .Release.Name }}-postgresql-web-modeler" 5432; do
              sleep 2
            done
            echo "PostgreSQL is ready"
    startupProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 30
      timeoutSeconds: 1
    mail:
      # This value is required, otherwise the restapi pod wouldn't start.
      fromAddress: noreply@example.com
  webapp:
    replicas: 2
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - webapp
              topologyKey: kubernetes.io/hostname

# -----------------------------------------------------------------------------
# WebModeler Database (8.6 uses postgresql, not webModelerPostgresql)
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    existingSecret: "integration-test-credentials"
    secretKeys:
      adminPasswordKey: "webmodeler-postgresql-admin-password"
      userPasswordKey: "webmodeler-postgresql-user-password"
  primary:
    # No persistent storage needed in CI — use emptyDir instead of PVC.
    persistence:
      enabled: false
    # Resource allocation for faster startup
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    # PostgreSQL configuration optimized for fast startup in integration tests.
    # WARNING: These settings trade durability for speed — NOT suitable for production.
    extendedConfiguration: |
      shared_buffers = 64MB
      work_mem = 8MB
      max_connections = 50
      fsync = off
      full_page_writes = off
      synchronous_commit = off

# -----------------------------------------------------------------------------
# Zeebe
# -----------------------------------------------------------------------------
zeebe:
  # JVM startup optimizations: TieredStopAtLevel=1 skips C2 compiler for ~30-50% faster startup,
  # pre-sized heap avoids resizing overhead, G1GC with string deduplication for efficiency.
  javaOpts: >-
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:HeapDumpPath=/usr/local/zeebe/data
    -XX:ErrorFile=/usr/local/zeebe/data/zeebe_error%p.log
    -XX:+ExitOnOutOfMemoryError
    -XX:+TieredCompilation
    -XX:TieredStopAtLevel=1
    -XX:+UseG1GC
    -XX:+UseStringDeduplication
    -Xms1024m
    -Xmx2048m
  resources:
    requests:
      cpu: 2000m
      memory: 2000Mi
    limits:
      cpu: 2000m
      memory: 3000Mi
  startupProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5

# -----------------------------------------------------------------------------
# Elasticsearch (default)
# -----------------------------------------------------------------------------
elasticsearch:
  maxUnavailable: 0

# -----------------------------------------------------------------------------
# Monitoring
# -----------------------------------------------------------------------------
prometheusServiceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
