# External OpenSearch backend configuration for 8.6
# Layer 3: Backend - OpenSearch (external, pool-routed)
#
# Uses one of 4 internal OpenSearch pools (pool-0 through pool-3) based on
# the $OS_POOL_INDEX variable, mirroring the Elasticsearch external pool pattern.

global:
  elasticsearch:
    enabled: false
  exporter:
    zeebe:
      enabled: true
  opensearch:
    enabled: true
    aws:
      enabled: false
    auth:
      username: admin
      password: ""
    url:
      protocol: https
      host: "opensearch-2-19-pool-${OS_POOL_INDEX}.ci.distro.ultrawombat.com"
      port: 443
    prefix: $ORCHESTRATION_INDEX_PREFIX-$FLOW

# Operate (OpenSearch backend)
operate:
  env:
    - name: CAMUNDA_OPERATE_OPENSEARCH_INDEXPREFIX
      value: $OPERATE_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_OPERATE_ZEEBEOPENSEARCH_PREFIX
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW
  migration:
    env:
      - name: CAMUNDA_OPERATE_OPENSEARCH_INDEXPREFIX
        value: $OPERATE_INDEX_PREFIX-$FLOW
      - name: CAMUNDA_OPERATE_ZEEBEOPENSEARCH_PREFIX
        value: $ORCHESTRATION_INDEX_PREFIX-$FLOW

# Tasklist (OpenSearch backend)
tasklist:
  env:
    - name: CAMUNDA_TASKLIST_OPENSEARCH_INDEXPREFIX
      value: $TASKLIST_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_TASKLIST_ZEEBEOPENSEARCH_PREFIX
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW

# Zeebe (OpenSearch exporter)
zeebe:
  env:
    - name: ZEEBE_BROKER_EXPORTERS_OPENSEARCH_ARGS_INDEX_PREFIX
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW

# Optimize (OpenSearch backend)
optimize:
  env:
    - name: CAMUNDA_OPTIMIZE_ZEEBE_NAME
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_OPTIMIZE_OPENSEARCH_SETTINGS_INDEX_PREFIX
      value: $OPTIMIZE_INDEX_PREFIX-$FLOW
  migration:
    env:
      - name: CAMUNDA_OPTIMIZE_ZEEBE_NAME
        value: $ORCHESTRATION_INDEX_PREFIX-$FLOW
      - name: CAMUNDA_OPTIMIZE_OPENSEARCH_SETTINGS_INDEX_PREFIX
        value: $OPTIMIZE_INDEX_PREFIX-$FLOW

elasticsearch:
  enabled: false
