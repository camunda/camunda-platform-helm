# =============================================================================
# OpenSearch Backend (8.6)
# =============================================================================
# Layer 3: Data backend - External OpenSearch
# Used with: TEST_VALUES_BACKEND=opensearch
# Note: 8.6 uses separate operate, tasklist, zeebe components
# =============================================================================

global:
  elasticsearch:
    enabled: false
  exporter:
    zeebe:
      enabled: true
  opensearch:
    enabled: true
    aws:
      enabled: false
    auth:
      username: "$OPENSEARCH_USERNAME"
      password: "$OPENSEARCH_PASSWORD"
    url:
      protocol: $OPENSEARCH_PROTOCOL
      host: "$OPENSEARCH_HOST"
      port: $OPENSEARCH_PORT
    prefix: $ORCHESTRATION_INDEX_PREFIX-$FLOW

# -----------------------------------------------------------------------------
# Operate (OpenSearch backend)
# -----------------------------------------------------------------------------
operate:
  env:
    - name: CAMUNDA_OPERATE_OPENSEARCH_INDEXPREFIX
      value: $OPERATE_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_OPERATE_ZEEBEOPENSEARCH_PREFIX
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW
  migration:
    env:
      - name: CAMUNDA_OPERATE_OPENSEARCH_INDEXPREFIX
        value: $OPERATE_INDEX_PREFIX-$FLOW
      - name: CAMUNDA_OPERATE_ZEEBEOPENSEARCH_PREFIX
        value: $ORCHESTRATION_INDEX_PREFIX-$FLOW

# -----------------------------------------------------------------------------
# Tasklist (OpenSearch backend)
# -----------------------------------------------------------------------------
tasklist:
  env:
    - name: CAMUNDA_TASKLIST_OPENSEARCH_INDEXPREFIX
      value: $TASKLIST_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_TASKLIST_ZEEBEOPENSEARCH_PREFIX
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW

# -----------------------------------------------------------------------------
# Zeebe (OpenSearch exporter)
# -----------------------------------------------------------------------------
zeebe:
  env:
    - name: ZEEBE_BROKER_EXPORTERS_OPENSEARCH_ARGS_INDEX_PREFIX
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW

# -----------------------------------------------------------------------------
# Optimize (OpenSearch backend - currently disabled)
# -----------------------------------------------------------------------------
optimize:
  enabled: false
  env:
    - name: CAMUNDA_OPTIMIZE_ZEEBE_NAME
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_OPTIMIZE_OPENSEARCH_SETTINGS_INDEX_PREFIX
      value: $OPTIMIZE_INDEX_PREFIX-$FLOW
  migration:
    env:
      - name: CAMUNDA_OPTIMIZE_ZEEBE_NAME
        value: $ORCHESTRATION_INDEX_PREFIX-$FLOW
      - name: CAMUNDA_OPTIMIZE_OPENSEARCH_SETTINGS_INDEX_PREFIX
        value: $OPTIMIZE_INDEX_PREFIX-$FLOW

# -----------------------------------------------------------------------------
# Elasticsearch disabled
# -----------------------------------------------------------------------------
elasticsearch:
  enabled: false
