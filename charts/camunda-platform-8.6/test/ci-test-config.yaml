# Used in the GitHub Actions unit test CI workflow.
unit:
  enabled: true
  matrix:
    - name: Core
      packages: identity camunda console
    - name: Apps
      packages: connectors operate optimize tasklist
    - name: Zeebe
      packages: zeebe zeebe-gateway
    - name: WebModeler
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          exclude: []
          shortname: es
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          skip-e2e: true
          flow: install,upgrade-patch
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke,eks]
        - name: opensearch-external
          enabled: true
          shortname: osex
          exclude: []
          auth: keycloak
          skip-e2e: true
          identity: keycloak
          persistence: opensearch-external
        - name: multitenancy
          enabled: true
          exclude: []
          shortname: kemt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch-external
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: opensearch-external
          enabled: true
          shortname: osex
          exclude: []
          auth: keycloak
          skip-e2e: true
          identity: keycloak
          persistence: opensearch-external
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
    nightly:
      scenario:
        - name: elasticsearch
          enabled: true
          exclude: []
          shortname: es
          auth: keycloak
        - name: multitenancy
          enabled: true
          exclude: []
          shortname: mt
          auth: keycloak
          identity: keycloak-external
          persistence: elasticsearch
          features: [multitenancy]
        - name: opensearch
          enabled: true
          exclude: []
          shortname: os
          auth: keycloak
