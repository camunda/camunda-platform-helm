# =============================================================================
# Document Store Feature
# =============================================================================
# Layer 4: Optional feature - AWS S3 document storage
# Used with: TEST_VALUES_FEATURES containing "documentstore"
# =============================================================================

global:
  documentStore:
    activeStoreId: "aws"
    type:
      aws:
        enabled: true
        storeId: "aws"
        bucket: "camunda-ci-eks-prod-team-bucket-qa"
        region: "eu-central-1"
        bucketPath: "documents"
        class: "io.camunda.document.store.aws.AwsDocumentStoreProvider"
        existingSecret: "vault-mapped-secrets"
        accessKeyIdKey: "IDP_AWS_ACCESSKEY"
        secretAccessKeyKey: "IDP_AWS_SECRETKEY"
