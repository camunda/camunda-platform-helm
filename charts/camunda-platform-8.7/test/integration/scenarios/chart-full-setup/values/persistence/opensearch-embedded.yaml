# OpenSearch backend configuration for 8.7
# Layer 3: Backend - OpenSearch (embedded companion chart)
#
# Connects to the OpenSearch companion chart deployed as a separate Helm release
# by deploy-camunda before the main Camunda chart. The companion chart values
# are in test/integration/companion-values/opensearch.yaml (security disabled, single node).

global:
  elasticsearch:
    enabled: false
  opensearch:
    enabled: true
    url:
      protocol: http
      host: "opensearch-master"
      port: 9200
    prefix: $ORCHESTRATION_INDEX_PREFIX-$FLOW

elasticsearch:
  enabled: false

zeebe:
  env:
    - name: ZEEBE_BROKER_EXPORTERS_OPENSEARCH_ARGS_INDEX_PREFIX
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW

operate:
  env:
    - name: CAMUNDA_OPERATE_OPENSEARCH_INDEXPREFIX
      value: $OPERATE_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_OPERATE_ZEEBEOPENSEARCH_PREFIX
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW

tasklist:
  env:
    - name: CAMUNDA_TASKLIST_OPENSEARCH_INDEXPREFIX
      value: $TASKLIST_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_TASKLIST_ZEEBEOPENSEARCH_PREFIX
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW

optimize:
  env:
    - name: CAMUNDA_OPTIMIZE_ZEEBE_NAME
      value: $ORCHESTRATION_INDEX_PREFIX-$FLOW
    - name: CAMUNDA_OPTIMIZE_OPENSEARCH_SETTINGS_INDEX_PREFIX
      value: $OPTIMIZE_INDEX_PREFIX-$FLOW
