# Used in the GitHub Actions unit test CI workflow.
unit:
  enabled: true
  matrix:
    - name: Core
      packages: identity camunda console
    - name: Apps
      packages: connectors operate optimize tasklist
    - name: Zeebe
      packages: zeebe zeebe-gateway
    - name: WebModeler
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          shortname: eske
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: install
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]  # EKS removed: Playwright ITs fail due to pods not recovering on EKS (newly exposed by ExternalSecrets fix)
        - name: keycloak-mt
          enabled: true
          shortname: kemt
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: install,upgrade-patch
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-rba
          enabled: true
          shortname: kerba
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: install
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: oidc
          enabled: true
          shortname: esoi
          exclude: []
          auth: oidc
          persistence: elasticsearch
          flow: install,upgrade-patch
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi bug + OIDC incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-original
          enabled: true
          shortname: keyc
          exclude: []
          auth: keycloak
          flow: install,upgrade-patch
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: opensearch-external
          enabled: true
          shortname: osex
          exclude: []
          auth: keycloak
          identity: keycloak
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          persistence: opensearch-external
          flow: install
          helmVersion: 3.20.2
          infra-type:
            gke: distroci
          platforms: [gke]
    nightly:
      scenario:
        - name: elasticsearch
          enabled: true
          exclude: []
          shortname: es
          auth: keycloak
          helmVersion: 3.20.2
        - name: multitenancy
          enabled: true
          exclude: []
          shortname: mt
          auth: keycloak
          helmVersion: 3.20.2
          identity: keycloak-external
          persistence: elasticsearch
          features: [multitenancy]
        - name: oidc
          enabled: false
          exclude: []
          shortname: oi
          auth: keycloak
          helmVersion: 3.20.2
        - name: opensearch
          enabled: true
          shortname: os
          exclude: []
          auth: keycloak
          helmVersion: 3.20.2
        - name: elasticsearch
          enabled: true
          exclude: []
          auth: keycloak
          helmVersion: 3.20.2
          enterprise: true
        - name: documentstore
          enabled: true
          exclude: []
          shortname: docstr
          auth: keycloak
          helmVersion: 3.20.2
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
