# Used in the GitHub Actions unit test CI workflow.
unit:
  enabled: true
  matrix:
    - name: Core
      packages: identity camunda console
    - name: Apps
      packages: connectors operate optimize tasklist
    - name: Zeebe
      packages: zeebe zeebe-gateway
    - name: WebModeler
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../../charts
  scenarios:
    pr:
      fullSetup:
        enabled: true
        id: pr
        valuesFile: values-integration-test-ingress-common.yaml
    nightly:
      multitenancy:
        enabled: true
        valuesFile: values-integration-test-multitenancy.yaml
      oidc:
        enabled: false
        valuesFile: values-integration-test-oidc.yaml
      opensearch:
        enabled: false
        valuesFile: values-integration-test-opensearch.yaml
