# Used in the GitHub Actions unit test CI workflow.
unit:
  enabled: true
  matrix:
    - name: Core
      packages: identity camunda console
    - name: Apps
      packages: connectors operate optimize tasklist
    - name: Zeebe
      packages: zeebe zeebe-gateway
    - name: WebModeler
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          shortname: eske
          tier: 1
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: install
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]  # EKS removed: Playwright ITs fail due to pods not recovering on EKS (newly exposed by ExternalSecrets fix)
        - name: enterprise-values
          enabled: true
          shortname: entv
          tier: 2
          auth: keycloak
          flow: install
          exclude: []
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features: [enterprise]  # symlink: values/features/enterprise.yaml -> values-enterprise.yaml
          platforms: [gke]
        - name: keycloak-mt
          enabled: true
          shortname: kemt
          tier: 2
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: install,upgrade-patch
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-rba
          enabled: true
          shortname: kerba
          tier: 2
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: install
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: oidc
          enabled: true
          shortname: esoi
          tier: 2
          exclude: []
          auth: oidc
          persistence: elasticsearch
          flow: install,upgrade-patch
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi bug + OIDC incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-original
          enabled: true
          shortname: keyc
          tier: 2
          exclude: []
          auth: keycloak
          flow: install,upgrade-patch
          helmVersion: 3.20.2
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: opensearch-external
          enabled: false  # Disabled: external AWS OpenSearch tests are unstable; tracked in #6119
          shortname: osex
          tier: 2
          exclude: []
          auth: keycloak
          identity: keycloak
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          persistence: opensearch-external
          flow: install
          helmVersion: 3.20.2
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: opensearch-embedded
          enabled: true
          shortname: osem
          tier: 2
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          dependencies:
            - chart: opensearch/opensearch
              version: "2.31.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: component-persistence
          enabled: true
          tier: 2
          exclude: []
          shortname: cprst
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: install
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
          features: [persistence]
          platforms: [gke]
        - name: shadow-e2e
          enabled: true
          shortname: shde2
          tier: 2
          auth: keycloak
          flow: install
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          infra-type:
            gke: distroci
          skip-e2e: true  # Standard smoke tests skipped; full suite runs via shadow job

        # ===========================================================================
        # Backward-compat scenarios — referenced by .github/workflows/test-backward-compat.yaml
        # (caller: c8-cross-component-e2e-tests / playwright_sm_reusable_flow_8_7_minus.yaml).
        # All disabled so they don't appear in the regular CI matrix; matrix run resolves
        # them via --shortname-filter + --include-disabled.
        # ===========================================================================
        # Used by camunda/connectors FEATURE_BRANCH_HELM_TEST workflow (stable/8.7).
        - name: keycloak-original
          enabled: true
          flow: install
          shortname: keyco
          tier: 1
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          infra-type:
            gke: distroci
          post-deploy:
            script: post-deploy-keycloak-token-lifespan.sh
            description: |
              Increases Keycloak access token lifespan to 30 minutes and SSO
              session idle timeout to 2 hours for E2E test stability.
        # AlwaysGreen scenario — referenced by camunda/camunda's
        # docker-build-helm-integration.yml. Deploys onto dedicated alwaysgreen
        # GKE node pool (workload=alwaysgreen label + NoSchedule taint).
        - name: alwaysgreen
          enabled: false
          flow: install
          shortname: agrn
          auth: keycloak
          infra-type:
            gke: alwaysgreen
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: qa-elasticsearch
          enabled: false
          flow: install
          shortname: qael
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          qa: true
          image-tags: true
          platforms: [gke, eks]
          infra-type:
            gke: qa-workloads
            eks: preemptible
          post-deploy:
            script: post-deploy-keycloak-token-lifespan.sh
            description: |
              Increases Keycloak access token lifespan to 30 minutes and SSO
              session idle timeout to 2 hours. Prevents session-expiry flakiness
              in long-running E2E test flows (diagram building, process deployment)
              when the cluster is under heavy load.
        - name: qa-elasticsearch-rba
          enabled: false
          flow: install
          shortname: qarba
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          post-deploy:
            script: post-deploy-keycloak-token-lifespan.sh
            description: |
              Increases Keycloak access token lifespan to 30 minutes and SSO
              session idle timeout to 2 hours for E2E test stability.
        - name: qa-elasticsearch-mt
          enabled: false
          flow: install
          shortname: qamt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [multitenancy]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          post-deploy:
            script: post-deploy-keycloak-token-lifespan.sh
            description: |
              Increases Keycloak access token lifespan to 30 minutes and SSO
              session idle timeout to 2 hours for E2E test stability.
        - name: qa-license
          enabled: false
          flow: install
          shortname: lic
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [license]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          post-deploy:
            script: post-deploy-keycloak-token-lifespan.sh
            description: |
              Increases Keycloak access token lifespan to 30 minutes and SSO
              session idle timeout to 2 hours for E2E test stability.
        - name: qa-opensearch
          enabled: false
          flow: install
          shortname: qaos
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          post-deploy:
            script: post-deploy-keycloak-token-lifespan.sh
            description: |
              Increases Keycloak access token lifespan to 30 minutes and SSO
              session idle timeout to 2 hours for E2E test stability.
          dependencies:
            - chart: opensearch/opensearch
              version: "2.31.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
