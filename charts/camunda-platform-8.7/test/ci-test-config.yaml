# Used in the GitHub Actions unit test CI workflow.
unit:
  enabled: true
  matrix:
    - name: Core
      packages: identity camunda console
    - name: Apps
      packages: connectors operate optimize tasklist
    - name: Zeebe
      packages: zeebe zeebe-gateway
    - name: WebModeler
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          shortname: eske
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: install
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]  # EKS removed: Playwright ITs fail due to pods not recovering on EKS (newly exposed by ExternalSecrets fix)
        - name: keycloak-mt
          enabled: true
          shortname: kemt
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: install,upgrade-patch
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-rba
          enabled: true
          shortname: kerba
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: install
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: oidc
          enabled: true
          shortname: esoi
          exclude: []
          auth: oidc
          persistence: elasticsearch
          flow: install,upgrade-patch
          skip-e2e: true  # 8.7 web-modeler-restapi bug + OIDC incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-original
          enabled: true
          shortname: keyc
          exclude: []
          auth: keycloak
          flow: install,upgrade-patch
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: opensearch-external
          enabled: true
          shortname: osex
          exclude: []
          auth: keycloak
          identity: keycloak
          skip-e2e: true  # 8.7 web-modeler-restapi has a known unresponsiveness bug
          persistence: opensearch-external
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]

        # ===========================================================================
        # Backward-compat scenarios — referenced by .github/workflows/test-backward-compat.yaml
        # (caller: c8-cross-component-e2e-tests / playwright_sm_reusable_flow_8_7_minus.yaml).
        # All disabled so they don't appear in the regular CI matrix; matrix run resolves
        # them via --shortname-filter + --include-disabled.
        # ===========================================================================
        - name: qa-elasticsearch
          enabled: false
          flow: install
          shortname: qael
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-rba
          enabled: false
          flow: install
          shortname: qarba
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          qa: true
          platforms: [gke]
        - name: qa-elasticsearch-mt
          enabled: false
          flow: install
          shortname: qamt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [multitenancy]
          qa: true
          platforms: [gke]
        - name: qa-license
          enabled: false
          flow: install
          shortname: lic
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [license]
          qa: true
          platforms: [gke]
    nightly:
      scenario:
        - name: elasticsearch
          enabled: true
          exclude: []
          shortname: es
          auth: keycloak
        - name: multitenancy
          enabled: true
          exclude: []
          shortname: mt
          auth: keycloak
          identity: keycloak-external
          persistence: elasticsearch
          features: [multitenancy]
        - name: oidc
          enabled: false
          exclude: []
          shortname: oi
          auth: keycloak
        - name: opensearch
          enabled: true
          shortname: os
          exclude: []
          auth: keycloak
        - name: elasticsearch
          enabled: true
          exclude: []
          auth: keycloak
          enterprise: true
        - name: documentstore
          enabled: true
          exclude: []
          shortname: docstr
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
