apiVersion: v2
name: camunda-platform
version: 15.0.0-alpha3
appVersion: 8.10.x
description: |
  Camunda 8 Self-Managed Helm charts.
  Camunda's process automation platform allows developers to design, automate and improve processes.
type: application
icon: https://helm.camunda.io/imgs/camunda.svg
home: https://docs.camunda.io/docs/self-managed/about-self-managed/
sources:
  - https://github.com/camunda/camunda-platform-helm
keywords:
  - automation
  - business-rules
  - bpm
  - bpmn
  - camunda-platform
  - decision-engine
  - dmn
  - modeling
  - orchestration
  - process-automation
  - process-engine
  - process-orchestration
  - workflow
  - workflow-engine
dependencies:
  # Helpers.
  - name: common
    repository: "file://../common-2"
    version: 2.x.x
maintainers:
  - name: eamonnmoloney
    email: eamonn.moloney@camunda.com
  - name: Ian-wang-liyang
    email: ian.wang@camunda.com
  - name: hisImminence
    email: immanuel.monma@camunda.com
  - name: bkenez
    email: balazs.kenez@camunda.com
annotations:
  artifacthub.io/prerelease: "true"
  camunda.io/helmCLIVersion: "4.2.2"
  artifacthub.io/links: |
    - name: Camunda 8 docs
      url: https://docs.camunda.io/
    - name: Camunda 8 Self-Managed docs
      url: https://docs.camunda.io/docs/self-managed/about-self-managed/
    - name: Camunda 8 Self-Managed Helm charts
      url: https://github.com/camunda/camunda-platform-helm
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: added
      description: "Deprecate app-config proxy keys in favor of extraConfiguration"
    - kind: added
      description: "Adjust modeler cluster defaults for console migration"
    - kind: added
      description: "Rename cluster config types webModelerWebApp→hub, orchestrationIdentity→admin"
    - kind: changed
      description: "Remove inert console app-config-proxy deprecation warnings; Console is consolidated into Camunda Hub and these keys have no effect."
    - kind: changed
      description: "Warn when the removed global.identity.auth.console.* keys are set; configure Console auth via the web-modeler client instead."
    - kind: fixed
      description: "Harden caBundle truststore init container for air-gapped & OpenShift"
    - kind: fixed
      description: "Support Orchestration gRPC TLS endpoints"
    - kind: fixed
      description: "Trust caBundle CA in console via NODE_EXTRA_CA_CERTS + CRLF-safe init"
    - kind: fixed
      description: "Remove obsolete backup.webapps workaround when RDBMS is enabled"
    - kind: fixed
      description: "Align deployment PVC claimName casing to webmodeler-data in 8.9 and 8.10"
    - kind: fixed
      description: "Configure index replicas for the legacy Zeebe ES/OS exporter"
    - kind: fixed
      description: "Cover keys shipped by default values.yaml across 8.8/8.9/8.10"
    - kind: fixed
      description: "Back Web Modeler restapi /tmp with a per-pod ephemeral volume"
    - kind: fixed
      description: "Complete Camunda Hub consolidation deprecations for console/webModeler"
    - kind: fixed
      description: "Fail clearly when an image override has an empty tag and no digest"
    - kind: fixed
      description: "Surface deprecation warnings on the gitops render path"
