apiVersion: v2
name: camunda-platform
version: 15.0.0-alpha2
appVersion: 8.10.x
description: |
  Camunda 8 Self-Managed Helm charts.
  Camunda's process automation platform allows developers to design, automate and improve processes.
type: application
icon: https://helm.camunda.io/imgs/camunda.svg
home: https://docs.camunda.io/docs/self-managed/about-self-managed/
sources:
  - https://github.com/camunda/camunda-platform-helm
keywords:
  - automation
  - business-rules
  - bpm
  - bpmn
  - camunda-platform
  - decision-engine
  - dmn
  - modeling
  - orchestration
  - process-automation
  - process-engine
  - process-orchestration
  - workflow
  - workflow-engine
dependencies:
  # Helpers.
  - name: common
    repository: "file://../common-2"
    version: 2.x.x
maintainers:
  - name: eamonnmoloney
    email: eamonn.moloney@camunda.com
  - name: Ian-wang-liyang
    email: ian.wang@camunda.com
  - name: hisImminence
    email: immanuel.monma@camunda.com
  - name: bkenez
    email: balazs.kenez@camunda.com
annotations:
  artifacthub.io/prerelease: "true"
  camunda.io/helmCLIVersion: "4.1.4"
  artifacthub.io/links: |
    - name: Camunda 8 docs
      url: https://docs.camunda.io/
    - name: Camunda 8 Self-Managed docs
      url: https://docs.camunda.io/docs/self-managed/about-self-managed/
    - name: Camunda 8 Self-Managed Helm charts
      url: https://github.com/camunda/camunda-platform-helm
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: added
      description: "Fail early when Helm CLI < v4 is used with chart 15.x"
    - kind: added
      description: "Add orchestration.hostNetwork value"
    - kind: added
      description: "[TLS B1] add global.tls.caBundle helper for OS-level CA injection part 1 of helm#3498"
    - kind: added
      description: "[TLS B2] add init-container truststore import — closes helm#3498 for JVM clients"
    - kind: added
      description: "[TLS D] add values-tls.yaml customer overlay + quickstart doc"
    - kind: added
      description: "[TLS F] deprecate legacy per-component JKS truststore fields"
    - kind: added
      description: "Add global.gateway.namespace to support cross-namespace Gateway parentRefs"
    - kind: added
      description: "Added service account labels"
    - kind: changed
      description: "Drop camundaPlatform.toYamlPretty helm v3 compat wrapper"
    - kind: changed
      description: "Migrate console and webModeler values under camundaHub namespace [1/6]"
    - kind: changed
      description: "Drop bundled Bitnami subcharts"
    - kind: changed
      description: "Drop orphan helpers and guard keycloak release info"
    - kind: fixed
      description: "Update image tags to 8.10.0-alpha1"
    - kind: fixed
      description: "Expose cpu keys in connectors/console resources schema"
    - kind: fixed
      description: "Allow multiregion, env valueFrom subkeys, and sub-chart imagePullSecrets"
    - kind: fixed
      description: "Allow Recreate strategy for Web Modeler persistence"
    - kind: fixed
      description: "Guard legacy ES exporter on global.elasticsearch.enabled"
    - kind: fixed
      description: "Align camunda hub service account gating"
    - kind: fixed
      description: "Align upload size with Zeebe message limits"
