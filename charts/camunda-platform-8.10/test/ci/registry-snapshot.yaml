integration:
  vars:
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          shortname: eske
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 1
          infra-type:
            eks: preemptible
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          dependencies:
            - chart: charts/internal-keycloak-26
              release-name: keycloak
              values-file: test/integration/companion-values/keycloak.yaml
            - chart: elastic/elasticsearch
              version: 8.5.1
              release-name: elasticsearch
              values-file: test/integration/companion-values/elasticsearch.yaml
              repo-name: elastic
              repo-url: https://helm.elastic.co
            - chart: charts/internal-postgresql
              release-name: postgresql
              values-file: test/integration/companion-values/postgresql.yaml
              env-vars:
                - RDBMS_POSTGRESQL_USERNAME
                - RDBMS_POSTGRESQL_PASSWORD
        - name: orchestration-tls
          enabled: true
          shortname: estls
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch
          features:
            - orchestration-tls
          dependencies:
            - chart: charts/internal-keycloak-26
              release-name: keycloak
              values-file: test/integration/companion-values/keycloak.yaml
            - chart: elastic/elasticsearch
              version: 8.5.1
              release-name: elasticsearch
              values-file: test/integration/companion-values/elasticsearch.yaml
              repo-name: elastic
              repo-url: https://helm.elastic.co
            - chart: charts/internal-postgresql
              release-name: postgresql
              values-file: test/integration/companion-values/postgresql.yaml
              env-vars:
                - RDBMS_POSTGRESQL_USERNAME
                - RDBMS_POSTGRESQL_PASSWORD
          pre-install:
            script: pre-install-orchestration-tls.sh
            description: |
              Generates a self-signed certificate/key pair for the Orchestration
              Cluster gRPC endpoint, creates the server TLS Secret, and creates
              a truststore Secret consumed by Web Modeler restapi. The Identity/WebModeler
              PostgreSQL database is provided by the `postgresql` companion dependency.
        - name: opensearch
          enabled: true
          shortname: oske
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          tier: 2
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: opensearch-embedded
          dependencies:
            - chart: charts/internal-keycloak-26
              release-name: keycloak
              values-file: test/integration/companion-values/keycloak.yaml
            - chart: opensearch/opensearch
              version: 3.6.0
              release-name: opensearch
              values-file: test/integration/companion-values/opensearch.yaml
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
            - chart: charts/internal-postgresql
              release-name: postgresql
              values-file: test/integration/companion-values/postgresql.yaml
              env-vars:
                - RDBMS_POSTGRESQL_USERNAME
                - RDBMS_POSTGRESQL_PASSWORD
        - name: opensearch-self-signed
          enabled: true
          shortname: osss
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: opensearch-self-signed
          dependencies:
            - chart: charts/internal-keycloak-26
              release-name: keycloak
              values-file: test/integration/companion-values/keycloak.yaml
            - chart: charts/internal-postgresql
              release-name: postgresql
              values-file: test/integration/companion-values/postgresql.yaml
              env-vars:
                - RDBMS_POSTGRESQL_USERNAME
                - RDBMS_POSTGRESQL_PASSWORD
            - chart: opensearch/opensearch
              version: 3.6.0
              release-name: opensearch
              values-file: test/integration/companion-values/opensearch-tls.yaml
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
          pre-install:
            script: pre-install-opensearch-self-signed.sh
            description: |
              Provisions the Identity/WebModeler PostgreSQL fixture, then
              Generates a self-signed CA plus node certificate via openssl
              and creates the opensearch-tls-certs, opensearch-tls-ca, and
              opensearch-jks Secrets consumed by the OpenSearch companion
              chart's TLS config.
        - name: opensearch-self-signed-os-trust
          enabled: true
          shortname: osot
          auth: keycloak
          flow: install
          platforms:
            - gke
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: opensearch-self-signed-os-trust
          dependencies:
            - chart: charts/internal-postgresql
              release-name: postgresql
              values-file: test/integration/companion-values/postgresql.yaml
              env-vars:
                - RDBMS_POSTGRESQL_USERNAME
                - RDBMS_POSTGRESQL_PASSWORD
            - chart: charts/internal-keycloak-26
              release-name: keycloak
              values-file: test/integration/companion-values/keycloak.yaml
            - chart: opensearch/opensearch
              version: 3.6.0
              release-name: opensearch
              values-file: test/integration/companion-values/opensearch-tls.yaml
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
          pre-install:
            script: pre-install-opensearch-self-signed-os-trust.sh
            description: |
              Provisions the Identity/WebModeler PostgreSQL fixture, then
              generates a self-signed CA plus node certificate via openssl
              and creates the opensearch-tls-certs, opensearch-tls-ca, and
              opensearch-jks Secrets consumed by the OpenSearch companion
              chart's TLS config. Identical cert generation to the
              opensearch-self-signed scenario.
