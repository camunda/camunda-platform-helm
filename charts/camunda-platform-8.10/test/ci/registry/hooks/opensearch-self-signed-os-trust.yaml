script: pre-install-opensearch-self-signed-os-trust.sh
description: |
  Provisions the Identity/WebModeler PostgreSQL fixture, then
  generates a self-signed CA plus node certificate via openssl
  and creates the opensearch-tls-certs, opensearch-tls-ca, and
  opensearch-jks Secrets consumed by the OpenSearch companion
  chart's TLS config. Identical cert generation to the
  opensearch-self-signed scenario.
