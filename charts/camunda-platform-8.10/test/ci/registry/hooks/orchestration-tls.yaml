script: pre-install-orchestration-tls.sh
description: |
  Generates a self-signed certificate/key pair for the Orchestration
  Cluster gRPC endpoint and creates the server TLS Secret. The same
  self-signed cert is also referenced as global.tls.caBundle so in-cluster
  Java clients (Web Modeler, Connectors) trust it via the chart-derived
  internal URLs. The Identity/WebModeler PostgreSQL database is provided by
  the `postgresql` companion dependency.
