integration:
  vars:
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  flows:
    upgrade-patch:
      pre-upgrade:
        script: pre-upgrade-patch.sh
        description: |
          Deletes orchestration StatefulSets and the postgresql-web-modeler
          StatefulSet + PVC before the patch upgrade. Required because the
          target chart's PostgreSQL spec has immutable diffs vs the prior
          patch (PSQL 15→14 rollback path) — Helm cannot reconcile in place.
  scenarios:
    - id: elasticsearch
      tier: 1
      enabled: true
    - id: opensearch
      tier: 2
      enabled: true
    - id: opensearch-self-signed
      enabled: true
    - id: opensearch-self-signed-os-trust
      enabled: true
    - id: upgrade-migration
      enabled: false
    - id: elasticsearch-basic
      enabled: false
    - id: oidc
      enabled: false
    - id: auth0
      enabled: true
    - id: keycloak-mt
      enabled: false
    - id: keycloak-rba
      enabled: false
    - id: keycloak-original-upgrade
      enabled: false
    - id: keycloak-original-install-tier2
      tier: 2
      enabled: true
    - id: gateway-keycloak
      tier: 2
      enabled: true
    - id: elasticsearch-arm
      tier: 2
      enabled: false
    - id: no-secondary-storage
      tier: 2
      enabled: true
    - id: documentstore
      tier: 2
      enabled: true
    - id: rdbms-self-signed
      tier: 2
      enabled: true
    - id: rdbms-external
      enabled: false
    - id: rdbms
      tier: 2
      enabled: true
    - id: hub-legacy-install
      tier: 2
      enabled: true
    - id: shadow-e2e
      tier: 2
      enabled: true
    - id: hub-legacy-upgrade
      enabled: false
    - id: hub-mixed
      enabled: false
    - id: hub-external-db
      tier: 2
      enabled: true
    - id: keycloak-original-install-tier1
      tier: 1
      enabled: true
    - id: alwaysgreen
      enabled: false
    - id: qa-elasticsearch-upg-install
      enabled: false
    - id: qa-elasticsearch-upg-modular
      enabled: false
    - id: qa-elasticsearch
      enabled: false
    - id: qa-opensearch
      enabled: false
    - id: qa-opensearch-upg-install
      enabled: false
    - id: qa-opensearch-upg-modular
      enabled: false
    - id: qa-elasticsearch-mt
      enabled: false
    - id: qa-elasticsearch-mt-upg-install
      enabled: false
    - id: qa-elasticsearch-mt-upg-modular
      enabled: false
    - id: qa-elasticsearch-rba
      enabled: false
    - id: qa-document-store-gke
      enabled: false
    - id: qa-document-store-eks
      enabled: false
    - id: qa-document-store-upg-install-gke
      enabled: false
    - id: qa-document-store-upg-install-eks
      enabled: false
    - id: qa-document-store-upg-modular-gke
      enabled: false
    - id: qa-document-store-upg-modular-eks
      enabled: false
    - id: qa-license
      enabled: false
