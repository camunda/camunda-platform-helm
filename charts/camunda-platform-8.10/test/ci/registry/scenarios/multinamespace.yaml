name: multinamespace
auth: keycloak
flows:
  - install
skip-e2e: true
platforms:
  - gke
infra-type:
  gke: distroci
topology:
  name: mgmt-2orch
  shared-storage: elasticsearch
  shared-storage-service: elasticsearch-master
  releases:
    - role: management
      namespace-suffix: mgmt
      identity: keycloak
      dependencies:
        - keycloak
        - postgresql
        - elasticsearch
      values: features/multinamespace-management.yaml
    - role: orchestration
      namespace-suffix: orcha
      identity: keycloak-external
      persistence: elasticsearch-external
      dependencies: []
      values: features/multinamespace-orchestration.yaml
      depends-on: management
    - role: orchestration
      namespace-suffix: orchb
      identity: keycloak-external
      persistence: elasticsearch-external
      dependencies: []
      values: features/multinamespace-orchestration.yaml
      depends-on: management
