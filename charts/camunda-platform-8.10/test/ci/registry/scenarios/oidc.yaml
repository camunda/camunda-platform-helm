name: oidc
shortname: esoi
auth: oidc
flows:
  - upgrade-minor
identity: oidc
persistence: elasticsearch
features:
  - postgresql-companion
platforms:
  - gke
exclude:
  - identity
  - console
  - orchestration-grpc
infra-type:
  eks: preemptible
  gke: distroci
skip-e2e: true
skip-it: true
dependencies:
  - postgresql
  - elasticsearch-8.5.1
