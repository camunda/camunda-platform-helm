# GKE qa-workloads nodes need nodeSelector and tolerations config.

# Auth.
identity:
  nodeSelector:
    workload: qa-workloads
  tolerations:
  - effect: NoSchedule
    key: workload
    operator: Equal
    value: qa-workloads

# Camunda Hub.
camundaHub:
  restapi:
    nodeSelector:
      workload: qa-workloads
    tolerations:
    - effect: NoSchedule
      key: workload
      operator: Equal
      value: qa-workloads
  websockets:
