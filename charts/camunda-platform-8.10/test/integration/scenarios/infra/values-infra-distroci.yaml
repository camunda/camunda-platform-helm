# GKE distroci nodes need nodeSelector and tolerations config.

# Auth.
identity:
  nodeSelector:
    workload: distroci
  tolerations:
  - effect: NoSchedule
    key: workload
    operator: Equal
    value: distroci

# Camunda Hub.
camundaHub:
  console:
    nodeSelector:
      workload: distroci
    tolerations:
    - effect: NoSchedule
      key: workload
      operator: Equal
      value: distroci
  webModeler:
    restapi:
      nodeSelector:
        workload: distroci
      tolerations:
      - effect: NoSchedule
        key: workload
        operator: Equal
        value: distroci
    websockets:
      nodeSelector:
        workload: distroci
      tolerations:
      - effect: NoSchedule
        key: workload
        operator: Equal
        value: distroci
connectors:
  nodeSelector:
    workload: distroci
  tolerations:
