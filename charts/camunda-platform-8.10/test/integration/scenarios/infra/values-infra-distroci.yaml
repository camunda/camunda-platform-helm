# GKE distroci nodes need nodeSelector and tolerations config.

# Auth.
identity:
  nodeSelector:
    workload: distroci
  tolerations:
  - effect: NoSchedule
    key: workload
    operator: Equal
    value: distroci

# Camunda Hub.
camundaHub:
  restapi:
    nodeSelector:
      workload: distroci
    tolerations:
    - effect: NoSchedule
      key: workload
      operator: Equal
      value: distroci
  websockets:
    nodeSelector:
      workload: distroci
    tolerations:
    - effect: NoSchedule
      key: workload
      operator: Equal
      value: distroci
