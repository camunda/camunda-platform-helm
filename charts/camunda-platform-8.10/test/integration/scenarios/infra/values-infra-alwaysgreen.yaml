# GKE alwaysgreen nodes need nodeSelector and tolerations config.
# NOTE: Bitnami subcharts (identityKeycloak, identityPostgresql, webModelerPostgresql,
# elasticsearch) were removed in 8.10. Companion chart scheduling is handled via
# dedicated companion-values files (e.g., keycloak-alwaysgreen.yaml, elasticsearch-alwaysgreen.yaml).

# Auth.
identity:
  nodeSelector:
    workload: alwaysgreen
  tolerations:
  - effect: NoSchedule
    key: workload
    operator: Equal
    value: alwaysgreen

# Camunda Hub.
camundaHub:
