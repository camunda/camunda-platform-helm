# GKE stable nodes need nodeSelector and tolerations config.

# Auth.
identity:
  nodeSelector:
    workload: standard
  tolerations:
  - effect: NoSchedule
    key: workload
    operator: Equal
    value: standard

# Camunda Hub.
camundaHub:
  restapi:
    nodeSelector:
      workload: standard
    tolerations:
    - effect: NoSchedule
      key: workload
      operator: Equal
      value: standard
