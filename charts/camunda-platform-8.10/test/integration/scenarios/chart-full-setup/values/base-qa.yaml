# QA-specific configuration for 8.9
# Layer 5: QA additions - Extra users, clients, and test configuration

global:
  image:
    pullPolicy: Always
  identity:
    auth:
      enabled: true
  license: {}

orchestration:
  data:
    secondaryStorage:
      type: elasticsearch
  security:
    authentication:
      method: oidc
      oidc:
        groupsClaim: ""
      authenticationRefreshInterval: "PT30S"

identityKeycloak:
  enabled: true

identity:
  firstUser:
    user: demo
    secret:
      existingSecret: vault-mapped-secrets
      existingSecretKey: DISTRO_QA_E2E_TESTS_IDENTITY_FIRSTUSER_PASSWORD
  clients:
    - id: test
      name: Test
      secret:
        existingSecret: vault-mapped-secrets
        existingSecretKey: DISTRO_QA_E2E_TESTS_KEYCLOAK_CLIENTS_SECRET
      redirectUris: /dummy
      rootUrl: http://dummy
      type: confidential
      permissions:
        - resourceServerId: camunda-identity-resource-server
          definition: read
        - resourceServerId: camunda-identity-resource-server
          definition: write
        - resourceServerId: orchestration-api
          definition: read:*
        - resourceServerId: orchestration-api
          definition: write:*
        - resourceServerId: optimize-api
          definition: write:*
        - resourceServerId: web-modeler-api
          definition: write:*
        - resourceServerId: console-api
          definition: write:*
  users:
    - username: lisa
      secret:
        existingSecret: vault-mapped-secrets
        existingSecretKey: DISTRO_QA_E2E_TESTS_IDENTITY_SECONDUSER_PASSWORD
      firstName: Lisa
      lastName: Doe
      email: cawemodev+lisa@gmail.com
      roles:
        - ManagementIdentity
        - Optimize
        - Web Modeler
        - Web Modeler Admin
        - Console
        - Orchestration
    - username: bart
      secret:
        existingSecret: vault-mapped-secrets
        existingSecretKey: DISTRO_QA_E2E_TESTS_IDENTITY_THIRDUSER_PASSWORD
      firstName: Bart
      lastName: Foo
      email: cawemodev+bart@gmail.com
      roles:
        - ManagementIdentity
        - Optimize
        - Web Modeler
        - Web Modeler Admin
        - Console
        - Orchestration

connectors:
  security:
    authentication:
      method: oidc
  env:
    - name: CAMUNDA_CONNECTOR_SECRETPROVIDER_ENVIRONMENT_PREFIX
      value: ""
    - name: username
      value: username
    - name: password
      value: password
    - name: CAMUNDA_CLIENT_DEFAULT_JOB_WORKER_TENANT_IDS
      value: "<default>, Tenant_Main_Connectors, Tenant_Second_Connectors, Tenant_1_Connectors, Tenant_2_Connectors"

console:
  extraConfiguration:
    - content: |
        camunda:
          console:
            managed:
              releases:
                - name: integration
                  namespace: "$TEST_NAMESPACE"
                  tags:
                    - dev
                    - custom
                    - stage
                    - prod
                    - test
                  custom-properties:
                    - description: "This is the main integration environment for the Camunda Platform."
                      links:
                        - name: "Camunda"
                          url: "https://camunda.com"
                        - name: "Camunda Docs"
                          url: "https://docs.camunda.io"
  env:
    - name: CAMUNDA_CONSOLE_EXPERIMENTAL_TAGS
      value: "true"
