global:
  elasticsearch:
    enabled: true
  host: $CAMUNDA_HOSTNAME
  ingress:
    enabled: true
    className: nginx
    tls:
      enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/hostname: '{{ .Values.global.host }}'
      external-dns.alpha.kubernetes.io/ttl: '60'
  security:
    authentication:
      method: oidc
  identity:
    auth:
      enabled: true
      type: GENERIC
      issuer: $AUTH0_ISSUER_URL/
      issuerBackendUrl: $AUTH0_ISSUER_URL/
      publicIssuerUrl: $AUTH0_ISSUER_URL/
      tokenUrl: $AUTH0_ISSUER_URL/oauth/token
      jwksUrl: $AUTH0_ISSUER_URL/.well-known/jwks.json
      authUrl: $AUTH0_ISSUER_URL/authorize
      identity:
        clientId: $AUTH0_IDENTITY_CLIENT_ID
        audience: $AUTH0_AUDIENCE
        initialClaimName: https://camunda.com/claims/email
        initialClaimValue: $AUTH0_INITIAL_ADMIN_EMAIL
        redirectUrl: https://{{ .Values.global.host }}/identity
        secret:
          existingSecret: client-secret-for-components
          existingSecretKey: auth0-identity
      orchestration:
        clientId: $AUTH0_ORCHESTRATION_CLIENT_ID
        audience: $AUTH0_AUDIENCE
        redirectUrl: https://{{ .Values.global.host }}/orchestration
        secret:
          existingSecret: client-secret-for-components
          existingSecretKey: auth0-orchestration
      optimize:
        clientId: $AUTH0_OPTIMIZE_CLIENT_ID
        audience: $AUTH0_AUDIENCE
        redirectUrl: https://{{ .Values.global.host }}/optimize
        secret:
          existingSecret: client-secret-for-components
          existingSecretKey: auth0-optimize
      connectors:
        clientId: $AUTH0_CONNECTORS_CLIENT_ID
        audience: $AUTH0_AUDIENCE
        secret:
          existingSecret: client-secret-for-components
          existingSecretKey: auth0-connectors
      webModeler:
        clientId: $AUTH0_WEB_MODELER_CLIENT_ID
        clientApiAudience: $AUTH0_AUDIENCE
        publicApiAudience: $AUTH0_AUDIENCE
        redirectUrl: https://{{ .Values.global.host }}/modeler
      console:
        wellKnown: $AUTH0_ISSUER_URL/.well-known/openid-configuration
        clientId: $AUTH0_CONSOLE_CLIENT_ID
        audience: $AUTH0_AUDIENCE
        redirectUrl: https://{{ .Values.global.host }}/
identity:
  externalDatabase:
    enabled: true
    host: postgresql
    port: 5432
    database: identity
    username: $RDBMS_POSTGRESQL_USERNAME
    secret:
      inlineSecret: $RDBMS_POSTGRESQL_PASSWORD
webModeler:
  restapi:
    externalDatabase:
      enabled: true
      host: postgresql
      port: 5432
      database: webmodeler
      username: $RDBMS_POSTGRESQL_USERNAME
      secret:
        inlineSecret: $RDBMS_POSTGRESQL_PASSWORD
connectors:
  security:
    authentication:
      method: oidc
      oidc:
        clientId: $AUTH0_CONNECTORS_CLIENT_ID
        secret:
          existingSecret: client-secret-for-components
          existingSecretKey: auth0-connectors
camundaHub:
  security:
    authentication:
      method: oidc
  restapi:
    pusher:
      secret:
        existingSecret: client-secret-for-components
        existingSecretKey: webmodeler-pusher-app-secret
      client:
        secret:
          existingSecret: client-secret-for-components
          existingSecretKey: webmodeler-pusher-app-key
orchestration:
  security:
    authentication:
      method: oidc
      unprotectedApi: false
      oidc:
        clientId: $AUTH0_ORCHESTRATION_CLIENT_ID
        audience: $AUTH0_AUDIENCE
        clientIdClaim: azp
        usernameClaim: https://camunda.com/claims/email
        preferUsernameClaim: true
        redirectUrl: https://{{ .Values.global.host }}/orchestration
        secret:
          existingSecret: client-secret-for-components
          existingSecretKey: auth0-orchestration
        backwardsCompatibleAudiences:
        - operate-api
        - tasklist-api
        - zeebe-api
    authorizations:
      enabled: true
    initialization:
      defaultRoles:
        admin:
          users:
          - $AUTH0_INITIAL_ADMIN_EMAIL
        connectors:
          clients:
          - $AUTH0_CONNECTORS_CLIENT_ID
