# Keycloak auth configuration for 8.10
# Layer 2: Auth method — Companion Keycloak (deployed as a separate Helm release)
#
# The companion internal-keycloak-26 chart creates a Service named "keycloak"
# in the same namespace. This layer tells the Camunda chart where to find it.
# Also configures Identity + WebModeler external databases, pointed at the
# `postgresql` service from the internal-postgresql companion chart (deployed
# via the scenario's `postgresql` profile).

global:
  host: "$CAMUNDA_HOSTNAME"
  ingress:
    enabled: true
    className: nginx
    tls:
      enabled: true
      # A wildcard certificate will be used.
    annotations:
      external-dns.alpha.kubernetes.io/hostname: "{{ .Values.global.host }}"
      external-dns.alpha.kubernetes.io/ttl: "60"
  identity:
    keycloak:
      url:
        protocol: http
        # FQDN required: the ExternalName service target must be resolvable from
        # the ingress-nginx namespace (which runs in a different namespace).
        host: "keycloak.{{ .Release.Namespace }}.svc.cluster.local"
        port: "80"
      internal: true
      auth:
        adminUser: admin
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-keycloak-admin-password"
    auth:
      enabled: true
      publicIssuerUrl: "https://{{ .Values.global.host }}/auth/realms/camunda-platform"
      admin:
        enabled: true
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-admin-client-token"
      webModeler:
        redirectUrl: "https://{{ .Values.global.host }}/modeler"
      console:
        redirectUrl: "https://{{ .Values.global.host }}"
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-console-client-token"
      optimize:
        redirectUrl: "https://{{ .Values.global.host }}/optimize"
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-optimize-client-token"
      ## This section will be enabled by the pre-install-upgrade.sh for backwards compatibility with alpha8 chart.
      ## TODO: Remove this section after the 8.8 release.
      ## START pre-install-upgrade.sh COMMENT
      # orchestration:
      #   redirectUrl: "https://{{ .Values.global.host }}/orchestration"
      #   secret:
      #     existingSecret: "integration-test-credentials"
      #     existingSecretKey: "identity-orchestration-client-token"
      # connectors:
      #   secret:
      #     existingSecret: "integration-test-credentials"
      #     existingSecretKey: "identity-connectors-client-token"
      ## END pre-install-upgrade.sh COMMENT
  security:
    authentication:
      method: oidc

# -- Wait for Keycloak before starting Identity --------------------------------
# Identity's /actuator/health returns 503 while Keycloak is not reachable,
# which burns through startup probe budget and causes unnecessary restarts.
# This init container blocks until Keycloak's health endpoint responds.
identity:
  initContainers:
    - name: wait-for-keycloak
      image: busybox:1.36
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      command:
        - sh
        - -c
        - |
          echo "Waiting for Keycloak at keycloak:80/auth/ ..."
          until wget -q --spider --timeout=2 "http://keycloak:80/auth/"; do
            sleep 2
          done
          echo "Keycloak is ready"
  externalDatabase:
    enabled: true
    host: postgresql
    port: 5432
    database: identity
    username: $RDBMS_POSTGRESQL_USERNAME
    secret:
      inlineSecret: $RDBMS_POSTGRESQL_PASSWORD

webModeler:
  restapi:
    externalDatabase:
      enabled: true
      host: postgresql
      port: 5432
      database: webmodeler
      username: $RDBMS_POSTGRESQL_USERNAME
      secret:
        inlineSecret: $RDBMS_POSTGRESQL_PASSWORD

optimize:
  enabled: true
  database:
    elasticsearch:
      enabled: true
  contextPath: "/optimize"
  livenessProbe:
    enabled: true

connectors:
  security:
    authentication:
      oidc:
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-connectors-client-token"

orchestration:
  security:
    initialization:
      defaultRoles:
        admin:
          users:
            - demo
          clients:
            - venom
    authentication:
      authenticationRefreshInterval: "PT30S"
      oidc:
        redirectUrl: "https://{{ .Values.global.host }}/orchestration"
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "identity-orchestration-client-token"
        backwardsCompatibleAudiences:
          - operate-api
          - tasklist-api
          - zeebe-api
