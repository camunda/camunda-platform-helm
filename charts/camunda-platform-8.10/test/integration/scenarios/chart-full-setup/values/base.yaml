global:
  imagePullSecrets:
  - index-docker-io
  - registry-camunda-cloud
  elasticsearch:
    enabled: true
  exporter:
    zeebe:
      enabled: false
  host: $CAMUNDA_HOSTNAME
  ingress:
    enabled: true
    className: nginx
    tls:
      enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/hostname: '{{ .Values.global.host }}'
      external-dns.alpha.kubernetes.io/ttl: '60'
identity:
  enabled: true
  image:
    pullSecrets:
    - name: index-docker-io
    - name: registry-camunda-cloud
  contextPath: /identity
  resources:
    requests:
      cpu: 600m
      memory: 1150Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  startupProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 2
    failureThreshold: 60
    timeoutSeconds: 1
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  firstUser:
    secret:
      existingSecret: integration-test-credentials
      existingSecretKey: identity-user-password
  clients:
  - id: venom
    name: Venom
    secret:
      existingSecret: integration-test-credentials
      existingSecretKey: identity-admin-client-password
    redirectUris: /dummy
    rootUrl: http://dummy
    type: confidential
    permissions:
    - resourceServerId: camunda-identity-resource-server
      definition: read
    - resourceServerId: camunda-identity-resource-server
      definition: write
    - resourceServerId: orchestration-api
      definition: read:*
    - resourceServerId: orchestration-api
      definition: write:*
    - resourceServerId: optimize-api
      definition: write:*
    - resourceServerId: web-modeler-api
      definition: write:*
optimize:
  enabled: true
  image:
    pullSecrets:
    - name: index-docker-io
    - name: registry-camunda-cloud
  contextPath: /optimize
  partitionCount: '1'
  resources:
    requests:
      cpu: 475m
      memory: 1150Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 40
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
connectors:
  image:
    pullSecrets:
    - name: index-docker-io
    - name: registry-camunda-cloud
  contextPath: /connectors
  resources:
    requests:
      cpu: 500m
      memory: 700Mi
    limits:
      cpu: 1000m
      memory: 1400Mi
  startupProbe:
    enabled: true
    probePath: /actuator/health/liveness
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 60
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 5
    timeoutSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5
camundaHub:
  enabled: true
  contextPath: /modeler
  restapi:
    resources:
      requests:
        cpu: 850m
        memory: 1550Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    startupProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 30
      timeoutSeconds: 1
    pusher:
      secret:
        existingSecret: integration-test-credentials
        existingSecretKey: webmodeler-pusher-app-secret
      client:
        secret:
          existingSecret: integration-test-credentials
          existingSecretKey: webmodeler-pusher-app-key
    mail:
      fromAddress: noreply@example.com
  webapp:
    resources:
      requests:
        cpu: 60m
        memory: 300Mi
      limits:
        cpu: 400m
        memory: 512Mi
  websockets:
    resources:
      requests:
        cpu: 25m
        memory: 50Mi
      limits:
        cpu: 100m
        memory: 128Mi
webModeler:
  image:
    pullSecrets:
    - name: index-docker-io
    - name: registry-camunda-cloud
orchestration:
  image:
    pullSecrets:
    - name: index-docker-io
    - name: registry-camunda-cloud
  data:
    secondaryStorage:
      type: elasticsearch
  contextPath: /orchestration
  clusterSize: '1'
  partitionCount: '1'
  replicationFactor: '1'
  resources:
    requests:
      cpu: 600m
      memory: 1350Mi
    limits:
      cpu: 2000m
      memory: 2000Mi
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5
  livenessProbe:
    enabled: false
  ingress:
    grpc:
      enabled: true
      className: nginx
      host: grpc-{{ .Values.global.host }}
      tls:
        enabled: true
        secretName: camunda-platform-zeebe-gateway
      annotations:
        external-dns.alpha.kubernetes.io/hostname: orchestration-{{ .Values.global.host }}
        external-dns.alpha.kubernetes.io/ttl: '60'
prometheusServiceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
console:
  contextPath: /
  resources:
    requests:
      cpu: 650m
      memory: 1150Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  image:
    pullSecrets:
    - name: index-docker-io
    - name: registry-camunda-cloud
