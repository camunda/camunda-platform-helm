# Base values for all 8.10 integration test deployments
# Layer 1: Common configuration shared across all scenarios

global:
  imagePullSecrets:
    - index-docker-io
    - registry-camunda-cloud
  elasticsearch:
    enabled: true
  exporter:
    zeebe:
      enabled: false
  host: "$CAMUNDA_HOSTNAME"
  ingress:
    enabled: true
    className: nginx
    tls:
      enabled: true
      # A wildcard certificate will be used.
      
    annotations:
      external-dns.alpha.kubernetes.io/hostname: "{{ .Values.global.host }}"
      external-dns.alpha.kubernetes.io/ttl: "60"

# Context paths for all components
identity:
  enabled: true
  contextPath: "/identity"
  startupProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 2
    failureThreshold: 60
    timeoutSeconds: 1
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  firstUser:
    secret:
      existingSecret: "integration-test-credentials"
      existingSecretKey: "identity-user-password"
  clients:
    - id: venom
      name: Venom
      secret:
        existingSecret: integration-test-credentials
        existingSecretKey: identity-admin-client-password
      redirectUris: /dummy
      rootUrl: http://dummy
      type: confidential
      permissions:
        - resourceServerId: camunda-identity-resource-server
          definition: read
        - resourceServerId: camunda-identity-resource-server
          definition: write
        - resourceServerId: orchestration-api
          definition: read:*
        - resourceServerId: orchestration-api
          definition: write:*
        - resourceServerId: optimize-api
          definition: write:*
        - resourceServerId: web-modeler-api
          definition: write:*
        - resourceServerId: console-api
          definition: write:*

optimize:
  enabled: true
  contextPath: "/optimize"
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 40
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

connectors:
  contextPath: "/connectors"
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 1
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 1

camundaHub:
  enabled: true
  webModeler:
    contextPath: "/modeler"
    image:
      pullSecrets:
        - name: index-docker-io
        - name: registry-camunda-cloud
    restapi:
      # Wait for PostgreSQL to accept connections before starting restapi.
      # Prevents restapi from failing on DB connection during Spring context init.
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at {{ .Release.Name }}-postgresql-web-modeler:5432 ..."
              until nc -z "{{ .Release.Name }}-postgresql-web-modeler" 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready"
      startupProbe:
        enabled: true
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 30
        timeoutSeconds: 1
      pusher:
        secret:
          existingSecret: "integration-test-credentials"
          existingSecretKey: "webmodeler-pusher-app-secret"
        client:
          secret:
            existingSecret: "integration-test-credentials"
            existingSecretKey: "webmodeler-pusher-app-key"
      mail:
        fromAddress: noreply@example.com
  console:
    contextPath: "/"
    image:
      pullSecrets:
        - name: index-docker-io
        - name: registry-camunda-cloud

webModelerPostgresql:
  enabled: true
  auth:
    existingSecret: "integration-test-credentials"
    secretKeys:
      adminPasswordKey: "webmodeler-postgresql-admin-password"
      userPasswordKey: "webmodeler-postgresql-user-password"
  primary:
    # No persistent storage needed in CI — use emptyDir instead of PVC.
    persistence:
      enabled: false
    # Resource allocation for faster startup
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    # PostgreSQL configuration optimized for fast startup in integration tests.
    # WARNING: These settings trade durability for speed — NOT suitable for production.
    extendedConfiguration: |
      shared_buffers = 64MB
      work_mem = 8MB
      max_connections = 50
      fsync = off
      full_page_writes = off
      synchronous_commit = off

orchestration:
  data:
    secondaryStorage:
      type: elasticsearch
  contextPath: "/orchestration"
  # JVM startup optimizations: TieredStopAtLevel=1 skips C2 compiler for ~30-50% faster startup,
  # pre-sized heap avoids resizing overhead, G1GC with string deduplication for efficiency.
  resources:
    requests:
      cpu: 2000m
      memory: 2000Mi
    limits:
      cpu: 2000m
      memory: 3000Mi
  startupProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5
  livenessProbe:
    enabled: false
  ingress:
    grpc:
      enabled: true
      className: nginx
      host: "grpc-{{ .Values.global.host }}"
      tls:
        enabled: true
        secretName: camunda-platform-zeebe-gateway
      annotations:
        external-dns.alpha.kubernetes.io/hostname: "orchestration-{{ .Values.global.host }}"
        external-dns.alpha.kubernetes.io/ttl: "60"
  importer:
    enabled: true


prometheusServiceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
