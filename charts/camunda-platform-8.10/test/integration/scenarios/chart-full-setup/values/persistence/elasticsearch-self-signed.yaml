# =============================================================================
# Elasticsearch Backend with Self-Signed TLS
# =============================================================================
# Layer 3: Backend - Elasticsearch (bundled, self-signed TLS)
# Used with: --persistence elasticsearch-self-signed
#
# This layer enables the bundled Bitnami Elasticsearch subchart with X-Pack
# security and TLS using pre-provisioned self-signed certificates.
#
# Prerequisites (created by pre-install-elasticsearch-self-signed.sh in the
# namespace before deployment):
#   - Secret "elasticsearch-tls-certs" with keys:
#       elasticsearch.keystore.jks, elasticsearch.truststore.jks
#   - Secret "elasticsearch-tls-passwords" with keys:
#       keystore-password, truststore-password
#   - Secret "elasticsearch-jks" with keys:
#       externaldb.jks (JKS truststore for Camunda components)
#       truststore-password
#
# Auth/TLS notes:
#   - Camunda 8.10 unified-orchestration wiring: secondaryStorage.elasticsearch.*
#     fields are the supported path (the global.elasticsearch.* fields are
#     deprecated, see values.yaml comments).
#   - Java 21 defaults trustStore.type to pkcs12; the chart helper appends
#     -Djavax.net.ssl.trustStore=/usr/local/camunda/certificates/externaldb.jks
#     when tls.secret.existingSecret is set, so we extend orchestration.javaOpts
#     with -Djavax.net.ssl.trustStoreType=jks -Djavax.net.ssl.trustStorePassword=changeit
#     to make Java actually read the JKS file. Mirrors PR #5974 (8.8 ES) and
#     #6032 (8.10 OS).
# =============================================================================

global:
  elasticsearch:
    enabled: true

orchestration:
  # See header comment for the Java 21 / JKS rationale.
  javaOpts: >-
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:HeapDumpPath=/usr/local/camunda/data
    -XX:ErrorFile=/usr/local/camunda/data/camunda_error%p.log
    -XX:+ExitOnOutOfMemoryError
    -Djavax.net.ssl.trustStoreType=jks
    -Djavax.net.ssl.trustStorePassword=changeit
  # The legacy ElasticsearchExporter (zeebe-record-* indices) does NOT pick
  # up secondaryStorage.elasticsearch.auth — it has its own ZEEBE_BROKER_*
  # auth env path. Same gotcha as PR #5974 (8.8 ES self-signed). Inject
  # explicitly so Zeebe can create its component templates and write
  # records to ES.
  env:
    - name: ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_AUTHENTICATION_USERNAME
      value: elastic
    - name: ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_AUTHENTICATION_PASSWORD
      value: "camunda-ci-es-password"
  data:
    secondaryStorage:
      type: elasticsearch
      elasticsearch:
        url: "https://integration-elasticsearch:9200"
        auth:
          username: elastic
          secret:
            inlineSecret: "camunda-ci-es-password"
        tls:
          secret:
            existingSecret: elasticsearch-jks
            existingSecretKey: externaldb.jks

optimize:
  enabled: true
  javaOpts: "-Djavax.net.ssl.trustStoreType=jks -Djavax.net.ssl.trustStorePassword=changeit"
  database:
    opensearch:
      enabled: false
    elasticsearch:
      enabled: true
      url:
        protocol: https
        host: "integration-elasticsearch"
        port: 9200
      auth:
        username: elastic
        secret:
          inlineSecret: "camunda-ci-es-password"
      tls:
        enabled: true
        secret:
          existingSecret: elasticsearch-jks
          existingSecretKey: externaldb.jks

elasticsearch:
  enabled: true
  maxUnavailable: 0
  security:
    enabled: true
    elasticPassword: "camunda-ci-es-password"
    tls:
      restEncryption: true
      autoGenerated: false
      verificationMode: certificate
      master:
        existingSecret: elasticsearch-tls-certs
      passwordsSecret: elasticsearch-tls-passwords
      keystorePassword: ""
      truststorePassword: ""
  # The parent chart's values.yaml defaults master.extraEnvVars to
  # [{name: ELASTICSEARCH_ENABLE_REST_TLS, value: "false"}], which would
  # override the security helper's "true" (from restEncryption: true above).
  # Setting extraEnvVars to an empty array clears that default so only the
  # security helper's correct value remains — no duplicate env var.
  master:
    extraEnvVars: []
