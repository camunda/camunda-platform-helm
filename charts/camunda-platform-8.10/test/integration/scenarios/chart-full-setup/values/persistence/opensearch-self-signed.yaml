# =============================================================================
# OpenSearch Backend with Self-Signed TLS (companion chart)
# =============================================================================
# Layer 3: Backend - OpenSearch (embedded companion, self-signed TLS)
# Used with: --persistence opensearch-self-signed
#
# Connects Camunda 8.10 to a TLS-enabled OpenSearch 3.x companion chart that
# is deployed by deploy-camunda before the main chart. The OS pod is
# configured for HTTPS with a self-signed CA generated by the pre-install
# script `pre-install-opensearch-self-signed.sh`.
#
# Prerequisites (created by the pre-install script in the namespace):
#   - Secret "opensearch-tls-certs" with keys ca.crt, tls.crt, tls.key,
#     admin.crt, admin.key (mounted into the OpenSearch pod).
#   - Secret "opensearch-tls-ca" with key ca.crt (PEM CA bundle for the
#     SSL_CERT_FILE pattern referenced in helm#3498).
#   - Secret "opensearch-jks" with keys externaldb.jks + truststore-password
#     (consumed by the chart's existing tls.secret.existingSecret wiring for
#     the JVM truststore path).
#
# Auth notes:
#   The OpenSearch security plugin is enabled; the initial admin user is
#   provisioned via OPENSEARCH_INITIAL_ADMIN_PASSWORD on the companion chart
#   (see test/integration/companion-values/opensearch-tls.yaml). We pin the
#   same password here so Camunda can authenticate.
# =============================================================================

global:
  elasticsearch:
    enabled: false
  # Required for the chart's getTlsSecretKey helper to resolve to the
  # OpenSearch JKS path; otherwise the helper falls through to
  # global.elasticsearch.tls (unset) and emits an empty truststore filename
  # — JAVA_TOOL_OPTIONS would render `-Djavax.net.ssl.trustStore=<dir>/`
  # and the JKS volumeMount subPath would be empty. Mirrors the
  # secondaryStorage.opensearch.tls.secret.* block below so both code paths
  # see the same secret material.
  opensearch:
    enabled: true
    tls:
      enabled: true
      secret:
        existingSecret: opensearch-jks
        existingSecretKey: externaldb.jks
      # Post-#5994: chart helper emits TRUSTSTORE_PASSWORD as an env var when
      # global.<engine>.tls.jks.secret is set, expanding it into JAVA_TOOL_OPTIONS
      # at container start. Lets us drop the literal password from javaOpts.
      jks:
        secret:
          existingSecret: opensearch-jks
          existingSecretKey: truststore-password

orchestration:
  # Java 21 defaults trustStore.type to pkcs12; our truststore is JKS so we
  # set the type explicitly. The chart helper now appends both
  # -Djavax.net.ssl.trustStore=... and -Djavax.net.ssl.trustStorePassword=$(TRUSTSTORE_PASSWORD)
  # automatically (see #5994), so we no longer set the password literal in javaOpts.
  javaOpts: >-
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:HeapDumpPath=/usr/local/camunda/data
    -XX:ErrorFile=/usr/local/camunda/data/camunda_error%p.log
    -XX:+ExitOnOutOfMemoryError
    -Djavax.net.ssl.trustStoreType=jks
  data:
    secondaryStorage:
      type: opensearch
      opensearch:
        url: "https://opensearch-master:9200"
        auth:
          username: admin
          secret:
            inlineSecret: "Camunda-CI-OS-2026!"
        tls:
          secret:
            existingSecret: opensearch-jks
            existingSecretKey: externaldb.jks
  # Belt-and-braces: also expose the CA via the OS-level path
  # (camunda/camunda-platform-helm#3498). This will let us isolate, on first
  # deploy, whether the existing JKS wiring is sufficient on 8.10 or whether
  # the OS-trust path is the one that actually carries the connection.
  extraVolumes:
    - name: opensearch-ca
      secret:
        secretName: opensearch-tls-ca
        items:
          - key: ca.crt
            path: ca.crt
  extraVolumeMounts:
    - name: opensearch-ca
      mountPath: /etc/camunda/tls
      readOnly: true
  env:
    - name: SSL_CERT_FILE
      value: /etc/camunda/tls/ca.crt

optimize:
  enabled: true
  database:
    elasticsearch:
      enabled: false
    opensearch:
      enabled: true
      aws:
        enabled: false
      url:
        protocol: https
        host: "opensearch-master"
        port: 9200
      auth:
        username: admin
        secret:
          inlineSecret: "Camunda-CI-OS-2026!"
      tls:
        enabled: true
        secret:
          existingSecret: opensearch-jks
          existingSecretKey: externaldb.jks
  javaOpts: "-Djavax.net.ssl.trustStoreType=jks"
  extraVolumes:
    - name: opensearch-ca
      secret:
        secretName: opensearch-tls-ca
        items:
          - key: ca.crt
            path: ca.crt
  extraVolumeMounts:
    - name: opensearch-ca
      mountPath: /etc/camunda/tls
      readOnly: true
  env:
    - name: SSL_CERT_FILE
      value: /etc/camunda/tls/ca.crt

elasticsearch:
  enabled: false
