# RDBMS feature configuration for 8.10 (PostgreSQL)
# Layer 4: Feature - RDBMS secondary storage

global:
  elasticsearch:
    url:
      host: "elasticsearch-master"

orchestration:
  data:
    secondaryStorage:
      type: rdbms
      rdbms:
        url: jdbc:postgresql://postgresql:5432/app
        username: ${RDBMS_POSTGRESQL_USERNAME}
        secret:
          inlineSecret: ${RDBMS_POSTGRESQL_PASSWORD}
  exporters:
    rdbms:
      enabled: true
  extraVolumeMounts:
    - name: jdbcdrivers
      mountPath: /driver-lib
  extraVolumes:
    - name: jdbcdrivers
      emptyDir: {}
