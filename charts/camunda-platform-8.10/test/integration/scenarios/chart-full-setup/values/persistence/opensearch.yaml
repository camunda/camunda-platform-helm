# OpenSearch backend configuration for 8.9
# Layer 3: Backend - OpenSearch (external)

global:
  elasticsearch:
    enabled: false
  exporter:
    zeebe:
      enabled: true

orchestration:
  data:
    secondaryStorage:
      type: opensearch
      opensearch:
        url: "$OPENSEARCH_PROTOCOL://$OPENSEARCH_HOST:$OPENSEARCH_PORT"
        auth:
          username: "$OPENSEARCH_USERNAME"
          secret:
            inlineSecret: "$OPENSEARCH_PASSWORD"
  index:
    prefix: $ORCHESTRATION_INDEX_PREFIX-$FLOW
  extraConfiguration:
    - file: "mapping-rules-application.yaml"
      content: |
        camunda:
          security:
            initialization:
              mappingrules:
                - mapping-rule-id: "demo-user-mapping-rule"
                  claim-name: "preferred_username"
                  claim-value: "demo"
                - mapping-rule-id: "venom-client-mapping-rule"
                  claim-name: "client_id"
                  claim-value: "$VENOM_CLIENT_ID"
                - mapping-rule-id: "connectors-client-mapping-rule"
                  claim-name: "client_id"
                  claim-value: "$CONNECTORS_CLIENT_ID"
              default-roles:
                admin:
                  mappingrules:
                    - "demo-user-mapping-rule"
                    - "venom-client-mapping-rule"
                    - "connectors-client-mapping-rule"
    - file: "custom-prefix-application.yaml"
      content: |
        camunda:
          data:
            secondary-storage:
              opensearch:
                index-prefix: $ORCHESTRATION_INDEX_PREFIX-$FLOW
        zeebe:
          broker:
            exporters:
              camundaexporter:
                args:
                  index-prefix: $ORCHESTRATION_INDEX_PREFIX-$FLOW

optimize:
  enabled: true
  database:
    elasticsearch:
      enabled: false
    opensearch:
      enabled: true
      aws:
        enabled: false
      auth:
        username: "$OPENSEARCH_USERNAME"
        secret:
          inlineSecret: "$OPENSEARCH_PASSWORD"
      url:
        protocol: $OPENSEARCH_PROTOCOL
        host: "$OPENSEARCH_HOST"
        port: $OPENSEARCH_PORT
      prefix: $ORCHESTRATION_INDEX_PREFIX-$FLOW
  extraConfiguration:
    - file: "index-prefix-application.yaml"
      content: |
        opensearch:
          settings:
            index:
              prefix: $OPTIMIZE_INDEX_PREFIX-$FLOW
        zeebe:
          name: $ORCHESTRATION_INDEX_PREFIX-$FLOW

elasticsearch:
  enabled: false
