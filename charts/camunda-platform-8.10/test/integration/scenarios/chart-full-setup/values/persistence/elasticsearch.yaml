# Elasticsearch backend configuration for 8.10
# Layer 3: Backend - Elasticsearch (embedded companion chart)
#
# Connects to the official elastic/elasticsearch chart deployed as a separate
# Helm release by deploy-camunda before the main Camunda chart. The companion
# chart values are in test/integration/companion-values/elasticsearch.yaml
# (security disabled, single node).
#
# No custom index prefixes are set. Each scenario deploys its own isolated ES
# instance so there are no cross-scenario index collisions. Using defaults
# avoids the CamundaExporter alias-nulling bug (SchemaManager creates indices
# with "aliases": {} which overrides index template alias definitions).

global:
  elasticsearch:
    enabled: false
  exporter:
    zeebe:
      enabled: true

orchestration:
  data:
    secondaryStorage:
      type: elasticsearch
      elasticsearch:
        url: "http://elasticsearch-master:9200"
  env:
    # Security mapping rules for orchestration authorization.
    # Uses env var placeholders so the same file works for both keycloak and OIDC:
    #   keycloak: VENOM_CLIENT_ID=venom, CONNECTORS_CLIENT_ID=connectors
    #   OIDC (Entra): VENOM_CLIENT_ID=<entra-app-guid>, CONNECTORS_CLIENT_ID=<entra-child-app-guid>
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_0_MAPPINGRULEID
      value: "demo-user-mapping-rule"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_0_CLAIMNAME
      value: "preferred_username"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_0_CLAIMVALUE
      value: "demo"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_1_MAPPINGRULEID
      value: "venom-client-mapping-rule"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_1_CLAIMNAME
      value: "client_id"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_1_CLAIMVALUE
      value: "$VENOM_CLIENT_ID"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_2_MAPPINGRULEID
      value: "connectors-client-mapping-rule"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_2_CLAIMNAME
      value: "client_id"
    - name: CAMUNDA_SECURITY_INITIALIZATION_MAPPINGRULES_2_CLAIMVALUE
      value: "$CONNECTORS_CLIENT_ID"
    - name: CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_MAPPINGRULES_0
      value: "demo-user-mapping-rule"
    - name: CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_MAPPINGRULES_1
      value: "venom-client-mapping-rule"
    - name: CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_MAPPINGRULES_2
      value: "connectors-client-mapping-rule"

optimize:
  enabled: true
  database:
    elasticsearch:
      enabled: true
      external: true
      url:
        protocol: http
        host: "elasticsearch-master"
        port: 9200
