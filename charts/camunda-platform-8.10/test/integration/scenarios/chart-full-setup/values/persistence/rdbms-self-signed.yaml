# =============================================================================
# RDBMS Backend with Self-Signed TLS (companion chart)
# =============================================================================
# Layer 3: Backend - PostgreSQL (companion, self-signed TLS)
# Used with: --persistence rdbms-self-signed
#
# Connects Camunda 8.10 to a TLS-enabled Bitnami postgresql companion chart
# that is deployed by deploy-camunda before the main chart. The PG instance
# is configured for TLS with a self-signed CA generated by the pre-install
# script `pre-install-rdbms-self-signed.sh`.
#
# Prerequisites (created by the pre-install script in the namespace):
#   - Secret "rdbms-tls-server" with keys tls.crt, tls.key, ca.crt
#     (referenced by the postgresql companion via tls.certificatesSecret)
#   - Secret "rdbms-tls-ca"     with key ca.crt (PEM, mounted into Camunda
#     components and referenced from the JDBC URL via sslrootcert=)
#
# Auth/TLS notes:
#   - JDBC URL uses sslmode=verify-full to require server cert validation
#     against our CA. sslrootcert points at the mounted PEM.
#   - PostgreSQL JDBC reads the CA cert as PEM directly; no JKS truststore
#     is needed for this path (unlike the ES/OS scenarios).
#   - Hybrid storage: keep ES enabled as the primary secondary storage
#     and run RDBMS as the dual exporter. Mirrors the existing rdbms.yaml
#     pattern.
# =============================================================================

orchestration:
  data:
    secondaryStorage:
      type: rdbms
      rdbms:
        url: "jdbc:postgresql://postgres-tls-postgresql:5432/orchestration?sslmode=verify-full&sslrootcert=/etc/camunda/tls/ca.crt"
        username: camunda
        secret:
          inlineSecret: "Camunda-CI-PG-2026!"
  security:
    authorizations:
      enabled: false
    authentication:
      unprotectedApi: true
  exporters:
    rdbms:
      enabled: true
  extraVolumes:
    - name: rdbms-ca
      secret:
        secretName: rdbms-tls-ca
        items:
          - key: ca.crt
            path: ca.crt
    - name: jdbcdrivers
      emptyDir: {}
  extraVolumeMounts:
    - name: rdbms-ca
      mountPath: /etc/camunda/tls
      readOnly: true
    - name: jdbcdrivers
      mountPath: /driver-lib

elasticsearch:
  enabled: true
