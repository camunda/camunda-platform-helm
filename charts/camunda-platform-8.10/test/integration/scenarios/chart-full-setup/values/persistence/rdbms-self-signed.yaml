# =============================================================================
# RDBMS Backend with CNPG-managed TLS
# =============================================================================
# Layer 3: Backend - PostgreSQL (CloudNativePG, self-signed TLS)
# Used with: --persistence rdbms-self-signed
#
# Connects Camunda 8.10 to a TLS-enabled PostgreSQL cluster provisioned in the
# scenario namespace by the `postgresql-cluster-tls.yaml` pre-install fixture.
# CloudNativePG generates its own self-signed CA + server cert by default; the
# CA is exposed via the `postgresql-cluster-ca` secret and mounted into
# Camunda for `sslmode=verify-full` validation.
#
# Prerequisites (created by the pre-install hook):
#   - CNPG Cluster `postgresql-cluster` with database `orchestration`
#   - Service `postgresql-cluster-rw` (TLS-enabled by CNPG default)
#   - Secret `postgresql-cluster-ca` with key `ca.crt`
#   - Secret `postgresql-secret` with `username` + `password` keys, matching
#     the CNPG-managed `app` role (sourced from $RDBMS_POSTGRESQL_USERNAME /
#     $RDBMS_POSTGRESQL_PASSWORD env vars).
#
# Auth/TLS notes:
#   - JDBC URL uses `sslmode=verify-full` to require server cert validation
#     against CNPG's CA. `sslrootcert` points at the mounted PEM.
#   - PostgreSQL JDBC reads the CA cert as PEM directly; no JKS truststore
#     needed for this path.
#   - Hybrid storage: keep Elasticsearch enabled as primary secondary storage
#     and run RDBMS as the dual exporter (mirrors `rdbms.yaml`).
# =============================================================================

global:
  elasticsearch:
    url:
      host: "elasticsearch-master"

orchestration:
  data:
    secondaryStorage:
      type: rdbms
      rdbms:
        url: "jdbc:postgresql://postgresql-cluster-rw:5432/orchestration?sslmode=verify-full&sslrootcert=/etc/camunda/tls/ca.crt"
        username: ${RDBMS_POSTGRESQL_USERNAME}
        secret:
          inlineSecret: ${RDBMS_POSTGRESQL_PASSWORD}
  security:
    authorizations:
      enabled: false
    authentication:
      unprotectedApi: true
  exporters:
    rdbms:
      enabled: true
  extraVolumes:
    - name: rdbms-ca
      secret:
        secretName: postgresql-cluster-ca
        items:
          - key: ca.crt
            path: ca.crt
    - name: jdbcdrivers
      emptyDir: {}
  extraVolumeMounts:
    - name: rdbms-ca
      mountPath: /etc/camunda/tls
      readOnly: true
    - name: jdbcdrivers
      mountPath: /driver-lib
