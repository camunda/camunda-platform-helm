# =============================================================================
# RDBMS Backend with self-signed TLS (internal-postgresql companion chart)
# =============================================================================
# Layer 3: Backend - PostgreSQL (internal-postgresql companion, self-signed TLS)
# Used with: --persistence rdbms-self-signed
#
# Connects Camunda 8.10 to a TLS-enabled PostgreSQL provisioned by the
# `internal-postgresql` companion chart (profile `postgresql-tls`). The chart
# generates its own self-signed CA + server cert at install time and starts
# PostgreSQL with `ssl=on`; the CA is published in the `postgresql-tls` Secret
# under `ca.crt` and mounted into Camunda for `sslmode=verify-full` validation.
# Replaces the former CloudNativePG `postgresql-cluster-tls.yaml` fixture.
#
# Prerequisites (provided by the `postgresql-tls` companion profile):
#   - Deployment + Service `postgresql` (ClusterIP, TLS-enabled) with database
#     `orchestration`.
#   - Secret `postgresql-tls` with key `ca.crt`.
#   - PostgreSQL role/password sourced from $RDBMS_POSTGRESQL_USERNAME /
#     $RDBMS_POSTGRESQL_PASSWORD.
#
# Auth/TLS notes:
#   - JDBC URL uses `sslmode=verify-full` to require server cert validation
#     against the companion chart's CA. `sslrootcert` points at the mounted PEM.
#   - PostgreSQL JDBC reads the CA cert as PEM directly; no JKS truststore
#     needed for this path.
#   - Hybrid storage: keep Elasticsearch enabled as primary secondary storage
#     and run RDBMS as the dual exporter (mirrors `rdbms.yaml`).
# =============================================================================

global:
  elasticsearch:
    url:
      host: "elasticsearch-master"

orchestration:
  data:
    secondaryStorage:
      type: rdbms
      rdbms:
        url: "jdbc:postgresql://postgresql:5432/orchestration?sslmode=verify-full&sslrootcert=/etc/camunda/tls/ca.crt"
        username: ${RDBMS_POSTGRESQL_USERNAME}
        secret:
          inlineSecret: ${RDBMS_POSTGRESQL_PASSWORD}
  security:
    authorizations:
      enabled: false
    authentication:
      unprotectedApi: true
  exporters:
    rdbms:
      enabled: true
  extraVolumes:
    - name: rdbms-ca
      secret:
        secretName: postgresql-tls
        items:
          - key: ca.crt
            path: ca.crt
    - name: jdbcdrivers
      emptyDir: {}
  extraVolumeMounts:
    - name: rdbms-ca
      mountPath: /etc/camunda/tls
      readOnly: true
    - name: jdbcdrivers
      mountPath: /driver-lib
