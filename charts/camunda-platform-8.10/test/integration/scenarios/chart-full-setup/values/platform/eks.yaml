# EKS infrastructure configuration for 8.9
# Layer 6: Infrastructure - AWS EKS specific settings

global:
  commonLabels:
    janitor/ttl: 1h
    camunda.cloud/ephemeral: "true"
  ingress:
    tls:
      secretName: aws-camunda-cloud-tls

orchestration:
  ingress:
    grpc:
      tls:
        secretName: aws-camunda-cloud-tls

prometheusServiceMonitor:
  enabled: false
