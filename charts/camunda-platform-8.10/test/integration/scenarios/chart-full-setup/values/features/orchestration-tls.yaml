global:
  tls:
    orchestration:
      grpc:
        enabled: true
        cert:
          secret:
            existingSecret: orchestration-tls
            existingSecretKey: tls.crt
        privateKey:
          secret:
            existingSecretKey: tls.key

webModeler:
  restapi:
    clusters:
      - id: default-cluster
        name: integration-zeebe
        version: 8.10-SNAPSHOT
        authentication: BEARER_TOKEN
        authorizations:
          enabled: true
        url:
          grpc: grpcs://grpc-$CAMUNDA_HOSTNAME
          rest: http://integration-zeebe-gateway:8080/orchestration
          web-app: https://$CAMUNDA_HOSTNAME/orchestration

connectors:
  configuration: |
    server:
      port: 8080
      servlet:
        context-path: "/connectors"

    management:
      context-path: /actuator
      endpoints:
        web:
          exposure:
            include: metrics,health,prometheus
      endpoint:
        health:
          show-details: always
          show-components: always
          group:
            readiness:
              include:
              - processDefinitionImport
              - zeebeClient

    camunda:
      client:
        rest-address: http://integration-zeebe-gateway:8080/orchestration
        grpc-address: https://grpc-$CAMUNDA_HOSTNAME
        worker:
          defaults:
            max-jobs-active: 32
            stream-enabled: true
        mode: selfManaged
        auth:
          issuer-url: "http://keycloak:80/auth/realms/camunda-platform"
          client-id: "connectors"
          client-secret: "${VALUES_CAMUNDA_IDENTITY_CLIENT_SECRET}"
          audience: "orchestration-api"
      connector:
        headless:
          service-url: "integration-connectors-headless"
        webhook:
          enabled: true
        polling:
          enabled: true
        agenticai:
          enabled: true

    logging:
      level:
        io.camunda.connector: INFO
