global:
  tls:
    orchestration:
      grpc:
        enabled: true
        secret:
          existingSecret: orchestration-tls
          existingSecretKey: tls.crt
          existingSecretPrivateKeyKey: tls.key

webModeler:
  enabled: true
  contextPath: "/modeler"
  image:
    pullSecrets:
      - name: index-docker-io
      - name: registry-camunda-cloud
  restapi:
    initContainers:
      - name: wait-for-postgresql
        image: busybox:1.36
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        command:
          - sh
          - -c
          - |
            echo "Waiting for PostgreSQL at postgresql:5432 ..."
            until nc -z "postgresql" 5432; do
              sleep 2
            done
            echo "PostgreSQL is ready"
    mail:
      fromAddress: noreply@example.com
    resources:
      requests:
        cpu: 400m
        memory: 512Mi
      limits:
        memory: 1Gi
  websockets:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

connectors:
  configuration: |
    server:
      port: 8080
      servlet:
        context-path: "/connectors"

    management:
      context-path: /actuator
      endpoints:
        web:
          exposure:
            include: metrics,health,prometheus
      endpoint:
        health:
          show-details: always
          show-components: always
          group:
            readiness:
              include:
              - processDefinitionImport
              - zeebeClient

    camunda:
      client:
        rest-address: http://integration-zeebe-gateway:8080/orchestration
        grpc-address: https://grpc-$CAMUNDA_HOSTNAME
        worker:
          defaults:
            max-jobs-active: 32
            stream-enabled: true
        mode: selfManaged
        auth:
          issuer-url: "http://keycloak:80/auth/realms/camunda-platform"
          client-id: "connectors"
          client-secret: "${VALUES_CAMUNDA_IDENTITY_CLIENT_SECRET}"
          audience: "orchestration-api"
      connector:
        headless:
          service-url: "integration-connectors-headless"
        webhook:
          enabled: true
        polling:
          enabled: true
        agenticai:
          enabled: true

    logging:
      level:
        io.camunda.connector: INFO
