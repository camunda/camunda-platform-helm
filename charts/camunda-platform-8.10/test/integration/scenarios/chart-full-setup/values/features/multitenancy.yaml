# Multi-tenancy feature configuration for 8.10
# Layer 4: Feature - Multi-tenancy

global:
  multitenancy:
    enabled: true
    checksEnabled: true
    apiEnabled: true

orchestration:
  security:
    authorizations:
      enabled: true
    initialization:
      mappingRules:
        - mappingRuleID: "admin-mapping"
          claimName: "group"
          claimValue: "admin"
        - mappingRuleID: "tenant-a-mapping"
          claimName: "tenant"
          claimValue: "tenant-a"
        - mappingRuleID: "tenant-b-mapping"
          claimName: "tenant"
          claimValue: "tenant-b"

optimize:
  caches:
    cloudTenantAuthorizations:
      minFetchIntervalSeconds: 120

connectors:
  env:
    - name: username
      value: username
    - name: password
      value: password
    - name: CAMUNDA_CLIENT_WORKER_DEFAULTS_TENANTIDS
      value: "<default>, Tenant_Main_Connectors, Tenant_Second_Connectors, Tenant_1_Connectors, Tenant_2_Connectors"
