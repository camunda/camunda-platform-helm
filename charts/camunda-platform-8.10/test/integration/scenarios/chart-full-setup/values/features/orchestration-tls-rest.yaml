global:
  tls:
    orchestration:
      rest:
        enabled: true
        secret:
          existingSecret: orchestration-tls-keystore
          existingSecretKey: keystore.p12
          existingSecretPasswordKey: keystore-password
          keyAlias: orchestration-rest

webModeler:
  enabled: true
  contextPath: "/modeler"
  image:
    pullSecrets:
      - name: index-docker-io
      - name: registry-camunda-cloud
  restapi:
    initContainers:
      - name: wait-for-postgresql
        image: busybox:1.36
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        command:
          - sh
          - -c
          - |
            echo "Waiting for PostgreSQL at postgresql:5432 ..."
            until nc -z "postgresql" 5432; do
              sleep 2
            done
            echo "PostgreSQL is ready"
    mail:
      fromAddress: noreply@example.com
    resources:
      requests:
        cpu: 400m
        memory: 512Mi
      limits:
        memory: 1Gi
  websockets:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
