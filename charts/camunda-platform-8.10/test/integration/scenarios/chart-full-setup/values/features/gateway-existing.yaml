global:
  host: "$CAMUNDA_HOSTNAME"
  ingress:
    enabled: false
  gateway:
    enabled: true
    # Gateway pre-created in the same namespace by the pre-install fixture (gateway-prereq.yaml).
    # The chart must not create its own Gateway resource.
    createGatewayResource: false
    name: pre-existing-gateway
    className: nginx
    tls:
      enabled: true
      # Wildcard cert pre-provisioned per namespace by the matrix runner.
      secretName: camunda-platform
    annotations:
      external-dns.alpha.kubernetes.io/hostname: "{{ .Values.global.host }}"
      external-dns.alpha.kubernetes.io/ttl: "60"
