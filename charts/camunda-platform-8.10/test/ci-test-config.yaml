# Used in the GitHub Actions unit test CI workflow.
# auth can be the following values: basic, keycloak, oidc
unit:
  enabled: true
  matrix:
    - name: Management
      packages: identity common console
    - name: Orchestration
      packages: orchestration connectors optimize
    - name: Design
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
#
# Scenarios support two configuration approaches:
#
# 1. Legacy (scenario name parsing - still supported):
#    - name: elasticsearch        # Scenario name is parsed to derive settings
#    - name: keycloak-mt         # Multitenancy derived from "-mt" suffix
#    - name: opensearch-rba      # RBA feature derived from "-rba" suffix
#
# 2. Selection + Composition (new - preferred for clarity):
#    - name: my-test
#      identity: keycloak        # Explicit: keycloak, oidc, basic, hybrid
#      persistence: elasticsearch # Explicit: elasticsearch, opensearch, rdbms, rdbms-oracle
#      platform: gke             # Explicit: gke, eks, openshift
#      features: [multitenancy]  # Explicit: any filename (without .yaml) from test/integration/scenarios/chart-full-setup/values/features/
#      qa: true                  # Enable QA config
#      upgrade: false            # Enable upgrade flow config
#
# Both approaches work - the legacy format is automatically mapped to the new model.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  flows:
    upgrade-patch:
      pre-upgrade:
        script: pre-upgrade-patch.sh
        description: |
          Deletes orchestration StatefulSets and the postgresql-web-modeler
          StatefulSet + PVC before the patch upgrade. Required because the
          target chart's PostgreSQL spec has immutable diffs vs the prior
          patch (PSQL 15→14 rollback path) — Helm cannot reconcile in place.
  # Reusable companion-chart bundles. A scenario references these by name via
  # its `profiles:` list (resolved into `dependencies` + `pre-install` at load
  # time). This keeps the common Keycloak / Elasticsearch / OpenSearch /
  # PostgreSQL companion setup declared once instead of repeated per scenario.
  # Special scenarios (self-signed TLS, the rdbms 3-database bootstrap) keep
  # their companion charts or pre-install hooks inline.
  dependency-profiles:
    keycloak:
      dependencies:
        - chart: charts/internal-keycloak-26
          release-name: keycloak
          values-file: test/integration/companion-values/keycloak.yaml
    keycloak-qa:
      dependencies:
        - chart: charts/internal-keycloak-26
          release-name: keycloak
          values-file: test/integration/companion-values/keycloak-qa.yaml
    elasticsearch:
      dependencies:
        - chart: elastic/elasticsearch
          version: "8.5.1"
          release-name: elasticsearch
          repo-name: elastic
          repo-url: https://helm.elastic.co
          values-file: test/integration/companion-values/elasticsearch.yaml
    elasticsearch-qa:
      dependencies:
        - chart: elastic/elasticsearch
          version: "8.5.1"
          release-name: elasticsearch
          repo-name: elastic
          repo-url: https://helm.elastic.co
          values-file: test/integration/companion-values/elasticsearch-qa.yaml
    opensearch:
      dependencies:
        - chart: opensearch/opensearch
          version: "3.6.0"
          release-name: opensearch
          repo-name: opensearch
          repo-url: https://opensearch-project.github.io/helm-charts/
          values-file: test/integration/companion-values/opensearch.yaml
    postgresql:
      dependencies:
        - chart: charts/internal-postgresql
          release-name: postgresql
          values-file: test/integration/companion-values/postgresql.yaml
          env-vars: [RDBMS_POSTGRESQL_USERNAME, RDBMS_POSTGRESQL_PASSWORD]
    postgresql-qa:
      dependencies:
        - chart: charts/internal-postgresql
          release-name: postgresql
          values-file: test/integration/companion-values/postgresql-qa.yaml
          env-vars: [RDBMS_POSTGRESQL_USERNAME, RDBMS_POSTGRESQL_PASSWORD]
    # PostgreSQL companion variant that also creates the `app` database used by
    # the RDBMS secondary-storage exporter (alongside identity + webmodeler).
    postgresql-rdbms:
      dependencies:
        - chart: charts/internal-postgresql
          release-name: postgresql
          values-file: test/integration/companion-values/postgresql-rdbms.yaml
          env-vars: [RDBMS_POSTGRESQL_USERNAME, RDBMS_POSTGRESQL_PASSWORD]
    # PostgreSQL companion variant with self-signed TLS (ssl=on, CA in the
    # `postgresql-tls` secret) plus the `orchestration` database. Replaces the
    # CloudNativePG `postgresql-cluster-tls.yaml` fixture for rdbms-self-signed.
    postgresql-tls:
      dependencies:
        - chart: charts/internal-postgresql
          release-name: postgresql
          values-file: test/integration/companion-values/postgresql-tls.yaml
          env-vars: [RDBMS_POSTGRESQL_USERNAME, RDBMS_POSTGRESQL_PASSWORD]
    # CloudNativePG pre-install fixture. Kept available so a scenario can opt
    # back into the operator-managed cluster if needed, but intentionally
    # referenced by NO scenario: CNPG operator reconcile flakiness on the CI
    # cluster (#6338) is why scenarios now use the `postgresql` companion chart
    # instead. Re-adding `cnpg` to a scenario's `profiles:` reactivates it.
    cnpg:
      pre-install:
        fixtures:
          - postgresql-cluster.yaml
        description: |
          Provisions a CloudNativePG `Cluster` in the scenario namespace,
          bootstrapped with `identity` and `webmodeler` databases. Available
          for opt-in use; no scenario references it by default (see #6338).
  case:
    pr:
      # NOTE (5985): install-flow scenarios now use identity: keycloak with the
      # bundled internal-keycloak-26 companion chart (charts/internal-keycloak-26/).
      # This replaces the shared external Keycloak instance which was
      # architecturally unfit (realm bottleneck, no tenant isolation).
      # Upgrade-flow scenarios remain disabled pending PVC-backed PostgreSQL.
      scenario:
        - name: elasticsearch
          enabled: true
          flow: install
          auth: keycloak
          shortname: eske
          tier: 1
          exclude: []
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          profiles: [keycloak, elasticsearch, postgresql]
        - name: opensearch
          enabled: true
          auth: keycloak
          shortname: oske
          tier: 2
          exclude: []
          identity: keycloak
          persistence: opensearch-embedded
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          profiles: [keycloak, opensearch, postgresql]
        - name: opensearch-self-signed
          enabled: true
          shortname: osss
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-self-signed
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          profiles: [keycloak, postgresql]
          pre-install:
            script: pre-install-opensearch-self-signed.sh
            description: |
              Generates a self-signed CA plus node certificate via openssl
              and creates the opensearch-tls-certs, opensearch-tls-ca, and
              opensearch-jks Secrets consumed by the OpenSearch companion
              chart's TLS config. The Identity/WebModeler PostgreSQL database
              is provided by the `postgresql` companion profile.
          dependencies:
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch-tls.yaml
        - name: opensearch-self-signed-os-trust
          # B2 turns this on. Depends on A1 (#6032) being on main first
          # (carries the cert generator script
          # create-opensearch-tls-secrets.sh that the os-trust pre-install
          # wrapper exec's). If B2 lands before A1 the scenario will fail
          # in CI; keep B2 stacked on a base that includes A1, or merge A1 first.
          enabled: true
          shortname: osot
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-self-signed-os-trust
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          profiles: [postgresql]
          pre-install:
            script: pre-install-opensearch-self-signed-os-trust.sh
            description: |
              Generates a self-signed CA plus node certificate via openssl
              and creates the opensearch-tls-certs, opensearch-tls-ca, and
              opensearch-jks Secrets consumed by the OpenSearch companion
              chart's TLS config. Identical cert generation to the
              opensearch-self-signed scenario. The Identity/WebModeler
              PostgreSQL database is provided by the `postgresql` companion
              profile.
          dependencies:
            - chart: charts/internal-keycloak-26
              release-name: keycloak
              values-file: test/integration/companion-values/keycloak.yaml
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch-tls.yaml
        - name: upgrade-migration
          # upgrade migrators are only for 8.7 -> 8.8, not for 8.10
          enabled: false
          flow: upgrade-minor
          auth: keycloak
          shortname: eske-upgm
          exclude: []
          infra-type:
            gke: distroci
            eks: preemptible
        - name: elasticsearch-basic
          enabled: false
          shortname: esba
          auth: basic
          flow: install
          identity: basic
          persistence: elasticsearch
          exclude: [identity,console,orchestration-grpc]
          infra-type:
            gke: distroci
            eks: preemptible
          profiles: [elasticsearch]
        - name: oidc
          enabled: false
          exclude: [identity,console,orchestration-grpc]
          shortname: esoi
          auth: oidc
          flow: upgrade-minor
          skip-e2e: true  # OIDC auth incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          identity: oidc
          persistence: elasticsearch
          features: [postgresql-companion]
          platforms: [gke]
          profiles: [postgresql, elasticsearch]
        - name: auth0
          # Auth0 OIDC scenario. The matrix runner provisions per-component
          # first-party clients via the Management API at runtime
          # (auth0.IsAuth0Identity in scripts/deploy-camunda/matrix/runner.go).
          # Playwright runs the auth0-smoke project (sourced from
          # @camunda/e2e-test-suite/dist/tests/auth0) rather than the
          # Keycloak-coupled smoke-tests project — see
          # scripts/base_playwright_script.sh. Tenant prerequisites are
          # documented at the top of values/identity/auth0.yaml.
          enabled: true
          exclude: [identity,console,orchestration-grpc]
          shortname: esa0
          auth: oidc
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: auth0
          persistence: elasticsearch
          platforms: [gke]
          profiles: [elasticsearch, postgresql]
        - name: keycloak-mt
          enabled: false
          exclude: []
          shortname: kemt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
          profiles: [keycloak, elasticsearch, postgresql]
        - name: keycloak-rba
          enabled: false
          exclude: []
          shortname: kerba
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          platforms: [gke]
          profiles: [keycloak, elasticsearch, postgresql]
        - name: keycloak-original
          enabled: false
          exclude: []
          shortname: keyc
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          profiles: [keycloak, elasticsearch, postgresql]
        - name: keycloak-original
          enabled: true
          exclude: []
          shortname: keorg
          tier: 2
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          profiles: [keycloak, elasticsearch, postgresql]
        - name: gateway-keycloak
          enabled: true
          exclude: []
          shortname: gatkc
          tier: 2
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          features: [gateway]
          platforms: [gke]
          profiles: [keycloak, elasticsearch, postgresql]
          post-deploy:
            script: post-deploy-gateway-keycloak.sh
            description: |
              Applies the NGINX ProxySettingsPolicy that bumps gateway buffer
              sizes. Runs after helm install because the Gateway API CRD is only
              registered by the chart itself.
        - name: elasticsearch-arm
          enabled: true
          auth: keycloak
          shortname: esarm
          tier: 2
          exclude: []
          infra-type:
            gke: arm
          flow: install
          identity: keycloak
          persistence: elasticsearch
          features: [arm]
          platforms: [gke]
          profiles: [keycloak, elasticsearch, postgresql]
        - name: noSecondaryStorage
          enabled: true
          auth: keycloak
          shortname: nosec
          tier: 2
          exclude: []
          flow: install
          skip-e2e: true  # No Elasticsearch means no secondary storage for E2E tests
          skip-it: true   # Integration tests require Elasticsearch
          identity: keycloak
          persistence: no-elasticsearch
          features: [no-secondary-storage]
          platforms: [gke]
          infra-type:
            gke: distroci
          profiles: [keycloak, postgresql]
        - name: documentstore
          enabled: true
          exclude: []
          shortname: docstr
          tier: 2
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion, documentstore]
          platforms: [eks]
          infra-type:
            eks: preemptible
          profiles: [postgresql, keycloak, elasticsearch]
        - name: rdbms-self-signed
          enabled: true
          shortname: rdbss
          tier: 2
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: rdbms-self-signed
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          # PostgreSQL (incl. self-signed TLS + the `orchestration` database) is
          # provided by the `postgresql-tls` companion profile; the CA is
          # published in the `postgresql-tls` secret and consumed by Camunda for
          # `sslmode=verify-full` validation.
          profiles: [keycloak, elasticsearch, postgresql-tls]
        - name: rdbms-external
          enabled: false
          auth: keycloak
          shortname: rdbme
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms-external
          platforms: [gke]
          profiles: [keycloak, elasticsearch, postgresql]
        # rdbms: persistence layer points Camunda's RDBMS secondary storage at
        # the in-cluster `postgresql` service (database `app`) provided by the
        # `postgresql-rdbms` companion profile, which also creates the
        # `identity` and `webmodeler` databases. Replaces the former
        # CloudNativePG `postgresql-cluster.yaml` pre-install fixture.
        - name: rdbms
          enabled: true
          auth: keycloak
          shortname: rdbms
          tier: 2
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms
          platforms: [gke]
          profiles: [keycloak, elasticsearch, postgresql-rdbms]
        - name: hub-legacy
          enabled: true
          auth: keycloak
          shortname: huble
          tier: 2
          exclude: []
          flow: install
          identity: keycloak
          persistence: elasticsearch
          features: [hub-legacy]
          platforms: [gke]
          infra-type:
            gke: distroci
          profiles: [keycloak, elasticsearch, postgresql]
        - name: shadow-e2e
          enabled: true
          shortname: shde2
          tier: 2
          auth: keycloak
          flow: install
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          infra-type:
            gke: distroci
          skip-e2e: true  # Standard smoke tests skipped; full suite runs via c8e2e distributed runner
          profiles: [keycloak, elasticsearch, postgresql]
        - name: hub-legacy
          enabled: false
          auth: keycloak
          shortname: hublu
          exclude: []
          flow: upgrade-minor
          identity: keycloak
          persistence: elasticsearch
          features: [hub-legacy]
          platforms: [gke]
          infra-type:
            gke: distroci
            eks: preemptible
          profiles: [keycloak, elasticsearch, postgresql]
        - name: hub-mixed
          enabled: false
          auth: keycloak
          shortname: hubmu
          exclude: []
          flow: upgrade-minor
          identity: keycloak
          persistence: elasticsearch
          features: [hub-mixed]
          platforms: [gke]
          infra-type:
            gke: distroci
            eks: preemptible
          profiles: [keycloak, elasticsearch, postgresql]
        - name: hub-external-db
          enabled: true
          auth: keycloak
          shortname: hubdb
          tier: 2
          exclude: []
          flow: install
          identity: keycloak
          persistence: elasticsearch
          features: [hub-external-db]
          platforms: [gke]
          infra-type:
            gke: distroci
          # Identity uses the `postgresql` companion profile; the hub-external-db
          # feature overrides Web Modeler's restapi onto the standalone
          # `hub-external-postgresql` pod from the pre-install fixture below.
          profiles: [keycloak, elasticsearch, postgresql]
          pre-install:
            fixtures:
              - hub-external-postgresql.yaml
            description: |
              Provisions a standalone PostgreSQL pod for Web Modeler restapi to
              connect to via externalDatabase config. Identity's database is
              provided separately by the `postgresql` companion profile.
        # Used by camunda/connectors FEATURE_BRANCH_HELM_TEST workflow (main/8.10).
        - name: keycloak-original
          enabled: true
          flow: install
          shortname: keyco
          tier: 1
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          infra-type:
            gke: distroci
          profiles: [keycloak, elasticsearch, postgresql]
        # AlwaysGreen scenario — referenced by camunda/camunda's
        # docker-build-helm-integration.yml. Deploys onto dedicated alwaysgreen
        # GKE node pool (workload=alwaysgreen label + NoSchedule taint).
        - name: alwaysgreen
          enabled: false
          flow: install
          shortname: agrn
          auth: keycloak
          infra-type:
            gke: alwaysgreen
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          profiles: [keycloak, elasticsearch, postgresql]
        - name: qa-elasticsearch-upg
          enabled: false
          flow: install
          shortname: qaelupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, elasticsearch-qa]
        - name: qa-elasticsearch-upg
          enabled: false
          flow: modular-upgrade-minor
          shortname: qaelupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, elasticsearch-qa]
        - name: qa-elasticsearch
          enabled: false
          flow: install
          shortname: qael
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, elasticsearch-qa]
        - name: qa-opensearch
          enabled: false
          flow: install
          shortname: qaos
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          features: [postgresql-companion]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, opensearch]
        - name: qa-opensearch-upg
          enabled: false
          flow: install
          shortname: qaosupg
          prefix-key: qa-opensearch-upg
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          features: [postgresql-companion]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, opensearch]
        - name: qa-opensearch-upg
          enabled: false
          flow: modular-upgrade-minor
          shortname: qaosupg
          prefix-key: qa-opensearch-upg
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          features: [postgresql-companion]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, opensearch]
        - name: qa-elasticsearch-mt
          enabled: false
          flow: install
          shortname: qaelmt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion, multitenancy]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, elasticsearch-qa]
        - name: qa-elasticsearch-mt-upg
          enabled: false
          flow: install
          shortname: qaelmtupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion, multitenancy]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, elasticsearch-qa]
        - name: qa-elasticsearch-mt-upg
          enabled: false
          flow: modular-upgrade-minor
          shortname: qaelmtupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion, multitenancy]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, elasticsearch-qa]
        - name: qa-elasticsearch-rba
          enabled: false
          flow: install
          shortname: qaelrba
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion, rba]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, elasticsearch-qa]
        - name: qa-document-store
          enabled: false
          flow: install
          shortname: qadoc
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion, documentstore]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, elasticsearch-qa]
        - name: qa-document-store
          enabled: false
          flow: install
          shortname: qadoc
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion, documentstore]
          qa: true
          image-tags: true
          platforms: [eks]
          infra-type:
            eks: preemptible
          profiles: [postgresql, keycloak, elasticsearch]
        - name: qa-document-store-upg
          enabled: false
          flow: install
          shortname: qadocupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [postgresql-companion, documentstore]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          profiles: [postgresql-qa, keycloak-qa, elasticsearch-qa]
        - name: qa-document-store-upg
          enabled: false
          flow: install
          shortname: qadocupg
          auth: keycloak
          identity: keycloak
