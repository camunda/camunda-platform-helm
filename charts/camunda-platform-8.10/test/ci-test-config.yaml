# Used in the GitHub Actions unit test CI workflow.
# auth can be the following values: basic, keycloak, oidc
unit:
  enabled: true
  matrix:
    - name: Management
      packages: identity common console
    - name: Orchestration
      packages: orchestration connectors optimize
    - name: Design
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
# 
# Scenarios support two configuration approaches:
#
# 1. Legacy (scenario name parsing - still supported):
#    - name: elasticsearch        # Scenario name is parsed to derive settings
#    - name: keycloak-mt         # Multitenancy derived from "-mt" suffix
#    - name: opensearch-rba      # RBA feature derived from "-rba" suffix
#
# 2. Selection + Composition (new - preferred for clarity):
#    - name: my-test
#      identity: keycloak        # Explicit: keycloak, keycloak-external, oidc, basic, hybrid
#      persistence: elasticsearch # Explicit: elasticsearch, opensearch, rdbms, rdbms-oracle
#      platform: gke             # Explicit: gke, eks, openshift
#      features: [multitenancy]  # Explicit: multitenancy, rba, documentstore
#      qa: true                  # Enable QA config
#      upgrade: false            # Enable upgrade flow config
#
# Both approaches work - the legacy format is automatically mapped to the new model.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          flow: install
          auth: keycloak
          shortname: eske
          exclude: []
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch-external
          platforms: [gke]  # EKS removed: external ES connectivity issues cause Zeebe pods to never become ready on EKS
        - name: opensearch
          enabled: false
          auth: keycloak
          shortname: oske
          exclude: []
          identity: keycloak
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: upgrade-migration
          # upgrade migrators are only for 8.7 -> 8.8, not for 8.10
          enabled: false
          flow: upgrade-minor
          auth: keycloak
          shortname: eske-upgm
          exclude: []
          infra-type:
            gke: distroci
            eks: preemptible
        - name: elasticsearch-basic
          enabled: false
          shortname: esba
          auth: basic
          flow: install
          identity: basic
          persistence: elasticsearch
          exclude: [identity,console,orchestration-grpc]
          infra-type:
            gke: distroci
            eks: preemptible
        - name: oidc
          enabled: false
          exclude: [identity,console,orchestration-grpc]
          shortname: esoi
          auth: oidc
          flow: upgrade-minor
          skip-e2e: true  # OIDC auth incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          identity: oidc
          persistence: elasticsearch-external
          platforms: [gke]
        - name: keycloak-mt
          enabled: false
          exclude: []
          shortname: kemt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch-external
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-rba
          enabled: false
          exclude: []
          shortname: kerba
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch-external
          features: [rba]
          platforms: [gke]
        - name: keycloak-original
          enabled: false
          exclude: []
          shortname: keyc
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch-external
          platforms: [gke]
        - name: keycloak-original
          enabled: true
          exclude: []
          shortname: keorg
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch-external
          platforms: [gke]
        - name: gateway-keycloak
          enabled: true
          exclude: []
          shortname: gatkc
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch-external
          features: [gateway]
          platforms: [gke]
        - name: elasticsearch-arm
          enabled: true
          auth: keycloak
          shortname: esarm
          exclude: []
          infra-type:
            gke: arm
          flow: install
          identity: keycloak-external
          persistence: elasticsearch-external
          features: [arm]
          platforms: [gke]
        - name: noSecondaryStorage
          enabled: true
          auth: keycloak
          shortname: nosec
          exclude: []
          flow: install
          skip-e2e: true  # No Elasticsearch means no secondary storage for E2E tests
          skip-it: true   # Integration tests require Elasticsearch
          identity: keycloak
          persistence: no-elasticsearch
          features: [no-secondary-storage]
          platforms: [gke]
        - name: hub-legacy
          enabled: true
          auth: keycloak
          shortname: huble
          exclude: []
          flow: install
          identity: keycloak
          persistence: elasticsearch-external
          features: [hub-legacy]
          platforms: [gke]
          infra-type:
            gke: distroci
            eks: preemptible
        - name: hub-legacy
          enabled: false
          auth: keycloak
          shortname: hublu
          exclude: []
          flow: upgrade-minor
          identity: keycloak
          persistence: elasticsearch-external
          features: [hub-legacy]
          platforms: [gke]
          infra-type:
            gke: distroci
            eks: preemptible
        - name: hub-mixed
          enabled: false
          auth: keycloak
          shortname: hubmu
          exclude: []
          flow: upgrade-minor
          identity: keycloak
          persistence: elasticsearch-external
          features: [hub-mixed]
          platforms: [gke]
          infra-type:
            gke: distroci
            eks: preemptible
    nightly:
      scenario:
        - name: elasticsearch
          enabled: true
          exclude: []
          shortname: eskey
          auth: keycloak
          # The following integration tests need to be exluded when basic-auth is enabled.
        - name: elasticsearch-basic
          enabled: true
          auth: basic
          shortname: esba
          exclude: [identity,console,orchestration-grpc]
          # deployment should work but integration tests are not passing
        - name: elasticsearch-oidc
          enabled: false
          exclude: []
          shortname: esoi
          auth: oidc
        - name: multitenancy
          enabled: true
          shortname: mtke
          exclude: []
          auth: keycloak
          # not supported
        - name: opensearch
          enabled: false
          exclude: []
          shortname: oske
          auth: keycloak
        - name: opensearch
          enabled: true
          shortname: osba
          exclude: [identity,console,orchestration-grpc]
          auth: basic
        - name: identity-migration
          enabled: true
          exclude: []
          shortname: idmike
          auth: keycloak
        - name: elasticsearch
          enabled: true
          exclude: []
          auth: basic
          shortname: elbae
          enterprise: true
        - name: documentstore
          enabled: false
          exclude: []
          shortname: docstr
          auth: keycloak
        - name: keycloak-external-mimic
          enabled: true
          exclude: []
          shortname: kcextm
          auth: keycloak
