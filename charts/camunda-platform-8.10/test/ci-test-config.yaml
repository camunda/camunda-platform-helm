# Used in the GitHub Actions unit test CI workflow.
# auth can be the following values: basic, keycloak, oidc
unit:
  enabled: true
  matrix:
    - name: Management
      packages: identity common console
    - name: Orchestration
      packages: orchestration connectors optimize
    - name: Design
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
# 
# Scenarios support two configuration approaches:
#
# 1. Legacy (scenario name parsing - still supported):
#    - name: elasticsearch        # Scenario name is parsed to derive settings
#    - name: keycloak-mt         # Multitenancy derived from "-mt" suffix
#    - name: opensearch-rba      # RBA feature derived from "-rba" suffix
#
# 2. Selection + Composition (new - preferred for clarity):
#    - name: my-test
#      identity: keycloak        # Explicit: keycloak, keycloak-external, oidc, basic, hybrid
#      persistence: elasticsearch # Explicit: elasticsearch, opensearch, rdbms, rdbms-oracle
#      platform: gke             # Explicit: gke, eks, openshift
#      features: [multitenancy]  # Explicit: any filename (without .yaml) from test/integration/scenarios/chart-full-setup/values/features/
#      qa: true                  # Enable QA config
#      upgrade: false            # Enable upgrade flow config
#
# Both approaches work - the legacy format is automatically mapped to the new model.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  flows:
    upgrade-patch:
      pre-upgrade:
        script: pre-upgrade-patch.sh
        description: |
          Deletes orchestration StatefulSets and the postgresql-web-modeler
          StatefulSet + PVC before the patch upgrade. Required because the
          target chart's PostgreSQL spec has immutable diffs vs the prior
          patch (PSQL 15→14 rollback path) — Helm cannot reconcile in place.
  case:
    pr:
      # NOTE (5985): install-flow scenarios now use identity: keycloak with the
      # bundled internal-keycloak-26 companion chart (charts/internal-keycloak-26/).
      # This replaces the shared external Keycloak instance which was
      # architecturally unfit (realm bottleneck, no tenant isolation).
      # Upgrade-flow scenarios remain disabled pending PVC-backed PostgreSQL.
      scenario:
        - name: elasticsearch
          enabled: true
          flow: install
          auth: keycloak
          shortname: eske
          tier: 1
          exclude: []
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          pre-install:
            fixtures:
              - postgresql-cluster.yaml
            description: |
              Provisions a CloudNativePG `Cluster` in the scenario
              namespace, bootstrapped with `identity` and `webmodeler` databases. Required because Identity
              and WebModeler need external databases now that no
              bundled PostgreSQL subchart is deployed (8.10+).
          post-deploy:
            script: post-deploy-zeebe-aliases.sh
            description: |
              Creates zeebe-record-* aliases in Elasticsearch that Optimize
              needs to discover and import Zeebe data. The Zeebe ES exporter
              in 8.10 no longer creates these aliases automatically.
          dependencies:
            - chart: charts/internal-keycloak-26
              release-name: keycloak
              values-file: test/integration/companion-values/keycloak.yaml
            - chart: elastic/elasticsearch
              version: "8.5.1"
              release-name: elasticsearch
              repo-name: elastic
              repo-url: https://helm.elastic.co
              values-file: test/integration/companion-values/elasticsearch.yaml
        - name: opensearch
          enabled: true
          auth: keycloak
          shortname: oske
          tier: 2
          exclude: []
          identity: keycloak
          persistence: opensearch-embedded
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          pre-install:
            fixtures:
              - postgresql-cluster.yaml
            description: |
              Provisions a CloudNativePG `Cluster` in the scenario
              namespace, bootstrapped with `identity` and `webmodeler` databases. Required because Identity
              and WebModeler need external databases now that no
              bundled PostgreSQL subchart is deployed (8.10+).
          dependencies:
            - chart: charts/internal-keycloak-26
              release-name: keycloak
              values-file: test/integration/companion-values/keycloak.yaml
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: opensearch-self-signed
          enabled: true
          shortname: osss
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-self-signed
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          pre-install:
            script: pre-install-opensearch-self-signed.sh
            description: |
              Generates a self-signed CA plus node certificate via openssl
              and creates the opensearch-tls-certs, opensearch-tls-ca, and
              opensearch-jks Secrets consumed by the OpenSearch companion
              chart's TLS config.
          dependencies:
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch-tls.yaml
        - name: upgrade-migration
          # upgrade migrators are only for 8.7 -> 8.8, not for 8.10
          enabled: false
          flow: upgrade-minor
          auth: keycloak
          shortname: eske-upgm
          exclude: []
          infra-type:
            gke: distroci
            eks: preemptible
        - name: elasticsearch-basic
          enabled: false
          shortname: esba
          auth: basic
          flow: install
          identity: basic
          persistence: elasticsearch
          exclude: [identity,console,orchestration-grpc]
          infra-type:
            gke: distroci
            eks: preemptible
        - name: oidc
          enabled: false
          exclude: [identity,console,orchestration-grpc]
          shortname: esoi
          auth: oidc
          flow: upgrade-minor
          skip-e2e: true  # OIDC auth incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          identity: oidc
          persistence: elasticsearch
          platforms: [gke]
        - name: auth0
          # Auth0 OIDC scenario. The matrix runner provisions per-component
          # first-party clients via the Management API at runtime
          # (auth0.IsAuth0Identity in scripts/deploy-camunda/matrix/runner.go).
          # Playwright runs the auth0-smoke project (sourced from
          # @camunda/e2e-test-suite/dist/tests/auth0) rather than the
          # Keycloak-coupled smoke-tests project — see
          # scripts/base_playwright_script.sh. Tenant prerequisites are
          # documented at the top of values/identity/auth0.yaml.
          enabled: true
          exclude: [identity,console,orchestration-grpc]
          shortname: esa0
          auth: oidc
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: auth0
          persistence: elasticsearch
          platforms: [gke]
          pre-install:
            fixtures:
              - postgresql-cluster.yaml
            description: |
              Provisions a CloudNativePG `Cluster` in the scenario
              namespace, bootstrapped with `identity` and `webmodeler` databases. Required because Identity
              and WebModeler need external databases now that no
              bundled PostgreSQL subchart is deployed (8.10+).
          post-deploy:
            script: post-deploy-zeebe-aliases.sh
            description: |
              Creates zeebe-record-* aliases in Elasticsearch that Optimize
              needs to discover and import Zeebe data. The Zeebe ES exporter
              in 8.10 no longer creates these aliases automatically.
          dependencies:
            - chart: elastic/elasticsearch
              version: "8.5.1"
              release-name: elasticsearch
              repo-name: elastic
              repo-url: https://helm.elastic.co
              values-file: test/integration/companion-values/elasticsearch.yaml
        - name: keycloak-mt
          enabled: false
          exclude: []
          shortname: kemt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-rba
          enabled: false
          exclude: []
          shortname: kerba
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          platforms: [gke]
        - name: keycloak-original
          enabled: false
          exclude: []
          shortname: keyc
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: keycloak-original
          enabled: true
          exclude: []
          shortname: keorg
          tier: 2
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          pre-install:
            fixtures:
              - postgresql-cluster.yaml
            description: |
              Provisions a CloudNativePG `Cluster` in the scenario
              namespace, bootstrapped with `identity` and `webmodeler` databases. Required because Identity
