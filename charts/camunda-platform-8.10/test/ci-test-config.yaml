          enabled: true
          shortname: rdbss
          tier: 2
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: rdbms-self-signed
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          pre-install:
            script: pre-install-rdbms-self-signed.sh
            description: |
              Provisions a CloudNativePG `Cluster` in the scenario namespace
              with the `orchestration` database (RDBMS secondary storage),
              plus `identity` and `webmodeler` databases. CNPG generates a
              self-signed CA + server cert by default; the CA is exposed via
              the `postgresql-cluster-ca` secret and consumed by Camunda for
              `sslmode=verify-full` validation.
          dependencies:
            - chart: charts/internal-keycloak-26
              release-name: keycloak
              values-file: test/integration/companion-values/keycloak.yaml
        - name: rdbms-external
          enabled: false
          auth: keycloak
          shortname: rdbme
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms-external
          platforms: [gke]
        # rdbms: persistence layer points Camunda at an external PostgreSQL
        # cluster (postgresql-cluster-rw.<namespace>.svc.cluster.local). The
        # CloudNativePG `Cluster` + auth Secret are NOT part of the chart —
        # they're a CI-only fixture that must exist before helm install or
        # Camunda pods crash-loop connecting. Provisioned via the
        # `pre-install: fixtures: [postgresql-cluster.yaml]` declaration below;
        # the matrix runner applies it via Go server-side apply immediately
        # before `helm install` (replaces the legacy Taskfile `setup.pre`
        # rdbms branch).
        - name: rdbms
          enabled: true
          auth: keycloak
          shortname: rdbms
          tier: 2
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms
          platforms: [gke]
          pre-install:
            fixtures:
              - postgresql-cluster.yaml
            description: |
              Provisions a CloudNativePG `Cluster` plus auth Secret in the
              scenario namespace. The cluster bootstraps with three databases:
              `app` (RDBMS secondary storage backend) plus `identity` and
              `webmodeler` (Identity + WebModeler external databases needed
              when no bundled PostgreSQL is deployed).
          dependencies:
            - chart: charts/internal-keycloak-26
              release-name: keycloak
              values-file: test/integration/companion-values/keycloak.yaml
