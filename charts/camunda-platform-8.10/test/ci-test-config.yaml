# Used in the GitHub Actions unit test CI workflow.
# auth can be the following values: basic, keycloak, oidc
unit:
  enabled: true
  matrix:
    - name: Management
      packages: identity common console
    - name: Orchestration
      packages: orchestration connectors optimize
    - name: Design
      packages: web-modeler

# Used in the GitHub Actions integration test CI workflow.
# 
# Scenarios support two configuration approaches:
#
# 1. Legacy (scenario name parsing - still supported):
#    - name: elasticsearch        # Scenario name is parsed to derive settings
#    - name: keycloak-mt         # Multitenancy derived from "-mt" suffix
#    - name: opensearch-rba      # RBA feature derived from "-rba" suffix
#
# 2. Selection + Composition (new - preferred for clarity):
#    - name: my-test
#      identity: keycloak        # Explicit: keycloak, keycloak-external, oidc, basic, hybrid
#      persistence: elasticsearch # Explicit: elasticsearch, opensearch, rdbms, rdbms-oracle
#      platform: gke             # Explicit: gke, eks, openshift
#      features: [multitenancy]  # Explicit: multitenancy, rba, documentstore
#      qa: true                  # Enable QA config
#      upgrade: false            # Enable upgrade flow config
#
# Both approaches work - the legacy format is automatically mapped to the new model.
integration:
  vars:
    # Using the common test dir.
    tasksBaseDir: ../../../test/integration/scenarios
    valuesBaseDir: integration/scenarios
    chartsBaseDir: ../../../..
  flows:
    upgrade-patch:
      pre-upgrade:
        script: pre-upgrade-patch.sh
        description: |
          Deletes orchestration StatefulSets and the postgresql-web-modeler
          StatefulSet + PVC before the patch upgrade. Required because the
          target chart's PostgreSQL spec has immutable diffs vs the prior
          patch (PSQL 15→14 rollback path) — Helm cannot reconcile in place.
  case:
    pr:
      scenario:
        - name: elasticsearch
          enabled: true
          flow: install
          auth: keycloak
          shortname: eske
          tier: 1
          exclude: []
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]  # EKS removed: external ES connectivity issues cause Zeebe pods to never become ready on EKS
        - name: opensearch
          enabled: false  # Disabled: Bitnami OpenSearch subchart is unstable in CI; tracked in #6121
          auth: keycloak
          shortname: oske
          tier: 2
          exclude: []
          identity: keycloak
          persistence: opensearch
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: opensearch-external
          enabled: false  # Disabled: external AWS OpenSearch tests are unstable; tracked in #6119
          shortname: osex
          tier: 2
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-external
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
        - name: opensearch-embedded
          enabled: true
          shortname: osem
          tier: 2
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          dependencies:
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: upgrade-migration
          # upgrade migrators are only for 8.7 -> 8.8, not for 8.10
          enabled: false
          flow: upgrade-minor
          auth: keycloak
          shortname: eske-upgm
          exclude: []
          infra-type:
            gke: distroci
            eks: preemptible
        - name: elasticsearch-basic
          enabled: false
          shortname: esba
          auth: basic
          flow: install
          identity: basic
          persistence: elasticsearch
          exclude: [identity,console,orchestration-grpc]
          infra-type:
            gke: distroci
            eks: preemptible
        - name: oidc
          enabled: false
          exclude: [identity,console,orchestration-grpc]
          shortname: esoi
          auth: oidc
          flow: upgrade-minor
          skip-e2e: true  # OIDC auth incompatible with Keycloak-dependent smoke tests
          skip-it: true   # OIDC ITs require Entra setup that returns 401
          infra-type:
            gke: distroci
            eks: preemptible
          identity: oidc
          persistence: elasticsearch
          platforms: [gke]
        - name: keycloak-mt
          enabled: false
          exclude: []
          shortname: kemt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          platforms: [gke]
        - name: keycloak-rba
          enabled: false
          exclude: []
          shortname: kerba
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          features: [rba]
          platforms: [gke]
        - name: keycloak-original
          enabled: false
          exclude: []
          shortname: keyc
          auth: keycloak
          flow: upgrade-minor
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: keycloak-original
          enabled: true
          exclude: []
          shortname: keorg
          tier: 2
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: elasticsearch-self-signed
          enabled: false
          exclude: []
          shortname: esss
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: elasticsearch-self-signed
          platforms: [gke]
          pre-install:
            script: pre-install-elasticsearch-self-signed.sh
            description: |
              Generates a self-signed CA plus node certificate via openssl,
              packages them into JKS keystore + truststore via keytool, and
              creates the elasticsearch-tls-certs, elasticsearch-tls-passwords,
              and elasticsearch-jks Secrets consumed by the Elasticsearch
              StatefulSet's TLS config.
        - name: gateway-keycloak
          enabled: true
          exclude: []
          shortname: gatkc
          tier: 2
          auth: keycloak
          flow: install
          infra-type:
            gke: distroci
            eks: preemptible
          identity: keycloak
          persistence: elasticsearch
          features: [gateway]
          platforms: [gke]
          post-deploy:
            fixtures:
              - gateway-proxy-settings.yaml
            description: |
              Applies the NGINX ProxySettingsPolicy that bumps gateway buffer
              sizes so the Camunda Gateway can carry Keycloak auth headers
              without 502s. Runs after helm install because the Gateway API
              CRD is only registered by the chart itself.
        - name: elasticsearch-arm
          enabled: true
          auth: keycloak
          shortname: esarm
          tier: 2
          exclude: []
          skip-e2e: true  # The smoke tests in 8.10 don't support the external keycloak
          infra-type:
            gke: arm
          flow: install
          identity: keycloak-external
          persistence: elasticsearch-external
          features: [arm]
          platforms: [gke]
        - name: noSecondaryStorage
          enabled: true
          auth: keycloak
          shortname: nosec
          tier: 2
          exclude: []
          flow: install
          skip-e2e: true  # No Elasticsearch means no secondary storage for E2E tests
          skip-it: true   # Integration tests require Elasticsearch
          identity: keycloak
          persistence: no-elasticsearch
          features: [no-secondary-storage]
          platforms: [gke]
          infra-type:
            gke: distroci
        - name: documentstore
          enabled: true
          exclude: []
          shortname: docstr
          tier: 2
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [documentstore]
          platforms: [eks]
          infra-type:
            eks: preemptible
        - name: rdbms-self-signed
          enabled: true
          shortname: rdbss
          exclude: []
          auth: keycloak
          identity: keycloak
          persistence: rdbms-self-signed
          flow: install
          infra-type:
            gke: distroci
          platforms: [gke]
          dependencies:
            - chart: bitnami/postgresql
              version: "18.6.2"
              release-name: postgres-tls
              repo-name: bitnami
              repo-url: https://charts.bitnami.com/bitnami
              values-file: test/integration/companion-values/postgresql-tls.yaml
        - name: rdbms-external
          enabled: false
          auth: keycloak
          shortname: rdbme
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms-external
          platforms: [gke]
        # rdbms: persistence layer points Camunda at an external PostgreSQL
        # cluster (postgresql-cluster-rw.<namespace>.svc.cluster.local). The
        # CloudNativePG `Cluster` + auth Secret are NOT part of the chart —
        # they're a CI-only fixture that must exist before helm install or
        # Camunda pods crash-loop connecting. Provisioned via the
        # `pre-install: fixtures: [postgresql-cluster.yaml]` declaration below;
        # the matrix runner applies it via Go server-side apply immediately
        # before `helm install` (replaces the legacy Taskfile `setup.pre`
        # rdbms branch).
        - name: rdbms
          enabled: true
          auth: keycloak
          shortname: rdbms
          tier: 2
          flow: install
          exclude: []
          infra-type:
            gke: distroci
          identity: keycloak
          persistence: rdbms
          platforms: [gke]
          pre-install:
            fixtures:
              - postgresql-cluster.yaml
            description: |
              Provisions a CloudNativePG `Cluster` plus auth Secret in the
              scenario namespace. The CloudNativePG operator reconciles the
              Cluster into a running PostgreSQL instance reachable as
              postgresql-cluster-rw.<namespace>.svc.cluster.local — required
              before helm install or the Camunda OrchestrationCluster pods
              crash-loop trying to reach RDBMS.
        - name: hub-legacy
          enabled: true
          auth: keycloak
          shortname: huble
          tier: 2
          exclude: []
          flow: install
          identity: keycloak
          persistence: elasticsearch
          features: [hub-legacy]
          platforms: [gke]
          infra-type:
            gke: distroci
        - name: hub-legacy
          enabled: false
          auth: keycloak
          shortname: hublu
          exclude: []
          flow: upgrade-minor
          identity: keycloak
          persistence: elasticsearch-external
          features: [hub-legacy]
          platforms: [gke]
          infra-type:
            gke: distroci
            eks: preemptible
        - name: hub-mixed
          enabled: false
          auth: keycloak
          shortname: hubmu
          exclude: []
          flow: upgrade-minor
          identity: keycloak
          persistence: elasticsearch-external
          features: [hub-mixed]
          platforms: [gke]
          infra-type:
            gke: distroci
            eks: preemptible
        - name: keycloak-original
          enabled: true
          flow: install
          shortname: keyco
          tier: 1
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
          infra-type:
            gke: distroci
        # AlwaysGreen scenario — referenced by camunda/camunda's
        # docker-build-helm-integration.yml. Deploys onto dedicated alwaysgreen
        # GKE node pool (workload=alwaysgreen label + NoSchedule taint).
        - name: alwaysgreen
          enabled: false
          flow: install
          shortname: agrn
          auth: keycloak
          infra-type:
            gke: alwaysgreen
          identity: keycloak
          persistence: elasticsearch
          platforms: [gke]
        - name: qa-elasticsearch-upg
          enabled: false
          flow: install
          shortname: qaelupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
        - name: qa-elasticsearch-upg
          enabled: false
          flow: modular-upgrade-minor
          shortname: qaelupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
        - name: qa-elasticsearch
          enabled: false
          flow: install
          shortname: qael
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
        - name: qa-opensearch
          enabled: false
          flow: install
          shortname: qaos
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          dependencies:
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: qa-opensearch-upg
          enabled: false
          flow: install
          shortname: qaosupg
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          dependencies:
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: qa-opensearch-upg
          enabled: false
          flow: modular-upgrade-minor
          shortname: qaosupg
          auth: keycloak
          identity: keycloak
          persistence: opensearch-embedded
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
          dependencies:
            - chart: opensearch/opensearch
              version: "3.6.0"
              release-name: opensearch
              repo-name: opensearch
              repo-url: https://opensearch-project.github.io/helm-charts/
              values-file: test/integration/companion-values/opensearch.yaml
        - name: qa-elasticsearch-mt
          enabled: false
          flow: install
          shortname: qaelmt
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [multitenancy]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
        - name: qa-elasticsearch-mt-upg
          enabled: false
          flow: install
          shortname: qaelmtupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [multitenancy]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
        - name: qa-elasticsearch-mt-upg
          enabled: false
          flow: modular-upgrade-minor
          shortname: qaelmtupg
          auth: keycloak
          identity: keycloak
          persistence: elasticsearch
          features: [multitenancy]
          qa: true
          image-tags: true
          platforms: [gke]
          infra-type:
            gke: qa-workloads
        - name: qa-elasticsearch-rba
          enabled: false
