{{- if and .Values.optimize.enabled (not .Values.global.noSecondaryStorage) -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "optimize.fullname" . }}
  labels:
    {{- include "optimize.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.global.annotations}}
      {{- toYaml .Values.global.annotations | nindent 4 }}
    {{- end }}
    {{- if .Values.optimize.service.annotations}}
      {{- toYaml .Values.optimize.service.annotations | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.optimize.service.type }}
  ports:
    - port: {{ .Values.optimize.service.port }}
      name: http
      targetPort: 8090
      protocol: TCP
      {{- with include "camundaPlatform.appProtocol" (dict "portName" "http" "knownPorts" (list "http" "management") "appProtocols" .Values.optimize.service.appProtocols) }}
      appProtocol: {{ . }}
      {{- end }}
    - port: {{ .Values.optimize.service.managementPort }}
      name: management
      targetPort: 8092
      protocol: TCP
      {{- with include "camundaPlatform.appProtocol" (dict "portName" "management" "knownPorts" (list "http" "management") "appProtocols" .Values.optimize.service.appProtocols) }}
      appProtocol: {{ . }}
      {{- end }}
  selector:
    {{- include "optimize.matchLabels" . | nindent 4 }}
{{- end }}
