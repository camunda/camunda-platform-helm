{{- if and (eq (include "camundaHub.consoleEnabled" .) "true") .Values.console.serviceAccount.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "console.serviceAccountName" . }}
  labels:
    {{- include "console.labels" . | nindent 4 }}
  {{- with (or .Values.camundaHub.console.serviceAccount.annotations .Values.console.serviceAccount.annotations) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ (or .Values.camundaHub.console.serviceAccount.automountServiceAccountToken .Values.console.serviceAccount.automountServiceAccountToken) }}
{{- end }}
