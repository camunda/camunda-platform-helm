{{- if eq (include "camundaHub.consoleEnabled" .) "true" -}}
{{- if or .Values.camundaHub.console.serviceAccount.enabled .Values.console.serviceAccount.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "console.serviceAccountName" . }}
  labels:
    {{- include "common.tplvalues.merge-overwrite" (dict
      "values" (list
        (include "console.labels" .)
        .Values.console.serviceAccount.labels
      )
      "context" .
    ) | nindent 4 }}
  {{- with (or .Values.camundaHub.console.serviceAccount.annotations .Values.console.serviceAccount.annotations) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ (or
  .Values.camundaHub.console.serviceAccount.automountServiceAccountToken
  .Values.console.serviceAccount.automountServiceAccountToken
) }}
{{- end }}
{{- end }}
