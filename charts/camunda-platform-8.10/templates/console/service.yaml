{{- if eq (include "camundaHub.consoleEnabled" .) "true" -}}
{{- $consoleVals := include "camundaHub.consoleValues" . | fromYaml -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "console.fullname" . }}
  labels:
    {{- include "console.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.global.annotations}}
      {{- toYaml .Values.global.annotations | nindent 4 }}
    {{- end }}
    {{- if $consoleVals.service.annotations}}
      {{- toYaml $consoleVals.service.annotations | nindent 4 }}
    {{- end }}
spec:
  type: {{ $consoleVals.service.type }}
  ports:
    - port: {{ $consoleVals.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ $consoleVals.service.managementPort }}
      name: management
      targetPort: management
      protocol: TCP
  selector:
    {{- include "console.matchLabels" . | nindent 4 }}
{{- end }}
