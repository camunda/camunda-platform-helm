{{- if and (eq (include "camundaHub.webModelerEnabled" .) "true") .Values.webModeler.serviceAccount.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "webModeler.serviceAccountName" . }}
  labels: {{- include "webModeler.labels" . | nindent 4 }}
  {{- with (or .Values.camundaHub.webModeler.serviceAccount.annotations .Values.webModeler.serviceAccount.annotations) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ or .Values.camundaHub.webModeler.serviceAccount.automountServiceAccountToken .Values.webModeler.serviceAccount.automountServiceAccountToken }}
{{- end }}
