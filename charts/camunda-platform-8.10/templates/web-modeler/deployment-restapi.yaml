{{- if eq (include "camundaHub.webModelerEnabled" .) "true" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webModeler.restapi.fullname" . }}
  labels: {{- include "webModeler.restapi.labels" . | nindent 4 }}
  annotations: {{- toYaml .Values.global.annotations | nindent 4 }}
spec:
  strategy:
    type: RollingUpdate
  replicas: {{ (or .Values.camundaHub.webModeler.restapi.replicas .Values.webModeler.restapi.replicas) }}
  selector:
    matchLabels: {{- include "webModeler.restapi.matchLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "webModeler.restapi.labels" . | nindent 8 }}
      {{- if (or .Values.camundaHub.webModeler.restapi.podLabels .Values.webModeler.restapi.podLabels) }}
      {{- tpl (toYaml (or .Values.camundaHub.webModeler.restapi.podLabels .Values.webModeler.restapi.podLabels)) $ | nindent 8 }}
      {{- end }}
      {{- if (or .Values.camundaHub.webModeler.restapi.podAnnotations .Values.webModeler.restapi.podAnnotations) }}
      annotations:
        {{- tpl (toYaml (or .Values.camundaHub.webModeler.restapi.podAnnotations .Values.webModeler.restapi.podAnnotations)) $ | nindent 8 }}
      {{- end }}
    spec:
      imagePullSecrets:
        {{- include "webModeler.imagePullSecrets" . | nindent 8 }}
      initContainers:
        {{- if eq (include "camundaPlatform.hasCaBundle" .) "true" }}
        {{- include "camundaPlatform.caBundleInitContainer" . | nindent 8 }}
        {{- end }}
        {{- with (or .Values.camundaHub.webModeler.restapi.initContainers .Values.webModeler.restapi.initContainers) }}
        {{- tpl (toYaml . | nindent 8) $ }}
        {{- end }}
      containers:
        - name: {{ include "webModeler.name" . }}-restapi
          image: {{ include "webModeler.restapi.image" . | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          {{- if (or .Values.camundaHub.webModeler.restapi.containerSecurityContext .Values.webModeler.restapi.containerSecurityContext) }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" (or .Values.camundaHub.webModeler.restapi.containerSecurityContext .Values.webModeler.restapi.containerSecurityContext) "context" $) | nindent 12 }}
          {{- end }}
          env:
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "CAMUNDA_LICENSE_KEY"
                "config" .Values.global.license
            ) | nindent 12 }}
            - name: JAVA_OPTIONS
              value: {{ (or .Values.camundaHub.webModeler.restapi.javaOpts .Values.webModeler.restapi.javaOpts) | default "-XX:MaxRAMPercentage=80.0" | quote }}
            {{- if not .Values.webModelerPostgresql.enabled }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "SPRING_DATASOURCE_PASSWORD"
                "config" (or .Values.camundaHub.webModeler.restapi.externalDatabase .Values.webModeler.restapi.externalDatabase)
            ) | nindent 12 }}
            {{- else }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.webModelerPostgresql.auth.existingSecret }}
                  key: {{ .Values.webModelerPostgresql.auth.secretKeys.userPasswordKey }}
            {{- end }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "RESTAPI_MAIL_PASSWORD"
                "config" (or .Values.camundaHub.webModeler.restapi.mail .Values.webModeler.restapi.mail)
            ) | nindent 12 }}
            - name: RESTAPI_PUSHER_APP_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "webModeler.fullname" . }}-configuration
                  key: pusher-app-id
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "RESTAPI_PUSHER_KEY"
                "config" (or .Values.camundaHub.webModeler.restapi.pusher.client .Values.webModeler.restapi.pusher.client)
                "defaultSecretName" (include "webModeler.fullname" .)
                "defaultSecretKey" "pusher-app-key"
            ) | nindent 12 }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "RESTAPI_PUSHER_SECRET"
                "config" (or .Values.camundaHub.webModeler.restapi.pusher .Values.webModeler.restapi.pusher)
                "defaultSecretName" (include "webModeler.fullname" .)
                "defaultSecretKey" "pusher-app-secret"
            ) | nindent 12 }}
            - name: ZEEBE_CLIENT_CONFIG_PATH
              value: {{ (or .Values.camundaHub.webModeler.restapi.zeebeClientConfigPath .Values.webModeler.restapi.zeebeClientConfigPath) | default "/tmp/zeebe_client_cache.txt" | quote }}
            {{- if and .Values.global.documentStore.type.aws.enabled (not .Values.global.documentStore.type.aws.irsa.enabled) }}
            - name: AWS_ACCESS_KEY_ID
              {{- include "camundaPlatform.emitAwsDocumentStoreSecret" (dict
                  "secretType" "accessKeyId"
                  "context" .
              ) | nindent 14 }}
            - name: AWS_SECRET_ACCESS_KEY
              {{- include "camundaPlatform.emitAwsDocumentStoreSecret" (dict
                  "secretType" "secretAccessKey"
                  "context" .
              ) | nindent 14 }}
            {{- end }}
            {{- if eq (lower .Values.global.documentStore.activeStoreId) "gcp" }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ printf "%s/%s" .Values.global.documentStore.type.gcp.mountPath .Values.global.documentStore.type.gcp.fileName | quote }}
            {{- end }}
          {{- if eq (include "camundaPlatform.hasCaBundle" .) "true" }}
            {{- include "camundaPlatform.caBundleEnv" . | nindent 12 }}
            {{- include "camundaPlatform.caBundleJavaToolOptionsEnv" . | nindent 12 }}
          {{- end }}
          {{- with (or .Values.camundaHub.webModeler.restapi.env .Values.webModeler.restapi.env) }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "camundaPlatform.fullname" . }}-documentstore-env-vars
          {{- if (or .Values.camundaHub.webModeler.restapi.envFrom .Values.webModeler.restapi.envFrom) }}
            {{- (or .Values.camundaHub.webModeler.restapi.envFrom .Values.webModeler.restapi.envFrom) | toYaml | nindent 12 }}
          {{- end }}
          {{- if (or .Values.camundaHub.webModeler.restapi.command .Values.webModeler.restapi.command) }}
          command: {{ toYaml (or .Values.camundaHub.webModeler.restapi.command .Values.webModeler.restapi.command) | nindent 10 }}
          {{- end }}
          resources:
            {{- toYaml (or .Values.camundaHub.webModeler.restapi.resources .Values.webModeler.restapi.resources) | nindent 12 }}
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
            - containerPort: 8091
              name: http-management
              protocol: TCP
          {{- if (or .Values.camundaHub.webModeler.restapi.startupProbe.enabled .Values.webModeler.restapi.startupProbe.enabled) }}
          startupProbe:
            httpGet:
              path: {{ include "camundaPlatform.joinpath" (list (or .Values.camundaHub.webModeler.contextPath .Values.webModeler.contextPath) (or .Values.camundaHub.webModeler.restapi.startupProbe.probePath .Values.webModeler.restapi.startupProbe.probePath)) }}
              scheme: {{ (or .Values.camundaHub.webModeler.restapi.startupProbe.scheme .Values.webModeler.restapi.startupProbe.scheme) }}
              port: http-management
            initialDelaySeconds: {{ (or .Values.camundaHub.webModeler.restapi.startupProbe.initialDelaySeconds .Values.webModeler.restapi.startupProbe.initialDelaySeconds) }}
            periodSeconds: {{ (or .Values.camundaHub.webModeler.restapi.startupProbe.periodSeconds .Values.webModeler.restapi.startupProbe.periodSeconds) }}
            successThreshold: {{ (or .Values.camundaHub.webModeler.restapi.startupProbe.successThreshold .Values.webModeler.restapi.startupProbe.successThreshold) }}
            failureThreshold: {{ (or .Values.camundaHub.webModeler.restapi.startupProbe.failureThreshold .Values.webModeler.restapi.startupProbe.failureThreshold) }}
            timeoutSeconds: {{ (or .Values.camundaHub.webModeler.restapi.startupProbe.timeoutSeconds .Values.webModeler.restapi.startupProbe.timeoutSeconds) }}
          {{- end }}
          {{- if (or .Values.camundaHub.webModeler.restapi.readinessProbe.enabled .Values.webModeler.restapi.readinessProbe.enabled) }}
          readinessProbe:
            httpGet:
              path: {{ include "camundaPlatform.joinpath" (list (or .Values.camundaHub.webModeler.contextPath .Values.webModeler.contextPath) (or .Values.camundaHub.webModeler.restapi.readinessProbe.probePath .Values.webModeler.restapi.readinessProbe.probePath)) }}
              scheme: {{ (or .Values.camundaHub.webModeler.restapi.readinessProbe.scheme .Values.webModeler.restapi.readinessProbe.scheme) }}
              port: http-management
            initialDelaySeconds: {{ (or .Values.camundaHub.webModeler.restapi.readinessProbe.initialDelaySeconds .Values.webModeler.restapi.readinessProbe.initialDelaySeconds) }}
            periodSeconds: {{ (or .Values.camundaHub.webModeler.restapi.readinessProbe.periodSeconds .Values.webModeler.restapi.readinessProbe.periodSeconds) }}
            successThreshold: {{ (or .Values.camundaHub.webModeler.restapi.readinessProbe.successThreshold .Values.webModeler.restapi.readinessProbe.successThreshold) }}
            failureThreshold: {{ (or .Values.camundaHub.webModeler.restapi.readinessProbe.failureThreshold .Values.webModeler.restapi.readinessProbe.failureThreshold) }}
            timeoutSeconds: {{ (or .Values.camundaHub.webModeler.restapi.readinessProbe.timeoutSeconds .Values.webModeler.restapi.readinessProbe.timeoutSeconds) }}
          {{- end }}
          {{- if (or .Values.camundaHub.webModeler.restapi.livenessProbe.enabled .Values.webModeler.restapi.livenessProbe.enabled) }}
          livenessProbe:
            httpGet:
              path: {{ include "camundaPlatform.joinpath" (list (or .Values.camundaHub.webModeler.contextPath .Values.webModeler.contextPath) (or .Values.camundaHub.webModeler.restapi.livenessProbe.probePath .Values.webModeler.restapi.livenessProbe.probePath)) }}
              scheme: {{ (or .Values.camundaHub.webModeler.restapi.livenessProbe.scheme .Values.webModeler.restapi.livenessProbe.scheme) }}
              port: http-management
            initialDelaySeconds: {{ (or .Values.camundaHub.webModeler.restapi.livenessProbe.initialDelaySeconds .Values.webModeler.restapi.livenessProbe.initialDelaySeconds) }}
            periodSeconds: {{ (or .Values.camundaHub.webModeler.restapi.livenessProbe.periodSeconds .Values.webModeler.restapi.livenessProbe.periodSeconds) }}
            successThreshold: {{ (or .Values.camundaHub.webModeler.restapi.livenessProbe.successThreshold .Values.webModeler.restapi.livenessProbe.successThreshold) }}
            failureThreshold: {{ (or .Values.camundaHub.webModeler.restapi.livenessProbe.failureThreshold .Values.webModeler.restapi.livenessProbe.failureThreshold) }}
            timeoutSeconds: {{ (or .Values.camundaHub.webModeler.restapi.livenessProbe.timeoutSeconds .Values.webModeler.restapi.livenessProbe.timeoutSeconds) }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /home/runner/config/application.yaml
              subPath: application.yaml
          {{- with (or .Values.camundaHub.webModeler.restapi.extraConfiguration .Values.webModeler.restapi.extraConfiguration) }}
          {{- include "camundaPlatform.extraConfigurationVolumeMounts" (dict "extraConfig" . "volumeName" "config" "basePath" "/home/runner/config") | trim | nindent 12 }}
          {{- end }}
            {{- if .Values.global.documentStore.type.gcp.enabled }}
            - name: gcp-credentials-volume
              mountPath: {{ .Values.global.documentStore.type.gcp.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if eq (include "camundaPlatform.hasCaBundle" .) "true" }}
            {{- include "camundaPlatform.caBundleVolumeMount" . | nindent 12 }}
            {{- include "camundaPlatform.caBundleTruststoreVolumeMount" . | nindent 12 }}
            {{- end }}
            {{- if (or .Values.camundaHub.webModeler.restapi.extraVolumeMounts .Values.webModeler.restapi.extraVolumeMounts) }}
            {{- (or .Values.camundaHub.webModeler.restapi.extraVolumeMounts .Values.webModeler.restapi.extraVolumeMounts) | toYaml | nindent 12 }}
            {{- end }}
        {{- if (or .Values.camundaHub.webModeler.restapi.sidecars .Values.webModeler.restapi.sidecars) }}
        {{- (or .Values.camundaHub.webModeler.restapi.sidecars .Values.webModeler.restapi.sidecars) | toYaml | nindent 8 }}
        {{- end }}
      volumes:
        - name: tmp
          {{- if and (or .Values.camundaHub.webModeler.persistence.enabled .Values.webModeler.persistence.enabled) (or .Values.camundaHub.webModeler.persistence.existingClaim .Values.webModeler.persistence.existingClaim) }}
          persistentVolumeClaim:
            claimName: {{ (or .Values.camundaHub.webModeler.persistence.existingClaim .Values.webModeler.persistence.existingClaim) }}
          {{- else if (or .Values.camundaHub.webModeler.persistence.enabled .Values.webModeler.persistence.enabled) }}
          persistentVolumeClaim:
            claimName: {{ include "camundaPlatform.fullname" . }}-webModeler-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "webModeler.fullname" . }}-restapi-configuration
        {{- if .Values.global.documentStore.type.gcp.enabled }}
        {{- include "camundaPlatform.emitVolumeFromSecretConfig" (dict
            "volumeName" "gcp-credentials-volume"
            "config" .Values.global.documentStore.type.gcp
            "fileName" .Values.global.documentStore.type.gcp.fileName
        ) | nindent 8 }}
        {{- end }}
        {{- if eq (include "camundaPlatform.hasCaBundle" .) "true" }}
        {{- include "camundaPlatform.caBundleVolume" . | nindent 8 }}
        {{- include "camundaPlatform.caBundleTruststoreVolume" . | nindent 8 }}
        {{- end }}
        {{- if (or .Values.camundaHub.webModeler.restapi.extraVolumes .Values.webModeler.restapi.extraVolumes) }}
        {{- (or .Values.camundaHub.webModeler.restapi.extraVolumes .Values.webModeler.restapi.extraVolumes) | toYaml | nindent 8 }}
        {{- end }}
      serviceAccountName: {{ include "webModeler.serviceAccountName" . }}
      {{- if (or .Values.camundaHub.webModeler.restapi.dnsConfig .Values.webModeler.restapi.dnsConfig) }}
      dnsConfig: {{- toYaml (or .Values.camundaHub.webModeler.restapi.dnsConfig .Values.webModeler.restapi.dnsConfig) | nindent 8 }}
      {{- end }}
      {{- if (or .Values.camundaHub.webModeler.restapi.dnsPolicy .Values.webModeler.restapi.dnsPolicy) }}
      dnsPolicy: {{ (or .Values.camundaHub.webModeler.restapi.dnsPolicy .Values.webModeler.restapi.dnsPolicy) | quote }}
      {{- end }}
      {{- if (or .Values.camundaHub.webModeler.restapi.podSecurityContext .Values.webModeler.restapi.podSecurityContext) }}
      securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" (or .Values.camundaHub.webModeler.restapi.podSecurityContext .Values.webModeler.restapi.podSecurityContext) "context" $) | nindent 8 }}
      {{- end }}
      {{- with (or .Values.camundaHub.webModeler.restapi.nodeSelector .Values.webModeler.restapi.nodeSelector) | default .Values.global.nodeSelector }}
      nodeSelector:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with (or .Values.camundaHub.webModeler.restapi.affinity .Values.webModeler.restapi.affinity) }}
      affinity:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with (or .Values.camundaHub.webModeler.restapi.tolerations .Values.webModeler.restapi.tolerations) }}
      tolerations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
