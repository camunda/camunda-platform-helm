{{- if eq (include "camundaHub.webModelerEnabled" .) "true" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webModeler.websockets.fullname" . }}
  labels:
    {{- include "webModeler.websockets.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.global.annotations}}
      {{- toYaml .Values.global.annotations | nindent 4 }}
    {{- end }}
    {{- if (dig "webModeler" "websockets" "service" "annotations" .Values.webModeler.websockets.service.annotations .Values.camundaHub)}}
      {{- toYaml (dig "webModeler" "websockets" "service" "annotations" .Values.webModeler.websockets.service.annotations .Values.camundaHub) | nindent 4 }}
    {{- end }}
spec:
  type: {{ (dig "webModeler" "websockets" "service" "type" .Values.webModeler.websockets.service.type .Values.camundaHub) }}
  ports:
    - port: {{ (dig "webModeler" "websockets" "service" "port" .Values.webModeler.websockets.service.port .Values.camundaHub) }}
      name: http
      targetPort: 8060
      protocol: TCP
  selector:
    {{- include "webModeler.websockets.matchLabels" . | nindent 4 }}
{{- end }}
