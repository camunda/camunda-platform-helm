{{- if and (eq (include "camundaHub.webModelerEnabled" .) "true") (or .Values.camundaHub.webModeler.persistence.enabled .Values.webModeler.persistence.enabled) (not (or .Values.camundaHub.webModeler.persistence.existingClaim .Values.webModeler.persistence.existingClaim)) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "camundaPlatform.fullname" . }}-webmodeler-data
  labels: {{- include "camundaPlatform.labels" . | nindent 4 }}
  {{- with (or .Values.camundaHub.webModeler.persistence.annotations .Values.webModeler.persistence.annotations) }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes: {{ (or .Values.camundaHub.webModeler.persistence.accessModes .Values.webModeler.persistence.accessModes) | default (list "ReadWriteOnce") | toYaml | nindent 4 }}
  {{- with (or .Values.camundaHub.webModeler.persistence.storageClassName .Values.webModeler.persistence.storageClassName) }}
  storageClassName: {{ . | quote }}
  {{- end }}
  {{- with (or .Values.camundaHub.webModeler.persistence.selector .Values.webModeler.persistence.selector) }}
  selector: {{- toYaml . | nindent 4 }}
  {{- end }}
  resources:
    requests:
      storage: {{ (or .Values.camundaHub.webModeler.persistence.size .Values.webModeler.persistence.size) | default "1Gi" | quote }}
{{- end }}
