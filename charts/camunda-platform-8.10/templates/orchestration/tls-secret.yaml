{{- if .Values.orchestration.enabled -}}
{{- range $proto := (list "rest" "grpc") }}
{{- $tls := index $.Values.global.tls.orchestration $proto }}
{{- $isPem := or (eq $proto "grpc") (eq ($tls.type | default "pkcs12") "pem") }}
{{- $data := dict }}
{{- if and $tls.cert.secret.inlineSecret $isPem }}
{{- $_ := set $data "tls.crt" ($tls.cert.secret.inlineSecret | b64enc) }}
{{- end }}
{{- if $tls.privateKey.secret.inlineSecret }}
{{- $_ := set $data "tls.key" ($tls.privateKey.secret.inlineSecret | b64enc) }}
{{- end }}
{{- if and (eq $proto "rest") $tls.keystorePassword.secret.inlineSecret }}
{{- $_ := set $data "keystore-password" ($tls.keystorePassword.secret.inlineSecret | b64enc) }}
{{- end }}
{{- if $data }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "camundaPlatform.orchestrationTLSGeneratedSecretName" (dict "context" $ "proto" $proto) }}
  labels:
    {{- include "orchestration.labels" $ | nindent 4 }}
  annotations:
    {{- toYaml $.Values.global.annotations | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := $data }}
  {{ $key }}: {{ $value }}
  {{- end }}
{{- end }}
{{- if $tls.proxyVerify.caSecret.secret.inlineSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-tls-%s-ca" (include "orchestration.fullname" $) $proto }}
  labels:
    {{- include "orchestration.labels" $ | nindent 4 }}
  annotations:
    {{- toYaml $.Values.global.annotations | nindent 4 }}
type: Opaque
data:
  ca.crt: {{ $tls.proxyVerify.caSecret.secret.inlineSecret | b64enc }}
{{- end }}
{{- end }}
{{- end -}}
