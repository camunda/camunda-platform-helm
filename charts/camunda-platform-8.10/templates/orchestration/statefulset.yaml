{{- if .Values.orchestration.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "orchestration.fullname" . }}
  labels:
    {{- include "orchestration.labels" . | nindent 4 }}
  annotations:
    {{- range $key, $value := .Values.global.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  replicas: {{ div .Values.orchestration.clusterSize .Values.global.multiregion.regions }}
  selector:
    matchLabels:
      {{- include "orchestration.matchLabels" . | nindent 6 }}
  serviceName: {{ include "orchestration.serviceNameHeadless" . | quote }}
  updateStrategy:
    type: RollingUpdate
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        {{- include "orchestration.labels" . | nindent 8 }}
        {{- if .Values.orchestration.podLabels }}
        {{- tpl (toYaml .Values.orchestration.podLabels) $ | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/orchestration/configmap.yaml") . | sha256sum }}
        {{- with (include "camundaPlatform.caBundleChecksumAnnotation" .) }}{{ . | nindent 8 }}{{- end }}
        {{- with (include "camundaPlatform.orchestrationTLSChecksumAnnotations" .) }}{{ . | nindent 8 }}{{- end }}
        {{- if .Values.orchestration.podAnnotations }}
        {{- tpl (toYaml .Values.orchestration.podAnnotations) $ | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.orchestration.priorityClassName }}
      priorityClassName: {{ .Values.orchestration.priorityClassName | quote }}
      {{- end }}
      imagePullSecrets:
        {{- include "orchestration.imagePullSecrets" . | nindent 8 }}
      initContainers:
        {{- if eq (include "camundaPlatform.hasCaBundle" .) "true" }}
        {{- include "camundaPlatform.caBundleInitContainer" (dict "context" $ "image" (include "camundaPlatform.imageByParams" (dict "base" $.Values.global "overlay" $.Values.orchestration))) | nindent 8 }}
        {{- end }}
        {{- with (coalesce .Values.orchestration.initContainers .Values.orchestration.extraInitContainers) }}
        {{- tpl (toYaml . | nindent 8) $ }}
        {{- end }}
      containers:
        - name: orchestration
          image: {{ include "camundaPlatform.imageByParams" (dict "base" .Values.global "overlay" .Values.orchestration) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          {{- if .Values.orchestration.containerSecurityContext }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" $.Values.orchestration.containerSecurityContext "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.orchestration.command }}
          command: {{ toYaml .Values.orchestration.command | nindent 10 }}
          {{- else }}
          command: ["bash", "/usr/local/bin/startup.sh"]
          {{- end }}
          env:
            - name: LC_ALL
              value: C.UTF-8
            - name: K8S_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_SERVICE_NAME
              value: {{ include "orchestration.serviceNameHeadless" . | quote }}
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "VALUES_ORCHESTRATION_LICENSE_KEY"
                "config" .Values.global.license
            ) | nindent 12 }}
            {{- if eq (include "orchestration.authMethod" .) "oidc" }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "VALUES_ORCHESTRATION_CLIENT_SECRET"
                "config" .Values.orchestration.security.authentication.oidc
            ) | nindent 12 }}
            {{- end }}
            {{- if or
              (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.global.elasticsearch.tls)) "true")
              (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.global.opensearch.tls)) "true")
              (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.orchestration.data.secondaryStorage.elasticsearch.tls)) "true")
              (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.orchestration.data.secondaryStorage.opensearch.tls)) "true")
            }}
            {{- include "common.java_tool_options_tls_env" (dict "Values" .Values "component" "orchestration") | nindent 12 }}
            {{- else if eq (include "camundaPlatform.hasCaBundle" .) "true" }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ printf "%s %s" .Values.orchestration.javaOpts (include "camundaPlatform.caBundleJavaOpts" .) | trim | quote }}
            {{- else }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.orchestration.javaOpts | quote }}
            {{- end }}
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if eq (include "camundaPlatform.hasCaBundle" .) "true" }}
            {{- include "camundaPlatform.caBundleEnv" . | nindent 12 }}
            {{- end }}
            {{- if .Values.global.tls.orchestration.rest.enabled }}
            {{- $restCertRef := include "camundaPlatform.orchestrationTLSCertRef" (dict "context" . "proto" "rest") | fromYaml }}
            {{- $restKeyRef := include "camundaPlatform.orchestrationTLSPrivateKeyRef" (dict "context" . "proto" "rest") | fromYaml }}
            {{- $restKsPwRef := include "camundaPlatform.orchestrationTLSKeystorePasswordRef" (dict "context" .) | fromYaml }}
            - name: SERVER_SSL_ENABLED
              value: "true"
            {{- if $restCertRef.name }}
            {{- if eq (.Values.global.tls.orchestration.rest.type | default "pkcs12") "pem" }}
            - name: SERVER_SSL_CERTIFICATE
              value: /usr/local/camunda/certificates/orchestration/rest/{{ $restCertRef.key }}
            - name: SERVER_SSL_CERTIFICATE_PRIVATE_KEY
            {{- if eq $restKeyRef.name $restCertRef.name }}
              value: /usr/local/camunda/certificates/orchestration/rest/{{ $restKeyRef.key }}
            {{- else }}
              value: /usr/local/camunda/certificates/orchestration/rest/key/{{ $restKeyRef.key }}
            {{- end }}
            {{- else }}
            - name: SERVER_SSL_KEY_STORE
              value: file:/usr/local/camunda/certificates/orchestration/rest/{{ $restCertRef.key }}
            - name: SERVER_SSL_KEY_STORE_TYPE
              value: PKCS12
            - name: SERVER_SSL_KEY_STORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $restKsPwRef.name }}
                  key: {{ $restKsPwRef.key }}
            {{- with .Values.global.tls.orchestration.rest.keyAlias }}
            - name: SERVER_SSL_KEY_ALIAS
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.global.tls.orchestration.grpc.enabled }}
            {{- $grpcCertRef := include "camundaPlatform.orchestrationTLSCertRef" (dict "context" . "proto" "grpc") | fromYaml }}
            {{- $grpcKeyRef := include "camundaPlatform.orchestrationTLSPrivateKeyRef" (dict "context" . "proto" "grpc") | fromYaml }}
            - name: CAMUNDA_API_GRPC_SSL_ENABLED
              value: "true"
            {{- if $grpcCertRef.name }}
            - name: CAMUNDA_API_GRPC_SSL_CERTIFICATE
              value: /usr/local/camunda/certificates/orchestration/grpc/{{ $grpcCertRef.key }}
            - name: CAMUNDA_API_GRPC_SSL_CERTIFICATEPRIVATEKEY
            {{- if eq $grpcKeyRef.name $grpcCertRef.name }}
              value: /usr/local/camunda/certificates/orchestration/grpc/{{ $grpcKeyRef.key }}
            {{- else }}
              value: /usr/local/camunda/certificates/orchestration/grpc/key/{{ $grpcKeyRef.key }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- with .Values.orchestration.env }}
              {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
            {{- if and .Values.global.documentStore.type.aws.enabled (not .Values.global.documentStore.type.aws.irsa.enabled) }}
            - name: AWS_ACCESS_KEY_ID
              {{- include "camundaPlatform.emitAwsDocumentStoreSecret" (dict
                  "secretType" "accessKeyId"
                  "context" .
              ) | nindent 14 }}
            - name: AWS_SECRET_ACCESS_KEY
              {{- include "camundaPlatform.emitAwsDocumentStoreSecret" (dict
                  "secretType" "secretAccessKey"
                  "context" .
              ) | nindent 14 }}
            {{- end }}
            {{- if eq (lower .Values.global.documentStore.activeStoreId) "gcp" }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ printf "%s/%s" .Values.global.documentStore.type.gcp.mountPath .Values.global.documentStore.type.gcp.fileName | quote }}
            {{- end }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "VALUES_DOCUMENT_STORE_AZURE_CONNECTION_STRING"
                "config" .Values.global.documentStore.type.azure.connectionString
            ) | nindent 12 }}
            {{/*
            Variable substitution for passwords.
            */}}
            {{- if (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.global.elasticsearch.auth)) "true") }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "VALUES_ELASTICSEARCH_PASSWORD"
                "config" .Values.global.elasticsearch.auth
            ) | nindent 12 }}
            {{- end }}
            {{- if (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.orchestration.data.secondaryStorage.elasticsearch.auth)) "true") }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "VALUES_ELASTICSEARCH_PASSWORD"
                "config" .Values.orchestration.data.secondaryStorage.elasticsearch.auth
            ) | nindent 12 }}
            {{- end }}
            {{- if (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.global.opensearch.auth)) "true") }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "VALUES_OPENSEARCH_PASSWORD"
                "config" .Values.global.opensearch.auth
            ) | nindent 12 }}
            {{- end }}
            {{- if (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.orchestration.data.secondaryStorage.opensearch.auth)) "true") }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "VALUES_OPENSEARCH_PASSWORD"
                "config" .Values.orchestration.data.secondaryStorage.opensearch.auth
            ) | nindent 12 }}
            {{- end }}
            {{- if and .Values.orchestration.exporters.rdbms.enabled (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.orchestration.data.secondaryStorage.rdbms)) "true") }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "VALUES_ORCHESTRATION_DATA_SECONDARYSTORAGE_RDBMS_PASSWORD"
                "config" .Values.orchestration.data.secondaryStorage.rdbms
            ) | nindent 12 }}
            {{- end }}
            {{- include "camundaPlatform.emitEnvVarFromSecretConfig" (dict
                "envName" "VALUES_EXPORTERS_APPINTEGRATIONS_APIKEY"
                "config" .Values.orchestration.exporters.appIntegrations.apiKey
            ) | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "camundaPlatform.fullname" . }}-documentstore-env-vars
          {{- if .Values.orchestration.envFrom }}
            {{- .Values.orchestration.envFrom | toYaml | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.orchestration.service.httpPort }}
              name: {{ default "http" .Values.orchestration.service.httpName }}
            - containerPort: {{ .Values.orchestration.service.commandPort }}
              name: {{ default "command" .Values.orchestration.service.commandName }}
            - containerPort: {{ .Values.orchestration.service.internalPort }}
              name: {{ default "internal" .Values.orchestration.service.internalName }}
            - containerPort: {{ .Values.orchestration.service.managementPort }}
              name: {{ default "management" .Values.orchestration.service.managementName }}
            - containerPort: {{ .Values.orchestration.service.grpcPort }}
              name: {{ default "grpc" .Values.orchestration.service.grpcName }}
          {{- if .Values.orchestration.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ include "camundaPlatform.joinpath" (list .Values.orchestration.contextPath .Values.orchestration.startupProbe.probePath) }}
              scheme: {{ .Values.orchestration.startupProbe.scheme }}
              port: {{ .Values.orchestration.service.managementPort }}
            initialDelaySeconds: {{ .Values.orchestration.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.orchestration.startupProbe.periodSeconds }}
            successThreshold: {{ .Values.orchestration.startupProbe.successThreshold }}
            failureThreshold: {{ .Values.orchestration.startupProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.orchestration.startupProbe.timeoutSeconds }}
          {{- end }}
          {{- if .Values.orchestration.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ include "camundaPlatform.joinpath" (list .Values.orchestration.contextPath .Values.orchestration.readinessProbe.probePath) }}
              scheme: {{ .Values.orchestration.readinessProbe.scheme }}
              port: {{ .Values.orchestration.service.managementPort }}
            initialDelaySeconds: {{ .Values.orchestration.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.orchestration.readinessProbe.periodSeconds }}
            successThreshold: {{ .Values.orchestration.readinessProbe.successThreshold }}
            failureThreshold: {{ .Values.orchestration.readinessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.orchestration.readinessProbe.timeoutSeconds }}
          {{- end }}
          {{- if .Values.orchestration.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ include "camundaPlatform.joinpath" (list .Values.orchestration.contextPath .Values.orchestration.livenessProbe.probePath) }}
              scheme: {{ .Values.orchestration.livenessProbe.scheme }}
              port: {{ .Values.orchestration.service.managementPort }}
            initialDelaySeconds: {{ .Values.orchestration.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.orchestration.livenessProbe.periodSeconds }}
            successThreshold: {{ .Values.orchestration.livenessProbe.successThreshold }}
            failureThreshold: {{ .Values.orchestration.livenessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.orchestration.livenessProbe.timeoutSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.orchestration.resources | nindent 12 }}
          volumeMounts:
            {{- if or
              (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.global.elasticsearch.tls)) "true")
              (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.global.opensearch.tls)) "true")
              (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.orchestration.data.secondaryStorage.elasticsearch.tls)) "true")
              (eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.orchestration.data.secondaryStorage.opensearch.tls)) "true")
            }}
            - name: keystore
              mountPath: /usr/local/camunda/certificates/{{ include "camundaPlatform.getTlsSecretKey" . }}
              subPath: {{ include "camundaPlatform.getTlsSecretKey" . }}
            {{- end }}
            - name: config
              mountPath: /usr/local/bin/startup.sh
              subPath: startup.sh
            {{- if not ( eq .Values.orchestration.persistenceType "local" ) }}
            - name: data
              mountPath: /usr/local/camunda/data
            {{- end }}
            - name: exporters
              mountPath: /exporters
            - mountPath: /tmp
              name: tmp
            {{- if .Values.orchestration.log4j2 }}
            - name: config
              mountPath: /usr/local/camunda/config/log4j2.xml
              subPath: log4j2.xml
            {{- end }}
            - name: config
              mountPath: /usr/local/camunda/config/application.yaml
              subPath: application.yaml
            {{- with .Values.orchestration.extraConfiguration }}
            {{- include "camundaPlatform.extraConfigurationVolumeMounts" (dict "extraConfig" . "volumeName" "config" "basePath" "/usr/local/camunda/config") | trim | nindent 12 }}
            {{- end }}
            {{- if .Values.global.documentStore.type.gcp.enabled }}
            - name: gcp-credentials-volume
              mountPath: {{ .Values.global.documentStore.type.gcp.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if eq (include "camundaPlatform.hasCaBundle" .) "true" }}
            {{- include "camundaPlatform.caBundleVolumeMount" . | nindent 12 }}
            {{- include "camundaPlatform.caBundleTruststoreVolumeMount" . | nindent 12 }}
            {{- end }}
            {{- if .Values.global.tls.orchestration.rest.enabled }}
            {{- $restCertRef := include "camundaPlatform.orchestrationTLSCertRef" (dict "context" . "proto" "rest") | fromYaml }}
            {{- $restKeyRef := include "camundaPlatform.orchestrationTLSPrivateKeyRef" (dict "context" . "proto" "rest") | fromYaml }}
            {{- if $restCertRef.name }}
            - name: orchestration-tls-rest
              mountPath: /usr/local/camunda/certificates/orchestration/rest
              readOnly: true
            {{- end }}
            {{- if and $restKeyRef.name (ne $restKeyRef.name $restCertRef.name) }}
            - name: orchestration-tls-rest-key
              mountPath: /usr/local/camunda/certificates/orchestration/rest/key
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if .Values.global.tls.orchestration.grpc.enabled }}
            {{- $grpcCertRef := include "camundaPlatform.orchestrationTLSCertRef" (dict "context" . "proto" "grpc") | fromYaml }}
            {{- $grpcKeyRef := include "camundaPlatform.orchestrationTLSPrivateKeyRef" (dict "context" . "proto" "grpc") | fromYaml }}
            {{- if $grpcCertRef.name }}
            - name: orchestration-tls-grpc
              mountPath: /usr/local/camunda/certificates/orchestration/grpc
              readOnly: true
            {{- end }}
            {{- if and $grpcKeyRef.name (ne $grpcKeyRef.name $grpcCertRef.name) }}
            - name: orchestration-tls-grpc-key
              mountPath: /usr/local/camunda/certificates/orchestration/grpc/key
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if .Values.orchestration.extraVolumeMounts }}
            {{ .Values.orchestration.extraVolumeMounts | toYaml | nindent 12 }}
            {{- end }}
      {{- if .Values.orchestration.sidecars }}
      {{- .Values.orchestration.sidecars | toYaml | nindent 8 }}
      {{- end }}
      volumes:
        {{- if eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.global.elasticsearch.tls)) "true" }}
        {{- include "camundaPlatform.emitTlsVolumeFromSecretConfig" (dict
            "volumeName" "keystore"
            "config" .Values.global.elasticsearch.tls
        ) | nindent 8 }}
        {{- else if eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.global.opensearch.tls)) "true" }}
        {{- include "camundaPlatform.emitTlsVolumeFromSecretConfig" (dict
            "volumeName" "keystore"
            "config" .Values.global.opensearch.tls
        ) | nindent 8 }}
        {{- else if eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.orchestration.data.secondaryStorage.elasticsearch.tls)) "true" }}
        {{- include "camundaPlatform.emitTlsVolumeFromSecretConfig" (dict
            "volumeName" "keystore"
            "config" .Values.orchestration.data.secondaryStorage.elasticsearch.tls
        ) | nindent 8 }}
        {{- else if eq (include "camundaPlatform.hasSecretConfig" (dict "config" .Values.orchestration.data.secondaryStorage.opensearch.tls)) "true" }}
        {{- include "camundaPlatform.emitTlsVolumeFromSecretConfig" (dict
            "volumeName" "keystore"
            "config" .Values.orchestration.data.secondaryStorage.opensearch.tls
        ) | nindent 8 }}
        {{- end }}
        {{- if eq .Values.orchestration.persistenceType "memory" }}
        - name: data
          emptyDir:
            medium: "Memory"
        {{- end }}
        - name: config
          configMap:
            name: {{ include "orchestration.fullname" . }}-configuration
            defaultMode: {{ .Values.orchestration.configMap.defaultMode }}
        - name: exporters
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if .Values.global.documentStore.type.gcp.enabled }}
        {{- include "camundaPlatform.emitVolumeFromSecretConfig" (dict
            "volumeName" "gcp-credentials-volume"
            "config" .Values.global.documentStore.type.gcp
            "fileName" .Values.global.documentStore.type.gcp.fileName
        ) | nindent 8 }}
        {{- end }}
        {{- if eq (include "camundaPlatform.hasCaBundle" .) "true" }}
        {{- include "camundaPlatform.caBundleVolume" . | nindent 8 }}
        {{- include "camundaPlatform.caBundleTruststoreVolume" . | nindent 8 }}
        {{- end }}
        {{- if .Values.global.tls.orchestration.rest.enabled }}
        {{- $restCertRef := include "camundaPlatform.orchestrationTLSCertRef" (dict "context" . "proto" "rest") | fromYaml }}
        {{- $restKeyRef := include "camundaPlatform.orchestrationTLSPrivateKeyRef" (dict "context" . "proto" "rest") | fromYaml }}
        {{- if $restCertRef.name }}
        - name: orchestration-tls-rest
          secret:
            secretName: {{ $restCertRef.name }}
            defaultMode: 0440
        {{- end }}
        {{- if and $restKeyRef.name (ne $restKeyRef.name $restCertRef.name) }}
        - name: orchestration-tls-rest-key
          secret:
            secretName: {{ $restKeyRef.name }}
            defaultMode: 0440
        {{- end }}
        {{- end }}
        {{- if .Values.global.tls.orchestration.grpc.enabled }}
        {{- $grpcCertRef := include "camundaPlatform.orchestrationTLSCertRef" (dict "context" . "proto" "grpc") | fromYaml }}
        {{- $grpcKeyRef := include "camundaPlatform.orchestrationTLSPrivateKeyRef" (dict "context" . "proto" "grpc") | fromYaml }}
        {{- if $grpcCertRef.name }}
        - name: orchestration-tls-grpc
          secret:
            secretName: {{ $grpcCertRef.name }}
            defaultMode: 0440
        {{- end }}
        {{- if and $grpcKeyRef.name (ne $grpcKeyRef.name $grpcCertRef.name) }}
        - name: orchestration-tls-grpc-key
          secret:
            secretName: {{ $grpcKeyRef.name }}
            defaultMode: 0440
        {{- end }}
        {{- end }}
        {{- if .Values.orchestration.extraVolumes }}
          {{ .Values.orchestration.extraVolumes | toYaml | nindent 8 }}
        {{- end }}
      serviceAccountName: {{ include "orchestration.serviceAccountName" . }}
      {{- if .Values.orchestration.hostNetwork }}
      hostNetwork: true
      {{- end }}
      {{- if .Values.orchestration.dnsConfig }}
      dnsConfig: {{- toYaml .Values.orchestration.dnsConfig | nindent 8 }}
      {{- end }}
      {{- if .Values.orchestration.dnsPolicy }}
      dnsPolicy: {{ .Values.orchestration.dnsPolicy | quote }}
      {{- else if .Values.orchestration.hostNetwork }}
      dnsPolicy: "ClusterFirstWithHostNet"
      {{- end }}
      {{- if .Values.orchestration.podSecurityContext }}
      securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" $.Values.orchestration.podSecurityContext "context" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestration.nodeSelector | default .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYamlPretty . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestration.affinity }}
      affinity:
        {{- toYamlPretty . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestration.tolerations }}
      tolerations:
        {{- toYamlPretty . | nindent 8 }}
      {{- end }}
  {{- if eq .Values.orchestration.persistenceType "disk" }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
        annotations:
          {{- toYaml .Values.orchestration.pvcAnnotations | nindent 10 }}
      spec:
        accessModes: {{ .Values.orchestration.pvcAccessModes }}
        {{- if .Values.orchestration.pvcStorageClassName }}
        {{- if (eq "-" .Values.orchestration.pvcStorageClassName) }}
        storageClassName: ""
        {{- else }}
        storageClassName: {{ .Values.orchestration.pvcStorageClassName }}
        {{- end }}
        {{- end }}
        {{- if .Values.orchestration.pvcSelector }}
        {{- with .Values.orchestration.pvcSelector }}
        selector: {{ toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.orchestration.pvcSize | quote }}
      {{- if .Values.orchestration.extraVolumeClaimTemplates }}
      {{- toYaml .Values.orchestration.extraVolumeClaimTemplates | nindent 4 }}
      {{- end }}
  {{- end }}
{{- end }}
