# Minimal PostgreSQL chart values — CI use only.
# Not intended for production deployments.

## @param fullnameOverride Override the full resource name (e.g., "postgresql").
fullnameOverride: ""

## @param nameOverride Override the chart name portion of resource names.
nameOverride: ""

image:
  registry: docker.io
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

## @param imagePullSecrets Array of image pull secret names.
imagePullSecrets: []

auth:
  ## @param auth.username PostgreSQL user.
  username: app
  ## @param auth.password PostgreSQL password (ignored if existingSecret is set).
  password: ""
  ## @param auth.existingSecret Existing Secret containing the PostgreSQL password.
  existingSecret: ""
  ## @param auth.passwordSecretKey Key within the existing Secret holding the password.
  passwordSecretKey: "postgresql-password"
  ## @param auth.database Initial database created by the image.
  database: identity

## Additional databases created during container initialization.
databases:
  - identity
  - webmodeler

service:
  type: ClusterIP
  port: 5432
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

## @param podAnnotations Additional annotations for PostgreSQL pods.
podAnnotations: {}

## @param nodeSelector Node selector for PostgreSQL pods.
nodeSelector: {}

## @param tolerations Tolerations for PostgreSQL pods.
tolerations: []
