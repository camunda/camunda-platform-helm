{{- if .Values.tls.enabled }}
{{- /*
  Generate a self-signed CA and a server certificate at render time. SANs cover
  the in-cluster service name (short, namespaced, and FQDN) so clients
  connecting via any of those hostnames pass `sslmode=verify-full`. This is the
  single place certs are generated; the Deployment only mounts this Secret.
  CI-only: regenerates on every render and is therefore not upgrade-safe.
*/ -}}
{{- $svc := include "postgresql.fullname" . -}}
{{- $days := int .Values.tls.certValidityDays -}}
{{- $altNames := list $svc (printf "%s.%s" $svc .Release.Namespace) (printf "%s.%s.svc" $svc .Release.Namespace) (printf "%s.%s.svc.cluster.local" $svc .Release.Namespace) -}}
{{- $ca := genCA (printf "%s-ca" $svc) $days -}}
{{- $cert := genSignedCert $svc nil $altNames $days $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgresql.tlsSecretName" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  ca.crt: {{ $ca.Cert | b64enc | quote }}
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
{{- end }}
