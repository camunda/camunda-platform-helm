{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgresql.fullname" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
type: Opaque
data:
  {{ include "postgresql.secretKey" . }}: {{ .Values.auth.password | default "postgresql" | b64enc | quote }}
{{- end }}
