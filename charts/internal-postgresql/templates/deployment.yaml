apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "postgresql.fullname" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "postgresql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "postgresql.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.tls.enabled }}
      # Pin to the alpine postgres user so the staged key (chmod 0600) is owned
      # by the running process; PostgreSQL refuses a world-readable key file.
      securityContext:
        fsGroup: 70
      initContainers:
        # Secret volumes mount root-owned and world-readable; copy the cert
        # material to an emptyDir, tighten the key to 0600, and hand ownership
        # to uid 70 (the postgres user) before PostgreSQL starts.
        - name: stage-tls
          image: {{ include "postgresql.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -eu
              cp /tls-src/ca.crt /tls-src/tls.crt /tls-src/tls.key /tls/
              chmod 0600 /tls/tls.key
              chmod 0644 /tls/ca.crt /tls/tls.crt
              chown 70:70 /tls/ca.crt /tls/tls.crt /tls/tls.key
          volumeMounts:
            - name: tls-src
              mountPath: /tls-src
              readOnly: true
            - name: tls
              mountPath: /tls
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgresql
          image: {{ include "postgresql.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.tls.enabled }}
          args:
            - -c
            - ssl=on
            - -c
            - ssl_cert_file=/tls/tls.crt
            - -c
            - ssl_key_file=/tls/tls.key
            - -c
            - ssl_ca_file=/tls/ca.crt
          {{- end }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql.secretName" . }}
                  key: {{ include "postgresql.secretKey" . }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.auth.username | quote }}
                - -d
                - {{ .Values.auth.database | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.auth.username | quote }}
                - -d
                - {{ .Values.auth.database | quote }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
      volumes:
        - name: data
          emptyDir: {}
        - name: initdb
          configMap:
            name: {{ include "postgresql.fullname" . }}-initdb
            defaultMode: 0755
        {{- if .Values.tls.enabled }}
        - name: tls-src
          secret:
            secretName: {{ include "postgresql.tlsSecretName" . }}
        - name: tls
          emptyDir: {}
        {{- end }}
