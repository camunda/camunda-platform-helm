ingress:
  enabled: true
  ingressClassName: nginx
  hostname: keycloak-24-9-0.ci.distro.ultrawombat.com
  pathType: Prefix
  path: /auth/
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls: true
  extraTls:
    - hosts:
        - keycloak-24-9-0.ci.distro.ultrawombat.com
      secretName: camunda-platform

# --- CI-oriented Keycloak setup (non-production) ---
# Scaled vertically for ~700 concurrent realms.
# Two replicas so the StatefulSet RollingUpdate keeps one pod serving while the other restarts.
replicaCount: 2

resources:
  requests:
    cpu: "4"
    memory: 12Gi
  limits:
    cpu: "6"
    memory: 16Gi

service:
  type: ClusterIP
  ports:
    http: 8080

image:
  registry: docker.io
  repository: bitnamilegacy/keycloak
  pullPolicy: IfNotPresent

# Probes tuned for slower startup under 700-realm load.
startupProbe:
  enabled: true
  initialDelaySeconds: 90
  periodSeconds: 10
  failureThreshold: 30
livenessProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 20
  failureThreshold: 5
readinessProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 5

auth:
  adminUser: admin
  existingSecret: infra-credentials
  passwordSecretKey: keycloak-admin-password

podAntiAffinityPreset: "soft"
updateStrategy:
  type: RollingUpdate
pdb:
  create: true
  minAvailable: 1

global:
  security:
    allowInsecureImages: true

httpRelativePath: /auth/

# Two replicas: enable distributed Infinispan cache for session replication.
cache:
  enabled: true
  stack: kubernetes

postgresql:
  primary:
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    extendedConfiguration: |
      max_connections = 300
      shared_buffers = 1GB
      effective_cache_size = 3GB
      work_mem = 8MB
  image:
    repository: bitnamilegacy/postgresql

# --- Critical for ingress behind TLS ---
proxy: edge
extraEnvVars:
  - name: KC_PROXY
    value: edge
  - name: KC_HOSTNAME
    value: keycloak-24-9-0.ci.distro.ultrawombat.com
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "true"
  # JVM heap sized for ~700 concurrent realms (~10 GB heap).
  # NOTE: JAVA_OPTS_APPEND is set by the chart's ConfigMap for JGroups DNS discovery
  # (cache.enabled=true). We use JAVA_OPTS for heap/metaspace so both take effect.
  - name: JAVA_OPTS
    value: "-Xms8g -Xmx10g -XX:MaxMetaspaceSize=512m"
  # DB connection pool: raised from default (100) to handle 700 concurrent realms.
  - name: KC_DB_POOL_MIN_SIZE
    value: "50"
  - name: KC_DB_POOL_MAX_SIZE
    value: "200"
  - name: KC_DB_POOL_INITIAL_SIZE
    value: "50"
