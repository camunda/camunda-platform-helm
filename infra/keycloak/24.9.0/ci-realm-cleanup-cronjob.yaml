# CronJob: Automated cleanup of ORPHANED CI-created Keycloak realms.
#
# CI test jobs create Keycloak realms via two naming conventions:
#   1. Go CLI (generateCompactRealmName): {scenario}-{8-char-suffix}
#      e.g. "keycloak-mt-a8x9z3k1"
#   2. GitHub Actions (workflow-vars):    {6-hex-job-id}-realm
#      e.g. "d6da2c-realm"
#
# When CI jobs finish and K8s namespaces are deleted, the realms persist
# in Keycloak as orphans.
#
# Orphan detection uses namespace cross-reference only (local filtering,
# no per-realm API calls — critical for performance at 400+ realms):
#   - Get all realm names + enabled status in a single API call.
#   - Get all active K8s namespace names.
#   - A CI-pattern realm is orphaned if its identifier does not appear
#     in any active namespace name.
# The "master" realm is always protected.
#
# Two-phase cleanup (disable-then-delete):
#   Phase 2a: DISABLE enabled orphans (~0.5s each, 10 parallel).
#     Disabled realms return "403 Realm not enabled" on auth attempts,
#     immediately stopping CLIENT_LOGIN_ERROR spam.
#   Phase 2b: DELETE already-disabled orphans in small batches
#     (DELETE_BATCH_SIZE per run, default 20, 2 parallel).
#     Deletion is slow (~20-30s each) so batching prevents timeout.
#
# The cleanup script lives in scripts/ci-cleanup-keycloak-realms.sh and is
# mounted into the pod via a ConfigMap (ci-cleanup-script-keycloak). The
# ConfigMap is created by deploy-keycloak.sh from that script file.
#
# This CronJob runs every 15 minutes.
#
# RBAC: Requires cluster-level namespace list permission (for cross-reference).
#
# Deploy: scripts/deploy-keycloak.sh (creates ConfigMap + applies this file)
#
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-realm-cleanup
  namespace: distribution-keycloak-24-9-0
  labels:
    app.kubernetes.io/name: ci-realm-cleanup
    app.kubernetes.io/component: maintenance
    app.kubernetes.io/part-of: keycloak
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ci-realm-cleanup
  namespace: distribution-keycloak-24-9-0
  labels:
    app.kubernetes.io/name: ci-realm-cleanup
    app.kubernetes.io/component: maintenance
    app.kubernetes.io/part-of: keycloak
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ci-realm-cleanup
        spec:
          serviceAccountName: ci-realm-cleanup
          restartPolicy: OnFailure
          volumes:
            - name: cleanup-script
              configMap:
                name: ci-cleanup-script-keycloak
                defaultMode: 0755
          containers:
            - name: cleanup
              image: bitnamilegacy/os-shell:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: KEYCLOAK_URL
                  value: "http://keycloak:8080"
                - name: KEYCLOAK_USER
                  value: "admin"
                - name: KEYCLOAK_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: infra-credentials
                      key: keycloak-admin-password
              volumeMounts:
                - name: cleanup-script
                  mountPath: /scripts
                  readOnly: true
              command:
                - /scripts/ci-cleanup-keycloak-realms.sh
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
