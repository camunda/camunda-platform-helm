# CI values for the embedded Elasticsearch companion chart (elastic/elasticsearch).
# Security/X-Pack disabled, single node, minimal resources for CI/dev environments.
#
# Deployed as a separate Helm release by deploy-camunda before the main
# Camunda chart. Referenced from ci-test-config.yaml dependencies.

clusterName: "elasticsearch"

replicas: 1
minimumMasterNodes: 1

protocol: http

# Single-node disco + disable HTTP TLS + disable X-Pack security so Camunda
# can talk to the cluster anonymously over plain HTTP (mirrors the OpenSearch
# companion chart's "security disabled" stance).
#
# NOTE: discovery.type: single-node is NOT set here because the
# elastic/elasticsearch chart injects cluster.initial_master_nodes via an env
# var in the StatefulSet template, and ES 8.x rejects having both. With
# replicas=1 the chart bootstraps correctly without the explicit single-node
# setting.
esConfig:
  elasticsearch.yml: |
    cluster.name: elasticsearch
    network.host: 0.0.0.0
    xpack.security.enabled: false
    xpack.security.http.ssl.enabled: false
    xpack.security.transport.ssl.enabled: false

extraEnvs:
  - name: ES_JAVA_OPTS
    value: "-Xms512m -Xmx512m"

# Single-node clusters cannot allocate index replicas. Camunda components
# create indices with an explicit number_of_replicas=1 in the create request,
# which leaves every replica unassigned, drives the cluster to yellow, and
# causes intermittent "all shards failed" 503s on _search calls (Zeebe
# exporter background jobs, Optimize fetchers, orchestration
# cluster-variables endpoint).
#
# Explicit settings in a create-index request override matching template
# settings, so a template that only sets number_of_replicas=0 has no effect.
# auto_expand_replicas is not sent by Camunda, so it merges in cleanly — and
# per Elasticsearch precedence, auto_expand_replicas overrides any explicit
# number_of_replicas. On a 1-node cluster auto_expand_replicas: 0-1 settles
# at 0; on a 2-node cluster it scales to 1.
#
# Deploy-camunda installs companion charts with helm install --wait, which
# blocks until post-install hooks complete, so the template is registered
# before the main Camunda chart starts creating indices.
#
# Index patterns are intentionally substring globs (e.g. "*operate*") rather
# than prefix globs ("operate-*"). CI prepends $GITHUB_WORKFLOW_JOB_ID to
# every component prefix via .github/actions/workflow-vars/action.yaml, so
# real indices look like "8d2802-operate-install-...". Substring matching
# covers that, the default "<component>-*" naming, and the hardcoded
# "custom-zeebe" prefix used by 8.10 in persistence/elasticsearch.yaml. None
# of Elasticsearch's system indices (.security-7, .kibana_*, .tasks) contain
# those substrings.
extraObjects:
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: elasticsearch-auto-expand-replicas
      annotations:
        helm.sh/hook: post-install,post-upgrade
        helm.sh/hook-weight: "5"
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    spec:
      backoffLimit: 6
      activeDeadlineSeconds: 120
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: register-template
              image: curlimages/curl:8.10.1
              command:
                - sh
                - -c
                - |
                  set -eu
                  max=30
                  n=0
                  until curl -fsS --connect-timeout 5 "http://elasticsearch-master:9200/_cluster/health" >/dev/null 2>&1; do
                    n=$((n + 1))
                    if [ "$n" -ge "$max" ]; then
                      echo "elasticsearch-master not reachable after $max attempts" >&2
                      exit 1
                    fi
                    echo "waiting for elasticsearch... ($n/$max)"
                    sleep 2
                  done
                  curl -fsS --connect-timeout 5 -X PUT "http://elasticsearch-master:9200/_index_template/camunda-ci-auto-expand-replicas" \
                    -H 'Content-Type: application/json' \
                    -d '{"index_patterns":["*operate*","*orchestration*","*optimize*","*tasklist*","*camunda*","*zeebe*"],"priority":500,"template":{"settings":{"index.auto_expand_replicas":"0-1"}}}'
                  echo
                  echo "template registered"

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "2Gi"

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 4Gi
