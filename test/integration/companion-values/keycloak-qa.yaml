# Companion values for internal-keycloak-26 chart (QA variant).
# Adds qa-workloads nodeSelector and tolerations so pods schedule on the
# dedicated QA node pool.
#
# Referenced from ci-test-config.yaml qa-* scenario dependencies.

fullnameOverride: keycloak

image:
  registry: quay.io
  repository: keycloak/keycloak
  tag: "26.3.3"

auth:
  adminUser: admin
  existingSecret: integration-test-credentials
  passwordSecretKey: identity-keycloak-admin-password

httpRelativePath: "/auth/"
proxy: edge

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# QA-specific: schedule on qa-workloads nodes.
nodeSelector:
  workload: qa-workloads
tolerations:
  - effect: NoSchedule
    key: workload
    operator: Equal
    value: qa-workloads

postgresql:
  enabled: true
  auth:
    database: keycloak
    username: keycloak
    password: "keycloak-ci-password"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  nodeSelector:
    workload: qa-workloads
  tolerations:
    - effect: NoSchedule
      key: workload
      operator: Equal
      value: qa-workloads
