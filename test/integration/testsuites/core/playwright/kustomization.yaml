apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

nameSuffix: -core

resources:
- ../../base/playwright

configMapGenerator:
- name: playwright-fixtures
  options:
    disableNameSuffixHash: true
  behavior: merge
  files:
  - files/test-inbound-process.bpmn
  - files/test-process.bpmn

patches:
- path: patches/job.yaml
  target:
    group: batch
    version: v1
    kind: Job
    name: ".*playwright.*"
