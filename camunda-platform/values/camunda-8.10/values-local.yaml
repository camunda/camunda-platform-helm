#
# This values file is used for local development and testing.
# It disables some features and reduces the resource requirements to run the Camunda Platform locally.
#
global:
  identity:
    auth:
      # Disable the Identity authentication for local development
      # it will fall back to basic-auth: demo/demo as default user
      enabled: false

#
# Management Cluster.
#

identity:
  enabled: false

#
# Orchestration Cluster.
#

orchestration:
  clusterSize: "1"
  partitionCount: "1"
  replicationFactor: "1"
  pvcSize: 10Gi
  data:
    secondaryStorage:
      type: elasticsearch
      elasticsearch:
        url: http://elasticsearch-es-http:9200
        auth:
          username: elastic
          secret:
            existingSecret: elasticsearch-es-elastic-user
            existingSecretKey: elastic

optimize:
  enabled: false
