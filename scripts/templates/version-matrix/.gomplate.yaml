plugins:
  helmCLIVersions:
    cmd: scripts/generate-version-matrix.sh
    args:
      - --helm-cli-versions
    timeout: 30s
  chartImagesCamunda:
    cmd: scripts/generate-version-matrix.sh
    args:
      - --chart-images-camunda
    timeout: 30s
  chartImagesNonCamunda:
    cmd: scripts/generate-version-matrix.sh
    args:
      - --chart-images-non-camunda
    timeout: 30s
  chartImagesEnterprise:
    cmd: scripts/generate-version-matrix.sh
    args:
      - --chart-images-enterprise
    timeout: 30s
